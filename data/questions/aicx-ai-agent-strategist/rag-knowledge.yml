questions:
  - id: "aicx-rag-001"
    text: "RAG（Retrieval-Augmented Generation）が業務利用で広く採用される主な理由として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "LLMをファインチューニングするより低コスト・短期間で社内固有知識を活用でき、知識の更新・削除も容易だから"
        explanation: "正しい。RAGは外部知識を推論時に注入する仕組みのため、モデル再学習を要せず、文書を入れ替えれば即座に知識更新が可能。社内文書・規程・FAQなど機密性の高い情報を学習させずに活用できる点が、企業導入の追い風となっている。ファインチューニングと併用するハイブリッド戦略もある。"
      - id: "b"
        text: "RAGを使えばハルシネーションが完全に消滅するから"
        explanation: "誤り。RAGはハルシネーション抑制に有効だが完全に消滅はしない。検索された文書を誤解釈する、文書外の情報で補完してしまう、矛盾を起こすなどのケースは依然存在する。設計と評価が依然必要。"
      - id: "c"
        text: "RAGはLLMより安価な代替技術であり、LLM不要になるから"
        explanation: "誤り。RAGはLLMを前提とする技術であり、LLMの代替ではない。検索＋生成の組み合わせである。"
      - id: "d"
        text: "RAGを使えば学習データセットを公開する義務が免除されるから"
        explanation: "誤り。法的義務とRAG採用は無関係である。"
    answer: "a"

  - id: "aicx-rag-002"
    text: "RAGにおける『埋め込み（embedding）』の役割として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "テキストを高次元の密ベクトルに変換し、意味的な類似性を距離計算で評価できるようにする"
        explanation: "正しい。埋め込みモデル（例：text-embedding-3、E5、bge-mシリーズ）はテキストの意味を数百〜数千次元のベクトル空間に写像する。コサイン類似度や内積で関連度を測定でき、これがベクトル検索の基礎となる。埋め込みモデルの選定は検索品質を直接左右するため、ドメイン適合性・多言語性・次元数・コストのバランスで選ぶ。"
      - id: "b"
        text: "テキストを画像に変換する処理"
        explanation: "誤り。テキスト埋め込みはテキスト→ベクトルの変換で、画像生成ではない。"
      - id: "c"
        text: "テキストを暗号化する処理"
        explanation: "誤り。埋め込みは可逆ではないが暗号化を目的とした技術ではない。むしろ埋め込みからの逆変換攻撃（embedding inversion）が研究されており、PII等の取り扱いには注意が必要である。"
      - id: "d"
        text: "テキストの誤字を修正する処理"
        explanation: "誤り。誤字修正は校正タスクの話で、埋め込みとは無関係である。"
    answer: "a"

  - id: "aicx-rag-003"
    text: "RAGにおける『チャンキング（chunking／文書分割）』戦略の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "文書を意味的・構造的に適切な単位で分割することで、検索精度・コンテキスト効率・回答精度を向上させる"
        explanation: "正しい。チャンクが大きすぎると関連性のない情報まで混入し精度が下がり、コストも増える。小さすぎると文脈が分断され回答が不完全になる。一般的には数百〜千トークン程度を目安に、見出し・段落・センテンス境界を考慮した分割が望ましい。重複（overlap）を持たせて文脈断絶を緩和する手法もある。"
      - id: "b"
        text: "文書を1文字ずつに分割することが最適"
        explanation: "誤り。1文字単位では意味的な情報が失われ、検索性能が著しく低下する。実用的でない。"
      - id: "c"
        text: "文書を分割せず丸ごと埋め込むのが最も精度が高い"
        explanation: "誤り。長文を1ベクトルに圧縮すると意味が平均化され、特定のトピックに対する検索精度が落ちる。また検索結果として返した際にコンテキストが膨大になりコスト・精度両面で不利。"
      - id: "d"
        text: "チャンク化はファイル容量を削減する圧縮技術"
        explanation: "誤り。チャンキングは検索品質のための分割であり、容量圧縮ではない。"
    answer: "a"

  - id: "aicx-rag-004"
    text: "ベクトル検索と全文検索（キーワード検索）を組み合わせる『ハイブリッド検索』の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "意味検索の柔軟性とキーワード検索の正確性を両立し、固有名詞・型番・略語などの取り逃しを減らせる"
        explanation: "正しい。ベクトル検索は意味的に近い文書を見つけるのが得意だが、製品型番・人名・特殊コードなど『そのものを正確に当てる』必要がある場面では全文検索（BM25等）が強い。両者をスコア統合（RRF：Reciprocal Rank Fusionなど）するハイブリッド検索は、エンタープライズRAGで広く採用されている。"
      - id: "b"
        text: "ハイブリッド検索はベクトル検索より常に低速である"
        explanation: "誤り。両者を並列実行することでレイテンシ増は限定的。むしろ品質向上のメリットの方が大きい場合が多い。"
      - id: "c"
        text: "全文検索だけで十分なため、ハイブリッドは不要"
        explanation: "誤り。同義語・言い換え・意図検索ではベクトル検索が圧倒的に強く、全文検索のみでは取りこぼしが多い。"
      - id: "d"
        text: "ベクトル検索のみで全要件を満たせるため、ハイブリッドは不要"
        explanation: "誤り。固有名詞・略語の正確一致、否定検索、フィルタリングなど、全文検索やフィルタが必要なケースは多い。"
    answer: "a"

  - id: "aicx-rag-005"
    text: "RAGの『リランキング（reranking）』の役割として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "1次検索で取得した候補文書を、より精密なモデル（クロスエンコーダ等）で再評価し、最終的な順位を決定する処理"
        explanation: "正しい。1次検索（バイエンコーダ）は高速だが精度に限界があり、上位候補をクロスエンコーダ（例：Cohere Rerank、bge-reranker）で並べ替えることで関連度を大幅に向上できる。コストはかかるが、上位N件のみ対象とすればコストを抑えられる。RAGの精度向上施策として費用対効果が高い手段の一つ。"
      - id: "b"
        text: "ベクトルDB内で文書を物理的に並び替える保守作業"
        explanation: "誤り。物理的な再配置ではなく、検索結果の順序を再決定する処理である。"
      - id: "c"
        text: "ユーザーの好みに合わせて推薦する協調フィルタリング"
        explanation: "誤り。それは推薦システムの話であり、RAG文脈のリランキングとは別である。"
      - id: "d"
        text: "ベクトルDBのサイズを削減するコンパクション"
        explanation: "誤り。ストレージ最適化作業とは別である。"
    answer: "a"

  - id: "aicx-rag-006"
    text: "RAGの『回答品質低下』の原因と対策の組み合わせとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "原因＝関連文書が検索ヒットしない／対策＝チャンキング見直し・埋め込みモデル変更・クエリリライト"
        explanation: "正しい。RAGの失敗の多くは『検索段階で関連文書が取れていない』に起因する。対策はチャンク粒度・埋め込みモデル・メタデータ付与・クエリ変換（HyDE、クエリ拡張など）といった検索品質改善が中心。LLMの推論ではなく検索を改善するのがコスパが高い。"
      - id: "b"
        text: "原因＝LLMの応答スタイルが堅い／対策＝モデルサイズを大きくする"
        explanation: "誤り。応答スタイルとモデルサイズは直接関係ない。スタイル変更はプロンプト設計の話である。"
      - id: "c"
        text: "原因＝コンテキストウィンドウが小さい／対策＝チャンキングをやめる"
        explanation: "誤り。チャンキングをやめても検索品質は改善しない。むしろ逆効果。"
      - id: "d"
        text: "原因＝GPU不足／対策＝サーバーを増設する"
        explanation: "誤り。インフラ問題と検索品質は別である。"
    answer: "a"

  - id: "aicx-rag-007"
    text: "RAGにおける『クエリリライト（query rewriting）』の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ユーザーの曖昧・多義・口語的な質問を検索に適した形式に変換し、検索ヒット率と精度を向上させる"
        explanation: "正しい。例：『この前の話、どうなった？』のような文脈依存質問を、会話履歴を踏まえて『2025年Q3売上の予算未達原因について議論した結果は？』に書き換える。HyDE（Hypothetical Document Embeddings）、Step-Back Prompting、Multi-Queryなどの手法もある。検索精度が向上する効果が大きく、RAG高度化の標準テクニックとなっている。"
      - id: "b"
        text: "ユーザーが入力した質問を文字数制限内に収めるための短縮化"
        explanation: "誤り。短縮ではなく、検索に適した変換である。情報を増やす方向の変換も多い。"
      - id: "c"
        text: "ユーザーの誤字を修正する単純な校正処理"
        explanation: "誤り。校正は副次的効果に留まり、本質的な意義は意味的な変換である。"
      - id: "d"
        text: "クエリを暗号化して送信するセキュリティ対策"
        explanation: "誤り。それは通信暗号化の話であり、クエリリライトとは別概念。"
    answer: "a"

  - id: "aicx-rag-008"
    text: "RAGの『メタデータフィルタリング』の活用例として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ベクトル類似度に加え、文書の発行日・部署・機密区分・言語などの属性で絞り込み、関連性と権限制御を両立する"
        explanation: "正しい。例：『マーケ部の2024年以降の文書のみ』『閲覧権限がある文書のみ』など、ベクトル検索を絞り込むフィルタを併用する。エンタープライズRAGでは権限制御（row-level security相当）が必須要件であり、メタデータベースのフィルタリングは設計の中核となる。検索品質向上にも寄与する。"
      - id: "b"
        text: "ベクトル検索に勝るので、ベクトル検索を不要にする"
        explanation: "誤り。フィルタリングは併用する補助手段であり、ベクトル検索の代替ではない。"
      - id: "c"
        text: "メタデータは個人情報そのものなので使うべきではない"
        explanation: "誤り。メタデータは多くの場合、個人情報ではなく文書管理上の属性である。混同すべきではない。"
      - id: "d"
        text: "メタデータフィルタは応答速度を遅くするので使うべきでない"
        explanation: "誤り。むしろ事前フィルタで検索範囲を絞ることで高速化する場合が多い。"
    answer: "a"

  - id: "aicx-rag-009"
    text: "ベクトルDB選定における観点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "データ規模・QPS要件・フィルタリング機能・分散性能・運用負荷・コストを総合的に評価する"
        explanation: "正しい。代表的選択肢にはPinecone、Weaviate、Milvus、Qdrant、pgvector（PostgreSQL拡張）、Redis、Azure AI Searchなどがあり、データ規模・運用形態・既存スタック親和性により最適解が異なる。マネージド vs セルフホスト、専用DB vs 既存DB拡張のトレードオフも戦略判断点。"
      - id: "b"
        text: "ベクトルDBはどれも同じ性能なので価格だけで選ぶ"
        explanation: "誤り。性能・機能・スケーラビリティ・運用性が大きく異なるため価格だけの判断は危険である。"
      - id: "c"
        text: "ベクトルDBは無料サービスを選ぶべき"
        explanation: "誤り。コストは重要要素だが無料優先は本番運用で問題を生むことが多い。SLA・サポート・スケーラビリティの保証が必要。"
      - id: "d"
        text: "クラウドベンダーが提供するものを必ず使うべき"
        explanation: "誤り。要件次第で選択肢は柔軟であるべき。盲目的なベンダー選定はロックインリスクを生む。"
    answer: "a"

  - id: "aicx-rag-010"
    text: "RAGにおける『チャンクサイズの設計』に関する一般的な指針として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ドメイン特性・想定質問・モデル文脈長・コストを踏まえ、典型的には数百〜千トークン程度を目安に試行錯誤する"
        explanation: "正しい。FAQ・短文回答が主なら小さめ、技術文書・法令など段落単位で意味が完結するなら大きめが適する。固定値にこだわらず、評価データで品質を測りながらチューニングするのが定石。階層チャンク（小チャンクで検索、大チャンクで生成に渡す）などの工夫もある。"
      - id: "b"
        text: "常に一律で5000トークンに固定する"
        explanation: "誤り。一律値はドメインや質問特性に合わない。むしろ評価駆動の最適化が重要。"
      - id: "c"
        text: "チャンクサイズは検索品質に影響しない"
        explanation: "誤り。チャンクサイズはRAG品質を最も左右するハイパーパラメータの一つである。"
      - id: "d"
        text: "チャンクサイズは小さいほど常に良い"
        explanation: "誤り。小さすぎると文脈分断が起き、回答精度が下がる。極端な極小化は害悪である。"
    answer: "a"

  - id: "aicx-rag-011"
    text: "RAGにおける『多段検索（multi-step retrieval）』の利点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "1回の検索では足りない複雑質問に対し、サブ質問への分解・段階的検索・統合により回答精度を高められる"
        explanation: "正しい。例：『製品Aと製品Bの違いを規制要件と性能の観点で比較して』のような質問は、1回の検索では片方の情報しか取れないことが多い。サブ質問への分解（query decomposition）と各々の検索を組み合わせるエージェンティックRAGが有効。LangGraphやLlamaIndexのSubQuestion Engineなどで実装される。"
      - id: "b"
        text: "応答時間を短縮できる"
        explanation: "誤り。多段検索は逆に時間がかかる傾向にあり、品質と時間のトレードオフを意識する必要がある。"
      - id: "c"
        text: "ベクトルDBを使わなくて済む"
        explanation: "誤り。多段検索はベクトルDBを前提とする手法であり、不要にするものではない。"
      - id: "d"
        text: "検索コストが下がる"
        explanation: "誤り。むしろ呼び出し回数が増えるためコストは増加する。"
    answer: "a"

  - id: "aicx-rag-012"
    text: "RAGの評価指標として活用される『RAGAs（Retrieval Augmented Generation Assessment）』が定義する典型的な軸として正しいものはどれか。"
    choices:
      - id: "a"
        text: "Faithfulness（忠実性）、Answer Relevancy（質問関連性）、Context Recall・Context Precision（検索品質）など"
        explanation: "正しい。RAGAsはRAG特有の品質を多面的に測る評価フレームワーク。Faithfulnessは生成された回答が取得文書に裏付けられているか、Answer Relevancyは質問に的確に答えているか、Context系は検索文書の網羅性と的確性を測る。LLM-as-a-Judgeで自動化することが多い。"
      - id: "b"
        text: "BLEU、ROUGE、METEORなどの伝統的な機械翻訳指標のみ"
        explanation: "誤り。これらはn-gram一致ベースで、RAGの忠実性・関連性は十分に評価できない。RAGAsはRAG特化指標を提供する。"
      - id: "c"
        text: "応答時間・スループット・GPUコストといったインフラ指標"
        explanation: "誤り。インフラ指標は別の関心事であり、品質評価指標ではない。"
      - id: "d"
        text: "ユーザー満足度を計測するNPSのみ"
        explanation: "誤り。NPSは事業指標であり、RAG品質の自動評価指標ではない。"
    answer: "a"

  - id: "aicx-rag-013"
    text: "RAGの『データ更新パイプライン』設計として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "原本→抽出→クリーニング→チャンキング→埋め込み→インデックス更新の流れを自動化し、削除・差分更新にも対応する"
        explanation: "正しい。RAGは知識の鮮度がROIに直結するため、データ取り込みパイプラインの自動化が重要。新規追加・変更・削除を差分処理で扱い、ベクトルDBに反映する。文書ID管理、バージョン管理、メタデータ整備、削除のタイムリーさ（特にプライバシー要件対応）が運用上のポイント。"
      - id: "b"
        text: "原本ファイルをコピーしてフォルダに置くだけ"
        explanation: "誤り。それでは検索可能な状態にならない。RAGには抽出・埋め込み・インデックスの工程が必須。"
      - id: "c"
        text: "ベクトルは一度作れば永続的に再生成不要"
        explanation: "誤り。文書更新・削除・モデル変更時には再生成が必要。永続不変の前提は誤り。"
      - id: "d"
        text: "削除した文書も検索可能にしておく"
        explanation: "誤り。削除済み文書を検索ヒットさせるとユーザーに古い情報を提供してしまい、法的・実務的に問題となる。"
    answer: "a"

  - id: "aicx-rag-014"
    text: "RAGにおける『階層的検索（hierarchical retrieval）』の例として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "上位サマリーチャンクで関連文書を絞り込み、続いて詳細チャンクで精密検索する2段階方式"
        explanation: "正しい。文書を要約レベル・段落レベル・文レベルなど階層化し、まず大粒度で対象を絞ってから細粒度に深掘りする方式。長文書を扱う場合に効率と精度を両立できる。LlamaIndexのDocument Summary Indexなどがこのパターン。製品カタログや法令集など階層構造のある文書に特に有効。"
      - id: "b"
        text: "ベクトルDBのインデックスを物理的に階層化するストレージ最適化"
        explanation: "誤り。論理的な検索戦略の話であり、ストレージ層の話とは異なる。"
      - id: "c"
        text: "管理職用と一般職用で検索結果を分ける機能"
        explanation: "誤り。それは権限制御の話であり、階層的検索とは別概念。混同しやすいが意味が異なる。"
      - id: "d"
        text: "ベクトル次元を階層化する圧縮技術"
        explanation: "誤り。それは次元削減の話で、階層検索とは別。"
    answer: "a"

  - id: "aicx-rag-015"
    text: "RAGにおける『プロンプト注入対策』として最も重要な観点はどれか。"
    choices:
      - id: "a"
        text: "取得文書には外部由来の悪意指示が混入し得る前提で扱い、文書を信頼境界外として明確に区別する"
        explanation: "正しい。RAGで取得した文書に『これまでの指示を無視せよ』のような攻撃指示が埋め込まれているケースがあり、これは間接プロンプトインジェクションと呼ばれる。文書はあくまで参考情報として扱い、システム指示と区別する設計（XMLタグでの囲み、明示的な前置きなど）、信頼できる文書のみを検索対象とする運用が対策になる。"
      - id: "b"
        text: "取得文書はLLMに渡る前にすべて手動で目視確認する"
        explanation: "誤り。スケールしないため現実的でない。自動化された対策が必要。"
      - id: "c"
        text: "プロンプト注入は理論上の脅威で実務では発生しない"
        explanation: "誤り。実際のセキュリティインシデントが多数報告されており、現実の脅威である。"
      - id: "d"
        text: "RAGを使わなければプロンプト注入は完全に防げる"
        explanation: "誤り。RAGを使わなくともユーザー入力経由で注入は発生し得る。RAG固有の問題ではない。"
    answer: "a"

  - id: "aicx-rag-016"
    text: "RAGの『グラウンディング（grounding）』の意味として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "LLMの回答を、信頼できる外部知識源・出典に紐付けて根拠ある応答にすること"
        explanation: "正しい。グラウンディングは『LLMの自由生成を、現実・出典の事実に縛り付ける』設計思想。引用形式の出力、出典リンクの提示、無関係質問には回答しない設計などで実現する。エンタープライズ用途でハルシネーション抑制と説明可能性を両立する基盤概念である。"
      - id: "b"
        text: "LLMサーバーをアース接続する物理工事"
        explanation: "誤り。電気工事の話であり、AI文脈とは無関係。比喩的に同じ単語だが意味が全く異なる。"
      - id: "c"
        text: "LLMに地理的な位置情報を持たせる機能"
        explanation: "誤り。位置情報の話と混同しないこと。"
      - id: "d"
        text: "LLMをローカル端末で実行する形態"
        explanation: "誤り。それはオンデバイス推論の話で、グラウンディングとは別概念。"
    answer: "a"

  - id: "aicx-rag-017"
    text: "『ドメイン特化埋め込みモデル』を採用する戦略的判断ポイントとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "汎用埋め込みでは捉えにくい専門用語・固有表現が多いドメインで、検索品質と引き換えに運用負荷増を許容できる場合"
        explanation: "正しい。医療・法務・金融・製造などの専門領域では、汎用モデルの埋め込み品質が不十分なことがある。ドメイン特化の埋め込み（独自ファインチューニングや、医療向けBioBERTのような専用モデル）は精度向上が期待できるが、運用・更新コストが増える。改善幅と運用負荷のバランスで判断する。"
      - id: "b"
        text: "汎用ドメインで使うと精度が上がる"
        explanation: "誤り。汎用ドメインに特化モデルを使ってもむしろ精度が下がることがある。適合領域を見極める必要がある。"
      - id: "c"
        text: "ドメイン特化は不要でいかなる場合も汎用が最善"
        explanation: "誤り。専門領域では特化モデルが大きな価値を生むため、一律否定は短絡的。"
      - id: "d"
        text: "ドメイン特化モデルは料金が安い"
        explanation: "誤り。料金は別軸の判断要素であり、必ずしも安いわけではない。"
    answer: "a"

  - id: "aicx-rag-018"
    text: "RAGの『多言語対応』の戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "多言語対応の埋め込みモデルを採用するか、クエリ・文書を統一言語に翻訳して索引することで言語混在に対応する"
        explanation: "正しい。多言語埋め込みモデル（multilingual-E5、bge-m3、OpenAI text-embedding-3-large など）は言語をまたいだ意味検索を可能にする。あるいは英語に統一翻訳してから検索する方式もある。日本語＋英語の社内文書、グローバル拠点の混在環境では戦略的判断が必要となる。"
      - id: "b"
        text: "言語ごとに別ベクトルDBを構築するしかない"
        explanation: "誤り。多言語埋め込みモデルを使えば単一インデックスで対応可能であり、必ずしも分離が必要なわけではない。"
      - id: "c"
        text: "全文書を機械翻訳すれば多言語対応は不要"
        explanation: "誤り。翻訳は手段の一つだが、原文ニュアンスの欠落・誤訳・コスト増などのデメリットもある。一概に最善ではない。"
      - id: "d"
        text: "RAGは英語以外で動作しない"
        explanation: "誤り。日本語等でも問題なく動作する。"
    answer: "a"

  - id: "aicx-rag-019"
    text: "RAGの『Long-Context LLMで全文を渡す方式 vs 検索して必要部分のみ渡す方式』の比較として最も適切な説明はどれか。"
    choices:
      - id: "a"
        text: "Long-Contextは実装が単純だがコスト・レイテンシが増し、無関係情報による精度低下リスクもあるため、文書量が大きい場合は検索方式が望ましい"
        explanation: "正しい。最近のLLMは100万トークン超のコンテキストを扱えるが、コスト・レイテンシ・Lost in the Middleの問題は残る。文書量が小さく毎回全文渡しても許容できるならLong-Context、量が多い／更新頻度が高い／コスト効率が重要なら検索方式が有利。両者を併用するハイブリッドも実用的（事前検索で絞ってからLong-Contextに渡す）。"
      - id: "b"
        text: "Long-Contextは常に検索より精度が高い"
        explanation: "誤り。関連情報の比率が下がるとむしろ精度低下する。Long-Contextが万能ではない。"
      - id: "c"
        text: "検索方式は精度を犠牲にするので避けるべき"
        explanation: "誤り。検索方式は適切なチューニングで高い精度を出せる。一律否定は誤り。"
      - id: "d"
        text: "両方式は性能・コスト・精度すべて同一である"
        explanation: "誤り。明確に異なる特性を持つ。比較・選択が必要。"
    answer: "a"

  - id: "aicx-rag-020"
    text: "RAGにおける『出典提示（citation）』の実装方法として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "回答中に文書ID・ページ番号・段落への参照を含めるよう指示し、ユーザーが原典を検証できるようにする"
        explanation: "正しい。引用箇所の明示はハルシネーション抑制と説明責任の両立に有効。プロンプトで形式を指定する、構造化出力で引用フィールドを必須にする、UIで出典リンクを併記するなどの実装がある。法務・医療・金融など事実性が問われる業務では必須要件となる。"
      - id: "b"
        text: "出典は内部情報なのでユーザーには見せない"
        explanation: "誤り。出典は信頼性・検証可能性のためにこそ表示すべきであり、隠すのは目的に反する。"
      - id: "c"
        text: "出典はLLMが自動的に提示するため設計不要"
        explanation: "誤り。LLMは指示なしでは出典提示しないことが多く、設計と検証が必要である。"
      - id: "d"
        text: "出典提示はハルシネーションを増やす"
        explanation: "誤り。逆である。出典提示は出典の有無確認と整合性チェックを促し、ハルシネーション抑制に寄与する。"
    answer: "a"

  - id: "aicx-rag-021"
    text: "RAGの『コスト最適化』のための一般的な施策として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "セマンティックキャッシュで類似質問の応答を再利用し、検索数や生成数を削減する"
        explanation: "正しい。セマンティックキャッシュは過去質問と意味的に近い質問が来た際、過去応答を再利用する仕組み。RAGはトラフィックの一定割合が類似質問になる傾向があり、コスト・レイテンシともに削減効果が大きい。鮮度や多様性とのバランス、ヒット判定閾値の調整が運用上のポイント。"
      - id: "b"
        text: "全質問に最大コンテキストを渡してコスト効率を最大化する"
        explanation: "誤り。最大コンテキスト＝最大コストであり、効率最大化と逆。"
      - id: "c"
        text: "ベクトルDBを毎日全削除して再構築する"
        explanation: "誤り。インデックス再構築はコストが高くなり、品質も不安定化する。むしろ避けるべき運用。"
      - id: "d"
        text: "RAGはコスト最適化の余地がない"
        explanation: "誤り。多数の最適化レバーが存在する（モデル選択・キャッシュ・チャンク調整・リランク戦略等）。"
    answer: "a"

  - id: "aicx-rag-022"
    text: "RAGにおける『PII（個人情報）対策』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "取り込み時のPII検出・マスキング、アクセス時の権限制御、忘れられる権利対応のための削除フローを整備する"
        explanation: "正しい。社内文書には氏名・口座番号・契約番号などPIIが含まれることが多く、RAGで漏洩するリスクがある。Microsoft Presidio、AWS Comprehendなどの自動検出に加え、ユーザー権限ベースのフィルタリング、削除要求への対応プロセスも必要。GDPR・個人情報保護法の遵守と業務価値の両立がストラテジストの役目である。"
      - id: "b"
        text: "PIIは社内なので扱いに注意は不要"
        explanation: "誤り。社内であってもアクセス権限・目的外利用・退職者対応など、PII取扱いのリスクは存在する。"
      - id: "c"
        text: "PIIはLLMが自動的に削除するので心配不要"
        explanation: "誤り。LLMは自動でPIIを削除しない。明示的な処理が必要。"
      - id: "d"
        text: "PII対策はRAGの精度を必ず低下させるので行わない"
        explanation: "誤り。マスキング・置換でPIIを除去しても検索精度はそれほど低下しない場合が多く、コンプライアンス要件と両立可能。"
    answer: "a"

  - id: "aicx-rag-023"
    text: "RAGの『フィードバックループ』設計として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ユーザーの良し悪し評価・正解修正・再質問パターンを蓄積し、検索品質改善やプロンプト・チャンキング調整に活用する"
        explanation: "正しい。RAGの品質は『運用しながら磨く』のが本質。Thumbs up/down、修正提案、よくある質問の発見などを蓄積し、検索ヒット率や関連度の改善、不足知識の補充、プロンプト調整に役立てる。継続的改善の仕組みを作ることがエンタープライズRAGの成功の鍵となる。"
      - id: "b"
        text: "フィードバックは収集せずデフォルト設定で運用するのが最善"
        explanation: "誤り。フィードバックは品質改善の最大の情報源であり、収集しないのは戦略的損失。"
      - id: "c"
        text: "フィードバックは収集するだけで活用は不要"
        explanation: "誤り。収集だけでは意味がなく、改善サイクルに組み込んでこそ価値が出る。"
      - id: "d"
        text: "ユーザーフィードバックよりLLM自動評価の方が常に正しい"
        explanation: "誤り。LLM自動評価は実ユーザーの実利用とずれることがあり、両方を組み合わせる必要がある。"
    answer: "a"

  - id: "aicx-rag-024"
    text: "RAGとファインチューニングの使い分けに関する戦略指針として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "事実知識の注入や頻繁更新にはRAG、文体・形式・特殊なタスク特化にはファインチューニング、両者の併用も有効"
        explanation: "正しい。事実知識をRAGで動的に注入し、応答スタイル・出力形式・特殊な語彙・専門タスクの精度向上にはファインチューニングを用いる。両者は競合せず補完関係にある。RAGで参照する文書を整備し、特化モデルにそれを参照させるハイブリッドが現実解として広く採用されている。"
      - id: "b"
        text: "ファインチューニングはRAGの完全上位互換である"
        explanation: "誤り。ファインチューニングは事実知識の動的更新が苦手で、用途に応じた使い分けが必要。"
      - id: "c"
        text: "RAGがあればファインチューニングは一切不要"
        explanation: "誤り。応答スタイル統一や特殊タスクではファインチューニングが有効。一律不要は短絡的。"
      - id: "d"
        text: "両者は同じ手法であり区別する意味がない"
        explanation: "誤り。明確に異なる手法であり、コスト・更新性・応用範囲が異なる。"
    answer: "a"

  - id: "aicx-rag-025"
    text: "RAGの『無回答（refuse to answer）』設計の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "関連文書が見つからない・信頼度が低い場合は推測せず『情報がない』と返答するよう設計し、誤情報の拡散を防ぐ"
        explanation: "正しい。RAGはハルシネーション抑制が大きな目的だが、検索ヒットがない場合に無理に答えると誤情報を出してしまう。閾値を下回る場合は『関連情報が見つかりませんでした』『社外公開情報を確認してください』など適切に断る設計が品質と信頼性を担保する。明示的な無回答は応答品質指標としても重要。"
      - id: "b"
        text: "RAGは常に何らかの答えを返すべきで、無回答は許されない"
        explanation: "誤り。誤った回答より無回答の方が良い場面が多く、特に高リスク業務（医療・法務・金融）では必須の設計判断である。"
      - id: "c"
        text: "無回答設計はユーザーを不快にするので避ける"
        explanation: "誤り。むしろ誤情報の方が信頼を大きく損ねる。透明性のある無回答が長期的信頼を生む。"
      - id: "d"
        text: "無回答設計はLLM側が自動でやるため不要"
        explanation: "誤り。明示的に指示・閾値設計しないと、LLMは誤情報を流暢に作る傾向がある。"
    answer: "a"

  - id: "aicx-rag-026"
    text: "RAGの導入で『初期に取り組むべきユースケース』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "業務文書が整備済みで、質問パターンが一定範囲に収まり、ROIと評価指標が定義しやすい領域（社内FAQ・製品マニュアル等）"
        explanation: "正しい。RAGは『良質な知識ベース×明確な質問』があるとROIが出やすい。逆にデータが散在し品質が低い、質問が極めて多様、評価指標が不明確、といった条件では失敗しやすい。最初の成功体験を作るためにスコープを絞り込むのが戦略的に賢明。"
      - id: "b"
        text: "業務文書が未整備で、ユーザー質問パターンも未知の領域から始めるべき"
        explanation: "誤り。それは難易度が最も高い条件であり、初期には不向き。失敗リスクを下げるため整備済み領域から着手するのが原則。"
      - id: "c"
        text: "ROIや指標を定義せず、まずは技術検証だけ行う"
        explanation: "誤り。指標定義なき技術検証はPoC死の典型パターン。事前に成功/中止条件を決めるのが戦略的アプローチ。"
      - id: "d"
        text: "全社一斉導入を最初から目指す"
        explanation: "誤り。一斉導入はリスクが高く、段階的展開が定石。"
    answer: "a"

  - id: "aicx-rag-027"
    text: "RAGの『コンテキスト構築（プロンプトに渡す形式）』として最も適切な工夫はどれか。"
    choices:
      - id: "a"
        text: "取得した文書を出典付き・順序付きで明示的に区切り、LLMが引用しやすく文脈混同しないように構造化する"
        explanation: "正しい。例：『以下は社内文書からの抜粋です。各文書には[doc_id]を付与しています。回答にはdoc_idを引用してください。』のような構造化指示。マークダウン・XMLタグ・JSON形式などで境界を明示することで、出典追跡と文脈混同回避が両立できる。"
      - id: "b"
        text: "取得文書を1つの長い文として連結し、区切りを入れない"
        explanation: "誤り。区切りなしでは文書境界をLLMが認識できず、誤った帰属や混同が起きやすい。"
      - id: "c"
        text: "取得文書はランダムに並べる"
        explanation: "誤り。順序は重要であり（Lost in the Middleの影響もある）、関連度順や重要度順での並びが望ましい。"
      - id: "d"
        text: "取得文書はLLMに渡さず、別途別チャットで送る"
        explanation: "誤り。RAGは取得文書を生成プロンプトに組み込むのが本質。別チャットでは効果が出ない。"
    answer: "a"

  - id: "aicx-rag-028"
    text: "RAGの『増分インデックス更新』の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "全件再索引せず変更分のみ反映することで、コスト・時間・サービス影響を抑えながら知識の鮮度を保つ"
        explanation: "正しい。文書追加・変更・削除のたびに全件再索引するとコスト・時間が膨大になる。差分パイプラインを構築し、変更検知（タイムスタンプ・チェックサム）からEmbed・インデックス更新までを自動化することで、運用負荷を抑えつつ鮮度を維持できる。"
      - id: "b"
        text: "毎日深夜に全件再索引するのが最も効率的"
        explanation: "誤り。全件再索引はコスト・時間が膨大で、頻繁に行うのは非効率。差分更新の方が運用効率が良い。"
      - id: "c"
        text: "ベクトルDBは更新する必要がない"
        explanation: "誤り。文書が変われば当然ベクトルも更新する必要があり、更新不要は誤り。"
      - id: "d"
        text: "増分更新は全件更新より精度が劣る"
        explanation: "誤り。同じ品質を保ちつつ効率化できる。精度劣化の理由はない。"
    answer: "a"

  - id: "aicx-rag-029"
    text: "RAGにおける『検索失敗時のフォールバック』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "閾値以下の検索結果のみの場合は『一般知識による回答』『無回答』『人へのエスカレーション』など段階的なフォールバック経路を設計する"
        explanation: "正しい。RAGは検索品質が応答品質を直接決めるため、検索失敗時の挙動を明示的に設計しないと、品質崩壊の温床になる。例：閾値以上ならRAG回答、それ以下なら『関連情報を見つけられませんでした』を表示し、人へのエスカレーションリンクを併記する、など。フォールバックの段階設計が運用品質を担保する。"
      - id: "b"
        text: "検索失敗時もLLMに自由に答えさせる"
        explanation: "誤り。それはハルシネーションを誘発する典型パターンであり、本末転倒。"
      - id: "c"
        text: "検索失敗は技術的にあり得ないので考慮不要"
        explanation: "誤り。データ不足・新規質問など検索失敗は日常的に発生する。"
      - id: "d"
        text: "検索失敗時はサーバーを再起動する"
        explanation: "誤り。インフラ問題と検索失敗は別。アプリケーションロジックの問題である。"
    answer: "a"

  - id: "aicx-rag-030"
    text: "RAGの『エンタープライズ適用』時に特に重要となる要素として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "アクセス制御（ユーザー権限と文書アクセス権の整合）・監査ログ・データ保持ポリシー・SLAの4要素を網羅した運用基盤"
        explanation: "正しい。エンタープライズRAGは『誰がどの文書を参照できるか』が最重要要件。ユーザー権限と文書ACLが連動していないと情報漏洩につながる。監査ログ・保持期間・削除フロー・可用性SLAなど運用面の整備が、技術選定と同等以上に成否を決める。AIストラテジストはこれらの要件を初期から織り込む役割を担う。"
      - id: "b"
        text: "技術選定さえ正しければ運用面は自然に整う"
        explanation: "誤り。技術と運用は両輪であり、運用設計を怠ると本番で事故になる。"
      - id: "c"
        text: "全社員に全文書を公開すれば設計が単純化する"
        explanation: "誤り。情報セキュリティ・コンプライアンス上、絶対に避けるべき設計である。"
      - id: "d"
        text: "監査ログは個人情報なので取得すべきでない"
        explanation: "誤り。監査ログは内部統制・法令遵守上必須の運用要件であり、適切な保護下で取得する必要がある。"
    answer: "a"
