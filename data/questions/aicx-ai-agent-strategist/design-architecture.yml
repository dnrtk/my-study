questions:
  - id: "aicx-da-001"
    text: "AIエージェントのアーキテクチャを設計する際、まず最初に明確化すべき要素として最も重要なものはどれか。"
    choices:
      - id: "a"
        text: "使用するLLMのモデル名を確定する"
        explanation: "誤り。モデル選定は重要だが、最初に決めるべき事項ではない。要件・制約が曖昧なまま技術選定を始めると、後から要件不整合が露呈し手戻りになる。"
      - id: "b"
        text: "エージェントが達成すべき目的・スコープ・成功条件、および守るべき制約（ガバナンス・コスト・SLA等）を定義する"
        explanation: "正しい。設計の出発点は『何を達成し、何をしないか』『どんな制約のもとで動くか』の明確化である。これがブレるとモデル選定・ツール設計・評価指標すべてが揺らぐ。AIストラテジストの本務は、まずこの問いを言語化することにある。"
      - id: "c"
        text: "ユーザーインターフェースの色とフォントを決定する"
        explanation: "誤り。UIデザインはエージェント設計の本質ではない。先に役割・能力・制約が固まらないとインターフェース設計も意味をなさない。"
      - id: "d"
        text: "ベンダーとの契約金額を交渉する"
        explanation: "誤り。契約交渉は要件と方針が固まった後の話であり、設計初期の優先事項ではない。"
    answer: "b"

  - id: "aicx-da-002"
    text: "AIエージェントの『役割（Persona／Role）』を設計する際の指針として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "あらゆる質問に万能に答えられるよう、役割は曖昧に広く定義する"
        explanation: "誤り。役割が広く曖昧だと、応答品質が劣化し責任範囲も不明確になる。『万能アシスタント』設計は実務でほぼ失敗する典型パターン。"
      - id: "b"
        text: "対象ユーザー・専門領域・口調・回答形式・回答してはいけない領域を具体的に定義する"
        explanation: "正しい。ペルソナを具体化することで品質と一貫性が保たれ、想定外利用も防げる。例：『法務部門向けの社内規程アシスタントとして、根拠条項を明示し、判例引用は範囲外と明言する』など。スコープアウト領域の明示が特に重要。"
      - id: "c"
        text: "役割は実装後にユーザーが自由に変更できるようにすべき"
        explanation: "誤り。役割をユーザーが自由変更できるとガードレールが機能しなくなる。プロンプトインジェクションのリスクも高まる。役割は管理者側が固定し、ユーザーはタスク内容のみ指定できる構造が望ましい。"
      - id: "d"
        text: "ペルソナ設定は応答品質に影響しないため不要"
        explanation: "誤り。実証研究上もペルソナ設定は応答スタイル・専門性・拒否ポリシーに大きく影響する。設計上の重要要素である。"
    answer: "b"

  - id: "aicx-da-003"
    text: "プロンプト設計の観点で、複雑な指示をLLMに伝える際の原則として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "1つの長文に全要件を詰め込み、改行や箇条書きを使わずに記述する"
        explanation: "誤り。1ブロックの長文は要件が埋没しやすく、LLMの遵守率が下がる。読み取り精度・指示遵守の両面で不利である。"
      - id: "b"
        text: "セクション分け・番号付き手順・XMLタグなどで構造化し、役割・タスク・制約・出力形式を明示する"
        explanation: "正しい。構造化されたプロンプトはLLMの解釈精度を高め、後続のメンテナンス性も向上する。Anthropic等のガイドではXMLタグ（<task><context><format>等）の利用が推奨される。出力形式の明示はパース可能性を担保するためにも重要。"
      - id: "c"
        text: "プロンプトには絶対に例示（few-shot）を含めてはならない"
        explanation: "誤り。few-shotは特に出力形式や微妙なニュアンスを伝える際に有効である。禁止すべき設計原則ではない。"
      - id: "d"
        text: "プロンプトは英語以外の言語では効果が出ない"
        explanation: "誤り。日本語をはじめ多言語に対応する。ただし英語の方が学習データが多く精度が高い場合があるため、用途に応じた選択は必要。"
    answer: "b"

  - id: "aicx-da-004"
    text: "シングルエージェント vs マルチエージェントの選択基準として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "常にマルチエージェントの方が優れているため、迷わずマルチを採用する"
        explanation: "誤り。マルチエージェントはオーケストレーション複雑性・コスト・デバッグ困難性が増加するため、シングルで足りる場合はシングルが望ましい。盲目的なマルチ化は失敗パターンである。"
      - id: "b"
        text: "タスクが明確かつ単純な場合はシングル、役割分担で並列化や専門性が活きる場合はマルチを選ぶ"
        explanation: "正しい。マルチエージェントは複雑タスクの分業・専門性活用・並列処理に有効。一方で監督者エージェントが各サブエージェントの出力を統合する複雑さが生じるため、シングルで実現可能な場合はシングルから始めるのが鉄則。スケールに応じて段階的に拡張する戦略が定石。"
      - id: "c"
        text: "ユーザー数に応じて自動的に決定される"
        explanation: "誤り。ユーザー数とエージェント構成は本質的に独立した設計判断である。"
      - id: "d"
        text: "LLMモデルの種類で自動的に決定される"
        explanation: "誤り。モデルとアーキテクチャは独立した選択である。同じモデルでもシングル／マルチどちらの構成も可能。"
    answer: "b"

  - id: "aicx-da-005"
    text: "AIエージェントの『短期メモリ（short-term memory）』として一般的に使われるものはどれか。"
    choices:
      - id: "a"
        text: "学習時に獲得したパラメトリック知識"
        explanation: "誤り。パラメトリック知識はモデル内部の重みであり、エージェントの短期メモリとは別概念。会話セッション中の動的状態とは異なる。"
      - id: "b"
        text: "現在の会話セッション内の発話履歴やツール実行結果を保持するバッファ"
        explanation: "正しい。短期メモリは1セッション・1タスク内で文脈維持のために保持される情報。会話履歴、直前のツール出力、思考ログなどが含まれる。コンテキスト長制約から、長くなった場合は要約・トリミング・選択的保持が必要。"
      - id: "c"
        text: "ユーザープロファイルや過去取引履歴など、永続的な情報"
        explanation: "誤り。これは長期メモリの説明である。短期と長期は保持期間・更新粒度・参照頻度が異なる。"
      - id: "d"
        text: "LLMの推論サーバーのGPU L1キャッシュ"
        explanation: "誤り。物理的なハードウェアキャッシュの話であり、エージェント設計の短期メモリとは別概念である。"
    answer: "b"

  - id: "aicx-da-006"
    text: "長期メモリの設計戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "全ての会話履歴を生のまま無期限に保存し、毎回プロンプトに全量挿入する"
        explanation: "誤り。コンテキスト膨張・コスト増・ノイズ混入によりむしろ精度低下する。プライバシー・保管期限の観点でも問題。"
      - id: "b"
        text: "事実・嗜好・タスク結果などを構造化または要約して保存し、必要に応じて関連情報のみを呼び出す"
        explanation: "正しい。長期メモリは『書き込みフィルタ』『読み出しフィルタ』『更新ポリシー』『削除ポリシー』を伴う設計が必要。Mem0、Letta、LangGraphなどのフレームワークが参考になる。プライバシー法令対応のため削除可能性の確保も重要。"
      - id: "c"
        text: "長期メモリは保存しないのが最善であり、毎回ゼロから対話する"
        explanation: "誤り。状況による。継続的なパーソナライゼーションが価値の核ならば長期メモリは必須である。一律に保存しないのは設計放棄である。"
      - id: "d"
        text: "メモリは暗号化せずクラウド共有ストレージに保存する"
        explanation: "誤り。メモリはユーザーの個人情報を含む可能性が高く、暗号化・アクセス制御は必須である。共有ストレージは権限分離が困難で不適切。"
    answer: "b"

  - id: "aicx-da-007"
    text: "AIエージェントの『ツール（function）スキーマ』を設計する際のベストプラクティスとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "引数名は短いほど良いため、a・b・cなどの記号を使う"
        explanation: "誤り。引数名はLLMがツール選択時に意味を解釈する手掛かりになるため、明確で意味のある名前にすべきである。記号や略称はかえって精度を下げる。"
      - id: "b"
        text: "関数名・引数名・description・enumを明確に記述し、入力例・期待される出力形式・エラーケースまで言及する"
        explanation: "正しい。LLMはツール定義の自然言語記述を読んで利用判断するため、descriptionの質が選択精度を直接決める。期待される入力範囲、戻り値形式、副作用の有無、レート制限なども併記すると、LLMの誤呼び出しを減らせる。"
      - id: "c"
        text: "1つの関数に20個以上の引数を持たせ、汎用性を最大化する"
        explanation: "誤り。引数が多すぎるとLLMの誤入力が増え、パース失敗や意図と異なる呼び出しが起きやすい。関数を分割するか、構造化引数を使う方が望ましい。"
      - id: "d"
        text: "ツールの実行結果は人間が読みやすい長文で返す"
        explanation: "誤り。LLMが解釈する戻り値は構造化（JSON等）が望ましい。長文の自然言語よりトークン効率・解析精度ともに良い。"
    answer: "b"

  - id: "aicx-da-008"
    text: "エージェントが多数のツールを持つ場合の戦略として、規模拡大時に最も推奨されるアプローチはどれか。"
    choices:
      - id: "a"
        text: "全ツールを常に1回のプロンプトに列挙する"
        explanation: "誤り。ツール数が増えるとプロンプトが膨張し、LLMの選択精度が低下する（MCP環境などで20以上で顕著に劣化することが知られる）。"
      - id: "b"
        text: "メタツール／ツールルーター／カテゴリ別エージェントを導入し、必要なツールのみを動的に提示する"
        explanation: "正しい。例：『情報取得カテゴリ』『書き込みカテゴリ』『分析カテゴリ』に分け、まずカテゴリを選ばせてから詳細ツールに絞り込む。あるいはセマンティック検索でツール定義を選ぶアプローチもある。スケーラブルなエージェント設計の常套手段である。"
      - id: "c"
        text: "ツールはすべてLLMに自動生成させる"
        explanation: "誤り。LLMが任意コードを生成して実行することはセキュリティリスクが極めて高い。ツールは設計者が定義・検証して提供すべきである。"
      - id: "d"
        text: "ツール数を削減することは品質低下につながるため避けるべき"
        explanation: "誤り。むしろ機能重複や粒度のばらつきを整理することは品質向上に寄与する。本質的でないツールを削減することは正しい設計判断である。"
    answer: "b"

  - id: "aicx-da-009"
    text: "AIエージェントの『プランナー（Planner）-エグゼキューター（Executor）』アーキテクチャの特徴として正しいものはどれか。"
    choices:
      - id: "a"
        text: "プランナーがすべての処理を行い、エグゼキューターは存在しない"
        explanation: "誤り。両者はそれぞれ役割が分かれている。プランナーが計画、エグゼキューターが実行を担う2段構成が本質である。"
      - id: "b"
        text: "プランナーが目標達成の手順を立案し、エグゼキューターが各ステップを実行することで、計画と実行を分離する設計"
        explanation: "正しい。Plan-and-Executeパターンとも呼ばれる。計画段階で全体像を把握できるため再試行・並列化が容易になり、ツール選択精度も向上する。一方で前提が変わった際の再計画（replanning）の設計が必要。複雑業務の自動化で頻繁に採用される。"
      - id: "c"
        text: "プランナーは人間が手動で実装し、エグゼキューターはLLMが担う"
        explanation: "誤り。プランナーもLLMが担うのが一般的な設計である。人手で逐一プランを作る場合は本パターンを使う動機が乏しい。"
      - id: "d"
        text: "計画立案中はユーザーからの入力を受け付けない"
        explanation: "誤り。Human-in-the-loop設計では計画段階でユーザー承認を挟むケースもある。一概に入力遮断するわけではない。"
    answer: "b"

  - id: "aicx-da-010"
    text: "AIエージェントにおける『Human-in-the-loop（HITL）』設計の主目的として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AIエージェントを完全自律にしないことで実装工数を削減する"
        explanation: "誤り。HITLはむしろ承認フローや差し戻しUIを実装するため工数は増える。目的はリスク管理である。"
      - id: "b"
        text: "重要な判断・高リスク行動・低信頼度ケースで人間の承認・修正を介在させ、安全性と品質を担保する"
        explanation: "正しい。HITLは『どこで人を介在させるか』を戦略的に設計する。例：金額閾値超過の取引、クレーム対応の最終承認、法務文書の送信前など。AIの能力を活かしつつリスク許容度を超えない仕組み作りが要点で、自律性レベルの設計と表裏一体。"
      - id: "c"
        text: "ユーザーがエージェントの内部パラメータを直接書き換えること"
        explanation: "誤り。HITLは判断介入であり、モデルパラメータ操作ではない。両者を混同しないこと。"
      - id: "d"
        text: "夜間バッチでエージェントを停止する運用ルール"
        explanation: "誤り。HITLは時間帯ではなく『判断地点での人介在』の概念である。"
    answer: "b"

  - id: "aicx-da-011"
    text: "AIエージェントが扱える『ツール実行の副作用（side effects）』を管理する戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "副作用を持つツールはエージェントに与えず、読み取り系のみに限定する"
        explanation: "副作用を一切持たせない設計は安全だが、実用範囲が限られる。読み取り専用に限定するのは選択肢として有効ではあるが、戦略選択肢として最も柔軟ではないため、状況によりbの方が望ましい。"
      - id: "b"
        text: "副作用を伴うツールには承認ステップ・dry-run・冪等キー・監査ログを組み合わせて段階的なリスク管理を行う"
        explanation: "正しい。書き込み・送信・支払いなど副作用ツールは『プレビュー（dry-run）→人承認→冪等キー付き実行→ログ保存』の多層防御が望ましい。これにより誤動作の被害を最小化しつつ業務価値を引き出せる。戦略レベルでは『どの副作用にどのレベルの管理を敷くか』のトリアージが要点。"
      - id: "c"
        text: "副作用ツールはLLMに自由に呼ばせ、結果を後から確認する"
        explanation: "誤り。事故が起きてからでは取り返せない領域（送金等）も多く、後追い確認では不十分である。"
      - id: "d"
        text: "副作用は本番環境でのみ有効化すれば安全である"
        explanation: "誤り。本番こそ被害が大きい環境であり、本番有効化＝安全ではない。逆に本番こそ厳格な管理が必要。"
    answer: "b"

  - id: "aicx-da-012"
    text: "エージェント設計における『状態管理（state management）』の課題として最も注意すべきものはどれか。"
    choices:
      - id: "a"
        text: "状態は常にLLMの内部に保持されるためアプリ側で考える必要はない"
        explanation: "誤り。LLMは推論ごとにステートレスであり、状態保持は外部で行う必要がある。エージェントの根本誤解として典型的なミス。"
      - id: "b"
        text: "セッション状態・タスク状態・長期状態の保持先と一貫性を設計し、障害復旧やリトライ時の整合性を確保する"
        explanation: "正しい。エージェントはツール呼び出し・会話履歴・サブタスク進捗など多層の状態を持つ。状態が失われると再試行で重複処理が起きたり、文脈が断絶する。LangGraphやTemporalのようなオーケストレーション基盤を使う、あるいは独自にチェックポイントを設計する戦略が必要。"
      - id: "c"
        text: "状態管理はフロントエンドのCookieだけで十分である"
        explanation: "誤り。Cookieは容量・セキュリティ・サーバー側参照性などの制約から、エージェントの状態管理基盤としては不十分である。"
      - id: "d"
        text: "状態を持たないエージェントは設計不可能である"
        explanation: "誤り。単発の質問応答など、ステートレスでよい用途も存在する。設計はユースケース次第である。"
    answer: "b"

  - id: "aicx-da-013"
    text: "エージェント開発で『LangGraph』のようなグラフ型フレームワークを採用する利点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "LLMの内部パラメータを編集できる"
        explanation: "誤り。LangGraphなどのフレームワークはアプリ層の制御フローを管理するもので、モデル内部のパラメータ操作機能は持たない。"
      - id: "b"
        text: "ノード（処理）とエッジ（遷移条件）でエージェントの状態遷移を明示的に定義し、複雑な分岐・ループ・人介在を可視化・制御できる"
        explanation: "正しい。グラフ表現により『どの状態からどの状態へ、どの条件で遷移するか』が明確になり、デバッグ・観測性・チェックポイント保存が容易になる。マルチエージェントやHITLとも親和性が高い。状態機械として設計する考え方は、自己ループ型エージェントの暴走防止にも有効。"
      - id: "c"
        text: "コードを書かずにエージェントが完成する"
        explanation: "誤り。フレームワークはコード作成を補助するもので、コーディング不要にはならない。"
      - id: "d"
        text: "エージェントの応答品質を自動的に向上させる"
        explanation: "誤り。フレームワークは設計・実装の枠組みを提供するが、品質は設計者の腕次第である。"
    answer: "b"

  - id: "aicx-da-014"
    text: "AIエージェントの『コンテキスト圧縮（compression）／要約』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "履歴は常に古いものから順に削除する単純なFIFO"
        explanation: "FIFOは実装が容易だが、重要情報を機械的に失う恐れがある。シンプルさは利点だが最適とは限らない。"
      - id: "b"
        text: "履歴を要約・選択保持し、重要事実は構造化メモリへ昇格させ、不要情報は破棄するハイブリッド戦略"
        explanation: "正しい。長い対話やマルチステップ処理ではコンテキスト管理が品質を左右する。直近履歴は生で保持、古い履歴は要約、抽出された事実はメモリ層へ移すなど階層化する戦略が一般的。要約モデル選定や要約プロンプト設計も重要要素となる。"
      - id: "c"
        text: "毎回履歴を全消去してまっさらな状態で対話する"
        explanation: "誤り。文脈消失はエージェントの一貫性を損なう。コスト削減のために安易にやるべきではない。"
      - id: "d"
        text: "履歴はファイルに保存するだけで自動的に最適化される"
        explanation: "誤り。保存と最適化は別概念であり、保存だけでは選択的活用ができない。"
    answer: "b"

  - id: "aicx-da-015"
    text: "AIエージェントの『無限ループ』を防ぐ設計として最も有効なものはどれか。"
    choices:
      - id: "a"
        text: "再帰深度・反復回数・実行時間・トークン使用量に上限を設け、超過時は強制終了または人介在に切り替える"
        explanation: "正しい。エージェントは自己ループや再試行で容易に無限ループに陥る。多層的な上限制御（max_iterations、timeout、token budget、コスト上限）と、上限到達時の優雅な失敗（fallback）設計が不可欠。複数の指標で並行に制御するのが安全である。"
      - id: "b"
        text: "LLM自身が無限ループを認識して停止するため、外部制御は不要"
        explanation: "誤り。LLMはステートレスで自己の実行回数を認識できない。外部での制御が必須である。"
      - id: "c"
        text: "ループ防止には全タスクをシングルステップ化する"
        explanation: "誤り。シングルステップ化はループ問題を完全に防ぐが、複雑タスクへの対応能力を放棄することになる。トレードオフが極端すぎる。"
      - id: "d"
        text: "ループはむしろ望ましい挙動なので制御不要"
        explanation: "誤り。意図しないループはコスト爆発・ユーザー体験悪化・SLA違反に直結する。明示的な制御が必要。"
    answer: "a"

  - id: "aicx-da-016"
    text: "エージェントのテストとデバッグを容易にするための設計として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "観測性（プロンプト・思考過程・ツール呼び出し・出力）をすべてトレース可能にし、再現可能な実行記録を残す"
        explanation: "正しい。エージェントは非決定的かつ多段処理のためデバッグが難しい。LangSmith・Langfuse・OpenTelemetry等で各ステップをトレースし、入力・思考・ツール呼び出し・観察を可視化する。これにより不具合の原因切り分けや改善が可能になる。本番運用でも観測性は最重要要件のひとつ。"
      - id: "b"
        text: "ログは最終出力のみ保存すれば十分である"
        explanation: "誤り。最終出力だけでは中間ステップで何が起きたか分からず、不具合の原因究明ができない。"
      - id: "c"
        text: "デバッグはLLMベンダー側が行うため利用者は気にしなくてよい"
        explanation: "誤り。アプリ層・プロンプト層の問題はベンダーには見えない。利用者側の責務である。"
      - id: "d"
        text: "本番環境ではログを取らない方がプライバシーに配慮できる"
        explanation: "誤り。プライバシー対応はマスキングや保持期限管理で行うべきで、ログを取らないのは観測性放棄であり別問題である。"
    answer: "a"

  - id: "aicx-da-017"
    text: "AIエージェントを構築する際の『エラーハンドリング戦略』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ツール呼び出しのエラーはエージェントに見せず、空の結果を返す"
        explanation: "誤り。エラーを隠すとエージェントは状況を把握できず、誤った前提で処理を続けてしまう。観測性も損なわれる。"
      - id: "b"
        text: "エラーメッセージを構造化してエージェントに返し、リトライ・代替手段・人へのエスカレーションを設計する"
        explanation: "正しい。エージェントが原因を理解し、適切な代替行動を取れるよう情報を返すのが要点。リトライは指数バックオフ、リトライ上限到達時はエスカレーション、決定不能時はユーザーに確認、など段階的な戦略が必要。永続的な失敗を一時的失敗と区別する設計も重要。"
      - id: "c"
        text: "エラーが起きた瞬間にすべての処理を停止し、ユーザーに『失敗』と返す"
        explanation: "誤り。ユーザー体験が悪く、回復可能な問題まで全停止になる。回復可能/不可能の区別が必要である。"
      - id: "d"
        text: "エラーを無視して次の処理に進む"
        explanation: "誤り。エラー無視は隠れバグを生む典型パターンであり、データ不整合や事故を招く。"
    answer: "b"

  - id: "aicx-da-018"
    text: "エージェント間の『ハンドオフ（handoff）』を設計する際のポイントとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ハンドオフ時には会話の文脈を共有せず、新エージェントはゼロから始める"
        explanation: "誤り。文脈なしでは引き継ぎ品質が著しく低下する。最低限の状態・要件・既往履歴は共有する必要がある。"
      - id: "b"
        text: "ハンドオフ条件・引き継ぎ情報・責務境界を明示し、文脈の損失を最小化しつつ専門化のメリットを得る"
        explanation: "正しい。例：『料金関連はサポートエージェントが担当』『技術質問はテックエージェントが担当』のような責務分割を行い、引継ぎ時に必要情報（顧客プロファイル、これまでのやりとりの要約、未解決事項）を構造化して渡す。ユーザー体験上『振り出しに戻った感』を出さないことが重要。"
      - id: "c"
        text: "ハンドオフは応答速度を上げるための仕組みである"
        explanation: "誤り。むしろハンドオフはオーバーヘッドを生むため、速度面ではマイナスになりやすい。専門性活用が主目的である。"
      - id: "d"
        text: "ハンドオフはユーザーには見えないので何も気にしなくてよい"
        explanation: "誤り。ユーザーは応答スタイルや知識範囲の変化を感じ取る。見えない裏側の話と思って雑に設計するのは失敗の元である。"
    answer: "b"

  - id: "aicx-da-019"
    text: "エージェント設計における『冗長性（redundancy）』戦略の例として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "重要な判断は複数モデル・複数経路で検証し、結果が一致しない場合は人へエスカレーションする"
        explanation: "正しい。重要度の高い判断（例：医療一次トリアージ、金融判断）では、単一LLMの判断に依存するリスクが大きい。複数モデルでクロスチェックする、ルールベースとLLMを組み合わせる、信頼度スコアで人介在を切り替えるなどの冗長化が有効である。コストとリスクのバランスを戦略的に判断する。"
      - id: "b"
        text: "サーバーを2台用意するハードウェア冗長化のみ"
        explanation: "誤り。それは可用性確保の話で、判断品質の冗長性とは別概念である。両者は補完的だが同義ではない。"
      - id: "c"
        text: "冗長性は無駄なので一切持たせない"
        explanation: "誤り。重要判断における冗長性は信頼性の根幹であり、コストとのバランスで判断すべき設計選択である。一律不要と決めつけるのは短絡的。"
      - id: "d"
        text: "全ユーザーに同じ応答を返す均質化のこと"
        explanation: "誤り。それは均質化の話であり、冗長性とは別概念。混同しやすい用語に注意。"
    answer: "a"

  - id: "aicx-da-020"
    text: "AIエージェントの『コスト最適化』設計として最も適切な戦略はどれか。"
    choices:
      - id: "a"
        text: "常に最も高性能で高価なモデルを全タスクで使う"
        explanation: "誤り。簡単なタスクに高性能モデルを使うのはコスト浪費である。タスク難易度に応じたモデル選択が定石である。"
      - id: "b"
        text: "タスク難易度に応じてモデルを使い分け（cascading）、キャッシュ・圧縮・要約・並列化・バッチ化を組み合わせる"
        explanation: "正しい。簡単な分類はSmallモデル、複雑な推論はLargeモデルというカスケード。プロンプトキャッシュやセマンティックキャッシュで重複コストを削減。会話履歴の要約でトークンを節約。これらを総合的に設計するのがコスト戦略の王道である。"
      - id: "c"
        text: "コスト最適化は性能を犠牲にするため避けるべき"
        explanation: "誤り。設計次第で性能とコストの両立は可能であり、選択肢ではない。コスト無視のシステムはROIが成立せず本番展開が困難。"
      - id: "d"
        text: "クラウドの自動スケーリングだけに依存する"
        explanation: "誤り。スケーリングはトラフィック対応であり、推論あたりコストの最適化とは別である。"
    answer: "b"

  - id: "aicx-da-021"
    text: "AIエージェントにおける『プロンプトキャッシュ』の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "頻繁に使われるシステムプロンプトや長文文脈をプロバイダ側でキャッシュし、後続呼び出しのコスト・レイテンシを削減する仕組み"
        explanation: "正しい。Anthropic Claude等が提供するプロンプトキャッシュは、長いシステム指示やドキュメントを再送するたびにトークンコストを払うのを避けられる。RAG・大規模指示文・MCPツール定義など、変化が少なく長いコンテキストでROIが大きい。戦略的にも『何を共通文脈に置くか』を意識した設計が効く。"
      - id: "b"
        text: "ユーザーごとに応答を保存し、次回同じ質問が来た時に再利用する仕組み"
        explanation: "誤り。これはレスポンスキャッシュ／セマンティックキャッシュの話であり、プロンプトキャッシュとは別レイヤーの最適化である。"
      - id: "c"
        text: "プロンプトをローカル端末にダウンロードしてオフラインで使う仕組み"
        explanation: "誤り。それはオフライン推論やキャッシング配信の話であり、プロンプトキャッシュとは別概念である。"
      - id: "d"
        text: "プロンプト履歴をユーザーに見せないUI機能"
        explanation: "誤り。表示制御の話とコスト最適化の話を混同している。プロンプトキャッシュは料金・レイテンシ最適化機能である。"
    answer: "a"

  - id: "aicx-da-022"
    text: "AIエージェントの『並列ツール実行』戦略について最も適切な説明はどれか。"
    choices:
      - id: "a"
        text: "並列実行は常に逐次より速く、副作用も問題ないので何でも並列化すべき"
        explanation: "誤り。副作用や依存関係を持つツール呼び出しは並列実行が事故を生む。順序やリソース競合に注意が必要。"
      - id: "b"
        text: "依存関係のない読み取り系ツールは並列化し、書き込み系や順序依存があるものは逐次で扱うのが定石"
        explanation: "正しい。LLMは複数ツールを同時呼び出しできるよう改善されてきたが、副作用ありの操作は『冪等性』『順序保証』『競合状態』の検討が必須。並列化はレイテンシ削減効果が大きいため、安全な範囲で活用するのが合理的戦略。"
      - id: "c"
        text: "並列実行はLLM側で自動判定されるため設計不要"
        explanation: "誤り。LLMの判定だけでは安全性は保証されず、設計者が事故防止策（ロック・トランザクション等）を組み込む必要がある。"
      - id: "d"
        text: "並列実行は応答速度を遅くするため避けるべき"
        explanation: "誤り。並列実行は逆にレイテンシを削減する場合が多い。説明が真逆である。"
    answer: "b"

  - id: "aicx-da-023"
    text: "AIエージェントの『出力構造化（structured output）』を強制する設計の利点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "LLMの応答が常に長文の自然言語になる"
        explanation: "誤り。それはむしろ非構造化出力の特徴であり、構造化の利点とは逆である。"
      - id: "b"
        text: "JSONスキーマやFunction Callingで出力形式を強制することで、後続処理のパース失敗・エラー処理コストを削減できる"
        explanation: "正しい。エージェントの出力をプログラムで処理する以上、形式の安定性が極めて重要である。OpenAI Structured Output、Anthropic JSON mode、Outlines、Pydantic-AIなどの仕組みで型安全性を担保できる。スキーマ定義はLLMの出力品質も向上させる副次効果がある。"
      - id: "c"
        text: "LLMが学習時に獲得した知識を増やせる"
        explanation: "誤り。学習データ増加は構造化出力とは無関係である。"
      - id: "d"
        text: "応答速度を高速化する直接効果がある"
        explanation: "誤り。構造化出力は速度より正確性・型安全性のための仕組みである。むしろわずかな処理オーバーヘッドが生じる場合もある。"
    answer: "b"

  - id: "aicx-da-024"
    text: "AIエージェントの『リトライ戦略』として最も適切な実装はどれか。"
    choices:
      - id: "a"
        text: "失敗したら即座に同じリクエストを送り続け、成功するまで停止しない"
        explanation: "誤り。即時無限再試行はサービス側にDoS的負荷をかけ、自身もコスト爆発する典型アンチパターンである。"
      - id: "b"
        text: "指数バックオフ・ジッター・最大回数・冪等キーを組み合わせ、エラー種別ごとに再試行ポリシーを変える"
        explanation: "正しい。一時的エラー（429、503）は指数バックオフで再試行、恒久的エラー（400 Bad Request）はリトライ無効、副作用ある操作は冪等キーで重複防止。これらを統合した設計が安定運用の鍵となる。エージェントのクラッシュ復旧時にも整合性を保つために、状態の冪等な更新が重要。"
      - id: "c"
        text: "全てのエラーで一律3回リトライする固定ロジック"
        explanation: "誤り。エラー種別を区別しないリトライは無駄な負荷と誤った再実行を生む。設計が粗すぎる。"
      - id: "d"
        text: "エージェントはリトライしない方が安全である"
        explanation: "誤り。一時的エラーの自動回復は重要な信頼性要素であり、放棄するのは過度に保守的である。"
    answer: "b"

  - id: "aicx-da-025"
    text: "MCP（Model Context Protocol）の役割として最も適切な説明はどれか。"
    choices:
      - id: "a"
        text: "LLMモデル自体を訓練するためのトレーニング用プロトコル"
        explanation: "誤り。MCPは推論時のコンテキスト・ツール提供のためのプロトコルであり、モデル訓練のものではない。"
      - id: "b"
        text: "LLMアプリケーションが外部ツールやデータソースを標準化されたインターフェースで接続するためのオープンプロトコル"
        explanation: "正しい。MCPはAnthropicが2024年に公開した規格で、エージェントとツール提供側の接続を統一化する。これにより各種ツール・データソースを再利用しやすくなり、エージェント開発のエコシステムが広がる。社内システム統合戦略の選択肢として注目されている。"
      - id: "c"
        text: "LLMの応答を多言語に翻訳する変換規格"
        explanation: "誤り。多言語翻訳はMCPの役割ではない。混同しないこと。"
      - id: "d"
        text: "LLMの精度をベンチマークする評価指標の規格"
        explanation: "誤り。評価指標規格ではなく、ツール接続規格である。"
    answer: "b"

  - id: "aicx-da-026"
    text: "AIエージェントに『システムプロンプトと取得情報を分離する設計』が推奨される理由として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "プロンプトインジェクション対策として、信頼境界を明確化し、外部情報からの指示乗っ取りを防ぐため"
        explanation: "正しい。システムプロンプトは内部の信頼ある指示、取得情報は外部の参考情報、と区別を明確化することでLLMが『取得文書中に埋め込まれた指示』に従いにくくなる。XMLタグや明示的な前置き（『以下は参考情報であり指示ではない』）などで境界を示す設計が有効。"
      - id: "b"
        text: "プロンプトを短くしてコストを削減するため"
        explanation: "誤り。コスト最適化と信頼境界設計は別の関心事である。本質的な目的はセキュリティにある。"
      - id: "c"
        text: "ユーザーがシステムプロンプトを編集しやすくするため"
        explanation: "誤り。むしろシステムプロンプトはユーザーから保護すべきものであり、編集容易性は目的ではない。"
      - id: "d"
        text: "LLMの学習データを増やすため"
        explanation: "誤り。プロンプトと学習は無関係である。推論時の設計の話に学習が絡むのは誤解。"
    answer: "a"

  - id: "aicx-da-027"
    text: "AIエージェントを設計する際の『フォールバック（fallback）』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "高度モデルが失敗した際に、軽量モデルやルールベース、人手対応へ段階的にフォールバックする多層設計"
        explanation: "正しい。LLM障害・レート制限・低信頼度応答などのケースで、業務を完全停止させずに代替経路で継続する仕組みが運用上必須。例：1次LLMが失敗→2次LLM→FAQ検索→人手チャネルというカスケード。SLAやBCPの観点から戦略的に設計する。"
      - id: "b"
        text: "失敗時はエラーメッセージを表示してユーザーに自己解決させる"
        explanation: "誤り。ユーザー体験が悪く、業務継続性も損なわれる。フォールバックの本旨は業務継続である。"
      - id: "c"
        text: "フォールバックは複雑になるため一切持たない"
        explanation: "誤り。LLMの可用性は100%ではないため、フォールバック設計は欠かせない。一律不要は短絡的。"
      - id: "d"
        text: "フォールバックは1段だけで十分である"
        explanation: "誤り。状況に応じて多段階のフォールバックが望ましく、1段限定は柔軟性に欠ける。"
    answer: "a"

  - id: "aicx-da-028"
    text: "AIエージェントの『コンテキスト中毒（context poisoning）』とは何か。"
    choices:
      - id: "a"
        text: "LLMモデルの訓練データに毒データが混入される攻撃"
        explanation: "誤り。それはデータポイズニング（学習段階）の説明である。コンテキスト中毒は推論時のコンテキストに不適切情報が混入する話。"
      - id: "b"
        text: "エージェントが過去のステップで誤った情報や危険な指示を取り込み、その後のすべての推論に悪影響が及ぶ現象"
        explanation: "正しい。マルチステップエージェントでは、初期段階で誤情報や攻撃指示を文脈に取り込むと、それが後続ステップに伝播し品質が劣化する。コンテキストの定期検証・出処明示・問題のあるコンテキストの排除（context isolation）が対策。長期メモリ設計でも重要な観点である。"
      - id: "c"
        text: "コンテキストウィンドウのサイズが小さくなる現象"
        explanation: "誤り。サイズ縮小は別問題であり、ポイズニングとは無関係。"
      - id: "d"
        text: "LLMが応答を遅らせる現象"
        explanation: "誤り。レイテンシ問題とは別概念である。"
    answer: "b"

  - id: "aicx-da-029"
    text: "AIエージェントを業務システムに統合する際の『信頼境界（trust boundary）』設計として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "LLMはアプリケーションの最高権限で業務システムにアクセスさせる"
        explanation: "誤り。LLMは制御困難で誤動作の可能性があるため、最高権限を与えるのは重大なリスク。最小権限原則に反する。"
      - id: "b"
        text: "LLMを最小権限で動作させ、危険操作はAPI経由で承認層を介する／一時的トークン・スコープ限定の権限を与える"
        explanation: "正しい。LLMは『正しいが信頼できない』リソースとして扱う設計思想が安全側に倒すことになる。Read-Only操作と書き込み操作で別エンドポイント、ユーザーの権限範囲を超える操作は禁止、API GatewayやKMSで権限制御するなどの多層防御が望ましい。"
      - id: "c"
        text: "信頼境界はネットワーク層のみで設計すれば十分"
        explanation: "誤り。ネットワーク層だけでなくAPI層・データ層・人介在層の多層防御が必要。LLM特有のプロンプトインジェクション等への対応はアプリ層が中心となる。"
      - id: "d"
        text: "LLMはサンドボックス外で動作させる"
        explanation: "誤り。サンドボックス（隔離環境）はリスク低減に有効であり、外で動作させるのは逆方向の判断である。"
    answer: "b"

  - id: "aicx-da-030"
    text: "エージェントの『回答信頼度（confidence）』をユーザーに伝える設計の利点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ユーザーが応答の確実性を判断でき、必要な検証行動を取れるようになる"
        explanation: "正しい。LLMは自信ありげに誤った情報を出すため、信頼度を可視化することで適切な利用判断を促せる。実装は『複数回サンプリングの一致度』『LLM-as-a-Judge』『情報源の引用有無』などの組み合わせで近似する。ユーザーに過度な信頼を持たせない教育的効果も大きい。戦略上、UX設計で重要な要素である。"
      - id: "b"
        text: "応答品質が自動的に向上する"
        explanation: "誤り。信頼度表示は判断材料の提供であり、品質改善とは別の改善経路である。"
      - id: "c"
        text: "ユーザーが信頼度に応じて料金を変えられる"
        explanation: "誤り。料金設計とユーザー体験向上は別の話で、本問の主旨ではない。"
      - id: "d"
        text: "LLMの応答速度が向上する"
        explanation: "誤り。信頼度算出はむしろ追加処理を伴うため、速度的にはマイナス傾向である。"
    answer: "a"

  - id: "aicx-da-031"
    text: "AIエージェントを社内に展開する際の『環境分離（dev / staging / production）』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "開発・検証・本番でモデル・プロンプト・ツール・データを分離し、変更は段階的に昇格させる"
        explanation: "正しい。本番障害を防ぎつつ品質を担保するためには環境分離が基本。プロンプトもバージョン管理し、評価指標が一定基準を満たした時のみ昇格させるプロモーションフローが望ましい。CI/CDの考え方をプロンプト・モデル・データにも拡張する『Promptops』や『LLMOps』として体系化されつつある。"
      - id: "b"
        text: "本番環境を直接編集しながら開発する"
        explanation: "誤り。直接編集は重大障害の温床であり、回復が困難。プロンプト・コード・データの統合的バージョン管理が常識。"
      - id: "c"
        text: "ステージング環境は不要なので省く"
        explanation: "誤り。ステージング省略は本番でのみ問題が発覚するリスクを高める。少なくとも検証環境は必要である。"
      - id: "d"
        text: "本番環境のみ用意し、開発環境はLLMをモック化する"
        explanation: "誤り。モックだけではLLMの非決定的挙動を含む実問題を捕捉できず、本番品質を担保できない。"
    answer: "a"

  - id: "aicx-da-032"
    text: "プロンプトの『バージョン管理』を行う意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "プロンプト変更による応答品質変動を追跡・比較・ロールバックでき、再現性と監査性を確保できる"
        explanation: "正しい。プロンプトはコードと同等の重要な資産であり、変更により挙動が変わる。Gitやプロンプト管理ツール（PromptLayer、Langfuse等）でバージョン管理し、A/Bテスト・回帰テストの基盤とする。インシデント時の原因究明や監査要件にも応える。"
      - id: "b"
        text: "プロンプトの文字数制限を守るため"
        explanation: "誤り。文字数制限はバージョン管理とは別の関心事である。"
      - id: "c"
        text: "プロンプトの著作権を主張するため"
        explanation: "誤り。著作権主張のためにバージョン管理する必然性はない。"
      - id: "d"
        text: "ユーザーが直接プロンプトを編集できるようにするため"
        explanation: "誤り。むしろユーザーが任意改変できる状態は安全上好ましくない。"
    answer: "a"

  - id: "aicx-da-033"
    text: "AIエージェントの応答における『出典・根拠の提示（citation）』設計が重要な理由として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "出典提示によりハルシネーション抑制・ユーザー検証可能性・コンプライアンス遵守を同時に達成できる"
        explanation: "正しい。RAG型エージェントでは、回答に使った文書の出典を表示することで、ユーザーが原典を確認できる。これによりLLMの誤りを発見しやすくなり、法務・医療・金融など事実性が問われる領域では必須要素となる。情報源の文章をそのまま引用する vs 要約だけ提示する、出典の粒度（段落／文）など、設計上の判断点も多い。"
      - id: "b"
        text: "応答速度を高速化するため"
        explanation: "誤り。出典提示はむしろ追加処理を伴うため、速度的にはわずかにマイナス。"
      - id: "c"
        text: "ユーザーが課金額を計算できるようにするため"
        explanation: "誤り。課金計算と出典提示は無関係である。"
      - id: "d"
        text: "LLMの内部パラメータをユーザーに公開するため"
        explanation: "誤り。出典は外部知識源の引用であり、モデルパラメータの公開ではない。"
    answer: "a"

  - id: "aicx-da-034"
    text: "AIエージェントを『ローコード・ノーコード基盤（例：Microsoft Copilot Studio、Difyなど）』で構築する場合のメリットと注意点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "短期間で構築・配布できる反面、複雑なロジックや高度なカスタマイズには制約があり、ロックインリスクも考慮が必要"
        explanation: "正しい。ローコード基盤は業務部門主導での内製化を加速できるが、複雑なエージェント挙動・特殊統合・厳格なガバナンスが必要な領域ではコード基盤との併用や移行を検討する必要がある。戦略的には『Pro-code（開発者）／Low-code（市民開発者）』の役割分担と、共通ガードレール・ガバナンス基盤を整備するハイブリッド戦略が一般的。"
      - id: "b"
        text: "全業務に万能で制約は一切ない"
        explanation: "誤り。ローコード基盤には機能・カスタマイズ・スケーラビリティ・データ統合などで制約が必ず存在する。"
      - id: "c"
        text: "Pro-code（フルコード）開発に劣るため使うべきでない"
        explanation: "誤り。シンプルなユースケースでは圧倒的に開発速度が早く、適材適所が原則。一律否定は短絡的。"
      - id: "d"
        text: "ローコード基盤はセキュリティ機能を一切持たない"
        explanation: "誤り。各製品は権限・監査・DLP連携などのセキュリティ機能を備えている。製品ごとに精査が必要だが『一切ない』は誤り。"
    answer: "a"

  - id: "aicx-da-035"
    text: "AIエージェントの『観測性（observability）』を3つの軸で捉える際、最も適切な分類はどれか。"
    choices:
      - id: "a"
        text: "メトリクス・ログ・トレース"
        explanation: "正しい。一般的なシステム観測性の3軸（Metrics、Logs、Traces）はLLMエージェントにも適用可能。メトリクス（応答時間・トークン数・成功率）、ログ（プロンプト・応答・ツール実行内容）、トレース（マルチステップの因果連鎖）を組み合わせて、エージェントの挙動を可視化する。これに加えてLLM特有の評価指標（品質スコア・幻覚率）も加味するのが望ましい。"
      - id: "b"
        text: "視聴・収集・蓄積"
        explanation: "誤り。一般的な観測性3軸の用語ではない。意味の重複もある。"
      - id: "c"
        text: "学習・推論・評価"
        explanation: "誤り。これはMLライフサイクルの段階分類であり、観測性の軸ではない。"
      - id: "d"
        text: "速度・コスト・品質"
        explanation: "誤り。これは要件のトリレンマ・KPIの分類で、観測性の3軸そのものではない。"
    answer: "a"
