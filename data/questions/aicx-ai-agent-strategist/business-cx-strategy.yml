questions:
  - id: "aicx-biz-001"
    text: "AIエージェント導入におけるユースケース選定の評価軸として最も適切な組み合わせはどれか。"
    choices:
      - id: "a"
        text: "ビジネスインパクト（売上・コスト・CSAT等）、技術的実現可能性、リスク、スケーラビリティ"
        explanation: "正しい。ユースケース選定は『価値（インパクト）』『フィージビリティ（技術的・運用的に実現可能か）』『リスク（誤動作の被害規模）』『スケーラビリティ（横展開可能性）』を組み合わせて評価する。価値マトリクス（縦：価値、横：実現性）で並べ、低リスク×高価値×実現容易の象限から着手するのが定石。"
      - id: "b"
        text: "技術的にトレンドかどうかだけで選定する"
        explanation: "誤り。トレンドありきではビジネス成果が伴わない。技術選定の自己目的化はAIプロジェクト失敗の典型パターン。"
      - id: "c"
        text: "経営層が関心を持つテーマだけで選定する"
        explanation: "誤り。トップダウンの選定は速い反面、現場実装可能性・リスク評価が抜け落ちやすい。複合視点が必要。"
      - id: "d"
        text: "競合が導入していれば自社も同領域で導入する"
        explanation: "誤り。競合追随は戦略の根拠としては弱く、自社の業務特性・データ資産・能力に合致するかの分析が必要。"
    answer: "a"

  - id: "aicx-biz-002"
    text: "AIエージェントのROIを試算する際、コスト側に含めるべき項目として最も網羅的なものはどれか。"
    choices:
      - id: "a"
        text: "LLM推論コスト・基盤運用コスト・開発・運用人件費・データ整備コスト・教育コスト・リスク対応コスト・撤退コスト"
        explanation: "正しい。LLM API料金だけでROI計算するとコスト過小評価になる。ベクトルDB・監視基盤・運用人員、データ前処理、教育・チェンジマネジメント、不具合対応、PoC撤退コストなどフルコストを織り込む必要がある。隠れたコストの見落としがプロジェクト失敗の原因となる。"
      - id: "b"
        text: "LLM API料金のみ"
        explanation: "誤り。LLM料金は氷山の一角であり、運用・人件費の方が大きい場合が多い。"
      - id: "c"
        text: "ハードウェア購入費だけ"
        explanation: "誤り。クラウド利用が一般的であり、また人件費・運用コストが抜けている。"
      - id: "d"
        text: "ライセンス料のみ"
        explanation: "誤り。一面的すぎる。ROI計算では総保有コスト（TCO）の視点が必要。"
    answer: "a"

  - id: "aicx-biz-003"
    text: "AIエージェントの『価値創出メカニズム』を整理する際の代表的な軸として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "コスト削減（自動化）、収益拡大（CX向上・パーソナライズ）、リスク低減、新規事業創出"
        explanation: "正しい。AIエージェントの価値は『削る・伸ばす・守る・創る』の4軸で整理できる。各ユースケースをこの軸に位置付けることで、優先順位や成果指標の設定が容易になる。多くの企業は『削る』から始めて『伸ばす・創る』へ展開していくロードマップを取る。"
      - id: "b"
        text: "コスト削減のみ"
        explanation: "誤り。AIエージェントの価値はコスト削減に限らない。CXやパーソナライゼーション、新規事業創出も大きな価値領域である。"
      - id: "c"
        text: "技術的な新規性のみ"
        explanation: "誤り。技術新規性は手段であり目的ではない。価値創出の文脈では適切でない軸。"
      - id: "d"
        text: "ベンダー収益のみ"
        explanation: "誤り。ベンダー収益は自社の価値創出ではない。視点が誤っている。"
    answer: "a"

  - id: "aicx-biz-004"
    text: "AIエージェントの『Build（自社開発）vs Buy（既製品購入）vs Hybrid（組み合わせ）』選定における判断基準として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "差別化要素・ドメイン特殊性・データ資産・社内人材・運用能力・TTM要件を踏まえ、コア領域はBuild、汎用領域はBuy、必要に応じてHybridを設計する"
        explanation: "正しい。差別化に直結する独自ロジック・固有データを活用する領域はBuild、メールアシスタントなど汎用機能はBuyが合理的。両者の組み合わせ（既製基盤＋独自プラグイン）も実用的。社内人材・運用能力に応じてバランスを取る戦略判断が求められる。"
      - id: "b"
        text: "常にBuild一択である"
        explanation: "誤り。すべてを内製化するのは時間・コスト・人材の観点で非現実的。コア集中の原則がある。"
      - id: "c"
        text: "常にBuy一択である"
        explanation: "誤り。差別化領域・機密情報領域・既存システム統合などBuyでは対応困難な場面も多い。"
      - id: "d"
        text: "Build/Buyは技術判断であり、戦略観点は不要"
        explanation: "誤り。Build/Buyはまさに戦略判断の中核であり、技術だけで決めると失敗する。"
    answer: "a"

  - id: "aicx-biz-005"
    text: "AIエージェント導入時の『成功指標（KPI）』として最も適切な設計原則はどれか。"
    choices:
      - id: "a"
        text: "業務指標（処理件数・応答時間等）と顧客指標（CSAT・NPS等）と経済指標（コスト削減・売上）を組み合わせ、AI固有指標（ハルシネーション率等）も併記する"
        explanation: "正しい。AI固有指標（応答品質・幻覚率）だけ見るとビジネス成果との接続が弱くなり、業務指標だけ見るとAI品質が劣化していても気づけない。多層のKPI体系を作り、目的階層と整合させる設計が望ましい。AIストラテジストはこのKPIツリー設計が腕の見せどころ。"
      - id: "b"
        text: "AI技術指標（精度のみ）に絞るのが最善"
        explanation: "誤り。技術指標だけでは経営的価値を語れず、投資継続の論拠が弱くなる。"
      - id: "c"
        text: "KPIは設定せず定性的評価のみ行う"
        explanation: "誤り。定量指標なしには改善も判断もできない。経営説明にも耐えない。"
      - id: "d"
        text: "競合と同じKPIを使う"
        explanation: "誤り。自社の戦略・業務に合わせた独自KPI設計が必要。模倣は表面的になる。"
    answer: "a"

  - id: "aicx-biz-006"
    text: "AIエージェントを『カスタマーサポート』に導入する際の戦略的留意点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "全自動化を目指さず、AIで一次対応・FAQ自動回答を捌き、複雑案件・感情的対応は人間オペレーターへ渡すハイブリッド設計を行う"
        explanation: "正しい。CS領域は『簡単な質問の高頻度処理』をAIが担い、『複雑・感情・例外』を人が担う棲み分けが現実的。完全自動化を目指すと顧客満足度が下がる事例が多い。エスカレーション基準・引継ぎ品質・オペレーター支援（AIサジェスト）も含めた設計がポイント。"
      - id: "b"
        text: "全件AI化することで人件費を最大化削減する"
        explanation: "誤り。全件AI化は顧客体験を毀損し、ブランド価値の毀損や顧客離反でかえって損失となる。"
      - id: "c"
        text: "AIエージェントの応答時間を遅くしてオペレーターと差別化する"
        explanation: "誤り。応答時間を遅らせる戦略には合理性がない。むしろ高速応答はAIの優位性。"
      - id: "d"
        text: "AIは検証段階でのみ使い、本番投入はしない"
        explanation: "誤り。本番投入してこそ価値が出る。検証だけで止めるのは投資回収不能。"
    answer: "a"

  - id: "aicx-biz-007"
    text: "AIエージェントの『営業支援（セールスエージェント）』適用時に注目すべき効果として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "リード調査の自動化・パーソナライズ提案・商談議事録作成・CRM入力支援などにより、営業担当が顧客との対話に時間を使えるようにする"
        explanation: "正しい。営業の生産性ボトルネックは『顧客に向き合う時間』を圧迫する事務作業や情報収集である。AIエージェントでこれらを代替・補助することで営業1人当たりのリード処理量・成約率向上を図れる。Build vs SaaS（Salesforce Einstein等）の選択も戦略判断点。"
      - id: "b"
        text: "全営業活動をAIで完全自動化する"
        explanation: "誤り。営業は人間関係構築や交渉が本質であり、完全自動化は現状非現実的。"
      - id: "c"
        text: "営業担当を全員解雇してAIに置き換える"
        explanation: "誤り。AIは営業の補助役であり、人間の判断・関係構築は依然必要。極端な人員削減は組織能力毀損のリスク。"
      - id: "d"
        text: "AIで顧客プライバシーを把握し優位に立つ"
        explanation: "誤り。プライバシー侵害は重大なコンプライアンス違反であり、戦略として誤り。"
    answer: "a"

  - id: "aicx-biz-008"
    text: "AIエージェントの『社内向け活用（インターナルAI）』の典型的価値領域として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "社内FAQ・規程検索・議事録作成・ナレッジマネジメント・コーディング支援・人事問い合わせ自動化など"
        explanation: "正しい。インターナルAIは情報アクセス・文書処理・コード生成・問い合わせ対応など、知的労働の生産性向上に効く領域が中心。社外公開と比べ、規制リスクが低く、データもコントロールしやすいため、エンタープライズの初期成功領域として推奨される。"
      - id: "b"
        text: "社外向けマーケティングのみ"
        explanation: "誤り。それは外向きの活用であり、インターナルAIの定義に合わない。"
      - id: "c"
        text: "工場の物理ラインを直接制御する"
        explanation: "誤り。物理制御はAIエージェントの典型的内部活用ではなく、別領域（産業オートメーション）。"
      - id: "d"
        text: "社員の監視・スコアリング"
        explanation: "誤り。プライバシー・倫理上の重大リスクがあり、戦略として推奨されない。"
    answer: "a"

  - id: "aicx-biz-009"
    text: "AIエージェント導入の『チェンジマネジメント』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "現場の不安・抵抗を踏まえ、教育・コミュニケーション・成功事例の共有・段階的導入・人材再配置プランを統合的に進める"
        explanation: "正しい。AIは雇用や業務役割への影響が大きく、現場が腑に落ちないまま導入すると形骸化する。経営の意図と現場の懸念を双方向で対話し、成功事例を共有して『使うほど自分の仕事が楽になる』を体感させるアプローチが効果的。リスキリング機会の提供も重要。"
      - id: "b"
        text: "技術導入が完了すれば自然に現場が使うようになる"
        explanation: "誤り。多くの企業でAI導入後の利用率は技術的成功と関係なく停滞する。チェンジマネジメントが鍵。"
      - id: "c"
        text: "現場の意見は技術選定後に聞けばよい"
        explanation: "誤り。後付けでは反映が困難。早期からの巻き込みが定着の鍵。"
      - id: "d"
        text: "現場が反対する場合は強制的に導入する"
        explanation: "誤り。強制導入は表面遵守で済まされ、本来の効果が出ない。納得感の醸成が必要。"
    answer: "a"

  - id: "aicx-biz-010"
    text: "AIエージェント導入の『AI人材戦略』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AI専門人材を採用しつつ既存社員のリスキリングを進め、ビジネス側・技術側・倫理側の3方向で人材配置する"
        explanation: "正しい。AI専門人材だけ集めても業務理解が弱く成果が出にくい。既存業務知見を持つ社員のリスキリングと、新規人材確保を並行することで成果を最大化できる。さらにAI倫理・コンプライアンスを担う人材も組織化することが、ガバナンスを担保する。"
      - id: "b"
        text: "AI専門人材を全員外部から採用すれば十分"
        explanation: "誤り。業務知識のない外部人材だけでは事業課題に踏み込めない。内部人材の知見が不可欠。"
      - id: "c"
        text: "リスキリングは不要で現状維持で対応"
        explanation: "誤り。AI時代に既存スキルだけでは対応できず、リスキリング不要は致命的判断ミス。"
      - id: "d"
        text: "外部委託のみで内部人材は不要"
        explanation: "誤り。外部委託のみではノウハウが社内に残らず、長期的に競争力が低下する。"
    answer: "a"

  - id: "aicx-biz-011"
    text: "AIエージェントの『センター・オブ・エクセレンス（CoE）』設置の主な意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AI推進の標準・ガイドライン・共通基盤・人材育成を集約し、各事業部の取り組みを支援・統制することで全社最適と速度を両立する"
        explanation: "正しい。各事業部が個別にAI活用を始めると重複投資・ガバナンス欠如・品質ばらつきが発生する。CoEはガイドライン・共通プラットフォーム・人材プール・ベストプラクティスを集約し、事業部の自律性を保ちつつ全社的整合を図る組織装置。多くの大企業で採用されるパターンである。"
      - id: "b"
        text: "AI関連の意思決定をすべて経営直轄にする組織"
        explanation: "誤り。CoEはむしろ事業部のスピードを支援する役割。意思決定を一極集中させると現場対応が遅れる。"
      - id: "c"
        text: "AI関連業務を全員CoEに集約し、事業部は手を出せない"
        explanation: "誤り。事業部の主体性を奪うとAI活用が進まない。CoEは支援・標準化が役割。"
      - id: "d"
        text: "AIに関する研究論文を執筆する研究機関"
        explanation: "誤り。研究機関の意味合いはあるが、戦略的にはより広い役割（標準化・人材育成・ガバナンス）を持つ。"
    answer: "a"

  - id: "aicx-biz-012"
    text: "AIエージェントの『全社展開（スケール）』段階で発生する典型的な課題として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "個別最適の重複・ガバナンス／セキュリティ統制不足・基盤運用負荷増・人材不足・コスト管理の困難化"
        explanation: "正しい。PoCは成功しても全社展開段階で『各部門が好き勝手に作る』『監査要件未対応』『運用が破綻』『コストが見えない』などの問題が露呈する。CoE・共通基盤・FinOps・ガバナンス委員会などの仕組み作りが、スケール段階の主要課題となる。"
      - id: "b"
        text: "PoCで成功すれば全社展開は自動的に進む"
        explanation: "誤り。PoCの成功条件と全社展開の成功条件は異なる。スケール特有の課題があり、別の戦略が必要。"
      - id: "c"
        text: "全社展開はLLMモデルの選定だけで決まる"
        explanation: "誤り。技術選定は一要素に過ぎず、組織・運用・コスト・人材が全社展開の鍵。"
      - id: "d"
        text: "全社展開ではコストが必ず減る"
        explanation: "誤り。スケール時にはコストがむしろ膨張しやすく、適切な管理がないとROIが悪化する。"
    answer: "a"

  - id: "aicx-biz-013"
    text: "AIエージェントの『ベンダー選定』における重要な評価軸として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "技術的能力・データ取扱方針・SLA・コスト・ロックイン度・サポート体制・財務健全性・将来ロードマップ"
        explanation: "正しい。ベンダー選定はAI戦略の長期的成否に直結する。価格や機能だけでなく、データを学習に使うか・契約解除時のデータ取り出し・モデル変更時の影響・サポート品質・ベンダーの存続可能性まで多面評価する。AI市場は変動が激しいため、複数ベンダー併用やオープンソース併用も含めたポートフォリオ戦略が重要。"
      - id: "b"
        text: "価格だけで選定する"
        explanation: "誤り。価格は重要だが、長期的なTCO・ロックイン・サポートの観点が抜けると後悔しやすい。"
      - id: "c"
        text: "ベンダーは1社のみに統一する必要がある"
        explanation: "誤り。1社統一はロックインリスクが大きく、複数ベンダー戦略やオープンソース併用が望ましい場合も多い。"
      - id: "d"
        text: "技術以外の評価軸は不要"
        explanation: "誤り。データ取扱・SLA・契約条件などビジネス・法務観点は不可欠である。"
    answer: "a"

  - id: "aicx-biz-014"
    text: "AIエージェントの『データ戦略』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "業務文書・対話ログ・CRM・行動データなどの自社データ資産を整備・活用し、AIエージェントの差別化要因として位置付ける"
        explanation: "正しい。汎用LLMが普及する中で、自社の差別化はデータの量・質・利用権で決まる。データ整備（クレンジング・タグ付け・許諾管理・統合）はAI戦略の中核であり、AIストラテジストはデータ戦略と密接に連携する必要がある。データなき戦略は実装フェーズで頓挫する。"
      - id: "b"
        text: "データは関係なく、LLMモデルの選択だけで戦略が決まる"
        explanation: "誤り。汎用モデルは誰でも使えるため、データ資産が差別化の主要因となる。モデル一辺倒は浅い戦略。"
      - id: "c"
        text: "外部公開データだけでAI戦略は十分構築できる"
        explanation: "誤り。外部公開データは競合も使えるため差別化にならない。自社固有データの活用が要点。"
      - id: "d"
        text: "データは多ければ多いほど良いため、品質は問わない"
        explanation: "誤り。データ品質は量より重要であり、ノイズの多いデータはむしろ害となる。"
    answer: "a"

  - id: "aicx-biz-015"
    text: "AIエージェントの『顧客体験（CX）戦略』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AIによるパーソナライズ・24時間応対・先回り提案など、人手では難しい体験価値を設計し、人間タッチポイントとの最適配分を考える"
        explanation: "正しい。AIエージェントはCX変革の中核手段。AIだから可能な体験（深夜の即時応答、過去履歴を踏まえた提案、多言語対応）と、人間ならではの共感・複雑判断のタッチポイントを設計し、顧客旅程全体で最適な体験を組み立てる。AICX協会の名にもCX（Customer Experience）が冠されている所以である。"
      - id: "b"
        text: "AIで全顧客接点を自動化し人を介在させない"
        explanation: "誤り。完全自動化は重要顧客の不満や離反を招く。人間タッチポイントは戦略的に残す必要がある。"
      - id: "c"
        text: "顧客の好みは平準化し、画一的な応対をする"
        explanation: "誤り。AIの強みはパーソナライズであり、画一化はむしろ機会損失。"
      - id: "d"
        text: "CXとAI戦略は無関係であり別個に考えるべき"
        explanation: "誤り。両者は密接に関連しており、AI戦略はCX戦略の延長線上に位置付けるべき。"
    answer: "a"

  - id: "aicx-biz-016"
    text: "AIエージェントを業務プロセスに組み込む際の『業務リエンジニアリング』の重要性として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AIを既存プロセスにそのまま乗せるのではなく、エージェント前提でプロセス自体を再設計することで効果を最大化できる"
        explanation: "正しい。既存プロセスはあくまで人手前提で設計されており、AIエージェントの能力に合わせてプロセスを再設計することで本当の価値が出る。例：5段階の手作業承認をAIによる事前審査＋例外時のみ人介在に変える、など。リフト＆シフトでは限界があり、AI起点のプロセス変革が真の競争優位を生む。"
      - id: "b"
        text: "既存プロセスは絶対に変えてはいけない"
        explanation: "誤り。プロセス聖域化はAIの効果を著しく削ぐ。むしろ変革対象として捉えるのが戦略判断。"
      - id: "c"
        text: "AIはツール置き換えに留めるべきで、プロセス変革は不要"
        explanation: "誤り。ツール置き換え発想ではROIが小さくなり、変革のインパクトが限定される。"
      - id: "d"
        text: "業務リエンジニアリングはAIとは無関係"
        explanation: "誤り。AI導入は業務リエンジニアリングの絶好の機会であり、両者は強く関連する。"
    answer: "a"

  - id: "aicx-biz-017"
    text: "AIエージェント導入における『リスク受容度（risk appetite）』設定の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "業務領域・利害関係者・法規制を踏まえ、組織として許容できるAI起因リスクの上限を明確化することで、設計判断と運用判断の指針となる"
        explanation: "正しい。リスク受容度を曖昧にすると、現場は判断に迷い、保守的すぎたり逆に冒険的すぎたりする。経営として『どの種のリスクをどこまで許容するか』を明文化することで、ガードレール設計や自律性レベル決定の根拠が明確になる。これはAIガバナンスの基礎概念。"
      - id: "b"
        text: "リスクはゼロにすべきであり受容度の概念は不要"
        explanation: "誤り。リスクゼロは事業活動と両立しない。残存リスクの管理が現実的アプローチ。"
      - id: "c"
        text: "リスク受容度は技術部門だけで決定する"
        explanation: "誤り。リスク受容度は経営判断であり、法務・倫理・事業部門を含めた全社的合意が必要。"
      - id: "d"
        text: "リスク受容度は文書化せず暗黙知でよい"
        explanation: "誤り。文書化されないリスク受容度は判断のばらつきや事故の温床となる。"
    answer: "a"

  - id: "aicx-biz-018"
    text: "AIエージェントを『マーケティング領域』に適用する際の代表的な活用シナリオとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "顧客セグメントごとの個別メッセージ生成・キャンペーン文案作成・パーソナライズ推奨・コンテンツ多言語化"
        explanation: "正しい。マーケティング領域はLLMとAIエージェントの効果が出やすい分野。1人ひとりに最適化したコピー生成、ABテスト用バリエーション作成、SNS監視と即応、多言語ローカライズなどでスピードと量を両立できる。一方でブランドトーン管理・著作権配慮・差別表現回避などのガードレールが必要。"
      - id: "b"
        text: "全マーケティング業務をAIに置き換えて人を解雇する"
        explanation: "誤り。マーケティングは人の創造性・戦略判断が依然重要であり、AIは支援者の位置付けが現実的。"
      - id: "c"
        text: "顧客データを許諾なく学習させて活用する"
        explanation: "誤り。プライバシー法令違反であり、戦略上絶対にやってはいけない。"
      - id: "d"
        text: "マーケティング領域にAIは不向きで導入価値はない"
        explanation: "誤り。むしろ最も導入が進んでいる領域の一つであり、価値が見えやすい。"
    answer: "a"

  - id: "aicx-biz-019"
    text: "AIエージェントの『プライシング戦略』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "従量課金・サブスクリプション・成果連動など複数モデルを組み合わせ、顧客価値・コスト構造・市場相場を踏まえて設計する"
        explanation: "正しい。AIエージェントは推論コスト・基盤コストが従量で発生するため、課金モデルとコスト構造の整合が重要。利用量が読めない初期はサブスク＋上限付き従量、価値創出が明確な場合は成果連動など、用途に応じてモデル設計する。社内利用の場合も部門課金や予算管理の設計が必要。"
      - id: "b"
        text: "プライシングは技術選定後に決めればよい"
        explanation: "誤り。プライシングはビジネスモデルの根幹であり、技術選定と並行して設計すべき。"
      - id: "c"
        text: "プライシングは無料が最善"
        explanation: "誤り。コストを回収できないプライシングは事業継続性を欠く。"
      - id: "d"
        text: "プライシングは1モデルに統一すべき"
        explanation: "誤り。多様な顧客セグメント・用途に対し1モデル統一は最適でない場合が多い。"
    answer: "a"

  - id: "aicx-biz-020"
    text: "AIエージェントの『PoC死（PoC trap）』を回避する戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "PoC開始時に本番展開条件・成功指標・撤退基準・拡張ロードマップを定義し、PoC自体を本番準備として位置付ける"
        explanation: "正しい。多くの企業で『PoCはやったが本番展開しないまま終わる』PoC死が起きる。原因はPoCが目的化していること、本番ロードマップが未定義であること、撤退基準が曖昧で延々と延命することなど。最初から『どうなったら本番化／中止か』を明確にし、PoCの先のスケール戦略を準備しておくことが定石。"
      - id: "b"
        text: "PoCは技術検証だけ行い、ビジネス側は介入しない"
        explanation: "誤り。ビジネス側の関与不足はPoC死の典型原因。"
      - id: "c"
        text: "PoCを長期間繰り返すことで品質を担保する"
        explanation: "誤り。延命はROIを毀損し、組織のAI推進力を弱める。"
      - id: "d"
        text: "PoCは設計せず思いつきで進める"
        explanation: "誤り。設計なきPoCは成功条件が不明で評価できない。"
    answer: "a"

  - id: "aicx-biz-021"
    text: "AIエージェント導入における『部門横断プロジェクト』の編成として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "業務部門・IT・データ・法務・人事・経営企画を巻き込み、業務知識・技術・統制・組織変革・経営判断を一体運営する"
        explanation: "正しい。AIエージェントは技術プロジェクトであると同時に業務変革プロジェクトであり、IT部門だけでは成功しない。法務・コンプライアンスはガードレール、人事はチェンジマネジメントを担う。AIストラテジストは多様な部門をつなぐ役割であり、コミュニケーションスキルが極めて重要。"
      - id: "b"
        text: "IT部門だけで完結させるべき"
        explanation: "誤り。業務理解・統制要件・組織変革のいずれもIT部門単独では対応困難。"
      - id: "c"
        text: "業務部門だけで進めれば十分"
        explanation: "誤り。技術選定・運用・セキュリティ等でIT部門の関与は不可欠。"
      - id: "d"
        text: "経営層の関与は不要"
        explanation: "誤り。リスク受容度・投資判断・戦略整合のため経営層の関与は不可欠。"
    answer: "a"

  - id: "aicx-biz-022"
    text: "AIエージェントの『投資判断』においてストラテジストが経営層に説明すべき要素として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ビジネス価値仮説・成功指標・コスト構造・主要リスクと対策・段階的なロードマップ・撤退条件"
        explanation: "正しい。経営判断には『何を実現するか』『どうやって測るか』『何にいくらかかるか』『何が起きうるか』『どう進めるか』『何があれば止めるか』の6点が必要。技術用語ではなく経営言語で語る能力がAIストラテジストの差別化要素となる。"
      - id: "b"
        text: "技術詳細（プロンプト構造、ベクトルDB選定理由等）"
        explanation: "誤り。技術詳細だけでは経営判断材料にならない。経営は意思決定に必要な情報を求めている。"
      - id: "c"
        text: "コストだけ"
        explanation: "誤り。コストだけではROIが見えず、投資判断ができない。"
      - id: "d"
        text: "他社事例の紹介だけ"
        explanation: "誤り。他社事例は参考だが、自社固有の判断には不十分。"
    answer: "a"

  - id: "aicx-biz-023"
    text: "AIエージェントの『業界別ユースケース』に関して、金融業界における代表的活用領域として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "顧客問い合わせ自動化・KYC文書解析・規制対応支援・市場リサーチ要約・営業提案資料生成・不正検知の補助"
        explanation: "正しい。金融業はテキスト・規制・分析業務が多く、AIエージェントの効果領域が広い。一方で規制対応（金融庁・FISC）、説明責任、リスク管理が厳格に求められる。よってガードレール・監査ログ・人間最終承認の設計が他業界以上に重要となる。"
      - id: "b"
        text: "金融業界はAI活用に不向きで導入事例はほぼない"
        explanation: "誤り。むしろ金融はAI活用先進業界の一つで、多くの導入事例がある。"
      - id: "c"
        text: "金融業界では完全自動化が標準である"
        explanation: "誤り。金融はリスク・規制が厳しく、人間最終承認やHITLが必須の業務が多い。完全自動化は限定的。"
      - id: "d"
        text: "金融業界では従量課金モデルが使えない"
        explanation: "誤り。従量課金モデルは金融業界でも採用される。一律否定は誤り。"
    answer: "a"

  - id: "aicx-biz-024"
    text: "AIエージェントの『製造業ユースケース』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "技術文書検索・故障診断支援・サプライヤー対応・取扱説明書多言語化・現場作業員向けナレッジ提供"
        explanation: "正しい。製造業は膨大な技術文書・現場ノウハウ・サプライチェーン情報を扱うため、知識検索・対応支援・多言語対応のAI価値が高い。一方で物理的な制御は安全性要件が厳格で、AIエージェント単独では行わずSCADAやPLCとの連携設計が必要。情報領域から始めてスケールするのが現実的アプローチ。"
      - id: "b"
        text: "製造業は古い業界でAI活用ができない"
        explanation: "誤り。むしろAIによる効率化機会が大きい業界。"
      - id: "c"
        text: "AIエージェントで物理制御を直接行うべき"
        explanation: "誤り。物理制御は安全要件が厳しく、AIエージェント単独では危険。専用システムとの連携が前提。"
      - id: "d"
        text: "製造業ではローコード基盤は使えない"
        explanation: "誤り。事務系業務にはローコード基盤も活用可能で、一律否定は誤り。"
    answer: "a"

  - id: "aicx-biz-025"
    text: "AIエージェントの『小売・EC』ユースケースとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "パーソナライズ推奨・チャット販売支援・在庫照会・商品説明文生成・カスタマーレビュー要約・問い合わせ自動応対"
        explanation: "正しい。小売・ECは顧客接点・商品データ・問い合わせのスケールが大きく、AIによる自動化・個別化の効果が出やすい領域。CXストラテジストの戦場。会話型コマース、対話的商品検索、リアルタイム在庫案内など、新しいショッピング体験の設計余地も大きい。"
      - id: "b"
        text: "小売業ではAI活用は法的に禁止されている"
        explanation: "誤り。法的禁止はない。プライバシー等の規制遵守は必要だが活用は可能。"
      - id: "c"
        text: "小売業は接客のみで成り立つためAIは不要"
        explanation: "誤り。商品知識検索・在庫管理・需要予測など接客以外にも価値領域が多数ある。"
      - id: "d"
        text: "AIで顧客の購買履歴を許諾なく外部企業と共有する"
        explanation: "誤り。データ共有は法的・倫理的に厳格な許諾が必要であり、戦略上不適切。"
    answer: "a"

  - id: "aicx-biz-026"
    text: "AIエージェントの『医療・ヘルスケア』導入における留意点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "高い事実性・説明可能性・プライバシー要件があり、医療判断は人間の医師が行う前提でAIは情報整理・問診支援・文書作成支援などに活用する"
        explanation: "正しい。医療はリスクが高く、薬機法・個人情報保護法・医療倫理など厳格な規制下にある。AIの出力をそのまま医療判断に使うのは慎重で、診療補助・問診支援・カルテ要約など人を支援する位置付けが現実的。HITLが必須で、誤情報のインパクトが特に大きい。"
      - id: "b"
        text: "医療領域は規制が緩いので自由に展開できる"
        explanation: "誤り。実態は逆であり、規制が厳しい代表領域。"
      - id: "c"
        text: "AIに最終診断をさせるべき"
        explanation: "誤り。最終診断は医師の専管事項であり、AI単独で診断するのは法的・倫理的に不適切。"
      - id: "d"
        text: "医療データは特別扱い不要"
        explanation: "誤り。医療データは要配慮個人情報であり、最高水準の保護が必要。"
    answer: "a"

  - id: "aicx-biz-027"
    text: "AIエージェントの『公共・行政』ユースケースに関する留意点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "公平性・透明性・説明責任が極めて重要で、市民への影響が大きい判断は人が行い、AIは情報案内・申請補助・問い合わせ対応に限定するのが安全"
        explanation: "正しい。公共サービスは公平性が法律で求められ、AIによる差別的判断や不透明な処理は重大な社会問題を引き起こす。EU AI Actや米OMBガイダンスなど、公共領域のAI規制は世界的に厳格化している。市民の権利に影響する判断ではHITL・説明責任・異議申立フローが必須。"
      - id: "b"
        text: "公共領域では完全自動化が望ましい"
        explanation: "誤り。公平性・説明責任の観点から完全自動化は危険であり、世界の規制動向にも反する。"
      - id: "c"
        text: "公共領域は規制が無いので自由"
        explanation: "誤り。むしろ最も規制が強い領域の一つ。"
      - id: "d"
        text: "公共領域でも企業利用と同じ運用で問題ない"
        explanation: "誤り。市民影響・説明責任の観点で固有の要件があり、企業利用と同等視はできない。"
    answer: "a"

  - id: "aicx-biz-028"
    text: "AIエージェントの『業務影響度マッピング』を行う際の戦略的アプローチとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "業務をタスクに分解し、各タスクを『AI完全代替』『AI支援』『人専管』に分類し、影響度・実現性・リスクで優先順位を付ける"
        explanation: "正しい。業務単位で『AIに置き換える』と粗すぎ、タスク単位での分解が必要。タスクを構造化評価することで、現実的な人とAIの分業設計が可能となる。経営に対しても説得力ある説明資料となり、現場の不安にも応えやすい。AIストラテジストの代表的な分析手法。"
      - id: "b"
        text: "全業務を一律にAI化対象とする"
        explanation: "誤り。業務特性により適性が異なり、一律AI化は失敗を生む。"
      - id: "c"
        text: "AI化は技術部門が決め業務部門は関与しない"
        explanation: "誤り。業務知識を持つ業務部門の関与なしには適切な分類ができない。"
      - id: "d"
        text: "業務影響度マッピングは不要"
        explanation: "誤り。マッピングなしの導入は当てずっぽうで、優先順位や合意形成が困難。"
    answer: "a"

  - id: "aicx-biz-029"
    text: "AIエージェントの『運用組織体制』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "プロダクトオーナー・エンジニア・データチーム・運用（SRE/MLOps）・法務／コンプライアンス・ビジネスSMEを含む横断チーム"
        explanation: "正しい。AIエージェントは継続的な改善・監視・改修・ガバナンスを必要とする生もののようなシステム。プロダクトとして長期運営する組織体制が必須で、SRE的な運用役割（LLMOps）と業務SME（subject matter expert）の継続的関与がポイントとなる。"
      - id: "b"
        text: "開発完了後はチームを解散して問題ない"
        explanation: "誤り。AIエージェントはモデル更新・データ更新・規制変化に応じて継続的進化が必要。"
      - id: "c"
        text: "外部ベンダーに丸投げで内部体制は不要"
        explanation: "誤り。社内ナレッジが残らず、長期的に競争力が低下する。"
      - id: "d"
        text: "1人の担当者が全責務を担う"
        explanation: "誤り。多様な専門性が必要であり、1人で全カバーは現実的でなく、リスクも大きい。"
    answer: "a"

  - id: "aicx-biz-030"
    text: "AIエージェントの『顧客向けブランディング』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AIであることを明示し、能力範囲・限界・人間オペレーターへの切替経路を透明に伝えることで信頼を構築する"
        explanation: "正しい。AIを人間と偽る『なりすまし』は短期的には効果があってもバレた時の信頼失墜が大きい。AIである旨を明示し、できること・できないこと・必要時の人介在を明確に伝えることが、長期的なブランド信頼を支える。各国の規制でもAI開示義務化が進んでいる（EU AI Act等）。"
      - id: "b"
        text: "AIを人間と偽って顧客接点を維持する"
        explanation: "誤り。倫理・法規制・信頼の観点で重大な問題。EU AI Actでも禁止される行為。"
      - id: "c"
        text: "AIであることを隠すと顧客満足度が高まる"
        explanation: "誤り。短期的にはそう見える場合があるが、長期的には信頼毀損につながる。"
      - id: "d"
        text: "ブランディングは技術設計とは無関係"
        explanation: "誤り。AIエージェントの応答スタイル・トーン・限界開示はブランド体験そのもの。"
    answer: "a"

  - id: "aicx-biz-031"
    text: "AIエージェントの『コスト管理（FinOps）』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "リクエスト単位／部門単位／ユースケース単位でコストを可視化し、予算上限・タグ付け・閾値アラート・最適化サイクルを運用する"
        explanation: "正しい。LLMコストは利用量に比例して急増することがあり、FinOpsアプローチが不可欠。誰がどのくらい使っているかを可視化し、無駄なリクエスト・冗長プロンプト・過大モデル選択を継続的に最適化する。コスト最適化はROI改善に直結する戦略テーマ。"
      - id: "b"
        text: "コストは可視化せずに使い放題にすべき"
        explanation: "誤り。可視化なしのコストは膨張し、ROIが崩壊する典型パターン。"
      - id: "c"
        text: "コスト管理は経理部門だけが行う"
        explanation: "誤り。コスト最適化は技術選択・プロンプト設計・運用と連動するため、技術側との協働が必要。"
      - id: "d"
        text: "AI関連のコストは固定費なので管理不要"
        explanation: "誤り。LLMコストは多くが従量課金で変動費。固定費扱いは誤り。"
    answer: "a"

  - id: "aicx-biz-032"
    text: "AIエージェントの『ガバナンス委員会』の役割として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AI倫理・リスク・コンプライアンスの観点でユースケース承認・ガイドライン整備・インシデント対応を行う全社的意思決定機関"
        explanation: "正しい。AIガバナンス委員会は経営・法務・倫理・技術・業務の代表で構成され、新規ユースケース承認、影響評価レビュー、インシデント時の判断、ガイドライン更新を担う。AICXの観点では特に対顧客影響を扱う案件で重要な役割を果たす。海外大手は既にAI Ethics Boardの設置が一般化している。"
      - id: "b"
        text: "AI関連の購買契約を行う調達部門"
        explanation: "誤り。調達は別の役割であり、ガバナンス委員会の主務ではない。"
      - id: "c"
        text: "AIモデルを開発するエンジニアリングチーム"
        explanation: "誤り。エンジニアリングチームとは異なる役割。ガバナンスは統制・倫理・リスク管理が主務。"
      - id: "d"
        text: "AIマーケティングを担当する広報チーム"
        explanation: "誤り。広報は別の役割。"
    answer: "a"

  - id: "aicx-biz-033"
    text: "AIエージェントの『社外コミュニケーション』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AI利用方針・データ取扱い・問題発生時の対応窓口を公開し、顧客・パートナー・規制当局に対する透明性を確保する"
        explanation: "正しい。AIに対する社会的注目が高まる中、企業のAI利用方針（AIポリシー）を公開する企業が増えている。データを学習に使うか、苦情窓口があるか、人権配慮の方針はあるか、などを明示することで、顧客信頼と規制対応を両立できる。AICX協会の理念とも合致するアプローチ。"
      - id: "b"
        text: "AI利用は機密扱いで一切公開しない"
        explanation: "誤り。利用者・規制当局・市民に対する説明責任があり、過度な秘匿は信頼を損なう。"
      - id: "c"
        text: "AIポリシーは技術部門だけで作成して問題ない"
        explanation: "誤り。経営・法務・広報を含めた全社的整合が必要。"
      - id: "d"
        text: "AIポリシーは更新せず初版のまま運用"
        explanation: "誤り。技術と規制の進化に合わせ定期的更新が必要。"
    answer: "a"

  - id: "aicx-biz-034"
    text: "AIエージェントの『パートナー戦略』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "技術ベンダー・SIer・データ提供者・大学・コミュニティと多層的にエコシステムを築き、自社単独では獲得困難な能力を獲得する"
        explanation: "正しい。AI領域は技術進化が速く、自社単独で全能力を保有するのは現実的でない。クラウドベンダー、専門SIer、データプロバイダ、大学・研究機関、業界コンソーシアムなどとパートナーシップを設計することで、能力ギャップを埋め、リスクを分散できる。AIストラテジストは社外関係構築も重要な役割。"
      - id: "b"
        text: "全部自社で内製化し外部依存をゼロにすべき"
        explanation: "誤り。完全内製化は時間・コスト・人材の制約から非現実的。"
      - id: "c"
        text: "1社のベンダーに全任せする"
        explanation: "誤り。1社依存はロックインリスクが大きく、複数パートナーが望ましい。"
      - id: "d"
        text: "パートナー戦略は不要"
        explanation: "誤り。エコシステム戦略はAI時代の重要競争要素。"
    answer: "a"

  - id: "aicx-biz-035"
    text: "AIエージェント導入時の『成功事例（リファレンスケース）』を社内でうまく活用する戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "成功事例の効果・課題・所要工数・リスクを構造化して共有し、他部門が再現しやすいプレイブック化を進める"
        explanation: "正しい。成功事例は単なる発表会で終わらせず、再現可能な形に整理することが重要。やってみて何が効いたか、どこに苦労したか、どれくらい費用がかかったか、を構造化することで、他部門が短期間で展開できる。CoEの主要アウトプットの一つ。"
      - id: "b"
        text: "成功事例は秘密にして他部門には共有しない"
        explanation: "誤り。組織学習を阻害する。横展開こそAI活用のスケール手段。"
      - id: "c"
        text: "成功事例の表面的な数字だけ共有する"
        explanation: "誤り。表面的な共有では再現できず、横展開につながらない。"
      - id: "d"
        text: "成功事例の共有は時間の無駄"
        explanation: "誤り。事例共有は組織学習を加速する重要施策である。"
    answer: "a"

  - id: "aicx-biz-036"
    text: "AIエージェントの『失敗事例（learning from failures）』の扱いとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "失敗事例を非難の対象とせず、原因・教訓・再発防止策を構造的に共有し、組織のAI成熟度を高める材料とする"
        explanation: "正しい。失敗を隠す文化はAI推進の最大の障害。心理的安全性を保ちつつ失敗事例を共有・分析することで、組織のAI成熟度が継続的に向上する。Blameless Post-Mortem、ポストモータム文化を取り入れる企業が増えている。AIストラテジストは失敗から学ぶ文化づくりにも責任を負う。"
      - id: "b"
        text: "失敗事例は隠して関係者だけ知る"
        explanation: "誤り。隠蔽は再発防止の最大の障害となる。"
      - id: "c"
        text: "失敗者を見せしめとして罰する"
        explanation: "誤り。心理的安全性を破壊し、挑戦が止まる。"
      - id: "d"
        text: "失敗事例から学ぶ必要はない"
        explanation: "誤り。失敗からの学びは成功事例と同等に重要。"
    answer: "a"

  - id: "aicx-biz-037"
    text: "AIエージェントの『他社／業界事例調査』を活用する際の戦略的留意点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "他社事例を参考にしつつ、自社の業務特性・データ・能力との差異を踏まえて適合させ、表面的模倣に陥らないようにする"
        explanation: "正しい。他社事例はインスピレーション源として有効だが、自社の組織能力・規制・データ資産が違うため、そのまま再現しても効果が出るとは限らない。差異を分析し、自社流に翻訳することがAIストラテジストの仕事。表面的な模倣は『隣の芝生』戦略となり、戦略的差別化につながらない。"
      - id: "b"
        text: "他社が成功した手法をそのまま全社展開する"
        explanation: "誤り。組織能力・データ・文化が異なるため、コピーは失敗しやすい。"
      - id: "c"
        text: "他社事例は無視し独自アプローチだけで進める"
        explanation: "誤り。学習の機会を捨てるのは非効率。"
      - id: "d"
        text: "事例は技術選定だけに参考にする"
        explanation: "誤り。技術以外の組織・運用面も学ぶ価値が大きい。"
    answer: "a"

  - id: "aicx-biz-038"
    text: "AIエージェントの『PoC段階で測定すべき指標』として最も適切な組み合わせはどれか。"
    choices:
      - id: "a"
        text: "技術指標（精度・幻覚率・応答時間）とビジネス指標（生産性向上・CSAT・コスト削減）の両方を測定し、本番展開判断の根拠とする"
        explanation: "正しい。技術指標だけだと『精度が高いが業務効果が出ていない』、ビジネス指標だけだと『効果は出ているが品質に隠れた問題がある』が見落とされる。両者を併測し、ROI・スケール時のリスクを判断するのが正しいPoC設計。撤退判断にも両指標が必要となる。"
      - id: "b"
        text: "技術指標だけ測定する"
        explanation: "誤り。技術成功とビジネス成功は別物であり、ビジネス指標も必要。"
      - id: "c"
        text: "ユーザー満足度のアンケートだけ取る"
        explanation: "誤り。アンケートは主観的でばらつきが大きく、客観指標と組み合わせる必要がある。"
      - id: "d"
        text: "PoCでは指標を取らないのが常識"
        explanation: "誤り。指標なきPoCは判断不能。"
    answer: "a"

  - id: "aicx-biz-039"
    text: "AIエージェントを『AICXの観点（AI×Customer Experience）』で位置付ける場合、最も重要な視点として適切なものはどれか。"
    choices:
      - id: "a"
        text: "AIを単なる効率化手段と捉えず、顧客体験の質的変革手段として位置付け、CX指標とAI戦略を連動させる"
        explanation: "正しい。AICX協会の名称が示す通り、AI×CXは『AIを使えば人件費が下がる』という単純化を超え、顧客体験そのものをAIで再設計する視点が中核。24時間応対・パーソナライズ・先回り提案・多言語など、人手では困難な体験を実現することで競争優位を作る。AIストラテジストはCX指標とAI戦略を統合するCX/AI翻訳者。"
      - id: "b"
        text: "AIは効率化のみが目的でCXとは無関係"
        explanation: "誤り。CX革新の手段としてのAIが本質的価値領域。AICX協会の根本理念にも反する。"
      - id: "c"
        text: "CXとAI戦略は別組織で別個に進める"
        explanation: "誤り。両者は深く関連し、統合運営が成功の鍵。"
      - id: "d"
        text: "AIエージェントは顧客には見せない方がよい"
        explanation: "誤り。顧客体験そのものに影響する技術であり、適切な開示と体験設計が必要。"
    answer: "a"

  - id: "aicx-biz-040"
    text: "AIエージェント戦略の『3〜5年ロードマップ』策定における重要な要素として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "段階的なケイパビリティ獲得・組織変革・ガバナンス成熟・データ整備を含み、技術進化への適応性を組み込んだロードマップを描く"
        explanation: "正しい。AI領域は技術進化が極めて速いため、固定的な5年計画は陳腐化しやすい。代わりに『獲得すべきケイパビリティ』『成熟させるべき組織能力』『整備すべきデータ・基盤』『展開すべきユースケース』を段階的に並べ、四半期単位で見直すローリングプラン方式が有効。AIストラテジストは中長期ビジョンと短期実行を結ぶ中継点を担う。"
      - id: "b"
        text: "5年間固定のウォーターフォール計画"
        explanation: "誤り。AI領域では陳腐化が速く、固定計画は機能しない。"
      - id: "c"
        text: "短期施策のみで中長期は考えない"
        explanation: "誤り。短期だけでは組織変革・人材育成・ガバナンス成熟が間に合わない。"
      - id: "d"
        text: "技術部門だけで策定する"
        explanation: "誤り。経営・業務・法務を巻き込んだ全社的策定が必要。"
    answer: "a"
