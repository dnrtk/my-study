questions:
  - id: "aicx-gov-001"
    text: "AIガバナンスの定義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AIシステムの開発・運用・利用にわたるリスク管理・倫理対応・法令遵守・説明責任を組織として継続的に行う仕組み"
        explanation: "正しい。AIガバナンスは『規則を作って終わり』ではなく、組織体制・プロセス・ツール・モニタリングを統合した継続的な取り組みである。OECD・NIST AI RMF・ISO/IEC 42001など国際的フレームワークも体系化されている。AIストラテジストはガバナンス設計の中心的役割を担う。"
      - id: "b"
        text: "AIモデルのパラメータを直接書き換える権限管理"
        explanation: "誤り。それは技術的なアクセス制御の話であり、ガバナンスの本旨である組織的・体系的なリスク・倫理管理とは別概念。"
      - id: "c"
        text: "AI製品の販売価格を統制する仕組み"
        explanation: "誤り。それは価格規制の話であり、AIガバナンスとは無関係。"
      - id: "d"
        text: "AIエンジニアの労働時間を管理する制度"
        explanation: "誤り。労務管理であり、AIガバナンスとは別の概念。"
    answer: "a"

  - id: "aicx-gov-002"
    text: "EU AI Actにおける『リスクベースアプローチ』の本質的な特徴として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AIの用途リスクを禁止・高リスク・限定リスク・最小リスクに階層化し、各層に異なる規制要件を課す"
        explanation: "正しい。EU AI Actは2024年に成立した世界初の包括的AI規制で、用途のリスクに応じた段階的規制が特徴。例：社会的スコアリングは禁止、採用・教育・重要インフラなどは高リスクで厳格な要件、生成AIは透明性義務、汎用低リスクは緩い要件。グローバル展開する企業は影響を受ける可能性が高く、AIストラテジストとしての把握が必須。"
      - id: "b"
        text: "全てのAIを一律に同じ基準で規制する"
        explanation: "誤り。EU AI Actはむしろ用途ごとに異なる要件を課すリスクベースが特徴であり、一律規制ではない。"
      - id: "c"
        text: "AI開発企業に対する課税制度"
        explanation: "誤り。EU AI Actは規制法であり課税法ではない。"
      - id: "d"
        text: "AIモデルの技術仕様を統一する標準化"
        explanation: "誤り。EU AI Actは技術仕様の統一ではなく、用途リスクに応じた管理要件を定める法令である。"
    answer: "a"

  - id: "aicx-gov-003"
    text: "日本における『AI事業者ガイドライン（経産省・総務省）』の位置付けとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AI開発者・提供者・利用者向けの非拘束的ガイドラインで、人間中心・公平性・透明性・プライバシー保護等の原則を統合的にまとめている"
        explanation: "正しい。日本は2024年に従来3つのガイドラインを統合し『AI事業者ガイドライン』として再編した。法的拘束力はないが、政府調達や産業界の自主基準の参照点として機能する。AI事業者の自主的取り組みを促すソフトロー方式を採用しており、EU AI Actとは規制スタイルが異なる。グローバルに事業展開する場合は両方の理解が必要。"
      - id: "b"
        text: "違反すると即罰金が科される強制法令"
        explanation: "誤り。AI事業者ガイドラインは法的拘束力を持たず、罰則規定もない。"
      - id: "c"
        text: "AI技術の特許出願を規制するもの"
        explanation: "誤り。特許制度とは別であり、ガイドラインの目的はAI事業の健全な推進。"
      - id: "d"
        text: "AI研究費補助金の申請要件"
        explanation: "誤り。補助金制度とは別の文書である。"
    answer: "a"

  - id: "aicx-gov-004"
    text: "AIエージェントの『説明責任（accountability）』を確保する仕組みとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "意思決定者の特定・監査ログの保持・判断根拠の説明可能化・苦情窓口の設置を組み合わせて、AIによる影響に責任を持てる体制を作る"
        explanation: "正しい。説明責任は『誰が責任を負うか』『どう説明するか』『どう異議申し立てできるか』の3要素から構成される。AIが判断した場合でも、最終的に人と組織が責任を負う前提を明示し、ログ保持・モデルカード・利用者フィードバック窓口などの具体的仕組みで担保する。AIガバナンスの中核要素。"
      - id: "b"
        text: "AIの判断は人間に説明できないので、説明責任は発生しない"
        explanation: "誤り。説明可能性に技術的限界があっても、組織として説明責任は免除されない。むしろ限界を踏まえた工夫が求められる。"
      - id: "c"
        text: "AIが起こした問題の責任はベンダーが全て負う"
        explanation: "誤り。利用者側にも適切な使用責任があり、ベンダーへの一方的な責任転嫁では実態に合わない。"
      - id: "d"
        text: "説明責任は技術部門だけが担う"
        explanation: "誤り。説明責任は経営・業務・法務を含む全社的な役割。"
    answer: "a"

  - id: "aicx-gov-005"
    text: "AIエージェントの『透明性（transparency）』確保の典型的な施策として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AIが応答していることの明示・能力範囲・制限事項・データ取扱方針の公開・モデルカードの整備"
        explanation: "正しい。透明性は『AIであることを伝える』『何ができて何ができないかを伝える』『どんなデータをどう扱うかを伝える』の3層から構成される。EU AI Actでも生成AIによるコンテンツであることの明示が義務化されている。透明性は信頼の前提条件であり、ブランド・規制対応の両面で重要。"
      - id: "b"
        text: "AIモデルの全パラメータを公開する"
        explanation: "誤り。透明性はパラメータ公開を意味するわけではない。利用者にとって意味のある情報の開示が本質。営業秘密や安全性配慮の観点で全パラメータ公開は通常行われない。"
      - id: "c"
        text: "ユーザーに何も伝えないことで混乱を防ぐ"
        explanation: "誤り。情報を伏せるのは透明性と逆方向。"
      - id: "d"
        text: "透明性は技術仕様書の作成だけで足りる"
        explanation: "誤り。技術仕様だけでは利用者・規制対応の透明性として不十分。"
    answer: "a"

  - id: "aicx-gov-006"
    text: "AIエージェントにおける『公平性（fairness）』対策として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "学習データ・判定結果を属性別に分析し、バイアスがあれば緩和（再サンプリング・後処理・公平性制約）し、運用後も継続モニタリングする"
        explanation: "正しい。公平性は単に『差別しない』ではなく、特定属性に不利な結果が出ていないかを継続的に検証する取り組み。データ層・モデル層・出力層それぞれで対策手段がある。完全なバイアスフリーは現実的に困難で、許容範囲を組織として定義し、継続改善する姿勢が求められる。"
      - id: "b"
        text: "公平性は数学的に測定不能なので考慮しない"
        explanation: "誤り。公平性指標（demographic parity、equal opportunity 等）が定義されており、測定可能。"
      - id: "c"
        text: "全ユーザーに完全に同じ応答を返す"
        explanation: "誤り。それは画一化であり、個別最適化と公平性は別概念。むしろパーソナライゼーションが価値の場面もある。"
      - id: "d"
        text: "公平性は技術部門だけで判断する"
        explanation: "誤り。社会的・倫理的判断を含み、複数部門の関与が必要。"
    answer: "a"

  - id: "aicx-gov-007"
    text: "AIエージェントにおける『バイアス（bias）』の代表的な発生源として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "学習データの偏り・特徴量設計の偏り・ラベル付けの偏り・歴史的差別の固定化・利用環境の偏り"
        explanation: "正しい。AIバイアスは多層で発生する。学習データに偏りがあれば再現される、特徴量選定で属性差が反映される、過去の判断履歴を学べば過去の差別が固定化される、運用環境のユーザー層が偏れば学習過程に偏りが入る、など。包括的に捉えないと部分的対策で取り残しが出る。"
      - id: "b"
        text: "バイアスは学習データのみが原因"
        explanation: "誤り。データ以外の多層で発生し、データだけ対策しても残る。"
      - id: "c"
        text: "バイアスはLLMの仕組み上避けられないので諦める"
        explanation: "誤り。完全除去は困難でも、軽減・モニタリング・透明化により管理可能。"
      - id: "d"
        text: "バイアスは利用者側の問題"
        explanation: "誤り。提供者側の責任が大きく、利用者だけに帰することはできない。"
    answer: "a"

  - id: "aicx-gov-008"
    text: "AIエージェントの『プライバシー保護』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "データ最小化・目的明示・同意管理・匿名化／仮名化・保管期限・削除フロー・第三者提供制限を統合的に設計する"
        explanation: "正しい。個人情報保護法・GDPR等の要件を満たすには、収集段階から削除段階までライフサイクル全体での設計が必要。AIエージェントは大量の対話ログ・個人嗜好を扱うため、特に保管・利用範囲・モデル学習への流用可否を明示し、利用者がコントロールできる仕組みが求められる。"
      - id: "b"
        text: "個人情報を全て匿名化すれば一切問題ない"
        explanation: "誤り。匿名化は重要だが、再識別化リスク・利用目的の説明・同意取得など他の要件もある。"
      - id: "c"
        text: "プライバシーは法務部門だけの責任"
        explanation: "誤り。技術設計・運用・教育を含む全社的な取り組みが必要。"
      - id: "d"
        text: "プライバシー保護はAIの精度を必ず損なう"
        explanation: "誤り。差分プライバシーやフェデレーテッドラーニングなど精度を保ちつつ保護する手法もある。"
    answer: "a"

  - id: "aicx-gov-009"
    text: "AIエージェントの『データ最小化原則』とは何か。"
    choices:
      - id: "a"
        text: "目的達成に必要な最小限のデータのみを収集・利用・保管する原則"
        explanation: "正しい。GDPRや個人情報保護法でも明示される基本原則。AIは『データが多いほど良い』と誤解されがちだが、不要なデータの保持はリスクと管理コストを増やすだけ。目的に応じた取得範囲・利用範囲・保管期限を厳格に定義することで、漏洩時の影響も軽減できる。"
      - id: "b"
        text: "データは可能な限り多く収集すべきという原則"
        explanation: "誤り。むしろ逆。データ最小化はリスク低減のための原則。"
      - id: "c"
        text: "データを最小サイズに圧縮する技術原則"
        explanation: "誤り。それは圧縮技術の話で、データ最小化原則とは別概念。"
      - id: "d"
        text: "データは1日1回しか更新できないという制限"
        explanation: "誤り。更新頻度制約とは別の概念。"
    answer: "a"

  - id: "aicx-gov-010"
    text: "AIエージェントの『差別防止』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "属性ごとの結果差を継続モニタリングし、規制が厳しい意思決定領域（採用・与信・保険・公共サービス等）ではHITLや独立監査を組み込む"
        explanation: "正しい。差別防止は技術対策だけでなく、対象業務の影響度に応じた管理体制が必要。米国EEOC、EU AI Act、日本の個人情報保護法・労働法など、領域ごとに規制が異なるため、リスクの高い領域では特に厳格な管理が求められる。AIストラテジストは法令と技術の両面を把握する必要がある。"
      - id: "b"
        text: "差別の問題はAIの仕組みでは発生しない"
        explanation: "誤り。多くのインシデント事例があり、無視できる問題ではない。"
      - id: "c"
        text: "差別防止は法的に明示されない限り不要"
        explanation: "誤り。法令未整備領域でも倫理的・社会的責任があり、自主的取り組みが必要。"
      - id: "d"
        text: "属性情報を全て削除すれば自動的に差別はなくなる"
        explanation: "誤り。代理変数（郵便番号と人種の相関等）を通じて差別が再現する。属性削除だけでは不十分。"
    answer: "a"

  - id: "aicx-gov-011"
    text: "AIエージェントの『プロンプトインジェクション対策』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "信頼境界の明示・入力検証・出力検証・最小権限の原則・取得文書の隔離・人介在の組み合わせによる多層防御"
        explanation: "正しい。プロンプトインジェクションは単一の対策で完全に防ぐのが困難で、多層防御が原則。攻撃の入口（ユーザー入力、外部文書、ツール戻り値）と被害の出口（情報漏洩、不正実行、ガイドライン破り）の両面で対策を重ねる。AIエージェントが外部システムを操作する場合は特にリスクが大きい。"
      - id: "b"
        text: "システムプロンプトを長くすればプロンプトインジェクションは防げる"
        explanation: "誤り。プロンプト長で完全に防げるものではない。多層防御の一要素にすぎない。"
      - id: "c"
        text: "プロンプトインジェクションは理論上の問題で実務では起きない"
        explanation: "誤り。多数のインシデント事例が報告されている現実の脅威。"
      - id: "d"
        text: "プロンプトインジェクションはモデルベンダーが対策するべきで利用者側は何もできない"
        explanation: "誤り。利用者側のガードレール・権限分離・人介在設計が決定的に重要。"
    answer: "a"

  - id: "aicx-gov-012"
    text: "OWASP LLM Top 10で挙げられている代表的な脅威として最も適切な組み合わせはどれか。"
    choices:
      - id: "a"
        text: "プロンプトインジェクション、機密情報漏洩、不適切な出力処理、サプライチェーン脆弱性、過剰なエージェント権限など"
        explanation: "正しい。OWASP（Open Web Application Security Project）はLLMアプリケーション特有のセキュリティリスクを体系化している。プロンプトインジェクション、データ汚染、機密情報の流出、サプライチェーン（モデル・プラグイン）の脆弱性、過大権限などが代表例。AIストラテジストとしては脅威モデルを把握し、組織の標準として参照すべき。"
      - id: "b"
        text: "サーバーの物理的盗難、火災、停電など"
        explanation: "誤り。それらは一般的な物理セキュリティであり、LLM固有の脅威ではない。"
      - id: "c"
        text: "ネットワークの帯域不足とレイテンシ"
        explanation: "誤り。性能問題でありセキュリティ脅威ではない。"
      - id: "d"
        text: "LLMの計算コストの増加"
        explanation: "誤り。コスト管理の話でありセキュリティの話ではない。"
    answer: "a"

  - id: "aicx-gov-013"
    text: "AIエージェントが扱う『機密情報漏洩リスク』への対策として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "PII検出・出力フィルタ・アクセス制御・ログマスキング・ユーザー入力の機密判定・モデル提供者のデータ取扱規約の確認"
        explanation: "正しい。機密情報漏洩は『入力時』『処理時』『出力時』『学習時』それぞれで起こり得る。各段階で検出・防止策を組み合わせる必要がある。特に外部のモデル提供者を使う場合、利用データを学習に使わないオプトアウト設定や法人契約の有無を確認することが必須。"
      - id: "b"
        text: "全ての出力を人間がレビューする"
        explanation: "誤り。スケールせず現実的でない。自動検出と組み合わせる必要がある。"
      - id: "c"
        text: "機密情報はLLMに入れなければ大丈夫"
        explanation: "誤り。エージェントが社内データソースから取得することもあり、入力制限だけでは不十分。"
      - id: "d"
        text: "暗号化通信を使えば漏洩は完全に防げる"
        explanation: "誤り。通信暗号化は重要だが、応答内容に機密が含まれる出力漏洩は別の問題。"
    answer: "a"

  - id: "aicx-gov-014"
    text: "AIエージェントの『ハルシネーション対策』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "RAGによるグラウンディング・出典提示・低信頼度時の無回答・人介在・LLM-as-a-Judge等の検証層を組み合わせる"
        explanation: "正しい。ハルシネーションを完全に防ぐ単一手段はないため、複数の対策を多層化することが定石。事実情報はRAGで根拠付け、出典を明示し、信頼度が低いケースは無回答にし、重要判断は人が確認、自動評価で監視するなど。AIストラテジストとしてはコストと品質のバランスで対策の組み合わせを判断する。"
      - id: "b"
        text: "ハルシネーションはLLMの本質なので諦める"
        explanation: "誤り。完全除去は困難でも、大幅な抑制と影響限定は可能。諦めは戦略放棄。"
      - id: "c"
        text: "高性能モデルを使えばハルシネーションはゼロになる"
        explanation: "誤り。最新モデルでもハルシネーションは発生し得る。複合的対策が必要。"
      - id: "d"
        text: "対策はベンダー任せでよい"
        explanation: "誤り。利用者側のRAG設計・プロンプト設計・運用設計が必要。"
    answer: "a"

  - id: "aicx-gov-015"
    text: "AIエージェントが扱う『著作権リスク』に関する留意点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "学習データ・取得データ・生成出力それぞれで著作権の所在を確認し、利用範囲・引用元明示・商用利用条件を整理する"
        explanation: "正しい。生成AIの著作権問題は『学習段階』『プロンプト段階』『出力段階』それぞれで論点が異なる。日本では著作権法30条の4で学習に一定の自由度があるが、出力が既存作品と類似した場合は通常の著作権侵害判断が適用される。社内文書で他社著作物を扱う場合の許諾、出力物の著作権帰属など、AIストラテジストとして法務と連携した判断が必要。"
      - id: "b"
        text: "AIが出力したものは全て著作権フリーで使える"
        explanation: "誤り。元データの著作権が及ぶ場合や、出力物自体の著作権の扱いは国・状況で異なり、安易な無条件利用は危険。"
      - id: "c"
        text: "学習データに使った時点で全て自社に著作権が移る"
        explanation: "誤り。学習に使うことと著作権の所在は別問題。"
      - id: "d"
        text: "著作権はAIには適用されない"
        explanation: "誤り。AIを使った行為にも著作権法は適用される。"
    answer: "a"

  - id: "aicx-gov-016"
    text: "AIエージェントの『ハイリスク利用ケース』を判別する際の指針として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "人の権利・安全・経済状況・基本的自由に重大な影響を及ぼす可能性がある利用は高リスクとし、強化された管理を適用する"
        explanation: "正しい。EU AI ActやNIST AI RMFが採用するリスクベース判断の核となる考え方。採用・与信・保険・教育・医療・公共サービス・法執行などは典型的な高リスク領域。これらの領域ではHITL、独立監査、影響評価、苦情処理、説明可能性などの強化された要件を適用する戦略判断が必要。"
      - id: "b"
        text: "技術的に複雑なAIは全て高リスク"
        explanation: "誤り。技術複雑性とリスクは別軸。シンプルなAIでも社会影響が大きければ高リスク。"
      - id: "c"
        text: "高リスクの判別は不要"
        explanation: "誤り。リスクに応じた管理がガバナンスの基礎。"
      - id: "d"
        text: "ユーザー数が多いものが高リスク"
        explanation: "誤り。ユーザー数は一要素だが、影響の質（権利侵害可能性）が判断軸。"
    answer: "a"

  - id: "aicx-gov-017"
    text: "AIエージェントの『影響評価（AI Impact Assessment）』の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "導入前にAIが個人・組織・社会に与える影響を体系的に評価し、リスクを特定・軽減することで責任あるAI運用を担保する"
        explanation: "正しい。プライバシー影響評価（PIA）のAI版で、AIIA・AIA・FRIAなど名称は様々。EU AI Actでも一部義務化される。利益・リスク・対象者・代替案を構造化し、責任ある導入判断の根拠とする。AIストラテジストはこのプロセスをファシリテートする役割を担うことが多い。"
      - id: "b"
        text: "影響評価はAIの精度を向上させる技術手法"
        explanation: "誤り。精度向上ではなく、リスク・影響を体系的に評価するガバナンスプロセス。"
      - id: "c"
        text: "影響評価は導入後に行うべき"
        explanation: "誤り。導入前に行うことで、設計・運用に反映できる。事後実施では予防効果が薄い。"
      - id: "d"
        text: "影響評価は技術的に不可能"
        explanation: "誤り。多数のフレームワークが整備されており、実務的に可能。"
    answer: "a"

  - id: "aicx-gov-018"
    text: "AIエージェントの『モデルカード（Model Card）』の主な目的として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "モデルの用途・性能・制限事項・トレーニングデータ・既知バイアス等を構造化して文書化し、利用者が適切に判断できるようにする"
        explanation: "正しい。モデルカードはGoogle Researchが2018年に提唱した文書様式で、利用者がモデルの特性・限界を理解するための『カタログ』に相当する。多くの主要ベンダーが採用しており、企業内でも自社モデル・カスタマイズモデルに対して整備することで、ガバナンス・透明性が向上する。"
      - id: "b"
        text: "モデルの著作権を主張する文書"
        explanation: "誤り。モデルカードは透明性のための文書であり、著作権主張ではない。"
      - id: "c"
        text: "モデルの販売価格を表示する文書"
        explanation: "誤り。価格表ではない。"
      - id: "d"
        text: "モデルの内部パラメータを全て公開する文書"
        explanation: "誤り。パラメータ全公開ではなく、利用者が理解できる説明・性能・制約の文書化。"
    answer: "a"

  - id: "aicx-gov-019"
    text: "AIエージェントの『AIインシデント対応』の準備として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "インシデント定義・検知・連絡体制・原因調査・是正措置・対外コミュニケーションをあらかじめプレイブック化する"
        explanation: "正しい。AIインシデント（誤回答による損害、データ漏洩、差別的出力、システム停止等）は必ず発生する前提で備える必要がある。誰がどう判断し、いつ誰に連絡し、どう公表するかまでをプレイブックで定めておくことで、混乱なく対応できる。AIインシデントレポーティング基準（AIID等）への参照も有効。"
      - id: "b"
        text: "インシデントが起きてから対応を考える"
        explanation: "誤り。事後対応では混乱と被害拡大を招く。事前準備が不可欠。"
      - id: "c"
        text: "インシデントは絶対に発生しないので準備不要"
        explanation: "誤り。AIシステムでは必ず想定外が発生する。"
      - id: "d"
        text: "インシデント対応はベンダー任せでよい"
        explanation: "誤り。利用者側の対外コミュニケーションや業務影響対応は自社が担う必要がある。"
    answer: "a"

  - id: "aicx-gov-020"
    text: "AIエージェントの『監査ログ』として保存すべき項目として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ユーザー識別子・タイムスタンプ・入力プロンプト・取得文書・モデル選択・ツール呼び出し・出力結果・人介在の有無"
        explanation: "正しい。監査ログはインシデント調査・コンプライアンス監査・継続改善・法的紛争対応の基盤。AIエージェントは多段処理のため、各ステップを追跡可能な粒度で記録することが望ましい。一方でPIIやセンシティブ情報を含むため、保管期限・アクセス制御・マスキングを設計する必要がある。"
      - id: "b"
        text: "応答時間だけ記録すれば十分"
        explanation: "誤り。応答時間だけでは原因究明・コンプライアンス対応に不十分。"
      - id: "c"
        text: "監査ログはプライバシー上記録すべきでない"
        explanation: "誤り。むしろ法令遵守と内部統制のため記録は必要。プライバシー対応はマスキング・アクセス制御で行う。"
      - id: "d"
        text: "監査ログはユーザー側で保存する"
        explanation: "誤り。提供者側の責務として保存する。"
    answer: "a"

  - id: "aicx-gov-021"
    text: "AIエージェントの『削除権・忘れられる権利』対応として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "対話履歴・長期メモリ・ベクトルDB・モデル学習データの各層で削除フローを設計し、ユーザーが自身のデータを削除できる権利を担保する"
        explanation: "正しい。GDPR第17条で明確化された権利で、日本の個人情報保護法でも一定範囲で保護される。AIエージェントはデータが多層に分散するため、削除要求が来た際にどのレイヤーから何を消すかをあらかじめ設計しておかないと対応できない。学習済みモデルからのunlearningは技術的に困難な点も含めた現実的な対応策が必要。"
      - id: "b"
        text: "削除要求は無視してよい"
        explanation: "誤り。法的に対応義務がある。"
      - id: "c"
        text: "削除は技術的に不可能なので拒否する"
        explanation: "誤り。完全削除が困難な部分はあっても、可能な範囲での対応と説明が必要。"
      - id: "d"
        text: "削除は1度だけ受け付ける"
        explanation: "誤り。利用者の権利として継続的に対応すべき。"
    answer: "a"

  - id: "aicx-gov-022"
    text: "AIエージェントの『社員教育・リテラシー』施策として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AI基礎知識・利用ガイドライン・リスク事例・実践的演習を組み合わせ、役割別に必要なスキルを継続的に育成する"
        explanation: "正しい。AIエージェントの利用者・管理者・経営層それぞれで求められる知識が異なる。一律の研修では効果が薄く、役割別カリキュラムを設計し、継続的なアップデート（技術進化と規制変化に対応）を行う必要がある。AIストラテジストはリテラシー向上のロードマップ策定にも責任を持つ。"
      - id: "b"
        text: "リテラシー教育は技術部門だけ受ければよい"
        explanation: "誤り。利用者・管理者・経営層全員に必要。"
      - id: "c"
        text: "1回の研修で十分"
        explanation: "誤り。AI領域は変化が速く、継続的アップデートが必要。"
      - id: "d"
        text: "教育は不要で現場で覚えるべき"
        explanation: "誤り。明確な教育がないと不適切利用やリスク認識欠如が広がる。"
    answer: "a"

  - id: "aicx-gov-023"
    text: "AIエージェントの『内部統制』との関係として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "既存の内部統制（J-SOX、COSO等）にAI関連リスク・統制点を追加し、職務分離・承認フロー・監査証跡をAIにも適用する"
        explanation: "正しい。AIエージェントは業務プロセスを自動化するため、従来の内部統制の対象範囲を拡張する必要がある。AIの誤動作によって財務報告に影響が及ぶ可能性、職務分離が崩れる可能性、監査証跡が確保されない可能性を統制設計に組み込む必要がある。AIストラテジストは内部監査・財務部門と連携した設計が求められる。"
      - id: "b"
        text: "AIは内部統制の対象外"
        explanation: "誤り。AIによる業務処理も統制対象に含まれる。"
      - id: "c"
        text: "AIには新しい内部統制を作る必要がある"
        explanation: "誤り。既存統制の拡張が現実的で、ゼロベース構築は不要。"
      - id: "d"
        text: "AIは内部統制を完全に置き換える"
        explanation: "誤り。AIは内部統制の対象であり、置き換えではない。"
    answer: "a"

  - id: "aicx-gov-024"
    text: "AIエージェントの『海外展開』時に考慮すべき規制要素として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AI規制（EU AI Act等）・データ保護法（GDPR、CCPA等）・データ越境移転規制・現地語要件・現地倫理ガイドライン"
        explanation: "正しい。AIエージェントを海外展開する場合、各国・地域の規制体系が異なる。EU、米国（連邦・州）、中国、日本、英国などで規制スタイルがバラバラで、データ越境移転制限やローカルAIガイドラインの違いを把握する必要がある。AIストラテジストはグローバル法務・コンプライアンスチームと密接に連携する。"
      - id: "b"
        text: "海外展開時は日本の法令だけ考えれば十分"
        explanation: "誤り。展開先の規制が適用される。日本法だけでは不十分。"
      - id: "c"
        text: "海外規制は技術設計に影響しない"
        explanation: "誤り。データ保管場所、暗号化、利用者通知などで技術設計に直接影響する。"
      - id: "d"
        text: "海外展開時はAIを使わないのが安全"
        explanation: "誤り。適切に対応すれば展開可能。AI回避は事業機会の損失。"
    answer: "a"

  - id: "aicx-gov-025"
    text: "AIエージェントの『サプライチェーンリスク』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "モデルプロバイダ・プラグイン・OSS・データ提供者など外部依存先の脆弱性・契約解除・規約変更・サービス停止が事業継続に影響するリスク"
        explanation: "正しい。AIエージェントは多数の外部部品で成り立ち、上流の問題が下流の自社サービスに直接影響する。OSSの脆弱性、ベンダーの規約変更（学習利用方針変更、価格変更、機能廃止）、サービス停止による業務影響などを想定した代替手段や契約条項の準備が必要。"
      - id: "b"
        text: "サプライチェーンリスクはAI領域には存在しない"
        explanation: "誤り。むしろ顕著に存在する。AIモデルもプラグインも外部依存が多い。"
      - id: "c"
        text: "サプライチェーンリスクは利用者では対処できない"
        explanation: "誤り。代替手段準備、契約条項、SLA交渉、複数ベンダー併用などで対処可能。"
      - id: "d"
        text: "サプライチェーンリスクはハードウェアだけの問題"
        explanation: "誤り。ソフトウェア・モデル・データなど全レイヤーに存在する。"
    answer: "a"

  - id: "aicx-gov-026"
    text: "AIエージェントの『契約・SLA』設計として最も重要な確認項目はどれか。"
    choices:
      - id: "a"
        text: "データの利用範囲（学習利用可否）・データ保管場所・知的財産権の扱い・賠償責任・終了時のデータ返却／削除・SLA水準"
        explanation: "正しい。AIサービスは標準のSaaSと比べてもデータ取扱条項が複雑で、特に学習利用可否は事業上極めて重要。法務・調達・技術が連携し、企業として譲れない条件を明確化することが必要。SLA水準（可用性、応答時間、サポート）も事業影響を踏まえた設計が必要。"
      - id: "b"
        text: "価格だけ確認すれば十分"
        explanation: "誤り。価格以外の条項が長期リスクを左右する。"
      - id: "c"
        text: "契約は技術部門が締結する"
        explanation: "誤り。法務・調達・経営の関与が必要。"
      - id: "d"
        text: "AIサービスは標準契約のままで問題ない"
        explanation: "誤り。AIサービスはデータ・知財・責任に関する条項が事業影響大であり、標準契約のままでは不十分なケースが多い。"
    answer: "a"

  - id: "aicx-gov-027"
    text: "AIエージェントの『リスク受容（risk acceptance）』を組織として行う際の留意点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "残存リスクの内容・確率・影響度・受容理由を文書化し、適切な権限者が承認することで責任の所在を明確化する"
        explanation: "正しい。あらゆるリスクをゼロにはできないため、許容するリスクを明示的に承認し記録することで、後日の説明責任に応えられる。誰がリスクを承認したかが不明確なまま運用すると、インシデント発生時に責任の所在が不明になる。AIストラテジストはこのリスク受容プロセスを設計・運用する。"
      - id: "b"
        text: "リスクは現場担当者が個別に判断する"
        explanation: "誤り。組織的判断と承認権限の明示が必要。"
      - id: "c"
        text: "リスク受容は文書化せず暗黙裡に行う"
        explanation: "誤り。文書化しないと監査・調査時に説明できない。"
      - id: "d"
        text: "リスク受容を行うとリスク自体が消える"
        explanation: "誤り。受容してもリスクは存在し続け、モニタリングが必要。"
    answer: "a"

  - id: "aicx-gov-028"
    text: "AIエージェントの『児童・脆弱な利用者』への配慮として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "対象に応じた表現制御・年齢確認・保護者同意・有害コンテンツフィルタ・依存防止のためのUX設計を組み合わせる"
        explanation: "正しい。子ども・高齢者・障がい者など脆弱な利用者は特別な配慮が必要で、EU AI Actやこども基本法、各国の児童保護法令でも明記されている。表現の難易度調整、年齢適合性、過度な依存を防ぐ設計、緊急時の人介在経路など多面的対応が求められる。"
      - id: "b"
        text: "子ども向けに配慮すると大人向け機能が損なわれるので不要"
        explanation: "誤り。両立可能な設計が一般的。子ども向け配慮を理由とした不対応は不適切。"
      - id: "c"
        text: "脆弱な利用者は技術部門が判断する"
        explanation: "誤り。倫理・法務・福祉専門家を含む多角検討が必要。"
      - id: "d"
        text: "脆弱な利用者向け対応は法令で義務付けられない限り行わない"
        explanation: "誤り。倫理的責務として法令以上の自主対応が望まれる。"
    answer: "a"

  - id: "aicx-gov-029"
    text: "AIエージェントの『労務上のリスク』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AIによる従業員監視・評価のバイアス・スキル変化への対応・従業員エンゲージメント低下・解雇影響などを労使対話を踏まえて設計する"
        explanation: "正しい。AIは雇用・評価・労働条件に直接影響するため、労務リスクの観点が重要。AIによる過度な監視、評価のブラックボックス化、スキル陳腐化、解雇への影響などは法的リスク・労使紛争につながる。労働組合・従業員代表との対話を踏まえた設計がリスクを軽減する。"
      - id: "b"
        text: "AIは技術導入なので労務リスクは発生しない"
        explanation: "誤り。労務影響は不可避であり、無視は重大リスク。"
      - id: "c"
        text: "労務リスクは人事部門だけが対応する"
        explanation: "誤り。AI設計者・経営・法務が連携して設計段階から検討すべき。"
      - id: "d"
        text: "従業員には事後通知すれば十分"
        explanation: "誤り。事前合意・対話が望ましく、事後通知だけでは信頼を損なう。"
    answer: "a"

  - id: "aicx-gov-030"
    text: "AIエージェントの『ディープフェイク・なりすまし』対策として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "AI生成コンテンツの明示（ウォーターマーク・C2PA等）・本人認証強化・社内における利用ポリシー・通報窓口を整備する"
        explanation: "正しい。生成AI技術の進歩でディープフェイクや音声なりすましが容易になっており、企業のリスク（CEOフィッシング、ブランド毀損、フェイクニュース）が増加している。出力の明示（C2PAコンテンツ来歴規格、SynthID等）、認証強化、通報体制の整備が望ましい。EU AI Actでも生成AIコンテンツの明示が義務化されている。"
      - id: "b"
        text: "ディープフェイクはAI技術の進化なので歓迎すべき"
        explanation: "誤り。悪用リスクが大きく、対策と倫理的議論が必要。"
      - id: "c"
        text: "ディープフェイク対策は不要"
        explanation: "誤り。実害が報告されており、対策は必要。"
      - id: "d"
        text: "対策はベンダーに任せればよい"
        explanation: "誤り。利用者側の認証・教育・通報体制が必要。"
    answer: "a"

  - id: "aicx-gov-031"
    text: "AIエージェントの『環境負荷（サステナビリティ）』に関する考慮として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "モデル選定・推論最適化・キャッシュ・バッチ化・電力消費の可視化を通じて、必要十分な性能で環境負荷を抑制する"
        explanation: "正しい。AIの計算負荷は電力・水・カーボン排出を伴い、サステナビリティ報告（ESG、TCFD、CSRD等）に影響する。大型モデルを過剰に使わず、用途に応じた適切なモデル選定、キャッシュ活用、効率的な運用設計が、コスト削減とサステナビリティの両立につながる。"
      - id: "b"
        text: "AIの環境負荷は無視できる"
        explanation: "誤り。データセンター電力消費は世界的課題として認識されている。"
      - id: "c"
        text: "環境負荷対策はAIの精度を損なうので避ける"
        explanation: "誤り。多くの最適化は精度を保ちつつ環境負荷を低減できる。"
      - id: "d"
        text: "環境負荷はベンダーの責任で利用者は無関係"
        explanation: "誤り。利用者の選択（モデル・利用量）が環境負荷を左右し、共同責任。"
    answer: "a"

  - id: "aicx-gov-032"
    text: "AIエージェントの『ガバナンス成熟度評価』を行う意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "組織のAIガバナンスを段階的（初期・繰返し可能・定義済・管理可能・最適化）に評価し、改善の優先順位を明確化する"
        explanation: "正しい。CMMI的な成熟度モデルをAIガバナンスにも適用することで、現状の弱点が可視化され、次に取り組むべき領域が明確になる。NIST AI RMFやISO/IEC 42001も成熟度的な観点を提供している。AIストラテジストはガバナンス成熟度の現状診断・ロードマップ策定を担う。"
      - id: "b"
        text: "成熟度評価は時間の無駄"
        explanation: "誤り。改善の優先順位付けに極めて有効。"
      - id: "c"
        text: "成熟度評価は技術部門だけで実施"
        explanation: "誤り。多部門の関与が必要な評価対象である。"
      - id: "d"
        text: "成熟度評価は1度だけ行う"
        explanation: "誤り。継続改善のため定期的な評価が望ましい。"
    answer: "a"

  - id: "aicx-gov-033"
    text: "AIエージェントの『第三者監査』の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "独立した第三者がAIシステムの設計・運用・成果を客観的に評価し、内部視点では見えにくい問題を発見・改善できる"
        explanation: "正しい。AIシステムは複雑かつ自己評価では盲点が残りやすく、独立した第三者監査が有効。EU AI Actでは高リスクAIに対し適合性評価が求められる。社内では監査法人やコンサルティング会社に依頼するケースが増えている。レピュテーション・規制対応・継続改善の3面でメリットがある。"
      - id: "b"
        text: "第三者監査は法的義務がない限り不要"
        explanation: "誤り。義務がなくても自主的監査が望ましいケースは多い。"
      - id: "c"
        text: "内部監査だけで十分"
        explanation: "誤り。内部視点では盲点が残るため、第三者の客観性が補完となる。"
      - id: "d"
        text: "第三者監査はAIには適用できない"
        explanation: "誤り。多くの監査機関がAI監査サービスを提供している。"
    answer: "a"

  - id: "aicx-gov-034"
    text: "AIエージェントの『倫理委員会／AI倫理ボード』設置の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "技術面・倫理面・社会面・法務面・人権面など多角的な専門知見を結集し、組織のAI利用の倫理性を継続的に議論・判断する"
        explanation: "正しい。AI倫理は単一視点では捉えきれず、社外有識者（学者、人権専門家、市民代表等）を含めた多角的な議論が必要。Microsoftの『Office of Responsible AI』、Googleの『Responsible AI Principles』など先行事例がある。AICX協会の理念にも適合する組織運営の要素である。"
      - id: "b"
        text: "倫理委員会は形式的に設置するだけで十分"
        explanation: "誤り。実質的に機能しないと意味がない。継続的な議論・意思決定への影響が必要。"
      - id: "c"
        text: "倫理委員会は技術部門の中に置く"
        explanation: "誤り。独立性・多角性のため、独立組織または経営直轄が望ましい。"
      - id: "d"
        text: "倫理は個人の問題で組織として議論する必要はない"
        explanation: "誤り。組織として倫理基準を持つことが信頼の基盤となる。"
    answer: "a"

  - id: "aicx-gov-035"
    text: "AIストラテジストとしての『倫理的判断』の指針として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "技術的に可能か（can）と、すべきか（should）を区別し、社会的影響・利害関係者・長期影響を含めて判断する"
        explanation: "正しい。AIは技術的に可能なことが急速に拡大する一方で、それを実行すべきかは別の判断軸が必要。短期的利益と長期的信頼、効率と人間性、自社利益と社会影響などのトレードオフを直視し、利害関係者と対話しながら判断するのがAIストラテジストの倫理的責務。技術可能性に流されない自律的な判断力が問われる。"
      - id: "b"
        text: "技術的に可能なら全て実行すべき"
        explanation: "誤り。可能性と妥当性は別の判断であり、倫理的判断が必要。"
      - id: "c"
        text: "倫理判断は経営層だけが行う"
        explanation: "誤り。AIストラテジストは経営に倫理的視点を提供する役割を持つ。"
      - id: "d"
        text: "倫理判断は法令違反でなければ全て妥当"
        explanation: "誤り。法令は最低基準であり、倫理はそれ以上を求めるもの。"
    answer: "a"
