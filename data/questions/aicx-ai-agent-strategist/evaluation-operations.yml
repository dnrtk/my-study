questions:
  - id: "aicx-eval-001"
    text: "AIエージェントの『評価戦略』を設計する際の基本姿勢として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ビジネスKPI・タスク成功率・品質指標・運用指標を多層的に設定し、自動評価と人手評価を組み合わせて継続的に測定する"
        explanation: "正しい。AIエージェントは単一の指標で評価できず、ビジネス成果（売上・CSAT）とAI技術指標（精度・幻覚率）と運用指標（コスト・レイテンシ）を多層で設計する必要がある。自動評価で広範囲をカバーし、人手評価で微妙な品質を確認するハイブリッドが現実解。評価設計はAIストラテジストの戦略的能力の核となる領域。"
      - id: "b"
        text: "精度（accuracy）だけ測定すれば十分"
        explanation: "誤り。精度だけではビジネス成果やリスクが見えず、運用判断材料として不十分。"
      - id: "c"
        text: "評価は導入後に決めればよい"
        explanation: "誤り。評価設計は設計フェーズから決めておかないと、何を最適化すべきか不明瞭になる。"
      - id: "d"
        text: "評価はLLMベンダー側が行うので不要"
        explanation: "誤り。利用ユースケースに固有の評価は利用者が設計・実施する必要がある。"
    answer: "a"

  - id: "aicx-eval-002"
    text: "AIエージェントの『オフライン評価』と『オンライン評価』の使い分けとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "オフラインは事前のテストデータで品質を確認、オンラインは実利用環境でのA/Bテストや継続モニタリングで実際の効果を検証する"
        explanation: "正しい。オフライン評価は開発・改善時にプロンプト・モデル・RAG設定を変更した際の影響を素早く測る。オンライン評価は本番環境で実利用との相関を確認する。両者は目的・タイミング・コストが異なり、組み合わせて運用する。オフラインで合格したものだけをオンラインに昇格させるプロモーションフローが望ましい。"
      - id: "b"
        text: "オンライン評価だけ行えばよい"
        explanation: "誤り。本番でのみ評価すると、品質低下に気づくのが遅れて顧客影響が大きくなる。"
      - id: "c"
        text: "オフライン評価だけで本番展開できる"
        explanation: "誤り。オフラインは実利用環境を完全には再現できず、オンラインでの検証が不可欠。"
      - id: "d"
        text: "オフライン・オンラインに分ける必要はない"
        explanation: "誤り。両者は明確に異なる目的・手法を持つ。"
    answer: "a"

  - id: "aicx-eval-003"
    text: "LLM-as-a-Judge手法を使う際の主な留意点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "判定モデル自身のバイアス・自モデル優遇・長文優遇・順序効果に注意し、人手評価との相関を定期的に検証する"
        explanation: "正しい。LLM-as-a-Judgeは大量評価をスケールできるが、判定モデルが自社モデルを優遇する、長い回答を高く評価する、提示順序で結果が変わるなどのバイアスが知られている。人手評価と相関を取り続ける、判定基準を明示する、複数モデルでクロスチェックするなどの対策が必要。"
      - id: "b"
        text: "LLM-as-a-Judgeは完全に客観的で人手評価より優れている"
        explanation: "誤り。バイアスが存在し、人手評価との補完が必要。"
      - id: "c"
        text: "LLM-as-a-Judgeは精度が低いので使うべきでない"
        explanation: "誤り。スケール性と費用対効果に優れ、適切に使えば有効。"
      - id: "d"
        text: "判定モデルと評価対象モデルは同一にすべき"
        explanation: "誤り。同一モデルでは自己優遇バイアスが働きやすく、別モデルが望ましい。"
    answer: "a"

  - id: "aicx-eval-004"
    text: "AIエージェントの『評価データセット』設計として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "実利用シナリオを反映した代表サンプル・エッジケース・敵対的入力・経時的な追加サンプルを含める"
        explanation: "正しい。評価データは実運用の分布を代表する必要がある。代表ケースだけでなく、エッジケース（曖昧質問、長文、多言語）、敵対的ケース（プロンプトインジェクション、不適切質問）、新たに発見された失敗ケースを継続的に追加する『ライブデータセット』が望ましい。"
      - id: "b"
        text: "評価データは初期に作成したものを永続的に使う"
        explanation: "誤り。利用パターンが変化するため、定期的な更新が必要。"
      - id: "c"
        text: "評価データは少ないほどよい"
        explanation: "誤り。少なすぎると統計的な妥当性が低くなる。"
      - id: "d"
        text: "評価データは本番ログをそのまま使う"
        explanation: "誤り。プライバシー・偏り・代表性の観点で、適切なキュレーションが必要。"
    answer: "a"

  - id: "aicx-eval-005"
    text: "AIエージェントの『回帰テスト』設計として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "プロンプト・モデル・RAG設定の変更時に既存品質が劣化していないか自動的に検証する仕組みを整備する"
        explanation: "正しい。AIエージェントはプロンプト1行の変更で挙動が大きく変わることがあり、変更影響を検知する自動回帰テストが必須。重要シナリオを評価セットに固め、CI/CDパイプラインに組み込むことで、品質の揺り戻しを早期発見できる。これがプロンプトOpsの中核プラクティス。"
      - id: "b"
        text: "回帰テストは不要で本番で確認すれば十分"
        explanation: "誤り。本番で気づくのは遅すぎる。事前検知が望ましい。"
      - id: "c"
        text: "AIには回帰テストの概念は適用できない"
        explanation: "誤り。非決定性を踏まえた回帰テスト設計は可能で、実務でも採用されている。"
      - id: "d"
        text: "回帰テストは1回だけ実施"
        explanation: "誤り。継続的な実行が必要。"
    answer: "a"

  - id: "aicx-eval-006"
    text: "AIエージェントの『可観測性（observability）』として最も重要な情報はどれか。"
    choices:
      - id: "a"
        text: "プロンプト・モデル名・パラメータ・取得文書・ツール呼び出し・出力・トークン数・レイテンシ・コストを単一トレースで追跡できること"
        explanation: "正しい。エージェントは多段処理のため、1つのリクエストに対する全工程を時系列で追跡できることが運用の基盤。LangSmith、Langfuse、OpenTelemetryなどのツールが代表的。問題発生時の原因特定や継続改善の基礎情報となる。"
      - id: "b"
        text: "最終出力だけ記録すれば十分"
        explanation: "誤り。中間ステップが見えないとデバッグも改善もできない。"
      - id: "c"
        text: "可観測性は本番では不要"
        explanation: "誤り。本番こそ可観測性が必要。"
      - id: "d"
        text: "可観測性データは利用者にも全公開する"
        explanation: "誤り。プライバシーや営業秘密の観点で内部利用に限定するのが通常。"
    answer: "a"

  - id: "aicx-eval-007"
    text: "AIエージェントの『コスト管理』指標として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "リクエスト単価・ユーザー単価・タスク単価・部門別コスト・モデル別利用比率・キャッシュヒット率"
        explanation: "正しい。多視点でコストを可視化することで、最適化のポイントが見える。例：『特定機能のコストが想定より高い』『特定部門の利用が増えすぎている』『キャッシュヒット率が低い』など。FinOps原則に従ったコスト管理がROI改善に直結する。"
      - id: "b"
        text: "総コストだけ見れば十分"
        explanation: "誤り。総コストだけでは何を最適化すべきか不明瞭。"
      - id: "c"
        text: "コスト管理は経理部門の仕事で技術側は無関係"
        explanation: "誤り。技術判断（モデル選択・プロンプト設計）がコストを左右する。"
      - id: "d"
        text: "コストは可視化すると現場が萎縮するため見せない"
        explanation: "誤り。透明性こそ最適化の前提。"
    answer: "a"

  - id: "aicx-eval-008"
    text: "AIエージェントの『SLA・SLO』設計として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "可用性・応答時間・品質指標（成功率・幻覚率）・コスト上限を設定し、エラーバジェット運用で改善とリリース速度のバランスを取る"
        explanation: "正しい。AIエージェントもSREの考え方を適用できる。SLO（目標値）を定め、達成率を追跡し、エラーバジェットが残っていれば新機能リリース、消費していれば品質改善優先、というバランス調整が有効。AI特有の品質指標（幻覚率、ガードレール違反率）もSLOに組み込むのが望ましい。"
      - id: "b"
        text: "SLA・SLOはAIには適用できない"
        explanation: "誤り。一般のサービスと同様に適用可能で、適用が望ましい。"
      - id: "c"
        text: "SLOは100%を目指すのが正しい"
        explanation: "誤り。100%は現実的でなく、達成コストも見合わない。適切なターゲット設定が必要。"
      - id: "d"
        text: "SLAは可用性だけ定めればよい"
        explanation: "誤り。可用性以外にも品質・コストなど多面的な目標が必要。"
    answer: "a"

  - id: "aicx-eval-009"
    text: "AIエージェントの『A/Bテスト』設計として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "プロンプト・モデル・RAG設定などの変更を一部トラフィックに適用し、品質指標とビジネス指標で統計的に効果を比較検証する"
        explanation: "正しい。AIエージェントの改善は推論コスト・品質・UXに複雑に影響するため、本番でのA/Bテストが効果検証の標準手段。サンプルサイズ・統計的有意性・複数指標のバランス・公平性チェックなどを設計に組み込む必要がある。"
      - id: "b"
        text: "A/Bテストは不要で全ユーザーに即時展開"
        explanation: "誤り。リスクが大きく、品質劣化の影響が広がる。"
      - id: "c"
        text: "A/Bテストは技術指標だけで判断"
        explanation: "誤り。ビジネス指標との両面評価が必要。"
      - id: "d"
        text: "A/Bテストは1度だけ"
        explanation: "誤り。継続的に複数の改善を検証することが望ましい。"
    answer: "a"

  - id: "aicx-eval-010"
    text: "AIエージェントの『フィードバック収集』として最も適切な仕組みはどれか。"
    choices:
      - id: "a"
        text: "Thumbs up/down、自由記述、修正提案、再質問パターンの観察、人手レビューを組み合わせ、改善サイクルに組み込む"
        explanation: "正しい。フィードバック収集はAIエージェントの継続改善の生命線。明示的フィードバック（評価ボタン、コメント）と暗黙的フィードバック（再質問、放棄）の両方を組み合わせ、定期的に分析・改善に反映する。フィードバックを集めても活用しないと意味がないため、改善サイクルへの組み込みがポイント。"
      - id: "b"
        text: "フィードバックは収集しない"
        explanation: "誤り。最大の改善情報源を捨てることになる。"
      - id: "c"
        text: "フィードバックは集めるだけで分析しない"
        explanation: "誤り。分析・反映があってこそ価値がある。"
      - id: "d"
        text: "フィードバックは技術部門だけが見る"
        explanation: "誤り。業務部門・経営層との共有が改善優先度に影響する。"
    answer: "a"

  - id: "aicx-eval-011"
    text: "AIエージェントの『継続的改善（continuous improvement）』サイクルとして最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "計測→分析→仮説→改善→再計測のサイクルを定期的に回し、評価データセットも継続更新する"
        explanation: "正しい。AIエージェントは『一度作って完成』ではなく、利用パターン変化・データ更新・モデル進化に応じて継続改善する必要がある。PDCAやOODAなど既存のサイクル概念をAI特有の指標と組み合わせて運用するのが定石。AIストラテジストはこのサイクルの設計者。"
      - id: "b"
        text: "AIエージェントは作ったら触らないのが最善"
        explanation: "誤り。継続改善なしでは品質低下と陳腐化が起きる。"
      - id: "c"
        text: "改善はベンダーが自動で行う"
        explanation: "誤り。利用者側のユースケース固有の改善はベンダーには見えない。"
      - id: "d"
        text: "改善サイクルはAIには適用できない"
        explanation: "誤り。むしろAIこそ継続改善の対象。"
    answer: "a"

  - id: "aicx-eval-012"
    text: "AIエージェントの『モデルドリフト（model drift）』検知の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "ユーザー入力の傾向変化・取得知識の変化・モデル更新による挙動変化を継続検知し、品質劣化を早期発見する"
        explanation: "正しい。モデルドリフトには『データドリフト（入力分布の変化）』『コンセプトドリフト（正解定義の変化）』『モデルドリフト（モデル自体の更新）』などがある。検知が遅れるとサイレントに品質劣化が進行する。指標モニタリングと閾値アラート、人手スポット確認を組み合わせるのが現実的。"
      - id: "b"
        text: "ドリフトは発生しないので検知不要"
        explanation: "誤り。実際には頻繁に発生し、検知が運用の鍵。"
      - id: "c"
        text: "ドリフトはモデルベンダーが対応するので利用者は無関係"
        explanation: "誤り。利用者側のドリフト（入力傾向・データ）は利用者が検知すべき。"
      - id: "d"
        text: "ドリフト検知はAIエージェント以外に対する概念"
        explanation: "誤り。AIエージェントにも該当する。"
    answer: "a"

  - id: "aicx-eval-013"
    text: "AIエージェントの『プロンプトのCI/CD』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "プロンプトをバージョン管理し、変更時に自動評価が走り、合格時のみステージング・本番に昇格させる仕組み"
        explanation: "正しい。プロンプトはコードと同等の重要資産であり、CI/CDの考え方を適用する『PromptOps』が定着しつつある。Gitでバージョン管理、評価データセットでの自動テスト、段階的なロールアウト、ロールバック容易性などが要件。AIエージェントの安定運用に不可欠な基盤。"
      - id: "b"
        text: "プロンプトは本番に直接編集する"
        explanation: "誤り。本番直接編集は重大障害の温床。"
      - id: "c"
        text: "プロンプトはバージョン管理不要"
        explanation: "誤り。挙動が変わる重要要素であり、バージョン管理は必須。"
      - id: "d"
        text: "プロンプトは設計書に書いておけば十分"
        explanation: "誤り。設計書とは別に、稼働中の実体プロンプトを管理する必要がある。"
    answer: "a"

  - id: "aicx-eval-014"
    text: "AIエージェントの『ロールバック戦略』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "プロンプト・モデル・RAG設定を以前のバージョンに即座に戻せる仕組みを整備し、品質悪化時の影響を最小化する"
        explanation: "正しい。AIエージェントの変更は予期せぬ挙動を生むことがあり、ロールバック手段を持つことがリスク管理の基本。Featureフラグ、Blue/Greenデプロイ、Canary releaseなど一般的な技術がそのまま使える。ロールバックの所要時間・成功率もSLO的に追跡すべき。"
      - id: "b"
        text: "ロールバックは不要で問題があれば修正する"
        explanation: "誤り。修正には時間がかかり、その間の影響が大きい。"
      - id: "c"
        text: "ロールバックはAIには適用できない"
        explanation: "誤り。一般的な技術がそのまま適用可能。"
      - id: "d"
        text: "ロールバックは1度しかできない"
        explanation: "誤り。複数バージョン間で柔軟にロールバックできる設計が望ましい。"
    answer: "a"

  - id: "aicx-eval-015"
    text: "AIエージェントの『ガードレール違反監視』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "入力・出力それぞれに対するガードレール違反を計測・記録し、傾向分析と改善に活用する"
        explanation: "正しい。ガードレール違反（不適切表現、PII漏洩、ポリシー逸脱など）の発生件数・種類・トリガーを追跡することで、攻撃パターンや設計欠陥を発見できる。違反のサイレント増加は重大インシデントの前兆になることがあり、早期検知が望ましい。"
      - id: "b"
        text: "ガードレール違反は計測不要"
        explanation: "誤り。違反増加の検知が事故予防に直結する。"
      - id: "c"
        text: "ガードレール違反はベンダーが見ればよい"
        explanation: "誤り。利用ユースケース固有の違反パターンは利用者側で監視する必要がある。"
      - id: "d"
        text: "ガードレール違反は隠蔽すべき"
        explanation: "誤り。隠蔽は重大事故への布石となる。"
    answer: "a"

  - id: "aicx-eval-016"
    text: "AIエージェントの『品質劣化アラート』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "成功率・幻覚率・ユーザー満足度・ガードレール違反などが閾値を逸脱した場合に自動通知する仕組み"
        explanation: "正しい。サイレントに品質劣化が進むのが最悪のシナリオであり、自動アラートは早期発見の要。閾値設定は静的な値だけでなく、過去傾向との乖離を検知する動的な手法も併用が望ましい。アラート疲れを防ぐため、適切な集約・優先順位付けが必要。"
      - id: "b"
        text: "アラートは混乱を生むので設定しない"
        explanation: "誤り。重要事象を見逃すリスクが大きい。"
      - id: "c"
        text: "アラートは全イベントに対し設定"
        explanation: "誤り。アラート過多は本当に重要なものを埋もれさせる。"
      - id: "d"
        text: "アラートは技術部門だけが受信"
        explanation: "誤り。業務影響が大きい場合は業務部門への伝達も必要。"
    answer: "a"

  - id: "aicx-eval-017"
    text: "AIエージェントの『継続学習（continuous learning）』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "実利用フィードバックを収集し、評価セット・プロンプト・RAG・必要に応じてファインチューニングに反映する継続的な改善サイクル"
        explanation: "正しい。AIエージェントの『学習』はファインチューニングだけでなく、評価セットへのケース追加、プロンプトの改善、RAGの文書整備など多層に渡る。本番から得られる知見を改善サイクルに繋げる仕組みが、長期的な品質向上の鍵となる。"
      - id: "b"
        text: "学習は初期構築時だけで十分"
        explanation: "誤り。利用パターン変化に追随できず、品質劣化の原因となる。"
      - id: "c"
        text: "継続学習はモデルの再学習だけ"
        explanation: "誤り。プロンプト・RAG・運用調整も含む包括的な改善が現実的。"
      - id: "d"
        text: "継続学習は不要"
        explanation: "誤り。AIの強みは継続的に改善できる点にあり、放棄は機会損失。"
    answer: "a"

  - id: "aicx-eval-018"
    text: "AIエージェントの『コスト最適化施策』の効果測定として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "施策前後でリクエスト単価・総コスト・品質指標を比較し、コスト削減と品質維持の両立を確認する"
        explanation: "正しい。コスト最適化は品質を犠牲にしてはROIが下がる。両指標を併測することで、適切な施策かを判断できる。例：軽量モデルへの切替がコスト削減と引き換えに品質低下を招いていないか、キャッシュ導入で応答品質が劣化していないかなど。"
      - id: "b"
        text: "コスト削減効果だけ測れば十分"
        explanation: "誤り。品質低下を見落とすリスクがある。"
      - id: "c"
        text: "コスト最適化は効果測定不要"
        explanation: "誤り。効果が確認できないと改善の継続性がない。"
      - id: "d"
        text: "コスト最適化と品質改善は両立しない"
        explanation: "誤り。実務的に両立可能な施策が多数ある（キャッシュ、軽量モデル使い分け等）。"
    answer: "a"

  - id: "aicx-eval-019"
    text: "AIエージェントの『定性評価（qualitative evaluation）』の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "数値化しにくいユーザー体験・トーン・倫理的妥当性・微妙なニュアンスを人手レビューで把握し、定量指標を補完する"
        explanation: "正しい。AIの応答品質は数値化しにくい要素（共感性、表現の柔らかさ、誤解を招かない言い回し）が多く、定量指標だけでは捉えきれない。定期的な人手レビューや専門家評価を通じて、定量指標の盲点を埋めることが重要。AICXの観点では特にユーザー体験面の定性評価が決定的。"
      - id: "b"
        text: "定性評価は主観的なので不要"
        explanation: "誤り。主観的だが重要な品質要素を捉える唯一の手段でもある。"
      - id: "c"
        text: "定量評価だけで全て判断できる"
        explanation: "誤り。数値化困難な要素が品質を左右する場面が多い。"
      - id: "d"
        text: "定性評価はAIには不要"
        explanation: "誤り。むしろAIの応答品質には定性要素が多い。"
    answer: "a"

  - id: "aicx-eval-020"
    text: "AIエージェントの『運用引継ぎ（runbook）』整備として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "障害対応手順・復旧手順・既知問題・連絡体制・エスカレーション基準を文書化し、属人化を防ぐ"
        explanation: "正しい。AIエージェントの運用は属人化しやすく、担当者の異動や離脱で運用品質が崩れるリスクがある。Runbookとして手順を文書化し、誰でも対応できる状態を維持することが業務継続性の基盤。AIストラテジストは運用設計まで含めて責任を持つ。"
      - id: "b"
        text: "運用引継ぎは個別の口頭伝達で十分"
        explanation: "誤り。属人化と引継ぎ漏れの温床。"
      - id: "c"
        text: "Runbookは技術部門だけが見る"
        explanation: "誤り。業務影響時の連絡や判断には業務部門・経営層も関与する。"
      - id: "d"
        text: "Runbookは1度作れば更新不要"
        explanation: "誤り。手順は変化するため、定期的な更新が必要。"
    answer: "a"

  - id: "aicx-eval-021"
    text: "AIエージェントの『カナリアリリース』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "新バージョンを少数のユーザーやリクエストに先行適用し、品質指標を確認しながら段階的に拡大する"
        explanation: "正しい。AIエージェントの変更は影響範囲が読みにくく、いきなり全展開すると品質劣化が広がる。カナリアリリースで小規模に試し、指標を確認しながら拡大することで、リスクを限定しつつ改善を進められる。Web系のリリース戦略がそのまま応用できる。"
      - id: "b"
        text: "新バージョンは全ユーザーに即時展開"
        explanation: "誤り。リスクが大きい。"
      - id: "c"
        text: "カナリアリリースはAIには適用できない"
        explanation: "誤り。むしろAIこそ予測困難な挙動があるため適用が望ましい。"
      - id: "d"
        text: "カナリアリリースはコストの無駄"
        explanation: "誤り。事故防止効果がコスト以上の価値を持つ。"
    answer: "a"

  - id: "aicx-eval-022"
    text: "AIエージェントの『障害分析（post-mortem）』の意義として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "発生した障害の原因・影響・対応・再発防止策を非難なく分析し、組織学習に活用する"
        explanation: "正しい。Blameless Post-Mortem（非難なき事後分析）はSREの基本プラクティスで、AI運用にも有効。原因を個人責任に帰さず、システム要因・プロセス要因・教訓に焦点を当てることで、率直な共有と継続改善が可能になる。心理的安全性の確保が文化的成功要因。"
      - id: "b"
        text: "障害は隠蔽するのが最善"
        explanation: "誤り。隠蔽は再発と組織学習機会の喪失を生む。"
      - id: "c"
        text: "Post-mortemでは責任者を厳しく追及する"
        explanation: "誤り。非難文化は率直な共有を阻害し、根本原因に到達できなくなる。"
      - id: "d"
        text: "Post-mortemは形式的に行えば十分"
        explanation: "誤り。実質的な改善に繋げてこそ意味がある。"
    answer: "a"

  - id: "aicx-eval-023"
    text: "AIエージェントの『ユーザー満足度測定』として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "CSAT・NPS・タスク完了率・エスカレーション率・離脱率など複数指標で多角的に把握する"
        explanation: "正しい。ユーザー満足度は単一指標では捉えきれず、感情的満足（CSAT、NPS）と行動的指標（タスク完了率、リピート率、離脱率）の両方を併測する。AICXの観点では特にユーザー体験全体の品質を多角度で見ることが重要。"
      - id: "b"
        text: "技術指標だけで満足度は分かる"
        explanation: "誤り。ユーザーの主観的体験は技術指標だけでは捉えきれない。"
      - id: "c"
        text: "ユーザー満足度は測定不要"
        explanation: "誤り。改善の方向付けに不可欠。"
      - id: "d"
        text: "ユーザー満足度は単一指標で十分"
        explanation: "誤り。複数指標の組み合わせがより正確な把握を可能にする。"
    answer: "a"

  - id: "aicx-eval-024"
    text: "AIエージェントの『キャッシュ戦略』の効果測定として最も適切な指標はどれか。"
    choices:
      - id: "a"
        text: "キャッシュヒット率・コスト削減額・レイテンシ短縮効果・キャッシュ起因の品質劣化を併測する"
        explanation: "正しい。キャッシュは劇的なコスト・レイテンシ改善が期待できるが、古い回答を返すリスク（鮮度劣化）も伴う。ヒット率だけでなく品質側の指標も併測することで、適正な閾値や有効期限の設定が可能になる。セマンティックキャッシュでは特に重要。"
      - id: "b"
        text: "ヒット率だけ見れば十分"
        explanation: "誤り。品質劣化リスクを見逃す。"
      - id: "c"
        text: "キャッシュは効果測定不要"
        explanation: "誤り。効果が見えないと最適化できない。"
      - id: "d"
        text: "キャッシュはAIには使えない"
        explanation: "誤り。プロンプトキャッシュ・セマンティックキャッシュなど多様な手法がある。"
    answer: "a"

  - id: "aicx-eval-025"
    text: "AIエージェントの『LLM評価ベンチマーク（MMLU、HellaSwag等）』の業務利用における留意点として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "公開ベンチマークはモデル選定の参考になるが、実業務性能は自社のユースケースで独自評価する必要がある"
        explanation: "正しい。MMLUなどの一般ベンチマークはモデル間比較の参考にはなるが、特定ドメイン・特定タスクでの性能を保証しない。実業務での性能は自社の評価データセット・指標で確認する必要があり、ベンチマーク順位だけでモデル選定するのは危険。AIストラテジストはこの違いを理解し、独自評価への投資判断ができる必要がある。"
      - id: "b"
        text: "公開ベンチマークの順位だけでモデルを決定できる"
        explanation: "誤り。特定業務性能は別途確認が必要。"
      - id: "c"
        text: "自社評価は不要で公開ベンチマークだけで十分"
        explanation: "誤り。業務固有性能の保証にならない。"
      - id: "d"
        text: "公開ベンチマークは無視すべき"
        explanation: "誤り。参考情報として有用。一律無視は情報損失。"
    answer: "a"

  - id: "aicx-eval-026"
    text: "AIエージェントの『新モデルへの切替（migration）』戦略として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "並行運用・評価セット比較・段階的トラフィック移行・ロールバック容易性を含む計画的な移行戦略を策定する"
        explanation: "正しい。LLMモデルは頻繁に新版がリリースされ、既存モデルが廃止されることもある。移行は影響が大きいため、事前評価・並行運用・段階移行・ロールバック手段を含む計画的なアプローチが必要。プロンプトが新モデルで挙動が変わることもあり、評価セットでの確認が不可欠。"
      - id: "b"
        text: "新モデルが出たら即座に全切替"
        explanation: "誤り。挙動変化のリスクが大きい。"
      - id: "c"
        text: "古いモデルを使い続けるのが安全"
        explanation: "誤り。サポート終了や性能差で逆に不利になることがある。"
      - id: "d"
        text: "モデル切替は技術部門だけで決定"
        explanation: "誤り。業務影響が大きいため業務部門の関与も必要。"
    answer: "a"

  - id: "aicx-eval-027"
    text: "AIエージェントの『運用熟練度（operational maturity）』を高める施策として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "計測・自動化・障害演習・ナレッジ共有・運用組織の継続育成を統合的に進める"
        explanation: "正しい。運用は単発の改善ではなく、複合的な能力向上が必要。計測の充実、自動化推進、障害演習による対応力強化、運用ナレッジの組織内共有、運用人材の継続育成を統合的に進めることで、組織全体の運用品質が高まる。AIストラテジストは運用組織の成熟度向上ロードマップにも責任を持つ。"
      - id: "b"
        text: "運用熟練度は自然に上がる"
        explanation: "誤り。意識的な施策がないと停滞する。"
      - id: "c"
        text: "運用熟練度は技術指標だけで決まる"
        explanation: "誤り。組織能力・プロセス・文化など多面的な要素が関わる。"
      - id: "d"
        text: "運用熟練度は重要ではない"
        explanation: "誤り。長期的なAI活用の成否を決める重要要素。"
    answer: "a"

  - id: "aicx-eval-028"
    text: "AIエージェントの『運用コスト見積もり』として最も適切なアプローチはどれか。"
    choices:
      - id: "a"
        text: "リクエスト数・平均トークン数・モデル単価・キャッシュ率・成長率を踏まえ、シナリオ別（楽観・現実・悲観）でレンジ提示する"
        explanation: "正しい。AIの運用コストは利用量に比例し、変動が大きいため、単一の数字ではなくレンジで示すのが現実的。シナリオプランニングを用い、楽観・現実・悲観の3パターンを提示することで、経営判断と予算確保がしやすくなる。コスト超過時の対応策（節約モード、利用制限）も含めて準備するのが望ましい。"
      - id: "b"
        text: "コストは固定額で見積もる"
        explanation: "誤り。利用量で大きく変動するため固定額では実態と乖離する。"
      - id: "c"
        text: "見積もりは不要"
        explanation: "誤り。投資判断と予算確保に不可欠。"
      - id: "d"
        text: "コスト見積もりは技術部門の責任ではない"
        explanation: "誤り。技術選択がコストを左右するため、技術部門の関与が必要。"
    answer: "a"

  - id: "aicx-eval-029"
    text: "AIエージェントの『運用ダッシュボード』に含めるべき要素として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "技術指標（成功率・レイテンシ・幻覚率）・ビジネス指標（CSAT・タスク完了率）・コスト指標（総コスト・単価）を統合的に可視化する"
        explanation: "正しい。ダッシュボードは技術・ビジネス・コストの3面を統合的に見せることで、関係者全員が同じ事実に基づいて判断できる基盤となる。役割別ビュー（経営、業務、技術、運用）を用意することで、それぞれの関心事に応じた情報提供が可能。AIストラテジストはダッシュボード設計の責任を担うことが多い。"
      - id: "b"
        text: "技術指標だけ表示"
        explanation: "誤り。ビジネス指標との接続が見えなくなる。"
      - id: "c"
        text: "ダッシュボードは不要"
        explanation: "誤り。状況可視化なしには意思決定の質が下がる。"
      - id: "d"
        text: "ダッシュボードは技術部門だけが見る"
        explanation: "誤り。経営・業務部門も活用すべき情報基盤。"
    answer: "a"

  - id: "aicx-eval-030"
    text: "AIストラテジストとして『評価・運用領域』で果たすべき最も重要な役割はどれか。"
    choices:
      - id: "a"
        text: "ビジネス目標と技術指標・運用指標を結び付け、継続改善サイクルを設計・主導することでAI投資のROIを継続的に向上させる"
        explanation: "正しい。AIエージェントは作って終わりではなく、運用しながら磨くもの。AIストラテジストは技術・ビジネス・運用の翻訳者として、評価設計・継続改善・組織能力向上を主導する。エージェントの寿命を通じてビジネス価値を最大化する継続的取組みが本質的な責務である。AICX観点では特にCXとAI改善を結び付ける視点が重要となる。"
      - id: "b"
        text: "評価・運用は技術部門に任せれば十分"
        explanation: "誤り。経営的視点での結び付けがないと部分最適に陥る。"
      - id: "c"
        text: "評価・運用は別組織が担い戦略部門は無関係"
        explanation: "誤り。戦略と評価・運用は密接に連動する。"
      - id: "d"
        text: "評価・運用は1度設計すれば変える必要はない"
        explanation: "誤り。継続改善が本質。"
    answer: "a"
