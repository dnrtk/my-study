questions:
- id: jhs-sh-ms-001
  text: 1338年に足利尊氏が開いた幕府はどこに置かれたか。
  choices:
  - id: a
    text: 鎌倉
    explanation: 鎌倉に幕府を置いたのは源頼朝（鎌倉幕府）です。
  - id: b
    text: 京都の室町
    explanation: 正解です。足利尊氏が開いた室町幕府は、3代将軍義満が京都の室町に「花の御所」を作ったことからこう呼ばれます。
  - id: c
    text: 江戸
    explanation: 江戸に幕府を置いたのは徳川家康（江戸幕府）です。
  - id: d
    text: 大阪
    explanation: 室町幕府は大阪ではなく京都に置かれました。
  answer: b
- id: jhs-sh-ms-002
  text: 14世紀後半に南朝（吉野）と北朝（京都）に分かれて対立した時代を何というか。
  choices:
  - id: a
    text: 戦国時代
    explanation: 戦国時代は15〜16世紀の下剋上の時代です。
  - id: b
    text: 南北朝時代
    explanation: 正解です。後醍醐天皇が吉野（南朝）に逃れ、京都には別の天皇（北朝）が立てられ、約60年間両朝が対立した南北朝時代が続きました。
  - id: c
    text: 平安時代
    explanation: 平安時代は794〜1185年です。
  - id: d
    text: 江戸時代
    explanation: 江戸時代は1603〜1868年です。
  answer: b
- id: jhs-sh-ms-003
  text: 室町幕府3代将軍で、南北朝を統一し、明（中国）との貿易を始めた人物は誰か。
  choices:
  - id: a
    text: 足利尊氏
    explanation: 足利尊氏は室町幕府を開いた初代将軍です。
  - id: b
    text: 足利義満
    explanation: 正解です。足利義満は1392年に南北朝を統一し、1404年から明との勘合貿易（日明貿易）を始めました。また金閣寺を建てました。
  - id: c
    text: 足利義政
    explanation: 足利義政は8代将軍で、銀閣寺を建てました。
  - id: d
    text: 足利義昭
    explanation: 足利義昭は室町幕府最後（15代）の将軍です。
  answer: b
- id: jhs-sh-ms-004
  text: 足利義満が京都の北山に建てた、金箔を貼った建物はどれか。
  choices:
  - id: a
    text: 銀閣寺
    explanation: 銀閣寺は8代将軍足利義政が建てた東山山荘（慈照寺）です。
  - id: b
    text: 金閣寺
    explanation: 正解です。足利義満が北山に建てた金閣寺（鹿苑寺金閣）は、金箔が貼られた3層の建物で、北山文化の代表です。
  - id: c
    text: 平等院鳳凰堂
    explanation: 平等院鳳凰堂は平安時代に藤原頼通が建てました。
  - id: d
    text: 二条城
    explanation: 二条城は江戸時代に徳川家康が建てました。
  answer: b
- id: jhs-sh-ms-005
  text: 室町幕府の将軍を補佐した役職で、有力な守護大名が交代で務めたものはどれか。
  choices:
  - id: a
    text: 執権（しっけん）
    explanation: 執権は鎌倉幕府の将軍補佐役です。
  - id: b
    text: 管領（かんれい）
    explanation: 正解です。管領は室町幕府の将軍補佐役で、細川・斯波・畠山の三管領家が交代で就任しました。
  - id: c
    text: 老中
    explanation: 老中は江戸幕府の政務担当役です。
  - id: d
    text: 摂政
    explanation: 摂政は朝廷の役職です。
  answer: b
- id: jhs-sh-ms-006
  text: 1467年に起きた、約11年間続いた室町時代最大の内乱はどれか。
  choices:
  - id: a
    text: 承久の乱
    explanation: 承久の乱は1221年の鎌倉時代の出来事です。
  - id: b
    text: 応仁の乱
    explanation: 正解です。1467年に8代将軍足利義政の後継者問題をきっかけに起きた応仁の乱は、約11年続き、戦国時代への扉を開きました。
  - id: c
    text: 島原の乱
    explanation: 島原の乱は1637年の江戸時代の出来事です。
  - id: d
    text: 大塩の乱
    explanation: 大塩の乱は1837年の江戸時代の出来事です。
  answer: b
- id: jhs-sh-ms-007
  text: 室町時代に農民が団結して領主に年貢の軽減などを要求した一揆を何というか。
  choices:
  - id: a
    text: 百姓一揆
    explanation: 百姓一揆は江戸時代に多発した農民の一揆です。
  - id: b
    text: 土一揆
    explanation: 正解です。土一揆は室町時代に近畿地方の農民が徳政（借金の帳消し）を求めて起こした一揆です。
  - id: c
    text: 一向一揆
    explanation: 一向一揆は浄土真宗（一向宗）の信者が起こした一揆です。
  - id: d
    text: 打ちこわし
    explanation: 打ちこわしは江戸時代の都市の貧民が米屋などを壊した行動です。
  answer: b
- id: jhs-sh-ms-008
  text: 室町時代に浄土真宗（一向宗）の信者が一国を支配した事例として知られる「百年王国」はどこか。
  choices:
  - id: a
    text: 薩摩（鹿児島県）
    explanation: 薩摩は島津氏が支配しており、一向一揆による支配ではありません。
  - id: b
    text: 加賀（石川県）
    explanation: 正解です。加賀（現在の石川県）では一向一揆が守護の富樫氏を倒し、約100年間（1488〜1580年）にわたって自治を行いました（百姓の持ちたる国）。
  - id: c
    text: 土佐（高知県）
    explanation: 土佐は長宗我部氏が支配しました。
  - id: d
    text: 越後（新潟県）
    explanation: 越後は上杉氏が支配しました。
  answer: b
- id: jhs-sh-ms-009
  text: 戦国時代に自分の領国を独自の法律（分国法）で支配した地方の大名を何というか。
  choices:
  - id: a
    text: 御家人
    explanation: 御家人は鎌倉幕府の主従関係にある武士です。
  - id: b
    text: 戦国大名
    explanation: 正解です。戦国時代に実力で領国を支配し、独自の分国法を定めて統治した大名を戦国大名といいます。
  - id: c
    text: 守護大名
    explanation: 守護大名は室町幕府の守護から発展した大名で、戦国大名より前の段階です。
  - id: d
    text: 国人領主
    explanation: 国人領主は地方の在地領主（小規模な武士）です。
  answer: b
- id: jhs-sh-ms-010
  text: 室町時代に足利義満が始めた明（中国）との貿易で使われた合札を何というか。
  choices:
  - id: a
    text: 朱印状
    explanation: 朱印状は江戸時代の海外渡航許可証です。
  - id: b
    text: 勘合（かんごう）
    explanation: 正解です。倭寇と正式な貿易船を区別するために使われた合い札を勘合といい、勘合貿易（日明貿易）と呼ばれました。
  - id: c
    text: 渡来銭
    explanation: 渡来銭は中国から輸入された銅銭です。
  - id: d
    text: 割符（わりふ）
    explanation: 割符は中世の遠隔地取引に使われた為替手形です。
  answer: b
- id: jhs-sh-ms-011
  text: 室町時代に発達した、商人・職人の同業者組合はどれか。
  choices:
  - id: a
    text: 株仲間（かぶなかま）
    explanation: 株仲間は江戸時代の商工業者の組合です。
  - id: b
    text: 座（ざ）
    explanation: 正解です。座は寺社や貴族の保護を受け、商品の販売や製造の独占権を持つ同業者組合です。室町時代に各地で発達しました。
  - id: c
    text: 惣（そう）
    explanation: 惣は室町時代の農民の自治組織です。
  - id: d
    text: 問丸（といまる）
    explanation: 問丸は中世の港湾での荷物の保管・輸送を扱う業者です。
  answer: b
- id: jhs-sh-ms-012
  text: 室町時代に農民が自治のために作った組織を何というか。
  choices:
  - id: a
    text: 座（ざ）
    explanation: 座は商人・職人の同業者組合です。
  - id: b
    text: 惣（そう）・惣村（そうそん）
    explanation: 正解です。惣（惣村）は室町時代の農民が自治のために作った組織で、寄合（集会）で村のルールを決め、一揆を起こす組織的な力を持ちました。
  - id: c
    text: 株仲間
    explanation: 株仲間は江戸時代の商工業者の組合です。
  - id: d
    text: 問屋（といや）
    explanation: 問屋は商品流通を担う業者です。
  answer: b
- id: jhs-sh-ms-013
  text: 室町時代に発達した芸能で、観阿弥・世阿弥父子が大成したものはどれか。
  choices:
  - id: a
    text: 歌舞伎（かぶき）
    explanation: 歌舞伎は江戸時代に出雲阿国が始めた芸能です。
  - id: b
    text: 能（のう）
    explanation: 正解です。能（能楽）は室町時代に観阿弥・世阿弥父子が大成した仮面劇で、足利義満の保護を受けて発展しました。
  - id: c
    text: 浄瑠璃（じょうるり）
    explanation: 浄瑠璃は江戸時代に発展した人形劇の語り物です。
  - id: d
    text: 狂言（きょうげん）
    explanation: 狂言は能と同じく室町時代に発達した笑いの芸能で、能の合間に演じられます。大成者は特に一人の人物ではありません。
  answer: b
- id: jhs-sh-ms-014
  text: 足利義政が京都の東山に建てた、わび・さびの文化（東山文化）を代表する建物はどれか。
  choices:
  - id: a
    text: 金閣寺
    explanation: 金閣寺は足利義満が北山に建てた建物（北山文化）です。
  - id: b
    text: 銀閣寺
    explanation: 正解です。8代将軍足利義政が東山に建てた銀閣寺は、わびさびの美意識をもった東山文化の代表です。書院造の建築も有名です。
  - id: c
    text: 平等院鳳凰堂
    explanation: 平等院鳳凰堂は平安時代の建物です。
  - id: d
    text: 姫路城
    explanation: 姫路城は戦国〜江戸時代の城です。
  answer: b
- id: jhs-sh-ms-015
  text: 戦国時代に活躍した武将で、「桶狭間の戦い（1560年）」で今川義元を破ったのは誰か。
  choices:
  - id: a
    text: 豊臣秀吉
    explanation: 豊臣秀吉は織田信長の家臣で、のちに天下統一します。
  - id: b
    text: 織田信長
    explanation: 正解です。1560年の桶狭間の戦いで、織田信長は大軍の今川義元を奇襲で破り、天下統一への第一歩を踏み出しました。
  - id: c
    text: 徳川家康
    explanation: 徳川家康は桶狭間の戦いの際は今川氏の人質でした。
  - id: d
    text: 武田信玄
    explanation: 武田信玄は甲斐（山梨）の戦国大名です。
  answer: b
- id: jhs-sh-ms-016
  text: 1573年に室町幕府を滅ぼした人物は誰か。
  choices:
  - id: a
    text: 豊臣秀吉
    explanation: 豊臣秀吉は織田信長の後継者で、室町幕府滅亡後に天下統一を目指しました。
  - id: b
    text: 織田信長
    explanation: 正解です。1573年に織田信長は最後の将軍・足利義昭を京都から追放し、室町幕府を滅ぼしました。
  - id: c
    text: 徳川家康
    explanation: 徳川家康は1603年に江戸幕府を開いた人物です。
  - id: d
    text: 明智光秀
    explanation: 明智光秀は1582年に本能寺の変で織田信長を討ちましたが、室町幕府滅亡には関係ありません。
  answer: b
- id: jhs-sh-ms-017
  text: 1543年に種子島に漂着したポルトガル人が伝えたものはどれか。
  choices:
  - id: a
    text: 仏教
    explanation: 仏教は古墳時代（538年または552年）に百済から伝わりました。
  - id: b
    text: 鉄砲
    explanation: 正解です。1543年に種子島に漂着したポルトガル人によって鉄砲（火縄銃）が日本に伝わりました。戦国時代の戦術を大きく変えました。
  - id: c
    text: 活版印刷術
    explanation: 活版印刷術はキリスト教の布教とともに伝わりましたが、鉄砲と同時ではありません。
  - id: d
    text: 羅針盤
    explanation: 羅針盤は中国から伝わったもので、ポルトガル人がもたらしたものではありません。
  answer: b
- id: jhs-sh-ms-018
  text: 1549年に日本に来航し、鹿児島でキリスト教の布教を始めた宣教師は誰か。
  choices:
  - id: a
    text: フランシスコ・ピサロ
    explanation: ピサロはインカ帝国を征服したスペインの征服者です。
  - id: b
    text: フランシスコ・ザビエル
    explanation: 正解です。イエズス会の宣教師ザビエルは1549年に鹿児島に来航し、日本にキリスト教を伝えました。
  - id: c
    text: マルコ・ポーロ
    explanation: マルコ・ポーロはモンゴル帝国を旅したヴェネツィア人探検家です。
  - id: d
    text: コロンブス
    explanation: コロンブスはアメリカ大陸に到達したスペイン探検家です。
  answer: b
- id: jhs-sh-ms-019
  text: 織田信長が行った経済政策で、市場での商品の税や独占販売権（座の特権）を廃止した政策はどれか。
  choices:
  - id: a
    text: 太閤検地
    explanation: 太閤検地は豊臣秀吉が行った土地調査です。
  - id: b
    text: 楽市・楽座
    explanation: 正解です。楽市令は誰でも自由に市場で商売できるよう座の特権を廃止し、商工業を活発にした政策です。
  - id: c
    text: 株仲間の公認
    explanation: 株仲間を公認したのは江戸幕府です。
  - id: d
    text: 参勤交代
    explanation: 参勤交代は江戸時代の制度です。
  answer: b
- id: jhs-sh-ms-020
  text: 1582年に本能寺の変で織田信長を討った武将は誰か。
  choices:
  - id: a
    text: 豊臣秀吉
    explanation: 豊臣秀吉は本能寺の変の後、山崎の戦いで明智光秀を討ちました。
  - id: b
    text: 明智光秀
    explanation: 正解です。1582年、織田信長の家臣・明智光秀が本能寺で信長を急襲し、信長は自害しました（本能寺の変）。
  - id: c
    text: 徳川家康
    explanation: 徳川家康は本能寺の変に関係していません。
  - id: d
    text: 上杉謙信
    explanation: 上杉謙信は本能寺の変の前に亡くなっています（1578年）。
  answer: b
- id: jhs-sh-ms-021
  text: 室町時代に水墨画を大成した禅僧は誰か。
  choices:
  - id: a
    text: 本阿弥光悦
    explanation: 本阿弥光悦は江戸時代初期の芸術家です。
  - id: b
    text: 雪舟
    explanation: 正解です。雪舟は室町時代に明に渡って水墨画を学び、帰国後に日本独自の水墨画を大成した禅僧です。「秋冬山水図」などが有名です。
  - id: c
    text: 狩野永徳
    explanation: 狩野永徳は安土桃山時代の絵師で、豪華な障壁画で知られます。
  - id: d
    text: 俵屋宗達
    explanation: 俵屋宗達は江戸時代初期の絵師です。
  answer: b
- id: jhs-sh-ms-022
  text: 戦国時代に鉄砲が初めて大規模に使われた1575年の戦いはどれか。
  choices:
  - id: a
    text: 川中島の戦い
    explanation: 川中島の戦いは武田信玄と上杉謙信の戦いです。
  - id: b
    text: 長篠の戦い
    explanation: 正解です。1575年の長篠の戦いで、織田信長・徳川家康連合軍は大量の鉄砲を使って武田勝頼の騎馬隊を破りました。
  - id: c
    text: 関ヶ原の戦い
    explanation: 関ヶ原の戦いは1600年の出来事です。
  - id: d
    text: 大坂の陣
    explanation: 大坂の陣は1614〜1615年の出来事です。
  answer: b
- id: jhs-sh-ms-023
  text: 豊臣秀吉が行った、田畑の広さや土の良し悪しを調べ石高で表した政策はどれか。
  choices:
  - id: a
    text: 楽市・楽座
    explanation: 楽市・楽座は織田信長が行った経済政策です。
  - id: b
    text: 太閤検地
    explanation: 正解です。豊臣秀吉は全国の土地を調査（検地）し、生産高を石高（こくだか）で統一的に表しました。これにより荘園制度が完全に崩壊しました。
  - id: c
    text: 地租改正
    explanation: 地租改正は明治時代（1873年）の税制改革です。
  - id: d
    text: 班田収授法
    explanation: 班田収授法は奈良時代の土地制度です。
  answer: b
- id: jhs-sh-ms-024
  text: 豊臣秀吉が1588年に農民や寺社から武器を取り上げた政策はどれか。
  choices:
  - id: a
    text: 兵農分離
    explanation: 兵農分離は武士と農民の身分を分ける政策の総称です。
  - id: b
    text: 刀狩り
    explanation: 正解です。豊臣秀吉は1588年に刀狩令を出し、農民や寺社から刀・脇差・弓・槍・鉄砲などの武器を没収しました。
  - id: c
    text: 一国一城令
    explanation: 一国一城令は江戸幕府が1615年に出した、大名の城を一つに限る命令です。
  - id: d
    text: 上知令
    explanation: 上知令は幕末（1843年）に水野忠邦が出した土地を幕府領に戻す命令です。
  answer: b
- id: jhs-sh-ms-025
  text: 室町時代に中国（明）との貿易で日本が主に輸入したものはどれか。
  choices:
  - id: a
    text: 金・硫黄・刀剣
    explanation: 金・硫黄・刀剣は日本が明に輸出したものです。
  - id: b
    text: 銅銭・生糸・陶磁器
    explanation: 正解です。日明貿易（勘合貿易）で日本は明から銅銭・生糸・絹織物・陶磁器などを輸入しました。
  - id: c
    text: 鉄砲・火薬・キリスト教の書物
    explanation: 鉄砲はポルトガルから伝わったもので、明貿易で輸入したものではありません。
  - id: d
    text: 砂糖・コーヒー・ガラス製品
    explanation: 砂糖・コーヒー・ガラス製品は南蛮貿易（ポルトガル・スペインとの貿易）で輸入されたものです。
  answer: b
- id: jhs-sh-ms-026
  text: 後醍醐天皇が1333年に鎌倉幕府を倒した後、自ら行った政治を何というか。
  choices:
  - id: a
    text: 大化の改新
    explanation: 大化の改新は645年の出来事です。
  - id: b
    text: 建武の新政
    explanation: 正解です。後醍醐天皇は鎌倉幕府滅亡後に自ら政治を行い、建武の新政と呼ばれる天皇親政を目指しましたが、武士の不満が高まり2年で崩壊しました。
  - id: c
    text: 摂関政治
    explanation: 摂関政治は平安時代の藤原氏による政治です。
  - id: d
    text: 院政
    explanation: 院政は上皇が行う政治で、後醍醐天皇の政治とは異なります。
  answer: b
- id: jhs-sh-ms-027
  text: 室町時代に琉球（現在の沖縄）で成立した王国を何というか。
  choices:
  - id: a
    text: 大和国
    explanation: 大和国は現在の奈良県にあたる地名です。
  - id: b
    text: 琉球王国
    explanation: 正解です。15世紀初めに尚氏が琉球を統一して琉球王国を建国し、中国・日本・東南アジアを結ぶ中継貿易で栄えました。
  - id: c
    text: 蝦夷地
    explanation: 蝦夷地は現在の北海道で、アイヌ民族が暮らした地域です。
  - id: d
    text: 対馬藩
    explanation: 対馬藩は江戸時代に朝鮮との交易を担った藩です。
  answer: b
- id: jhs-sh-ms-028
  text: 室町時代に蝦夷地（北海道）で交易を行い、アイヌ民族との間で対立した集団はどれか。
  choices:
  - id: a
    text: 薩摩藩
    explanation: 薩摩藩は九州南部の藩です。
  - id: b
    text: 和人・渡島の武士
    explanation: 正解です。本州から渡ってきた和人（日本人）商人・武士との交易をめぐる争いから、1457年にコシャマインを指導者とするアイヌの戦いが起きました。
  - id: c
    text: 対馬の宗氏
    explanation: 宗氏は対馬の有力者で、朝鮮との交易を担いました。
  - id: d
    text: 松前藩
    explanation: 松前藩は江戸時代に設立された藩です。
  answer: b
- id: jhs-sh-ms-029
  text: 戦国時代に「甲斐の虎」と呼ばれた武将は誰か。
  choices:
  - id: a
    text: 上杉謙信
    explanation: 上杉謙信は「越後の龍（虎）」と呼ばれました。
  - id: b
    text: 武田信玄
    explanation: 正解です。甲斐国（山梨県）の戦国大名・武田信玄は「甲斐の虎」と呼ばれ、信濃・駿河などに勢力を拡大しました。
  - id: c
    text: 北条氏康
    explanation: 北条氏康は「相模の獅子」と呼ばれた関東の戦国大名です。
  - id: d
    text: 毛利元就
    explanation: 毛利元就は中国地方を制覇した戦国大名です。
  answer: b
- id: jhs-sh-ms-030
  text: 戦国時代に「越後の龍」と呼ばれ、武田信玄と川中島で激突した武将は誰か。
  choices:
  - id: a
    text: 武田信玄
    explanation: 武田信玄は「甲斐の虎」と呼ばれた上杉謙信の宿敵です。
  - id: b
    text: 上杉謙信
    explanation: 正解です。越後（新潟県）の戦国大名・上杉謙信は「越後の龍」と呼ばれ、武田信玄と川中島で5度にわたって戦いました。
  - id: c
    text: 今川義元
    explanation: 今川義元は東海地方の戦国大名で、桶狭間の戦いで織田信長に討たれました。
  - id: d
    text: 長尾景虎
    explanation: 長尾景虎は上杉謙信の出家前の名前です。
  answer: b
- id: jhs-sh-ms-031
  text: 豊臣秀吉が行った2度の朝鮮出兵（1592年・1597年）をそれぞれ何というか。
  choices:
  - id: a
    text: 元寇と文永の役
    explanation: 元寇は鎌倉時代にモンゴル（元）が日本に侵攻した出来事です。
  - id: b
    text: 文禄の役と慶長の役
    explanation: 正解です。1592年の文禄の役（壬辰倭乱）と1597年の慶長の役（丁酉再乱）の2度の朝鮮出兵は、秀吉の死によって撤退しました。
  - id: c
    text: 刀伊の入寇と倭寇
    explanation: 刀伊の入寇は平安時代、倭寇は日本の海賊集団です。
  - id: d
    text: 日清戦争と日露戦争
    explanation: 日清・日露戦争は明治時代の出来事です。
  answer: b
- id: jhs-sh-ms-032
  text: 豊臣秀吉が関白になる前の身分はどれか。
  choices:
  - id: a
    text: 将軍
    explanation: 秀吉は将軍にはなれませんでした（源氏ではないため）。
  - id: b
    text: 農民の出身で、织田信長の家臣
    explanation: 正解です。豊臣秀吉は農民（百姓）の出身で、尾張国（愛知県）に生まれ、後に織田信長に仕えて出世しました。
  - id: c
    text: 公家（貴族）の出身
    explanation: 秀吉は公家ではなく農民の出身です。
  - id: d
    text: 武家の名門の出身
    explanation: 秀吉は武家の名門ではなく農民出身です。
  answer: b
- id: jhs-sh-ms-033
  text: 室町時代に各地に生まれた、定期的に開かれる市場を何というか。
  choices:
  - id: a
    text: 楽市
    explanation: 楽市は織田信長が既存の座の特権を廃止した自由市場です。
  - id: b
    text: 定期市
    explanation: 正解です。鎌倉・室町時代には月に3回開かれる三斎市、6回開かれる六斎市などの定期市が各地で発展しました。
  - id: c
    text: 百貨店
    explanation: 百貨店は近代の商業施設です。
  - id: d
    text: 問屋街
    explanation: 問屋街は特定の商品を扱う問屋が集まった街です。
  answer: b
- id: jhs-sh-ms-034
  text: 織田信長が1576年に建設を始めた、石垣と天守を備えた壮大な城はどれか。
  choices:
  - id: a
    text: 姫路城
    explanation: 姫路城は豊臣秀吉が大改修し、さらに江戸時代に整備された城です。
  - id: b
    text: 安土城
    explanation: 正解です。織田信長が琵琶湖畔に築いた安土城は、壮大な天守閣を持つ近世城郭の先駆けで、安土桃山時代の名前の由来になりました。
  - id: c
    text: 大阪城
    explanation: 大阪城は豊臣秀吉が築いた城です。
  - id: d
    text: 江戸城
    explanation: 江戸城は徳川家康が整備した城です。
  answer: b
- id: jhs-sh-ms-035
  text: 安土桃山時代の豪華で壮大な文化を何というか。
  choices:
  - id: a
    text: 元禄文化
    explanation: 元禄文化は江戸時代中期の文化です。
  - id: b
    text: 桃山文化
    explanation: 正解です。織田信長・豊臣秀吉の時代に栄えた、金箔を多用した豪華絢爛な文化を桃山文化といいます。狩野永徳の障壁画などが代表的です。
  - id: c
    text: 東山文化
    explanation: 東山文化は室町時代（足利義政の頃）のわびさびの文化です。
  - id: d
    text: 化政文化
    explanation: 化政文化は江戸時代後期の文化です。
  answer: b
- id: jhs-sh-ms-036
  text: 千利休が大成した、茶を点てて客をもてなす文化を何というか。
  choices:
  - id: a
    text: 生け花（いけばな）
    explanation: 生け花は花を生ける芸術で、茶の湯とは別です。
  - id: b
    text: 茶の湯（わびさびの茶道）
    explanation: 正解です。千利休はわびさびの精神に基づく「侘び茶」を大成し、茶道として確立しました。豊臣秀吉にも仕えましたが、後に切腹を命じられました。
  - id: c
    text: 能楽（のうがく）
    explanation: 能楽は室町時代に観阿弥・世阿弥が大成した仮面劇です。
  - id: d
    text: 書道（しょどう）
    explanation: 書道は文字を筆で美しく書く芸術です。
  answer: b
- id: jhs-sh-ms-037
  text: 豊臣秀吉の天下統一後、徳川家康との決戦となった1600年の戦いはどれか。
  choices:
  - id: a
    text: 大坂の陣
    explanation: 大坂の陣は1614〜15年の戦いで、豊臣家を滅ぼした戦いです。
  - id: b
    text: 関ヶ原の戦い
    explanation: 正解です。1600年に徳川家康率いる東軍と石田三成率いる西軍が岐阜県の関ヶ原で戦い、東軍が勝利して天下の主導権を徳川氏が握りました。
  - id: c
    text: 長篠の戦い
    explanation: 長篠の戦いは1575年の出来事です。
  - id: d
    text: 桶狭間の戦い
    explanation: 桶狭間の戦いは1560年の出来事です。
  answer: b
- id: jhs-sh-ms-038
  text: 室町時代に発展した、問丸（といまる）が扱ったものはどれか。
  choices:
  - id: a
    text: 武具の製造
    explanation: 問丸は武具製造ではありません。
  - id: b
    text: 港での荷物の保管・輸送・売買の仲介
    explanation: 正解です。問丸（後の問屋）は港や市場で荷物の保管・輸送・売買の仲介を行う業者で、流通を担いました。
  - id: c
    text: 農地の管理と年貢の徴収
    explanation: 農地管理・年貢徴収は地頭の役割です。
  - id: d
    text: 金融（貸付）業務のみ
    explanation: 金融業を行ったのは土倉（どそう）です。
  answer: b
- id: jhs-sh-ms-039
  text: 室町時代に高利貸しを行い、財をなした業者を何というか。
  choices:
  - id: a
    text: 座（ざ）
    explanation: 座は同業者組合です。
  - id: b
    text: 土倉（どそう）・酒屋
    explanation: 正解です。土倉（質屋兼高利貸し）や酒屋が蓄えた資金をもとに金融業を行い、農民や武士に貸付を行いました。土一揆の標的になることもありました。
  - id: c
    text: 問丸（といまる）
    explanation: 問丸は荷物の流通を扱う業者です。
  - id: d
    text: 馬借（ばしゃく）
    explanation: 馬借は馬を使って荷物を運ぶ運送業者です。
  answer: b
- id: jhs-sh-ms-040
  text: 戦国大名が家臣を城下に集め、商工業者を呼んで形成した都市を何というか。
  choices:
  - id: a
    text: 門前町
    explanation: 門前町は寺社の門前に発達した町です。
  - id: b
    text: 城下町
    explanation: 正解です。戦国大名は家臣と商工業者を城の周囲に集め、城下町を形成しました。これが近世都市の原型となりました。
  - id: c
    text: 宿場町
    explanation: 宿場町は街道に沿って発達した宿泊・休憩のための町です。
  - id: d
    text: 港町
    explanation: 港町は港を中心に発達した商業都市です。
  answer: b
- id: jhs-sh-ms-041
  text: 織田信長が室町幕府を滅ぼした後に目指した政治目標を表す言葉はどれか。
  choices:
  - id: a
    text: 王政復古
    explanation: 王政復古は明治維新（1868年）の際に使われた言葉です。
  - id: b
    text: 天下布武
    explanation: 正解です。織田信長は「天下布武」（武力で天下を統一する）を旗印にして全国統一を目指しました。
  - id: c
    text: 尊王攘夷
    explanation: 尊王攘夷は幕末の政治スローガンです。
  - id: d
    text: 富国強兵
    explanation: 富国強兵は明治政府のスローガンです。
  answer: b
- id: jhs-sh-ms-042
  text: 戦国時代に「三好長慶」が一時的に支配した地域はどこか。
  choices:
  - id: a
    text: 東北地方
    explanation: 三好長慶は東北ではなく畿内（近畿地方）を支配しました。
  - id: b
    text: 畿内・阿波
    explanation: 正解です。三好長慶は阿波国（徳島県）出身で、畿内に進出して室町幕府将軍を京都から追放し、一時的に畿内の実権を握りました。
  - id: c
    text: 九州全域
    explanation: 九州全域は島津氏・大友氏・龍造寺氏などが争いました。
  - id: d
    text: 関東地方
    explanation: 関東では後北条氏・上杉氏・里見氏などが争いました。
  answer: b
- id: jhs-sh-ms-043
  text: 豊臣秀吉が1587年に九州を統一した後、キリスト教の宣教師に対して発令した命令はどれか。
  choices:
  - id: a
    text: 禁教令
    explanation: 禁教令（1612年）は江戸幕府が発令したキリスト教禁止令です。
  - id: b
    text: バテレン追放令
    explanation: 正解です。1587年に豊臣秀吉はキリスト教宣教師（バテレン）の国外追放を命じるバテレン追放令を発しました。実際には徹底されませんでしたが、宗教政策の転換を示しました。
  - id: c
    text: 鎖国令
    explanation: 鎖国令は江戸幕府（徳川家光の時代）が発令しました。
  - id: d
    text: 南蛮貿易禁止令
    explanation: バテレン追放令は貿易禁止ではなく、宣教師の追放でした。
  answer: b
- id: jhs-sh-ms-044
  text: 南北朝時代に北朝の足利方についた武将で、室町幕府を開いた人物は誰か。
  choices:
  - id: a
    text: 楠木正成
    explanation: 楠木正成は後醍醐天皇（南朝）に忠誠を尽くした武将です。
  - id: b
    text: 足利尊氏
    explanation: 正解です。足利尊氏は後醍醐天皇の建武の新政に反旗を翻し、北朝（光明天皇）を立てて室町幕府を開きました。
  - id: c
    text: 新田義貞
    explanation: 新田義貞は南朝（後醍醐天皇）側の武将で、鎌倉幕府滅亡に貢献しました。
  - id: d
    text: 北条時行
    explanation: 北条時行は鎌倉幕府滅亡後に一時的に鎌倉を奪還した人物です。
  answer: b
- id: jhs-sh-ms-045
  text: 豊臣秀吉が全国支配の正当性を示すために就任した最高の朝廷の官職はどれか。
  choices:
  - id: a
    text: 征夷大将軍
    explanation: 征夷大将軍になれたのは源氏の家系（武家の棟梁）とされ、秀吉は就任できませんでした。
  - id: b
    text: 関白
    explanation: 正解です。豊臣秀吉は1585年に関白に就任し、翌1586年には太政大臣にもなりました。源氏ではなかったため征夷大将軍にはなれず、関白の地位で全国を支配しました。
  - id: c
    text: 摂政
    explanation: 摂政は天皇が幼少や女性のときに代理を務める職で、秀吉は関白を選びました。
  - id: d
    text: 太政大臣
    explanation: 秀吉は太政大臣にもなりましたが、最初についたのは関白です。
  answer: b
- id: jhs-sh-ms-046
  text: 室町時代に琉球王国の交易の中心地となった港はどこか。
  choices:
  - id: a
    text: 博多（福岡県）
    explanation: 博多は九州の貿易港ですが、琉球王国の中心港ではありません。
  - id: b
    text: 那覇（なは）
    explanation: 正解です。那覇港は琉球王国の中心的な港で、中国・日本・東南アジアを結ぶ中継貿易の拠点として繁栄しました。
  - id: c
    text: 薩摩（鹿児島）
    explanation: 薩摩は九州南部の地名で、琉球の中心港ではありません。
  - id: d
    text: 平戸（長崎県）
    explanation: 平戸はポルトガル・オランダの商館が置かれた港です。
  answer: b
- id: jhs-sh-ms-047
  text: 戦国時代に中国地方を「三本の矢」の逸話とともに統一した戦国大名は誰か。
  choices:
  - id: a
    text: 尼子経久
    explanation: 尼子経久は中国地方で活躍した戦国大名ですが、毛利氏に滅ぼされました。
  - id: b
    text: 毛利元就
    explanation: 正解です。毛利元就は安芸（広島県）の小国人から身を起こし、謀略を駆使して中国地方を統一しました。三人の息子に三本の矢を折らせて団結を説いた逸話でも有名です。
  - id: c
    text: 大友宗麟
    explanation: 大友宗麟は九州北部の戦国大名で、キリシタン大名としても知られます。
  - id: d
    text: 長宗我部元親
    explanation: 長宗我部元親は四国を統一した戦国大名です。
  answer: b
- id: jhs-sh-ms-048
  text: 南蛮貿易でポルトガル・スペインが日本に持ち込んだ品物として正しいものはどれか。
  choices:
  - id: a
    text: 絹織物・銅銭・陶磁器
    explanation: これらは中国（明）との勘合貿易で輸入されたものです。
  - id: b
    text: 鉄砲・火薬・生糸・砂糖・ガラス製品
    explanation: 正解です。南蛮貿易ではポルトガル・スペインから鉄砲・火薬・中国産生糸・砂糖・ガラス製品などが輸入されました。
  - id: c
    text: 銀・硫黄・刀剣
    explanation: これらは日本から輸出されたものです。
  - id: d
    text: 米・麦・大豆
    explanation: 米・麦・大豆は南蛮貿易で輸入された品物ではありません。
  answer: b
- id: jhs-sh-ms-049
  text: 応仁の乱後に京都から各地へ逃れた公家・僧が地方文化の普及に貢献した結果、各地に広まったものはどれか。
  choices:
  - id: a
    text: 幕府の支配が強化された
    explanation: 応仁の乱後は幕府の権威が低下しました。
  - id: b
    text: 京都の文化が地方に伝わった
    explanation: 正解です。応仁の乱で公家・文化人が地方に避難したことで、京都の文化（学問・芸能など）が地方の大名・武士に伝わり、地方文化が発展しました。
  - id: c
    text: 農業技術が進歩した
    explanation: 農業技術の進歩は乱の直接の結果ではありません。
  - id: d
    text: 仏教が衰退した
    explanation: 仏教は地方でも発展しており、衰退とはいえません。
  answer: b
- id: jhs-sh-ms-050
  text: 室町時代に発展した、お茶の産地を当てるゲームを何というか。
  choices:
  - id: a
    text: 蹴鞠（けまり）
    explanation: 蹴鞠は平安時代から続く球技です。
  - id: b
    text: 闘茶（とうちゃ）
    explanation: 正解です。闘茶は室町時代に流行した、お茶の産地を飲み当てる賭け遊びで、禅宗文化の広がりとともに茶文化の普及に貢献しました。
  - id: c
    text: 花見（はなみ）
    explanation: 花見は春の行事で、闘茶とは異なります。
  - id: d
    text: 歌合（うたあわせ）
    explanation: 歌合は和歌を詠んで優劣を競う宮廷の遊びです。
  answer: b
- id: jhs-sh-ms-051
  text: 戦国時代に四国を統一したが、豊臣秀吉に降伏した大名は誰か。
  choices:
  - id: a
    text: 島津義久
    explanation: 島津義久は九州（薩摩）の大名で、秀吉に降伏しました。
  - id: b
    text: 長宗我部元親
    explanation: 正解です。長宗我部元親は土佐（高知県）から四国全土を統一しましたが、1585年に秀吉の四国征伐で降伏し、土佐一国のみとなりました。
  - id: c
    text: 毛利輝元
    explanation: 毛利輝元は中国地方の大名で、関ヶ原の戦いで西軍の総大将になりました。
  - id: d
    text: 大友宗麟
    explanation: 大友宗麟は九州北部（豊後）の大名です。
  answer: b
- id: jhs-sh-ms-052
  text: 豊臣秀吉が農民・武士の身分を固定した「兵農分離」政策の具体的な内容として正しいものはどれか。
  choices:
  - id: a
    text: 農民が武士になることを奨励した
    explanation: 兵農分離は逆に農民が武士になることを禁止しました。
  - id: b
    text: 刀狩りで農民から武器を取り上げ、太閤検地で農民を土地に縛り付けた
    explanation: 正解です。刀狩り（農民の武器没収）と太閤検地（農民を土地に登録）により、武士と農民の身分が分離（兵農分離）されました。
  - id: c
    text: 武士が農業を兼ねることを義務付けた
    explanation: 兵農分離は武士が農業を兼ねることを廃止するものです。
  - id: d
    text: 商人が武士になることのみを禁止した
    explanation: 兵農分離は商人だけでなく農民も対象です。
  answer: b
- id: jhs-sh-ms-053
  text: 室町時代に禅宗とともに発達した、砂や石で山水を表現する庭園を何というか。
  choices:
  - id: a
    text: 回遊式庭園
    explanation: 回遊式庭園は池の周りを歩いて楽しむ形式の庭園です。
  - id: b
    text: 枯山水
    explanation: 正解です。枯山水は水を使わず砂や石だけで山・川・海を表現する禅宗庭園の様式で、龍安寺の石庭などが有名です。
  - id: c
    text: 浄土式庭園
    explanation: 浄土式庭園は平安時代の阿弥陀信仰に基づく庭園様式です。
  - id: d
    text: 日本庭園
    explanation: 「日本庭園」は枯山水を含む広い概念です。
  answer: b
- id: jhs-sh-ms-054
  text: 戦国時代に九州北部を支配し、キリスト教に改宗した「キリシタン大名」として有名な人物はどれか。
  choices:
  - id: a
    text: 島津義久
    explanation: 島津義久はキリシタン大名ではありません。
  - id: b
    text: 大友宗麟
    explanation: 正解です。豊後（大分県）の大名・大友宗麟はキリスト教に入信したキリシタン大名で、宣教師を保護しました。
  - id: c
    text: 毛利元就
    explanation: 毛利元就はキリスト教に改宗していません。
  - id: d
    text: 北条氏康
    explanation: 北条氏康はキリシタン大名ではありません。
  answer: b
- id: jhs-sh-ms-055
  text: 豊臣秀吉の死後、1600年の関ヶ原の戦いで西軍（豊臣方）の実質的な指揮をとった人物は誰か。
  choices:
  - id: a
    text: 毛利輝元
    explanation: 毛利輝元は西軍の総大将でしたが、実質的な指揮は石田三成が行いました。
  - id: b
    text: 石田三成
    explanation: 正解です。豊臣秀吉の奉行として仕えた石田三成が西軍を組織し、徳川家康の東軍と関ヶ原で戦いましたが敗れ、処刑されました。
  - id: c
    text: 宇喜多秀家
    explanation: 宇喜多秀家は西軍に属した大名ですが、実質的指揮者は石田三成です。
  - id: d
    text: 小西行長
    explanation: 小西行長は西軍の武将の一人です。
  answer: b
- id: jhs-sh-ms-056
  text: 戦国大名が自分の領国を支配するために独自に定めた法律を何というか。
  choices:
  - id: a
    text: 御成敗式目
    explanation: 御成敗式目は鎌倉幕府が定めた全国向けの武家法です。
  - id: b
    text: 分国法
    explanation: 正解です。分国法は戦国大名が各自の領国内だけで通用する独自の法律で、今川仮名目録・塵芥集・甲州法度之次第などが知られています。
  - id: c
    text: 律令
    explanation: 律令は奈良時代の全国向け法律体系です。
  - id: d
    text: 武家諸法度
    explanation: 武家諸法度は江戸幕府が定めた大名向けの規則です。
  answer: b
- id: jhs-sh-ms-057
  text: 室町時代に広まった、当座の商品代金の支払いを行う金融手段はどれか。
  choices:
  - id: a
    text: 米切手
    explanation: 米切手は江戸時代の大阪堂島米市場で使われた証券です。
  - id: b
    text: 割符
    explanation: 正解です。割符は中世に発達した遠隔地決済のための為替手形で、現金を運ぶリスクなく遠隔地との取引ができました。
  - id: c
    text: 藩札
    explanation: 藩札は江戸時代に各藩が発行した紙幣です。
  - id: d
    text: 国債
    explanation: 国債は近代国家が発行する国の借用証書です。
  answer: b
- id: jhs-sh-ms-058
  text: 室町幕府が衰退した大きな原因として正しいものはどれか。
  choices:
  - id: a
    text: 外国の侵略を受けたため
    explanation: 室町幕府衰退期に外国の侵略はありませんでした。
  - id: b
    text: 将軍の権威が弱く、守護大名の力が強すぎたため
    explanation: 正解です。室町幕府は守護大名への依存が強く、将軍の権威が安定しませんでした。応仁の乱を経て将軍の権威は完全に失われ、下剋上の時代となりました。
  - id: c
    text: 農民一揆で幕府の財政が破綻したため
    explanation: 農民一揆は幕府への打撃の一因でしたが、主な原因は守護大名の自立化です。
  - id: d
    text: 天皇が幕府を廃止したため
    explanation: 天皇が室町幕府を廃止したのではなく、内部から崩壊しました。
  answer: b
- id: jhs-sh-ms-059
  text: 安土桃山時代に秀吉がキリスト教を警戒した理由として最も適切なものはどれか。
  choices:
  - id: a
    text: キリスト教が仏教を排斥していたため
    explanation: これも要因の一つですが、秀吉の最大の警戒理由ではありません。
  - id: b
    text: 宣教師が日本人を奴隷として海外に売ったり、宗教的忠誠心が封建的支配を乱すと感じたため
    explanation: 正解です。秀吉はキリスト教信者が宗教的主君に忠誠を誓うことで封建制度を乱すこと、また宣教師が日本人の奴隷売買に関与していることを警戒しました。
  - id: c
    text: キリスト教の信者が税を払わなかったため
    explanation: 税の不払いが主な理由ではありません。
  - id: d
    text: ポルトガルとの貿易を断ちたかったため
    explanation: 秀吉はバテレン追放令後も南蛮貿易は継続させました。
  answer: b
- id: jhs-sh-ms-060
  text: 室町時代の「下剋上（げこくじょう）」とはどのような現象か。
  choices:
  - id: a
    text: 農民が商人になること
    explanation: 農民の商人への転身は下剋上の本来の意味ではありません。
  - id: b
    text: 身分の低い者が実力で上の者を倒し、権力を握ること
    explanation: 正解です。下剋上は下位の者が上位の者を実力で打倒して台頭する現象で、守護代が守護を、家臣が主君を倒す事例が多発した戦国時代の特徴です。
  - id: c
    text: 天皇が将軍を廃位すること
    explanation: 下剋上は天皇による廃位ではありません。
  - id: d
    text: 農民が武士の土地を奪うこと
    explanation: 農民が武士を倒すケースもありますが、下剋上は主に武士同士の関係で使われます。
  answer: b
- id: jhs-sh-ms-061
  text: 戦国時代に東海地方最大の勢力を誇り、桶狭間の戦いで織田信長に討たれた大名は誰か。
  choices:
  - id: a
    text: 武田信玄
    explanation: 武田信玄は甲斐（山梨県）の大名です。
  - id: b
    text: 今川義元
    explanation: 正解です。今川義元は駿河・遠江・三河を支配する東海地方最大の大名でしたが、1560年の桶狭間の戦いで織田信長に奇襲され討ち取られました。
  - id: c
    text: 上杉謙信
    explanation: 上杉謙信は越後（新潟県）の大名です。
  - id: d
    text: 北条氏康
    explanation: 北条氏康は相模（神奈川県）・武蔵（東京・埼玉）を支配した大名です。
  answer: b
- id: jhs-sh-ms-062
  text: 室町時代に「一休さん」として知られる禅僧の正式な名前はどれか。
  choices:
  - id: a
    text: 道元
    explanation: 道元は曹洞宗を伝えた鎌倉時代の僧です。
  - id: b
    text: 一休宗純
    explanation: 正解です。一休宗純は室町時代の臨済宗の禅僧で、奇行や逸話で知られ、アニメ「一休さん」のモデルとなりました。
  - id: c
    text: 栄西
    explanation: 栄西は鎌倉時代に臨済宗を伝えた僧です。
  - id: d
    text: 日蓮
    explanation: 日蓮は鎌倉時代に日蓮宗を開いた僧です。
  answer: b
- id: jhs-sh-ms-063
  text: 1615年に豊臣家が滅んだ戦いはどれか。
  choices:
  - id: a
    text: 関ヶ原の戦い
    explanation: 関ヶ原の戦い（1600年）は徳川家康が天下を決した戦いですが、豊臣家はまだ滅んでいません。
  - id: b
    text: 大坂の陣
    explanation: 正解です。1614年の大坂冬の陣・1615年の大坂夏の陣で豊臣家は徳川家に滅ぼされ、豊臣秀頼と母の淀殿は自害しました。
  - id: c
    text: 長篠の戦い
    explanation: 長篠の戦いは1575年の出来事です。
  - id: d
    text: 桶狭間の戦い
    explanation: 桶狭間の戦いは1560年の出来事です。
  answer: b
- id: jhs-sh-ms-064
  text: 室町時代に明との貿易（勘合貿易）を実質的に独占した大名家はどれか。
  choices:
  - id: a
    text: 上杉氏
    explanation: 上杉氏は越後の大名で、日明貿易を独占していません。
  - id: b
    text: 大内氏・細川氏
    explanation: 正解です。日明貿易（勘合貿易）は主に大内氏（山口）と細川氏（京都）が争いながら独占し、1523年には寧波（中国）での争いに発展しました（寧波の乱）。
  - id: c
    text: 島津氏
    explanation: 島津氏は薩摩（鹿児島）の大名で、琉球との交易を担いました。
  - id: d
    text: 毛利氏
    explanation: 毛利氏が台頭するのは戦国時代で、勘合貿易の独占期とは時期が異なります。
  answer: b
- id: jhs-sh-ms-065
  text: 戦国時代に甲相駿三国同盟として知られる、武田・北条・今川の三者が結んだ関係はどれか。
  choices:
  - id: a
    text: 三者が連合して織田信長に対抗するための同盟
    explanation: 甲相駿三国同盟は信長への対抗ではなく、三者間の平和のための取り決めです。
  - id: b
    text: 三者が互いに不可侵・婚姻関係を結んで東国を安定させた同盟
    explanation: 正解です。1554年頃に甲斐（武田）・相模（北条）・駿河（今川）の三国が婚姻関係・不可侵条約を結び、互いの領土を侵さないことを約束した同盟です。
  - id: c
    text: 三者が協力して上杉謙信を挟撃するための同盟
    explanation: 三国同盟の主目的は上杉謙信への対抗ではなく、三者間の安定化でした。
  - id: d
    text: 三者が協力して室町幕府を滅ぼすための同盟
    explanation: 室町幕府滅亡を目的とした同盟ではありません。
  answer: b
- id: jhs-sh-ms-066
  text: 戦国時代に鉄砲の伝来が戦術に与えた変化として正しいものはどれか。
  choices:
  - id: a
    text: 騎馬隊の戦術がさらに強化された
    explanation: 鉄砲の普及により、騎馬隊の優位性は相対的に低下しました。
  - id: b
    text: 足軽による一斉射撃戦術が生まれ、騎馬隊中心の戦術が変化した
    explanation: 正解です。鉄砲の普及により足軽による鉄砲隊が編成され、1575年の長篠の戦いで織田信長が三段撃ちで武田の騎馬隊を撃破したことで、戦術の大きな転換が起きました。
  - id: c
    text: 戦の規模が縮小された
    explanation: 鉄砲の普及で戦の規模はむしろ拡大しました。
  - id: d
    text: 城の攻防戦がなくなった
    explanation: 城の攻防戦は続きましたが、鉄砲対応の城構造（石垣など）が発達しました。
  answer: b
- id: jhs-sh-ms-067
  text: 室町時代に発達した、農村での民衆の踊りが起源の芸能で、盆踊りの原点ともいわれるものはどれか。
  choices:
  - id: a
    text: 歌舞伎
    explanation: 歌舞伎は江戸時代に出雲阿国が始めた芸能です。
  - id: b
    text: 風流踊り（ふりゅうおどり）
    explanation: 正解です。室町時代に民間で広まった風流踊りは、念仏踊りや田楽などとともに農村の祭礼で踊られ、盆踊りの起源ともされています。
  - id: c
    text: 神楽（かぐら）
    explanation: 神楽は神社での神事に関わる舞楽で、古くからあります。
  - id: d
    text: 雅楽（ががく）
    explanation: 雅楽は宮廷で演じられた古典音楽・舞楽です。
  answer: b
- id: jhs-sh-ms-068
  text: 豊臣秀吉が検地を行った際に使った、土地の収穫量を表す単位はどれか。
  choices:
  - id: a
    text: 坪（つぼ）
    explanation: 坪は面積の単位です。
  - id: b
    text: 石（こく）
    explanation: 正解です。太閤検地では田畑の収穫量を石（1石＝約150kg）という単位で表しました（石高制）。これにより全国の土地の生産性が統一的に把握できるようになりました。
  - id: c
    text: 貫（かん）
    explanation: 貫は銭の単位（1貫文＝1000文）です。
  - id: d
    text: 反（たん）
    explanation: 反は面積の単位で、検地でも使われましたが収穫量を表す単位は石です。
  answer: b
- id: jhs-sh-ms-069
  text: 「人は城、人は石垣、人は堀」という言葉で知られる戦国武将は誰か。
  choices:
  - id: a
    text: 織田信長
    explanation: この言葉は信長の言葉ではありません。
  - id: b
    text: 武田信玄
    explanation: 正解です。「人は城、人は石垣、人は堀、情けは味方、仇は敵なり」は武田信玄の言葉とされ、城よりも人（家臣・民）を大切にするという思想を示しています。
  - id: c
    text: 豊臣秀吉
    explanation: この言葉は秀吉の言葉ではありません。
  - id: d
    text: 上杉謙信
    explanation: この言葉は謙信の言葉ではありません。
  answer: b
- id: jhs-sh-ms-070
  text: 室町時代に将軍の御所の番衛をし、後に有力な軍事力を持った役職はどれか。
  choices:
  - id: a
    text: 管領
    explanation: 管領は幕府政治の補佐役です。
  - id: b
    text: 奉公衆
    explanation: 正解です。奉公衆は室町将軍の直属の軍事力で、将軍の護衛・御所の警護を担い、幕府の直轄軍としての役割を果たしました。
  - id: c
    text: 守護代
    explanation: 守護代は守護の代理を務める役職です。
  - id: d
    text: 地頭
    explanation: 地頭は鎌倉幕府が設置した農地管理の役人です。
  answer: b
- id: jhs-sh-ms-071
  text: 戦国時代の大名・上杉謙信が私財を投じて行ったことで知られる活動はどれか。
  choices:
  - id: a
    text: 大規模な城郭の建設
    explanation: 謙信の城（春日山城）は山城で、大規模な石垣建築ではありません。
  - id: b
    text: 関東の武将への支援と敵の武田信玄への塩の送付
    explanation: 正解です。上杉謙信は私欲のない「義の人」として知られ、海のない武田に今川が塩の輸送を禁じた際に「敵に塩を送る」逸話でも有名です。
  - id: c
    text: 南蛮との貿易の独占
    explanation: 上杉謙信は日本海側の大名で南蛮貿易は直接関係がありません。
  - id: d
    text: 鉄砲の大量生産
    explanation: 鉄砲の大量生産は主に和泉（大阪府）の堺が担いました。
  answer: b
- id: jhs-sh-ms-072
  text: 戦国時代に堺（大阪府）の商人が独自の自治を行った組織を何というか。
  choices:
  - id: a
    text: 惣（そう）
    explanation: 惣は農村の自治組織です。
  - id: b
    text: 会合衆（えごうしゅう）
    explanation: 正解です。堺では有力な商人で構成される会合衆が自治を行い、鉄砲の生産・貿易で栄えました。「東洋のベニス」と呼ばれることもあります。
  - id: c
    text: 座（ざ）
    explanation: 座は同業者組合です。
  - id: d
    text: 株仲間
    explanation: 株仲間は江戸時代の商工業者の組合です。
  answer: b
- id: jhs-sh-ms-073
  text: 豊臣秀吉が武士・農民・商人・職人の身分を調べ、帳簿に登録した調査を何というか。
  choices:
  - id: a
    text: 国勢調査
    explanation: 国勢調査は近代の人口調査です。
  - id: b
    text: 人掃令・身分統制令
    explanation: 正解です。豊臣秀吉は1591年に人掃令を出し、武士・農民・商人・職人の身分を固定して移動を制限する身分統制を行いました。
  - id: c
    text: 太閤検地
    explanation: 太閤検地は土地（田畑）の調査です。人の調査ではありません。
  - id: d
    text: 宗門人別帳
    explanation: 宗門人別帳は江戸時代にキリシタンでないことを証明するための帳簿です。
  answer: b
- id: jhs-sh-ms-074
  text: 安土桃山時代の文化の特徴として正しいものはどれか。
  choices:
  - id: a
    text: わびさびを重視した簡素な美意識
    explanation: わびさびは東山文化（室町時代後期）の美意識です。
  - id: b
    text: 金箔を多用した豪華絢爛で雄大な美術・建築
    explanation: 正解です。桃山文化は新興の武将や豪商の力強さを示す豪華な美術（狩野永徳の障壁画、金碧障壁画など）と建築（安土城・大阪城などの壮大な城郭）が特徴です。
  - id: c
    text: 宮廷貴族による雅な文化
    explanation: 宮廷貴族の雅な文化は平安時代の特徴です。
  - id: d
    text: 庶民が担った町人文化
    explanation: 庶民・町人が担う文化は江戸時代の元禄・化政文化の特徴です。
  answer: b
- id: jhs-sh-ms-075
  text: 1598年に豊臣秀吉が死去した後、朝鮮に出兵していた日本軍はどうなったか。
  choices:
  - id: a
    text: 引き続き朝鮮支配を続けた
    explanation: 秀吉の死後、日本軍は撤退しました。
  - id: b
    text: 五大老の命により朝鮮から全軍撤退した
    explanation: 正解です。秀吉の死後、徳川家康ら五大老の命令により、慶長の役で出兵していた日本軍は朝鮮から全軍撤退しました。
  - id: c
    text: 朝鮮に永住した
    explanation: 秀吉の死後、日本軍は撤退しており、永住は事実ではありません。
  - id: d
    text: 明（中国）に攻め込んだ
    explanation: 明への攻撃は実現せず、秀吉の死後に撤退しました。
  answer: b
- id: jhs-sh-ms-076
  text: 室町時代に禅宗の影響を受けて発展した、生け花の源流となる芸術はどれか。
  choices:
  - id: a
    text: 書道（しょどう）
    explanation: 書道は文字を筆で書く芸術です。
  - id: b
    text: 立花（たてばな）・いけばな
    explanation: 正解です。室町時代に仏前に花を供える行為が芸術化し、立花（たてばな）として発展しました。これが生け花（華道）の源流となりました。
  - id: c
    text: 盆栽（ぼんさい）
    explanation: 盆栽は鉢植えで植物を育てる芸術で、生け花とは別です。
  - id: d
    text: 俳諧（はいかい）
    explanation: 俳諧は和歌から発展した詩の一形式です。
  answer: b
- id: jhs-sh-ms-077
  text: 戦国時代に西日本を中心に活動した海の武装集団を何というか。
  choices:
  - id: a
    text: 倭寇（わこう）
    explanation: 倭寇は日本の海賊で主に朝鮮・中国沿岸を荒らしましたが、国内では水軍として活動した集団を指します。
  - id: b
    text: 水軍（すいぐん）
    explanation: 正解です。戦国時代に瀬戸内海や各地の海を支配した武装集団を水軍（海賊衆）といい、村上水軍・九鬼水軍などが有名です。海上輸送の要を握りました。
  - id: c
    text: 忍者（にんじゃ）
    explanation: 忍者は陸上で活動した諜報・暗殺の専門家です。
  - id: d
    text: 傭兵（ようへい）
    explanation: 傭兵は金銭で雇われた兵士の総称です。
  answer: b
- id: jhs-sh-ms-078
  text: 足利義政の時代に応仁の乱が起きたが、その直接のきっかけは何だったか。
  choices:
  - id: a
    text: 天皇が幕府に反旗を翻したため
    explanation: 天皇が幕府に反旗を翻したのが応仁の乱のきっかけではありません。
  - id: b
    text: 8代将軍義政の後継者問題と守護大名の争い
    explanation: 正解です。将軍義政の後継者問題をめぐって細川勝元（東軍）と山名宗全（西軍）の守護大名が対立し、1467年に応仁の乱が勃発しました。
  - id: c
    text: 農民が大規模な武装蜂起をしたため
    explanation: 農民の武装蜂起が応仁の乱のきっかけではありません。
  - id: d
    text: 外国が日本に侵攻したため
    explanation: 外国の侵攻は応仁の乱と関係ありません。
  answer: b
- id: jhs-sh-ms-079
  text: 豊臣秀吉の後見人として秀頼を補佐するために設置された五人の有力大名の合議制はどれか。
  choices:
  - id: a
    text: 評定衆
    explanation: 評定衆は鎌倉幕府の合議機関です。
  - id: b
    text: 五大老
    explanation: 正解です。秀吉は死の直前に徳川家康・前田利家・毛利輝元・宇喜多秀家・上杉景勝の五大老を定め、秀頼の後見を命じました。
  - id: c
    text: 五奉行
    explanation: 五奉行は石田三成らが務めた政務担当の五人の奉行です。五大老とは別です。
  - id: d
    text: 三家・三卿
    explanation: 三家・三卿は江戸幕府の徳川一族の家格です。
  answer: b
- id: jhs-sh-ms-080
  text: 室町時代に「御伽草子（おとぎぞうし）」として広まった文学の特徴はどれか。
  choices:
  - id: a
    text: 漢文で書かれた詩・文章集
    explanation: 御伽草子は漢文ではなく、平易な仮名文字で書かれました。
  - id: b
    text: 庶民向けの短い絵入り物語
    explanation: 正解です。御伽草子は室町時代から江戸初期にかけて広まった、絵を添えた短い物語集で、「一寸法師」「浦島太郎」「ものくさ太郎」など庶民向けの内容が多いです。
  - id: c
    text: 武士の合戦を描いた長編軍記物語
    explanation: 軍記物語は平家物語・太平記などで、御伽草子とは異なります。
  - id: d
    text: 天皇・貴族の日記や随筆
    explanation: 天皇・貴族の日記は宮廷文学で、御伽草子とは性格が異なります。
  answer: b
- id: jhs-sh-ms-081
  text: 戦国時代に鉄砲の国産化に貢献した、紀伊国（和歌山県）の鍛冶師はどれか。
  choices:
  - id: a
    text: 種子島時堯
    explanation: 種子島時堯は鉄砲が伝来した島の領主で、国産化を命じた人物です。
  - id: b
    text: 芝辻理右衛門
    explanation: 正解です。堺の鍛冶師・芝辻理右衛門などが鉄砲の国産化に成功し、日本各地に鉄砲製造技術が広まりました。
  - id: c
    text: 今井宗久
    explanation: 今井宗久は堺の豪商・茶人で、織田信長に仕えました。
  - id: d
    text: 千利休
    explanation: 千利休は茶の湯を大成した人物で、鍛冶師ではありません。
  answer: b
- id: jhs-sh-ms-082
  text: 室町時代に「狂言（きょうげん）」が発展したが、狂言の特徴として正しいものはどれか。
  choices:
  - id: a
    text: 仮面を用いた荘厳な歌舞劇
    explanation: 仮面を用いた荘厳な歌舞劇は能の特徴です。
  - id: b
    text: 能の合間に演じられる、庶民的なユーモアある会話劇
    explanation: 正解です。狂言は能の間に演じられる笑いの芸能で、仮面を使わず、日常的な言葉で庶民の生活を題材にしたユーモラスな会話劇です。
  - id: c
    text: 三味線を伴奏にした人形劇
    explanation: 三味線伴奏の人形劇は浄瑠璃・文楽（江戸時代）です。
  - id: d
    text: 女性だけが演じる舞踊
    explanation: 女性だけが演じる舞踊は、江戸時代の歌舞伎が男性だけになる前の出雲阿国の芸能です。
  answer: b
- id: jhs-sh-ms-083
  text: 室町時代から戦国時代にかけて、日本近海で活動した日本人・中国人混合の海賊集団を何というか。
  choices:
  - id: a
    text: 水軍
    explanation: 水軍は日本国内の武装船団です。
  - id: b
    text: 倭寇（わこう）
    explanation: 正解です。倭寇は14〜16世紀に朝鮮・中国沿岸を荒らした海賊集団で、前期は日本人中心、後期は中国人が多数を占めました。
  - id: c
    text: 南蛮人
    explanation: 南蛮人はポルトガル・スペインなどの西洋人を指します。
  - id: d
    text: 唐人（とうじん）
    explanation: 唐人は中国人の呼称です。
  answer: b
- id: jhs-sh-ms-084
  text: 豊臣秀吉が行った検地（太閤検地）以前の、荘園制度の特徴として正しいものはどれか。
  choices:
  - id: a
    text: 一つの土地に一人だけが権利を持つ一地一主の制度
    explanation: 一地一主は太閤検地によって実現した制度です。
  - id: b
    text: 一つの土地に複数の人物が重複して権利を持つ
    explanation: 正解です。荘園制度では同一の土地に本家・領家・地頭・荘官など複数の権利が重複して存在し、誰が実際の支配者か複雑でした。太閤検地はこれを一元化しました。
  - id: c
    text: 農民が土地を完全に所有していた
    explanation: 農民が土地を完全所有できるようになるのは明治時代の地租改正以降です。
  - id: d
    text: 幕府だけが全ての土地を管理していた
    explanation: 室町時代に幕府が全土地を管理していたわけではありません。
  answer: b
- id: jhs-sh-ms-085
  text: 戦国時代に東北地方で一大勢力を築いた「独眼竜」と称された武将は誰か。
  choices:
  - id: a
    text: 最上義光
    explanation: 最上義光は出羽（山形県）の戦国大名です。
  - id: b
    text: 伊達政宗
    explanation: 正解です。伊達政宗は陸奥・出羽を支配した仙台藩の初代藩主で、幼少期に右目を失ったことから「独眼竜」と称されました。
  - id: c
    text: 上杉景勝
    explanation: 上杉景勝は越後（新潟県）から米沢（山形県）に移封された大名です。
  - id: d
    text: 南部信直
    explanation: 南部信直は陸奥北部（岩手県）の大名です。
  answer: b
- id: jhs-sh-ms-086
  text: 豊臣秀吉が明（中国）に侵攻しようとした際、朝鮮に求めた協力はどれか。
  choices:
  - id: a
    text: 財政支援
    explanation: 財政支援ではなく、明への道案内（通路の提供）を求めました。
  - id: b
    text: 明への道案内・通路の提供
    explanation: 正解です。秀吉は朝鮮に「仮道入明」（明へ行くために道を貸してほしい）と要求しましたが朝鮮が拒否したため、朝鮮に侵攻しました。
  - id: c
    text: 朝鮮が日本の属国になること
    explanation: 属国化が直接の要求ではなく、明への道案内が要求でした。
  - id: d
    text: 朝鮮の貿易独占権を日本に譲ること
    explanation: 貿易独占権の譲渡は秀吉の朝鮮侵攻の要求ではありません。
  answer: b
- id: jhs-sh-ms-087
  text: 室町時代に商業の発達とともに普及した、中国から輸入された貨幣はどれか。
  choices:
  - id: a
    text: 和同開珎
    explanation: 和同開珎は奈良時代（708年）に日本で作られた銅銭です。
  - id: b
    text: 永楽通宝・洪武通宝などの渡来銭
    explanation: 正解です。室町時代には日本独自の貨幣がなかったため、中国（明）から輸入した永楽通宝・洪武通宝などの銅銭（渡来銭）が全国で流通しました。
  - id: c
    text: 慶長小判
    explanation: 慶長小判は江戸時代（1601年）に徳川家康が作らせた金貨です。
  - id: d
    text: 寛永通宝
    explanation: 寛永通宝は江戸時代に作られた日本の銅銭です。
  answer: b
- id: jhs-sh-ms-088
  text: 戦国時代に「信長の野望」ともいわれる全国統一を目指す中で、比叡山延暦寺を焼き討ちした人物は誰か。
  choices:
  - id: a
    text: 豊臣秀吉
    explanation: 比叡山焼き討ちは秀吉ではなく信長が行いました。
  - id: b
    text: 織田信長
    explanation: 正解です。1571年に織田信長は敵対する浅井・朝倉両氏を支援し、抵抗した比叡山延暦寺を焼き討ちにしました。これは権威への挑戦として衝撃を与えました。
  - id: c
    text: 徳川家康
    explanation: 比叡山焼き討ちは家康ではなく信長が行いました。
  - id: d
    text: 明智光秀
    explanation: 明智光秀は信長の命令で比叡山焼き討ちに参加した武将の一人です。
  answer: b
- id: jhs-sh-ms-089
  text: 足利義満が金閣寺を建てたことで示したかったことはどれか。
  choices:
  - id: a
    text: 仏教の教えを広めること
    explanation: 金閣寺は仏教の普及が主目的ではありませんでした。
  - id: b
    text: 武家・公家・禅宗の文化を融合した自らの権力の絶頂を示すこと
    explanation: 正解です。金閣の一層（貴族風）・二層（武家風）・三層（禅宗風）の建築は、義満が武士・貴族・宗教すべてを統合する権力者であることを示すものです。
  - id: c
    text: 中国（明）の皇帝に匹敵する建物を作ること
    explanation: 明への対抗心が主目的ではありません。
  - id: d
    text: 幕府の財政力を民衆に示すこと
    explanation: 民衆への財政力誇示が主目的ではありません。
  answer: b
- id: jhs-sh-ms-090
  text: 室町時代に守護大名が力をつけた主な理由はどれか。
  choices:
  - id: a
    text: 守護大名が独自に軍隊を組織することを幕府が禁じていたが無視されたため
    explanation: 禁止規定が無視されたというより、むしろ幕府が守護大名の権限拡大を認めていきました。
  - id: b
    text: 幕府が守護に土地の管理・軍事・警察権限を次々と与えたため
    explanation: 正解です。室町幕府は守護に刈田狼藉の取り締まり・使節遵行など次第に多くの権限を与えていき（守護請など）、守護大名として大きな権限を持つようになりました。
  - id: c
    text: 守護が農業技術を向上させて豊かになったため
    explanation: 農業技術向上が守護の力の源泉ではありません。
  - id: d
    text: 守護が天皇から直接土地を与えられたため
    explanation: 守護は幕府から任命されており、天皇から直接土地を与えられたわけではありません。
  answer: b
- id: jhs-sh-ms-091
  text: 安土桃山時代にキリシタン大名が1582年にローマ教皇のもとに送った少年使節はどれか。
  choices:
  - id: a
    text: 遣唐使
    explanation: 遣唐使は奈良・平安時代に唐（中国）に派遣された使節です。
  - id: b
    text: 天正遣欧少年使節
    explanation: 正解です。1582年に大友・有馬・大村の三キリシタン大名がローマ教皇に派遣した少年使節で、伊東マンショら4名の少年がヨーロッパを訪問しました。
  - id: c
    text: 岩倉使節団
    explanation: 岩倉使節団は明治時代（1871〜73年）の外交使節団です。
  - id: d
    text: バテレン追放使節
    explanation: そのような使節は存在しません。
  answer: b
- id: jhs-sh-ms-092
  text: 豊臣秀吉が行った身分統制で、武士・農民・商人・職人が他の身分に移動することを禁じた政策はどれか。
  choices:
  - id: a
    text: 刀狩り令
    explanation: 刀狩り令は農民から武器を没収する政策で、身分移動の禁止ではありません。
  - id: b
    text: 身分統制令
    explanation: 正解です。1591年の人掃令（身分統制令）により、武士は農業・商工業を、農民は他国への移住・商工業への転業を、商人・職人は農業を原則として禁じ、身分が固定されました。
  - id: c
    text: 禁教令
    explanation: 禁教令はキリスト教を禁止する法令です。
  - id: d
    text: 太閤検地
    explanation: 太閤検地は土地の調査であり、身分統制令とは別です。
  answer: b
- id: jhs-sh-ms-093
  text: 室町時代に発達した金融業者で、抵当を取って金銭を貸し付けた業者を何というか。
  choices:
  - id: a
    text: 問丸
    explanation: 問丸は流通・輸送業者です。
  - id: b
    text: 土倉
    explanation: 正解です。土倉は室町時代に発達した質屋兼高利貸しで、物品を担保（抵当）に取って金銭を貸し付けました。幕府や寺社に税を納める見返りに営業を許可されました。
  - id: c
    text: 馬借
    explanation: 馬借は馬で物を運ぶ運送業者です。
  - id: d
    text: 惣百姓
    explanation: 惣百姓は惣村の農民の総称です。
  answer: b
- id: jhs-sh-ms-094
  text: 1582年に明智光秀が本能寺で信長を討った後、素早く引き返して光秀を滅ぼした戦いはどれか。
  choices:
  - id: a
    text: 長篠の戦い
    explanation: 長篠の戦いは1575年の出来事です。
  - id: b
    text: 山崎の戦い
    explanation: 正解です。本能寺の変後、中国攻めの最中だった豊臣秀吉は大急ぎで引き返し（中国大返し）、山崎の戦いで明智光秀を破りました。
  - id: c
    text: 賤ヶ岳の戦い
    explanation: 賤ヶ岳の戦いは1583年に秀吉と柴田勝家が戦った合戦です。
  - id: d
    text: 小牧・長久手の戦い
    explanation: 小牧・長久手の戦いは1584年に秀吉と徳川家康が戦った合戦です。
  answer: b
- id: jhs-sh-ms-095
  text: 室町幕府の管領職を担った「三管領」とはどの家か。
  choices:
  - id: a
    text: 北条・上杉・今川
    explanation: これらは鎌倉・戦国時代の有力大名ですが、三管領ではありません。
  - id: b
    text: 細川・斯波・畠山
    explanation: 正解です。室町幕府の管領職には細川・斯波・畠山の三家が交代で就任しました（三管領）。
  - id: c
    text: 大内・山名・赤松
    explanation: 大内・山名・赤松は有力守護大名ですが、三管領ではありません。
  - id: d
    text: 武田・島津・毛利
    explanation: 武田・島津・毛利は戦国大名で、三管領ではありません。
  answer: b
- id: jhs-sh-ms-096
  text: 戦国時代の大名が家臣を支配するために採用した知行制度について正しいものはどれか。
  choices:
  - id: a
    text: 家臣に現金（銭）で給料を払った
    explanation: 戦国時代の主な知行形式は土地給付でした。
  - id: b
    text: 土地（知行地）を与えて、そこからの年貢で生活させた
    explanation: 正解です。戦国大名は家臣に知行地（領地）を与え、農民から年貢を徴収して生活させる地方知行制を採用していました。
  - id: c
    text: 家臣全員を城下に住まわせて農業に従事させた
    explanation: 兵農分離は豊臣秀吉の時代に進んだもので、それ以前は農村に住む国人領主も多くいました。
  - id: d
    text: 家臣に役職の俸禄のみを与えた
    explanation: 蔵米知行（米で支給）は江戸時代に普及した制度です。
  answer: b
- id: jhs-sh-ms-097
  text: 安土桃山時代の絵師で、信長・秀吉に仕えて豪壮な障壁画を描いた人物は誰か。
  choices:
  - id: a
    text: 雪舟
    explanation: 雪舟は室町時代の水墨画家です。
  - id: b
    text: 狩野永徳
    explanation: 正解です。狩野永徳は安土桃山時代の絵師で、金碧（きんぺき）の豪壮な障壁画（唐獅子図屏風など）を描き、桃山文化を代表しました。
  - id: c
    text: 俵屋宗達
    explanation: 俵屋宗達は江戸時代初期の絵師で、琳派の祖です。
  - id: d
    text: 長谷川等伯
    explanation: 長谷川等伯は安土桃山時代の絵師で、水墨画「松林図屏風」が有名です。
  answer: b
- id: jhs-sh-ms-098
  text: 室町時代に明との貿易を始めた当初の目的として最も正しいものはどれか。
  choices:
  - id: a
    text: 日本の文化・芸術を中国に広めるため
    explanation: 文化輸出が主目的ではありませんでした。
  - id: b
    text: 財政収入を得るとともに日本が明の権威を認め、倭寇取り締まりに協力するため
    explanation: 正解です。足利義満は明の冊封体制に入り「日本国王」として認められ、貿易利益と明の権威を国内支配に活用しました。また倭寇取り締まりも義務として負いました。
  - id: c
    text: 軍事同盟を結ぶため
    explanation: 日明貿易は軍事同盟を目的としていませんでした。
  - id: d
    text: 仏教の経典を輸入するため
    explanation: 仏教経典の輸入が目的ではありませんでした。
  answer: b
- id: jhs-sh-ms-099
  text: 戦国時代の武将・北条早雲（伊勢宗瑞）が果たした歴史的役割として正しいものはどれか。
  choices:
  - id: a
    text: 室町幕府を倒した武将
    explanation: 北条早雲は室町幕府を倒したのではなく、下剋上によって伊豆・相模を奪取しました。
  - id: b
    text: 下剋上の先駆けとして、実力で伊豆・相模を奪取した戦国大名の先駆者
    explanation: 正解です。北条早雲（後北条氏初代）は15世紀末に伊豆・相模を奪取し、下剋上の先駆けとして後の戦国時代を先取りした存在とされています。
  - id: c
    text: 鎌倉幕府の北条氏の子孫
    explanation: 後北条氏（小田原北条氏）は鎌倉幕府の北条氏とは別の家系です。
  - id: d
    text: 室町幕府の初代将軍
    explanation: 室町幕府の初代将軍は足利尊氏です。
  answer: b
- id: jhs-sh-ms-100
  text: 豊臣秀吉が1590年に小田原の北条氏政・氏直を攻め降し達成したことはどれか。
  choices:
  - id: a
    text: 四国の統一
    explanation: 四国統一は1585年の四国征伐で達成しました。
  - id: b
    text: 天下統一
    explanation: 正解です。1590年の小田原攻めで後北条氏を滅ぼし、続いて奥羽の大名を服属させたことで、豊臣秀吉による全国統一が完成しました。
  - id: c
    text: 九州の統一
    explanation: 九州征伐は1587年に行われました。
  - id: d
    text: 朝鮮の征服
    explanation: 朝鮮の征服は秀吉の目標でしたが、実現しませんでした。
  answer: b
