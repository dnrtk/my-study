questions:
  - id: "jhs-sh-an-001"
    text: "聖徳太子（厩戸王）が推古天皇の摂政として行った政策として正しいものはどれか。"
    choices:
      - id: "a"
        text: "武士を中心とした政治を始めた"
        explanation: "武士が政治の中心になるのは平安時代末期〜鎌倉時代以降です。"
      - id: "b"
        text: "冠位十二階と十七条憲法を定めた"
        explanation: "正解です。聖徳太子は冠位十二階（能力による人材登用）と十七条憲法（役人の心得）を定めました。"
      - id: "c"
        text: "大宝律令を制定して法律を整備した"
        explanation: "大宝律令は701年に文武天皇の時代に制定されました。"
      - id: "d"
        text: "参勤交代の制度を作った"
        explanation: "参勤交代は江戸時代（1635年）に徳川家光が定めた制度です。"
    answer: "b"

  - id: "jhs-sh-an-002"
    text: "645年に中大兄皇子と中臣鎌足が蘇我氏を倒して始めた政治改革を何というか。"
    choices:
      - id: "a"
        text: "享保の改革"
        explanation: "享保の改革は江戸時代中期に徳川吉宗が行った改革です。"
      - id: "b"
        text: "大化の改新"
        explanation: "正解です。645年に中大兄皇子と中臣鎌足が蘇我入鹿を倒し、大化の改新と呼ばれる政治改革が始まりました。"
      - id: "c"
        text: "明治維新"
        explanation: "明治維新は1868年の出来事です。"
      - id: "d"
        text: "建武の新政"
        explanation: "建武の新政は1333年に後醍醐天皇が行った政治です。"
    answer: "b"

  - id: "jhs-sh-an-003"
    text: "大化の改新で目指された政治の形として正しいものはどれか。"
    choices:
      - id: "a"
        text: "将軍を中心とした武家政治"
        explanation: "武家政治は鎌倉幕府以降のものです。"
      - id: "b"
        text: "天皇を中心とした中央集権国家"
        explanation: "正解です。大化の改新では、豪族が私有していた土地・人民を国家のものとし（公地公民）、天皇中心の中央集権国家を目指しました。"
      - id: "c"
        text: "貴族による摂関政治"
        explanation: "摂関政治が最盛期を迎えるのは平安時代（藤原道長の頃）です。"
      - id: "d"
        text: "武士と農民が平等な社会"
        explanation: "武士と農民の平等社会は目指されていませんでした。"
    answer: "b"

  - id: "jhs-sh-an-004"
    text: "聖徳太子が遣隋使として派遣した人物は誰か。"
    choices:
      - id: "a"
        text: "阿倍仲麻呂"
        explanation: "阿倍仲麻呂は遣唐使として唐に渡った奈良時代の人物です。"
      - id: "b"
        text: "小野妹子（おののいもこ）"
        explanation: "正解です。607年に小野妹子が遣隋使として派遣されました。持参した国書には「日出ずる処の天子、日没する処の天子に書を致す」とありました。"
      - id: "c"
        text: "鑑真（がんじん）"
        explanation: "鑑真は唐から日本に渡来した僧で、奈良時代の人物です。"
      - id: "d"
        text: "菅原道真"
        explanation: "菅原道真は遣唐使廃止を建言した平安時代の人物です。"
    answer: "b"

  - id: "jhs-sh-an-005"
    text: "701年に制定され、日本の律令国家の基礎となった法律はどれか。"
    choices:
      - id: "a"
        text: "十七条憲法"
        explanation: "十七条憲法は聖徳太子が定めた役人の心得で、法律の体系とは異なります。"
      - id: "b"
        text: "大宝律令（たいほうりつりょう）"
        explanation: "正解です。701年に文武天皇のもとで大宝律令が制定され、律（刑法）と令（行政法）からなる法典が整備されました。"
      - id: "c"
        text: "御成敗式目"
        explanation: "御成敗式目は1232年に鎌倉幕府の北条泰時が制定した武家の法律です。"
      - id: "d"
        text: "武家諸法度"
        explanation: "武家諸法度は江戸幕府が定めた大名への規則です。"
    answer: "b"

  - id: "jhs-sh-an-006"
    text: "奈良時代に聖武天皇が国家の安定を祈るため、全国に建てさせたものはどれか。"
    choices:
      - id: "a"
        text: "神社（じんじゃ）"
        explanation: "聖武天皇が建てさせたのは仏教の施設です。"
      - id: "b"
        text: "国分寺・国分尼寺（こくぶんじ・こくぶんにじ）"
        explanation: "正解です。聖武天皇は仏教の力で国を守ろうと、全国の国ごとに国分寺・国分尼寺を建てさせました。"
      - id: "c"
        text: "城（しろ）"
        explanation: "城が全国に建てられるのは戦国時代以降です。"
      - id: "d"
        text: "学校（寺子屋）"
        explanation: "寺子屋が普及するのは江戸時代です。"
    answer: "b"

  - id: "jhs-sh-an-007"
    text: "奈良の東大寺に建てられた、聖武天皇が造らせた有名な仏像はどれか。"
    choices:
      - id: "a"
        text: "飛鳥大仏（釈迦如来像）"
        explanation: "飛鳥大仏は飛鳥時代に造られた、奈良の飛鳥寺（法興寺）にある仏像です。"
      - id: "b"
        text: "東大寺の大仏（盧舎那仏像）"
        explanation: "正解です。聖武天皇は743年に東大寺の大仏（盧舎那仏）の建立を命じました。752年に開眼供養が行われました。"
      - id: "c"
        text: "鎌倉大仏（阿弥陀如来像）"
        explanation: "鎌倉大仏は鎌倉時代に建立された高徳院の大仏です。"
      - id: "d"
        text: "法隆寺の釈迦三尊像"
        explanation: "法隆寺の釈迦三尊像は飛鳥時代に造られたものです。"
    answer: "b"

  - id: "jhs-sh-an-008"
    text: "奈良時代に唐から日本に渡り、正式な戒律を伝えた僧は誰か。"
    choices:
      - id: "a"
        text: "行基（ぎょうき）"
        explanation: "行基は日本の僧で、民間で布教活動をした人物です。"
      - id: "b"
        text: "鑑真（がんじん）"
        explanation: "正解です。鑑真は唐の高僧で、5回の失敗ののち753年に来日し、東大寺に戒壇を設けて正式な戒律を伝えました。"
      - id: "c"
        text: "最澄（さいちょう）"
        explanation: "最澄は平安時代初期に唐に渡り、天台宗を開いた日本の僧です。"
      - id: "d"
        text: "空海（くうかい）"
        explanation: "空海は平安時代初期に唐に渡り、真言宗を開いた日本の僧です。"
    answer: "b"

  - id: "jhs-sh-an-009"
    text: "奈良時代に編集された、日本最古の歴史書はどれか。"
    choices:
      - id: "a"
        text: "万葉集（まんようしゅう）"
        explanation: "万葉集は奈良時代の和歌集です。歴史書ではありません。"
      - id: "b"
        text: "古事記（こじき）"
        explanation: "正解です。712年に太安万侶が編集した古事記は、日本最古の歴史書です。"
      - id: "c"
        text: "日本書紀（にほんしょき）"
        explanation: "日本書紀は720年に完成した歴史書です。古事記の方が8年早いです。"
      - id: "d"
        text: "源氏物語（げんじものがたり）"
        explanation: "源氏物語は平安時代に紫式部が書いた物語文学です。"
    answer: "b"

  - id: "jhs-sh-an-010"
    text: "奈良時代の文化（天平文化）の特徴として正しいものはどれか。"
    choices:
      - id: "a"
        text: "日本独自の仮名文字を使った国風文化"
        explanation: "国風文化は平安時代中期の文化です。"
      - id: "b"
        text: "唐の文化の影響を強く受けた国際色豊かな仏教文化"
        explanation: "正解です。天平文化は遣唐使が持ち帰った唐の文化の影響を受け、仏教を中心とした国際色豊かな文化です。"
      - id: "c"
        text: "武士の精神を重んじた質実剛健な文化"
        explanation: "武士の文化が発展するのは鎌倉時代以降です。"
      - id: "d"
        text: "商人や庶民が担った町人文化"
        explanation: "町人文化が栄えるのは江戸時代です。"
    answer: "b"

  - id: "jhs-sh-an-011"
    text: "奈良時代に定められた、6歳以上の人に口分田を与え、死亡後に国に返す制度を何というか。"
    choices:
      - id: "a"
        text: "墾田永年私財法"
        explanation: "墾田永年私財法は743年に新しく開墾した土地の永久私有を認めた法律です。"
      - id: "b"
        text: "班田収授法（はんでんしゅうじゅのほう）"
        explanation: "正解です。班田収授法は大宝律令で定められた制度で、6歳以上の男女に口分田を与え、死後は国に返す制度です。"
      - id: "c"
        text: "地頭制"
        explanation: "地頭は鎌倉幕府が設置した荘園・公領の管理者です。"
      - id: "d"
        text: "太閤検地"
        explanation: "太閤検地は豊臣秀吉が行った土地調査です。"
    answer: "b"

  - id: "jhs-sh-an-012"
    text: "飛鳥時代に建てられた、現存する世界最古の木造建築物はどれか。"
    choices:
      - id: "a"
        text: "東大寺（とうだいじ）"
        explanation: "東大寺は奈良時代（8世紀）に建立されました。"
      - id: "b"
        text: "法隆寺（ほうりゅうじ）"
        explanation: "正解です。法隆寺は聖徳太子が建立した607年創建の寺院で、現存する世界最古の木造建築物群です。"
      - id: "c"
        text: "金閣寺（きんかくじ）"
        explanation: "金閣寺は室町時代（1397年）に足利義満が建てました。"
      - id: "d"
        text: "平等院鳳凰堂"
        explanation: "平等院鳳凰堂は平安時代（1053年）に藤原頼通が建てました。"
    answer: "b"

  - id: "jhs-sh-an-013"
    text: "奈良時代に民衆のために寺や橋を作る社会事業を行い、東大寺大仏建立にも協力した僧は誰か。"
    choices:
      - id: "a"
        text: "鑑真"
        explanation: "鑑真は唐から渡来した僧で、戒律を伝えましたが、民間での社会事業はしていません。"
      - id: "b"
        text: "行基（ぎょうき）"
        explanation: "正解です。行基は各地で民衆のために橋や池を作る社会事業を行い、東大寺大仏建立の勧進にも協力しました。"
      - id: "c"
        text: "最澄"
        explanation: "最澄は平安時代初期の僧で、天台宗を開きました。"
      - id: "d"
        text: "空海"
        explanation: "空海は平安時代初期の僧で、真言宗を開きました。"
    answer: "b"

  - id: "jhs-sh-an-014"
    text: "壬申の乱（672年）に勝利して天武天皇となった人物は誰か。"
    choices:
      - id: "a"
        text: "中大兄皇子（天智天皇）"
        explanation: "中大兄皇子（天智天皇）は壬申の乱の前に亡くなっており、壬申の乱は天智天皇の後継者争いです。"
      - id: "b"
        text: "大海人皇子（おおあまのみこ）"
        explanation: "正解です。天智天皇の弟の大海人皇子が壬申の乱に勝利して即位し、天武天皇となりました。"
      - id: "c"
        text: "蘇我入鹿"
        explanation: "蘇我入鹿は645年の大化の改新で中大兄皇子に暗殺された人物です。"
      - id: "d"
        text: "藤原不比等"
        explanation: "藤原不比等は奈良時代初期の政治家で、大宝律令の制定に関わりました。"
    answer: "b"

  - id: "jhs-sh-an-015"
    text: "奈良時代に作られた、全国の産物・地形・伝説などをまとめた地誌はどれか。"
    choices:
      - id: "a"
        text: "古事記"
        explanation: "古事記は歴史書です。"
      - id: "b"
        text: "風土記（ふどき）"
        explanation: "正解です。風土記は713年に諸国に編集が命じられた地誌で、各国の産物・地形・伝説などが記されています。"
      - id: "c"
        text: "万葉集"
        explanation: "万葉集は和歌集です。"
      - id: "d"
        text: "日本書紀"
        explanation: "日本書紀は歴史書です。"
    answer: "b"

  - id: "jhs-sh-an-016"
    text: "奈良時代に制定された、新しく開墾した土地は永久に私有できるという法令はどれか。"
    choices:
      - id: "a"
        text: "班田収授法"
        explanation: "班田収授法は口分田を与えて死後に返す制度です。"
      - id: "b"
        text: "墾田永年私財法（こんでんえいねんしざいほう）"
        explanation: "正解です。743年に出された墾田永年私財法により、開墾した土地の永久所有が認められ、荘園が発生する原因となりました。"
      - id: "c"
        text: "分国法"
        explanation: "分国法は戦国時代の大名が定めた法律です。"
      - id: "d"
        text: "御成敗式目"
        explanation: "御成敗式目は鎌倉時代の武家法です。"
    answer: "b"

  - id: "jhs-sh-an-017"
    text: "飛鳥時代に百済から日本に伝わったとされる年として正しいものはどれか。（仏教公伝）"
    choices:
      - id: "a"
        text: "645年"
        explanation: "645年は大化の改新が起きた年です。"
      - id: "b"
        text: "538年（または552年）"
        explanation: "正解です。538年（または552年）に百済の聖明王が欽明天皇に仏像・経典を贈り、仏教が公式に伝わりました。"
      - id: "c"
        text: "701年"
        explanation: "701年は大宝律令が制定された年です。"
      - id: "d"
        text: "710年"
        explanation: "710年は平城京に都が移された年です。"
    answer: "b"

  - id: "jhs-sh-an-018"
    text: "710年に奈良に都が移されたが、その都の名前はどれか。"
    choices:
      - id: "a"
        text: "藤原京"
        explanation: "藤原京は694年に作られた都で、平城京の前の都です。"
      - id: "b"
        text: "平城京（へいじょうきょう）"
        explanation: "正解です。710年に元明天皇が奈良に平城京を造り、都を移しました。唐の都・長安をモデルにしています。"
      - id: "c"
        text: "平安京"
        explanation: "平安京は794年に桓武天皇が京都に移した都です。"
      - id: "d"
        text: "難波宮"
        explanation: "難波宮は大阪にあった宮で、都として機能した時期もありますが、奈良の都ではありません。"
    answer: "b"

  - id: "jhs-sh-an-019"
    text: "奈良時代に作られた、約4500首の和歌を収めた日本最古の和歌集はどれか。"
    choices:
      - id: "a"
        text: "古今和歌集"
        explanation: "古今和歌集は平安時代（905年）に編集された和歌集です。"
      - id: "b"
        text: "万葉集（まんようしゅう）"
        explanation: "正解です。万葉集は奈良時代に編集された、約4500首を収める日本最古の和歌集です。天皇から庶民まで幅広い人々の歌が収められています。"
      - id: "c"
        text: "新古今和歌集"
        explanation: "新古今和歌集は鎌倉時代（1205年）に編集された和歌集です。"
      - id: "d"
        text: "百人一首"
        explanation: "百人一首は鎌倉時代初期に藤原定家が選んだ100首の和歌集です。"
    answer: "b"

  - id: "jhs-sh-an-020"
    text: "聖徳太子が定めた「冠位十二階」の目的として正しいものはどれか。"
    choices:
      - id: "a"
        text: "地方の農民を管理するため"
        explanation: "冠位十二階は役人の地位を表すものであり、農民管理が目的ではありません。"
      - id: "b"
        text: "家柄にかかわらず能力・功績によって役人を登用するため"
        explanation: "正解です。冠位十二階は、それまでの家柄による地位決定を改め、個人の能力と功績に応じて役人を登用するために定められました。"
      - id: "c"
        text: "天皇家の血統を守るため"
        explanation: "冠位十二階は天皇家の血統とは別に、臣下の役人を対象とした制度です。"
      - id: "d"
        text: "武士の序列を明確にするため"
        explanation: "飛鳥時代にはまだ武士階級は存在していませんでした。"
    answer: "b"

  - id: "jhs-sh-an-021"
    text: "奈良時代の政治に深く関わり、称徳天皇の寵愛を受けて権力を握ろうとした僧は誰か。"
    choices:
      - id: "a"
        text: "行基"
        explanation: "行基は社会事業を行った僧で、政治的権力は握りませんでした。"
      - id: "b"
        text: "道鏡（どうきょう）"
        explanation: "正解です。道鏡は称徳天皇の寵愛を受け、法王の地位まで上り詰め、皇位をも狙ったとされます。"
      - id: "c"
        text: "鑑真"
        explanation: "鑑真は唐から渡来した僧で、政治的権力は握りませんでした。"
      - id: "d"
        text: "最澄"
        explanation: "最澄は平安時代の僧で、天台宗を開きました。"
    answer: "b"

  - id: "jhs-sh-an-022"
    text: "飛鳥時代に蘇我氏と対立し、仏教受容に反対した有力豪族はどれか。"
    choices:
      - id: "a"
        text: "藤原氏"
        explanation: "藤原氏（中臣鎌足から）は蘇我氏を倒した側の氏族です。"
      - id: "b"
        text: "物部氏（もののべし）"
        explanation: "正解です。物部氏は蘇我氏と仏教受容をめぐって対立し（崇仏論争）、587年の丁未の乱で蘇我馬子に敗れ滅亡しました。"
      - id: "c"
        text: "平氏"
        explanation: "平氏が台頭するのは平安時代中期以降です。"
      - id: "d"
        text: "源氏"
        explanation: "源氏が台頭するのは平安時代中期以降です。"
    answer: "b"

  - id: "jhs-sh-an-023"
    text: "奈良時代の税制で、布や地方の特産物を都に納める税を何というか。"
    choices:
      - id: "a"
        text: "租（そ）"
        explanation: "租は口分田の収穫の約3%を稲で納める税です。"
      - id: "b"
        text: "調（ちょう）"
        explanation: "正解です。調は布や地方の特産物を都に納める税です。庸（ようろう）とともに都まで自分で運ぶ義務がありました。"
      - id: "c"
        text: "庸（よう）"
        explanation: "庸は労役の代わりに布を納める税です。"
      - id: "d"
        text: "雑徭（ぞうよう）"
        explanation: "雑徭は地方での労働奉仕です。"
    answer: "b"

  - id: "jhs-sh-an-024"
    text: "聖武天皇の遺品などが収められ、「シルクロードの終着点」とも呼ばれる奈良の倉庫はどれか。"
    choices:
      - id: "a"
        text: "法隆寺の夢殿"
        explanation: "夢殿は法隆寺の八角形の建物で、倉庫ではありません。"
      - id: "b"
        text: "正倉院（しょうそういん）"
        explanation: "正解です。正倉院は東大寺にある校倉造りの倉庫で、聖武天皇の遺品など約9000点が保管されており、シルクロードを通じた国際交流の証ともなっています。"
      - id: "c"
        text: "鎌倉の鶴岡八幡宮"
        explanation: "鶴岡八幡宮は鎌倉時代の神社です。"
      - id: "d"
        text: "京都の金閣寺"
        explanation: "金閣寺は室町時代の建物です。"
    answer: "b"

  - id: "jhs-sh-an-025"
    text: "大化の改新で定められた「公地公民」の原則とはどのようなものか。"
    choices:
      - id: "a"
        text: "豪族が土地と人民を私有できる制度"
        explanation: "公地公民はその逆で、土地と人民を国家（天皇）のものとする原則です。"
      - id: "b"
        text: "土地と人民をすべて国家（天皇）のものとする原則"
        explanation: "正解です。公地公民は豪族が私有していた土地（私地）と人民（私民）をすべて国家のものとし、天皇中心の体制を確立しようとする原則です。"
      - id: "c"
        text: "土地を農民に無償で永久に与える制度"
        explanation: "農民に与えられる口分田は死後に返す必要があり、永久所有ではありません。"
      - id: "d"
        text: "税をすべて廃止して農民を解放する制度"
        explanation: "大化の改新で税が廃止されたわけではなく、租・調・庸などの税制が整備されました。"
