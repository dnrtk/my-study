questions:
  - id: "jhs-sh-me-001"
    text: "1868年に江戸幕府が倒れて新政府が成立した政治的変革を何というか。"
    choices:
      - id: "a"
        text: "大化の改新"
        explanation: "大化の改新は645年の出来事です。"
      - id: "b"
        text: "明治維新（めいじいしん）"
        explanation: "正解です。1868年に明治天皇のもとで江戸幕府が倒れ、新政府が成立した政治的・社会的大変革を明治維新といいます。"
      - id: "c"
        text: "建武の新政"
        explanation: "建武の新政は1333年に後醍醐天皇が行った政治改革です。"
      - id: "d"
        text: "大正デモクラシー"
        explanation: "大正デモクラシーは大正時代の民主主義運動です。"
    answer: "b"

  - id: "jhs-sh-me-002"
    text: "明治新政府が1868年に発した、新しい政治の基本方針を示した文書はどれか。"
    choices:
      - id: "a"
        text: "五箇条の御誓文（ごかじょうのごせいもん）"
        explanation: "正解です。明治天皇が神々に誓う形で発した五箇条の御誓文は、広く会議を開いて意見を聞くことや開国・和親などを基本方針として示しました。"
      - id: "b"
        text: "十七条憲法"
        explanation: "十七条憲法は飛鳥時代に聖徳太子が定めたものです。"
      - id: "c"
        text: "大日本帝国憲法"
        explanation: "大日本帝国憲法は1889年に公布されました。"
      - id: "d"
        text: "教育勅語"
        explanation: "教育勅語は1890年に発布された教育の基本方針です。"
    answer: "a"

  - id: "jhs-sh-me-003"
    text: "明治政府が行った、藩を廃止して府・県を置いた改革を何というか。"
    choices:
      - id: "a"
        text: "廃仏毀釈"
        explanation: "廃仏毀釈は仏教を排斥した運動です。"
      - id: "b"
        text: "廃藩置県（はいはんちけん）"
        explanation: "正解です。1871年に明治政府は藩を廃止して府・県を置き、政府が派遣した府知事・県令が地方を治める中央集権体制を確立しました。"
      - id: "c"
        text: "版籍奉還"
        explanation: "版籍奉還は1869年に藩主が土地（版）と人民（籍）を天皇に返上した改革です。廃藩置県の前段階です。"
      - id: "d"
        text: "地租改正"
        explanation: "地租改正は1873年に行われた税制改革です。"
    answer: "b"

  - id: "jhs-sh-me-004"
    text: "明治政府が1873年に行った、土地の価格（地価）に応じて税を現金で納めさせる改革はどれか。"
    choices:
      - id: "a"
        text: "廃藩置県"
        explanation: "廃藩置県は地方行政制度の改革です。"
      - id: "b"
        text: "地租改正（ちそかいせい）"
        explanation: "正解です。地租改正では土地の価格（地価）の3%を現金（地租）で納める制度に統一され、政府の安定した収入源となりました。"
      - id: "c"
        text: "秩禄処分"
        explanation: "秩禄処分は士族への俸禄を廃止した改革です。"
      - id: "d"
        text: "太閤検地"
        explanation: "太閤検地は豊臣秀吉が行った土地調査です。"
    answer: "b"

  - id: "jhs-sh-me-005"
    text: "明治政府が推進した、欧米の文明・技術・制度を取り入れる政策を何というか。"
    choices:
      - id: "a"
        text: "鎖国政策"
        explanation: "鎖国は江戸時代の政策で、明治政府は逆に開国・西洋化を進めました。"
      - id: "b"
        text: "文明開化（ぶんめいかいか）"
        explanation: "正解です。明治時代に欧米の文化・制度・技術を積極的に取り入れて社会を近代化しようとした動きを文明開化といいます。"
      - id: "c"
        text: "国粋主義"
        explanation: "国粋主義は日本の伝統や文化を重んじる思想で、文明開化とは対立します。"
      - id: "d"
        text: "和魂洋才"
        explanation: "和魂洋才は日本の精神を保ちながら西洋の技術を取り入れるという考え方で、文明開化の一形態です。"
    answer: "b"

  - id: "jhs-sh-me-006"
    text: "1871年に派遣された、岩倉具視を大使とする使節団の目的はどれか。"
    choices:
      - id: "a"
        text: "中国との戦争に備えるため"
        explanation: "使節団の目的は戦争準備ではありません。"
      - id: "b"
        text: "欧米各国の制度・文化を視察し、不平等条約の改正を交渉するため"
        explanation: "正解です。岩倉使節団（1871〜73年）は欧米12か国を訪問し、近代文明を視察するとともに、不平等条約の改正を交渉しました（改正は実現しませんでした）。"
      - id: "c"
        text: "欧米各国と同盟を結ぶため"
        explanation: "同盟締結が主目的ではありませんでした。"
      - id: "d"
        text: "欧米への移民を促進するため"
        explanation: "移民促進が目的ではありませんでした。"
    answer: "b"

  - id: "jhs-sh-me-007"
    text: "明治政府が行った、近代的な軍隊を作るため満20歳の男子に兵役を義務付けた制度はどれか。"
    choices:
      - id: "a"
        text: "御家人制度"
        explanation: "御家人制度は鎌倉時代の武士の主従関係です。"
      - id: "b"
        text: "徴兵令（ちょうへいれい）"
        explanation: "正解です。1873年に発せられた徴兵令により、満20歳の男子は身分を問わず兵役を義務付けられ、近代的な国民軍が作られました。"
      - id: "c"
        text: "士族の武装義務"
        explanation: "徴兵令は逆に士族の特権を廃し、広く国民から兵を集めるものです。"
      - id: "d"
        text: "国民皆兵制"
        explanation: "これは徴兵令の別称として使われることもありますが、正式な名称は徴兵令です。"
    answer: "b"

  - id: "jhs-sh-me-008"
    text: "1877年に西郷隆盛が鹿児島の士族を率いて起こした、明治最大の士族反乱はどれか。"
    choices:
      - id: "a"
        text: "島原の乱"
        explanation: "島原の乱は江戸時代（1637年）の出来事です。"
      - id: "b"
        text: "西南戦争（せいなんせんそう）"
        explanation: "正解です。西郷隆盛を盟主とした鹿児島の士族が起こした西南戦争（1877年）は、明治最大の士族反乱で、政府軍に鎮圧されました。"
      - id: "c"
        text: "秋月の乱"
        explanation: "秋月の乱は1876年の福岡・秋月での士族反乱です。"
      - id: "d"
        text: "佐賀の乱"
        explanation: "佐賀の乱は1874年の江藤新平らによる士族反乱です。"
    answer: "b"

  - id: "jhs-sh-me-009"
    text: "明治時代に板垣退助らが中心となって進めた、議会政治の実現を求める運動はどれか。"
    choices:
      - id: "a"
        text: "大正デモクラシー"
        explanation: "大正デモクラシーは大正時代の民主主義運動です。"
      - id: "b"
        text: "自由民権運動（じゆうみんけんうんどう）"
        explanation: "正解です。1874年に板垣退助らが民撰議院設立の建白書を提出し、国会の開設・憲法の制定・地租の軽減を求める自由民権運動が始まりました。"
      - id: "c"
        text: "護憲運動"
        explanation: "護憲運動は大正時代の議会政治擁護運動です。"
      - id: "d"
        text: "民主化運動"
        explanation: "「民主化運動」は一般的な表現で、明治時代の運動は自由民権運動と呼ばれます。"
    answer: "b"

  - id: "jhs-sh-me-010"
    text: "1889年に公布された日本最初の憲法はどれか。"
    choices:
      - id: "a"
        text: "日本国憲法"
        explanation: "日本国憲法は1946年に公布、1947年に施行されました。"
      - id: "b"
        text: "大日本帝国憲法（だいにほんていこくけんぽう）"
        explanation: "正解です。1889年2月11日に公布された大日本帝国憲法（明治憲法）は、天皇主権・統帥権などを規定し、プロイセン（ドイツ）の憲法をモデルとしました。"
      - id: "c"
        text: "五箇条の御誓文"
        explanation: "五箇条の御誓文は1868年に発せられた新政府の基本方針です。憲法ではありません。"
      - id: "d"
        text: "御成敗式目"
        explanation: "御成敗式目は1232年の鎌倉時代の武家法です。"
    answer: "b"

  - id: "jhs-sh-me-011"
    text: "大日本帝国憲法で主権者とされた者はどれか。"
    choices:
      - id: "a"
        text: "国民"
        explanation: "国民主権は日本国憲法（1947年）の原則です。"
      - id: "b"
        text: "天皇"
        explanation: "正解です。大日本帝国憲法では天皇が主権者とされ、陸海軍の統帥権・条約締結権・議会の召集・解散権など強大な権限を持つとされました。"
      - id: "c"
        text: "議会"
        explanation: "帝国議会は立法機関ですが、主権者は天皇です。"
      - id: "d"
        text: "内閣総理大臣"
        explanation: "内閣総理大臣は行政の長ですが、主権者ではありません。"
    answer: "b"

  - id: "jhs-sh-me-012"
    text: "1894〜95年に日本が清（中国）と戦った戦争はどれか。"
    choices:
      - id: "a"
        text: "日露戦争"
        explanation: "日露戦争は1904〜05年の日本とロシアの戦争です。"
      - id: "b"
        text: "日清戦争（にっしんせんそう）"
        explanation: "正解です。1894〜95年の日清戦争で日本が勝利し、下関条約で台湾・遼東半島などを獲得しました。"
      - id: "c"
        text: "日中戦争"
        explanation: "日中戦争は1937〜45年の日本と中国の戦争です。"
      - id: "d"
        text: "西南戦争"
        explanation: "西南戦争は1877年の国内の士族反乱です。"
    answer: "b"

  - id: "jhs-sh-me-013"
    text: "日清戦争の講和条約で結ばれた条約はどれか。"
    choices:
      - id: "a"
        text: "ポーツマス条約"
        explanation: "ポーツマス条約は日露戦争（1905年）の講和条約です。"
      - id: "b"
        text: "下関条約（しものせきじょうやく）"
        explanation: "正解です。1895年に結ばれた下関条約で、清は台湾・遼東半島・澎湖諸島を日本に割譲し、多額の賠償金を支払うことになりました。"
      - id: "c"
        text: "日韓併合条約"
        explanation: "日韓併合条約は1910年に朝鮮を日本が植民地化した条約です。"
      - id: "d"
        text: "天津条約"
        explanation: "天津条約は日清戦争前（1885年）の清とのとり決めです。"
    answer: "b"

  - id: "jhs-sh-me-014"
    text: "日清戦争後にロシア・フランス・ドイツの三国が、日本に対して遼東半島を清に返還するよう要求した出来事を何というか。"
    choices:
      - id: "a"
        text: "ポーツマス条約"
        explanation: "ポーツマス条約は日露戦争後の講和条約です。"
      - id: "b"
        text: "三国干渉（さんごくかんしょう）"
        explanation: "正解です。1895年に下関条約で遼東半島を獲得した日本に対し、ロシア・フランス・ドイツの三国が「遼東半島は清に返還すべき」と干渉し、日本はやむなく返還しました。"
      - id: "c"
        text: "門戸開放宣言"
        explanation: "門戸開放宣言は1899年にアメリカが中国への機会均等を求めた宣言です。"
      - id: "d"
        text: "ワシントン会議"
        explanation: "ワシントン会議は1921〜22年の国際会議です。"
    answer: "b"

  - id: "jhs-sh-me-015"
    text: "1904〜05年に日本がロシアと戦った戦争はどれか。"
    choices:
      - id: "a"
        text: "日清戦争"
        explanation: "日清戦争は1894〜95年の日本と清の戦争です。"
      - id: "b"
        text: "日露戦争（にちろせんそう）"
        explanation: "正解です。1904年に日本はロシアに宣戦布告し、日露戦争が始まりました。日本海海戦での東郷平八郎の勝利などもあり、1905年にポーツマス条約で講和しました。"
      - id: "c"
        text: "西南戦争"
        explanation: "西南戦争は1877年の国内の士族反乱です。"
      - id: "d"
        text: "太平洋戦争"
        explanation: "太平洋戦争は1941〜45年の出来事です。"
    answer: "b"

  - id: "jhs-sh-me-016"
    text: "日露戦争の講和条約で、日本がポーツマスで結んだ条約はどれか。"
    choices:
      - id: "a"
        text: "下関条約"
        explanation: "下関条約は日清戦争（1895年）の講和条約です。"
      - id: "b"
        text: "ポーツマス条約（ポーツマスじょうやく）"
        explanation: "正解です。1905年に日本はアメリカのルーズベルト大統領の仲介でポーツマス条約を結び、南樺太・旅順・大連の租借権などを獲得しましたが、賠償金は得られませんでした。"
      - id: "c"
        text: "日英同盟"
        explanation: "日英同盟は1902年に締結された日本とイギリスの軍事同盟です。"
      - id: "d"
        text: "サンフランシスコ平和条約"
        explanation: "サンフランシスコ平和条約は1951年に締結された第二次世界大戦後の講和条約です。"
    answer: "b"

  - id: "jhs-sh-me-017"
    text: "明治時代に岩倉具視と協力して明治政府の近代化を推進した薩摩・長州出身の政治家として正しい人物はどれか。"
    choices:
      - id: "a"
        text: "坂本龍馬と吉田松陰"
        explanation: "坂本龍馬は明治維新直前に暗殺され、吉田松陰は安政の大獄で処刑されています。"
      - id: "b"
        text: "大久保利通と木戸孝允（桂小五郎）"
        explanation: "正解です。大久保利通（薩摩）と木戸孝允（長州）は岩倉具視とともに明治政府の中心となり（維新の三傑）、近代化を推進しました。"
      - id: "c"
        text: "伊藤博文と山県有朋"
        explanation: "伊藤博文・山県有朋も重要な政治家ですが、維新の三傑の一人としてより有名なのは大久保・木戸です。"
      - id: "d"
        text: "板垣退助と後藤象二郎"
        explanation: "板垣退助と後藤象二郎は自由民権運動の指導者です。"
    answer: "b"

  - id: "jhs-sh-me-018"
    text: "明治時代に設立された最初の国立銀行はどれか。"
    choices:
      - id: "a"
        text: "日本銀行"
        explanation: "日本銀行は1882年に設立された中央銀行です。"
      - id: "b"
        text: "第一国立銀行（だいいちこくりつぎんこう）"
        explanation: "正解です。1873年に渋沢栄一が設立した第一国立銀行は日本最初の銀行で、近代的な金融制度の基礎となりました。"
      - id: "c"
        text: "横浜正金銀行"
        explanation: "横浜正金銀行は外国為替専門の銀行です。"
      - id: "d"
        text: "三井銀行"
        explanation: "三井銀行は民間銀行です。"
    answer: "b"

  - id: "jhs-sh-me-019"
    text: "明治時代に「学問のすゝめ」を著し「天は人の上に人を造らず」と唱えた思想家は誰か。"
    choices:
      - id: "a"
        text: "中江兆民"
        explanation: "中江兆民はフランスの自由民権思想を紹介した思想家です。"
      - id: "b"
        text: "福沢諭吉（ふくざわゆきち）"
        explanation: "正解です。福沢諭吉は「学問のすゝめ」で人間の平等と独立の精神を説き、慶應義塾を設立しました。現在の一万円札の肖像に採用されています。"
      - id: "c"
        text: "西周（にしあまね）"
        explanation: "西周は「哲学」などの訳語を作った明治の思想家です。"
      - id: "d"
        text: "森有礼"
        explanation: "森有礼は初代文部大臣で、教育制度の整備に尽力しました。"
    answer: "b"

  - id: "jhs-sh-me-020"
    text: "1910年に日本が朝鮮を植民地化した出来事を何というか。"
    choices:
      - id: "a"
        text: "日清戦争"
        explanation: "日清戦争（1894〜95年）はきっかけの一つですが、植民地化は日韓併合です。"
      - id: "b"
        text: "韓国併合（日韓併合）"
        explanation: "正解です。1910年に日本は大韓帝国との間に日韓併合条約を結び、朝鮮を植民地として支配しました。"
      - id: "c"
        text: "台湾の割譲"
        explanation: "台湾の割譲は日清戦争後（1895年）の下関条約によるものです。"
      - id: "d"
        text: "満州事変"
        explanation: "満州事変は1931年の出来事です。"
    answer: "b"

  - id: "jhs-sh-me-021"
    text: "明治時代に八幡（福岡県）に設立された、日本初の本格的な鉄鋼の製鉄所はどれか。"
    choices:
      - id: "a"
        text: "富岡製糸場"
        explanation: "富岡製糸場（群馬県）は生糸の工場です。"
      - id: "b"
        text: "八幡製鉄所（やはたせいてつしょ）"
        explanation: "正解です。1901年に操業を開始した八幡製鉄所は、日清戦争の賠償金をもとに建設された国営の製鉄所で、日本の重工業発展の中心となりました。"
      - id: "c"
        text: "大阪紡績会社"
        explanation: "大阪紡績会社は明治時代の綿業会社です。"
      - id: "d"
        text: "新日本製鐵"
        explanation: "新日本製鐵は戦後に設立された民間企業です。"
    answer: "b"

  - id: "jhs-sh-me-022"
    text: "明治時代に行われた小学校教育の義務化について正しいものはどれか。"
    choices:
      - id: "a"
        text: "1868年の明治維新と同時に義務教育が始まった"
        explanation: "学制が発布されたのは1872年です。"
      - id: "b"
        text: "1872年の学制発布により、男女ともに小学校教育が義務化された"
