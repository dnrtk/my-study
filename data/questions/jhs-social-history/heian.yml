questions:
  - id: "jhs-sh-he-001"
    text: "794年に桓武天皇が都を移した場所はどこか。"
    choices:
      - id: "a"
        text: "奈良（平城京）"
        explanation: "平城京はすでにあった都です。桓武天皇はここから都を移しました。"
      - id: "b"
        text: "京都（平安京）"
        explanation: "正解です。794年に桓武天皇は京都に平安京を造り、都を移しました。以後約1100年間、京都が都となりました。"
      - id: "c"
        text: "鎌倉"
        explanation: "鎌倉に幕府が開かれるのは1192年（または1185年）です。"
      - id: "d"
        text: "大阪（難波）"
        explanation: "桓武天皇は一時長岡京（現在の向日市付近）にも都を置きましたが、最終的に平安京（京都）に移しました。"
    answer: "b"

  - id: "jhs-sh-he-002"
    text: "平安時代に藤原氏が行った政治形態で、天皇が幼少のときは摂政、成人後は関白として実権を握った政治を何というか。"
    choices:
      - id: "a"
        text: "院政（いんせい）"
        explanation: "院政は上皇（院）が行う政治で、白河上皇から始まります。"
      - id: "b"
        text: "摂関政治（せっかんせいじ）"
        explanation: "正解です。藤原氏が摂政・関白の地位を独占して行った政治を摂関政治といいます。"
      - id: "c"
        text: "幕府政治"
        explanation: "幕府政治は武士による政治で、鎌倉時代以降です。"
      - id: "d"
        text: "太政官制"
        explanation: "太政官制は律令制度における国家の行政制度です。"
    answer: "b"

  - id: "jhs-sh-he-003"
    text: "摂関政治の全盛期を実現した藤原氏の人物で、「この世をば わが世とぞ思ふ 望月の かけたることも なしと思へば」と詠んだのは誰か。"
    choices:
      - id: "a"
        text: "藤原鎌足"
        explanation: "藤原鎌足は中臣鎌足で、大化の改新の立役者です。"
      - id: "b"
        text: "藤原道長（ふじわらのみちなが）"
        explanation: "正解です。藤原道長は3人の娘を天皇の后にして権勢を振るい、摂関政治の絶頂期を実現しました。"
      - id: "c"
        text: "藤原頼通"
        explanation: "藤原頼通は道長の息子で、平等院鳳凰堂を建てました。"
      - id: "d"
        text: "藤原不比等"
        explanation: "藤原不比等は奈良時代初期の政治家です。"
    answer: "b"

  - id: "jhs-sh-he-004"
    text: "平安時代に発達した、日本独自の文化を何というか。"
    choices:
      - id: "a"
        text: "天平文化"
        explanation: "天平文化は奈良時代の唐の影響を受けた文化です。"
      - id: "b"
        text: "国風文化（こくふうぶんか）"
        explanation: "正解です。平安時代中期、遣唐使廃止後に発達した日本独自の貴族文化を国風文化（もしくは藤原文化）といいます。"
      - id: "c"
        text: "桃山文化"
        explanation: "桃山文化は安土桃山時代の文化です。"
      - id: "d"
        text: "元禄文化"
        explanation: "元禄文化は江戸時代中期の文化です。"
    answer: "b"

  - id: "jhs-sh-he-005"
    text: "平安時代に紫式部が書いた世界最古の長編小説はどれか。"
    choices:
      - id: "a"
        text: "枕草子（まくらのそうし）"
        explanation: "枕草子は清少納言が書いた随筆集です。"
      - id: "b"
        text: "源氏物語（げんじものがたり）"
        explanation: "正解です。紫式部が書いた源氏物語は、光源氏を主人公とする世界最古の長編小説とされています。"
      - id: "c"
        text: "竹取物語"
        explanation: "竹取物語はかぐや姫の物語で、平安時代の作品ですが作者不詳です。"
      - id: "d"
        text: "土佐日記"
        explanation: "土佐日記は紀貫之が書いた日記文学です。"
    answer: "b"

  - id: "jhs-sh-he-006"
    text: "894年に遣唐使の廃止を建言した人物は誰か。"
    choices:
      - id: "a"
        text: "藤原道長"
        explanation: "藤原道長は遣唐使廃止より後の時代の人物です。"
      - id: "b"
        text: "菅原道真（すがわらのみちざね）"
        explanation: "正解です。菅原道真は894年に遣唐使の廃止を建言し、唐の衰退や航海の危険を理由に廃止が決まりました。"
      - id: "c"
        text: "小野妹子"
        explanation: "小野妹子は飛鳥時代の遣隋使です。"
      - id: "d"
        text: "最澄"
        explanation: "最澄は平安時代初期に唐に渡った僧です。"
    answer: "b"

  - id: "jhs-sh-he-007"
    text: "平安時代に発明・発達した日本独自の文字はどれか。"
    choices:
      - id: "a"
        text: "漢字（かんじ）"
        explanation: "漢字は中国から伝わった文字です。"
      - id: "b"
        text: "仮名文字（ひらがな・カタカナ）"
        explanation: "正解です。平安時代に漢字をもとに仮名文字（ひらがな・カタカナ）が発達し、日本語の表現が豊かになりました。"
      - id: "c"
        text: "ローマ字"
        explanation: "ローマ字は戦国時代末にキリスト教宣教師がもたらしました。"
      - id: "d"
        text: "万葉がな"
        explanation: "万葉がなは奈良時代に使われた、漢字の音を借りた表記方法です。"
    answer: "b"

  - id: "jhs-sh-he-008"
    text: "1086年に白河天皇が上皇となっても政治を続けた制度を何というか。"
    choices:
      - id: "a"
        text: "摂関政治"
        explanation: "摂関政治は藤原氏が摂政・関白として行う政治です。"
      - id: "b"
        text: "院政（いんせい）"
        explanation: "正解です。白河上皇が始めた院政は、上皇（院）が院の御所で政治を行う形で、藤原氏の摂関政治を抑えました。"
      - id: "c"
        text: "幕府政治"
        explanation: "幕府政治は鎌倉時代以降の武士による政治です。"
      - id: "d"
        text: "太政官政治"
        explanation: "太政官政治は律令制の行政制度です。"
    answer: "b"

  - id: "jhs-sh-he-009"
    text: "平安時代初期に唐から帰国し、比叡山に延暦寺を建てて天台宗を開いた僧は誰か。"
    choices:
      - id: "a"
        text: "空海"
        explanation: "空海は真言宗を開き、高野山に金剛峯寺を建てました。"
      - id: "b"
        text: "最澄（さいちょう）"
        explanation: "正解です。最澄は唐に渡って天台宗を学び、帰国後に比叡山に延暦寺を建てて天台宗を開きました。"
      - id: "c"
        text: "行基"
        explanation: "行基は奈良時代の僧で、民間布教と社会事業を行いました。"
      - id: "d"
        text: "鑑真"
        explanation: "鑑真は唐から日本に渡来した僧で、戒律を伝えました。"
    answer: "b"

  - id: "jhs-sh-he-010"
    text: "平安時代初期に高野山に金剛峯寺を建て、真言宗を開いた僧は誰か。"
    choices:
      - id: "a"
        text: "最澄"
        explanation: "最澄は天台宗を開き、比叡山に延暦寺を建てました。"
      - id: "b"
        text: "空海（くうかい）"
        explanation: "正解です。空海（弘法大師）は唐で密教を学び、高野山に金剛峯寺を建てて真言宗を開きました。"
      - id: "c"
        text: "法然"
        explanation: "法然は平安時代末期に浄土宗を開きました。"
      - id: "d"
        text: "親鸞"
        explanation: "親鸞は鎌倉時代に浄土真宗を開きました。"
    answer: "b"

  - id: "jhs-sh-he-011"
    text: "藤原頼通が1053年に京都宇治に建てた、極楽浄土をイメージした建物はどれか。"
    choices:
      - id: "a"
        text: "法隆寺"
        explanation: "法隆寺は飛鳥時代に聖徳太子が建てた寺院です。"
      - id: "b"
        text: "平等院鳳凰堂（びょうどういんほうおうどう）"
        explanation: "正解です。藤原頼通が宇治に建てた平等院鳳凰堂は、阿弥陀如来像を祀り、極楽浄土をイメージして建てられました。10円玉のデザインに使われています。"
      - id: "c"
        text: "東大寺"
        explanation: "東大寺は奈良時代に聖武天皇が建てた寺院です。"
      - id: "d"
        text: "金閣寺"
        explanation: "金閣寺は室町時代に足利義満が建てた別荘です。"
    answer: "b"

  - id: "jhs-sh-he-012"
    text: "平安時代末期の1156年と1159年に起きた2つの武士の争いはそれぞれ何か。"
    choices:
      - id: "a"
        text: "応仁の乱と明応の政変"
        explanation: "応仁の乱は室町時代（1467年）、明応の政変は1493年の出来事です。"
      - id: "b"
        text: "保元の乱と平治の乱"
        explanation: "正解です。1156年の保元の乱・1159年の平治の乱で武士が活躍し、平清盛が台頭しました。"
      - id: "c"
        text: "承久の乱と元弘の変"
        explanation: "承久の乱は1221年、元弘の変は1331年の出来事です。"
      - id: "d"
        text: "壬申の乱と白村江の戦い"
        explanation: "壬申の乱は672年、白村江の戦いは663年の出来事です。"
    answer: "b"

  - id: "jhs-sh-he-013"
    text: "平安時代末期に平氏政権を確立した人物は誰か。"
    choices:
      - id: "a"
        text: "源頼朝"
        explanation: "源頼朝は平氏を倒して鎌倉幕府を開いた人物です。"
      - id: "b"
        text: "平清盛（たいらのきよもり）"
        explanation: "正解です。平清盛は保元の乱・平治の乱で活躍し、太政大臣まで上り詰め、平氏政権を確立しました。"
      - id: "c"
        text: "源義仲"
        explanation: "源義仲（木曽義仲）は平氏打倒に参加しましたが、源頼朝に倒されました。"
      - id: "d"
        text: "源義経"
        explanation: "源義経は平氏を滅ぼした源頼朝の弟ですが、平氏政権の樹立ではなく、その打倒に関わりました。"
    answer: "b"

  - id: "jhs-sh-he-014"
    text: "1185年に壇ノ浦の戦いで平氏を滅ぼした源氏の武将は誰か。"
    choices:
      - id: "a"
        text: "源頼朝"
        explanation: "源頼朝は鎌倉に留まって政治・軍事指揮をしており、直接戦っていません。"
      - id: "b"
        text: "源義経（みなもとのよしつね）"
        explanation: "正解です。源義経は一の谷・屋島・壇ノ浦の戦いで平氏を追い詰め、1185年に壇ノ浦で平氏を滅ぼしました。"
      - id: "c"
        text: "源義仲"
        explanation: "源義仲は先に平氏を都から追いましたが、その後源頼朝に討たれました。"
      - id: "d"
        text: "北条時政"
        explanation: "北条時政は源頼朝の岳父で、鎌倉幕府の政治家です。"
    answer: "b"

  - id: "jhs-sh-he-015"
    text: "平安時代に清少納言が書いた随筆文学はどれか。"
    choices:
      - id: "a"
        text: "源氏物語"
        explanation: "源氏物語は紫式部が書いた長編小説です。"
      - id: "b"
        text: "枕草子（まくらのそうし）"
        explanation: "正解です。清少納言が書いた枕草子は、日常の出来事や感想を書いた随筆文学で、「春はあけぼの」の書き出しで有名です。"
      - id: "c"
        text: "土佐日記"
        explanation: "土佐日記は紀貫之が書いた日記文学です。"
      - id: "d"
        text: "更級日記"
        explanation: "更級日記は菅原孝標女（すがわらのたかすえのむすめ）が書いた日記文学です。"
    answer: "b"

  - id: "jhs-sh-he-016"
    text: "平安時代初期に行われた東北地方の蝦夷（えみし）との戦いで、征夷大将軍として活躍した人物は誰か。"
    choices:
      - id: "a"
        text: "平将門"
        explanation: "平将門は関東で反乱を起こした武将（939年）です。"
      - id: "b"
        text: "坂上田村麻呂（さかのうえのたむらまろ）"
        explanation: "正解です。坂上田村麻呂は桓武天皇から征夷大将軍に任命され、東北地方に進軍して蝦夷の指導者・阿弖流為（アテルイ）を降しました。"
      - id: "c"
        text: "源頼朝"
        explanation: "源頼朝は鎌倉幕府を開いた武将です。"
      - id: "d"
        text: "藤原秀衡"
        explanation: "藤原秀衡は平安時代末期の奥州藤原氏の当主です。"
    answer: "b"

  - id: "jhs-sh-he-017"
    text: "平安時代中期に905年に編集が命じられた、最初の勅撰和歌集はどれか。"
    choices:
      - id: "a"
        text: "万葉集"
        explanation: "万葉集は奈良時代の和歌集で、勅撰ではありません。"
      - id: "b"
        text: "古今和歌集（こきんわかしゅう）"
        explanation: "正解です。905年に醍醐天皇の命で紀貫之らが編集した古今和歌集は、日本最初の勅撰（天皇の命で編集された）和歌集です。"
      - id: "c"
        text: "新古今和歌集"
        explanation: "新古今和歌集は鎌倉時代（1205年）に後鳥羽上皇の命で編集されました。"
      - id: "d"
        text: "百人一首"
        explanation: "百人一首は鎌倉時代初期に藤原定家が選んだ和歌集です。"
    answer: "b"

  - id: "jhs-sh-he-018"
    text: "平安時代末期に奥州（東北）を支配した有力な藤原氏の一族を何というか。"
    choices:
      - id: "a"
        text: "藤原摂関家"
        explanation: "藤原摂関家は京都の貴族です。"
      - id: "b"
        text: "奥州藤原氏（おうしゅうふじわらし）"
        explanation: "正解です。奥州藤原氏は平安時代後期に陸奥国（現在の東北地方）を支配し、平泉を拠点に黄金文化を花開かせました。"
      - id: "c"
        text: "西国藤原氏"
        explanation: "西国藤原氏という勢力は特にありません。"
      - id: "d"
        text: "東海藤原氏"
        explanation: "東海藤原氏という勢力は特にありません。"
    answer: "b"

  - id: "jhs-sh-he-019"
    text: "奥州藤原氏の拠点で、中尊寺金色堂がある場所はどこか。"
    choices:
      - id: "a"
        text: "仙台"
        explanation: "仙台は奥州藤原氏の拠点ではありません。"
      - id: "b"
        text: "平泉（ひらいずみ）"
        explanation: "正解です。岩手県の平泉は奥州藤原氏の拠点で、中尊寺金色堂は藤原清衡が建てた黄金の堂です。現在は世界文化遺産に登録されています。"
      - id: "c"
        text: "会津若松"
        explanation: "会津若松は奥州藤原氏の拠点ではありません。"
      - id: "d"
        text: "青森"
        explanation: "青森は奥州藤原氏の拠点ではありません。"
    answer: "b"

  - id: "jhs-sh-he-020"
    text: "平安時代末期に平清盛が行った経済政策として正しいものはどれか。"
    choices:
      - id: "a"
        text: "鉄砲を輸入して軍事力を強化した"
        explanation: "鉄砲の輸入は戦国時代（1543年）のことです。"
      - id: "b"
        text: "宋（中国）と貿易を行い（日宋貿易）、莫大な富を得た"
        explanation: "正解です。平清盛は瀬戸内海の航路を整備し、大輪田泊（神戸）を修築して宋との貿易（日宋貿易）を積極的に行い、平氏の経済力の基盤としました。"
      - id: "c"
        text: "朝鮮半島の高麗と貿易した"
        explanation: "日宋貿易が平清盛の主要な貿易です。"
      - id: "d"
        text: "座（ざ）という同業者組合を作って利益を独占した"
        explanation: "座が発達するのは鎌倉・室町時代です。"
    answer: "b"

  - id: "jhs-sh-he-021"
    text: "939年に関東で起き、平将門が引き起こした反乱を何というか。"
    choices:
      - id: "a"
        text: "壬申の乱"
        explanation: "壬申の乱は672年の出来事です。"
      - id: "b"
        text: "平将門の乱（たいらのまさかどのらん）"
        explanation: "正解です。939年に平将門が関東で反乱を起こし、自ら「新皇」と称しましたが、藤原秀郷・平貞盛らに討たれました。"
      - id: "c"
        text: "保元の乱"
        explanation: "保元の乱は1156年の出来事です。"
      - id: "d"
        text: "承久の乱"
        explanation: "承久の乱は1221年の出来事です。"
    answer: "b"

  - id: "jhs-sh-he-022"
    text: "平安時代に地方の政治が乱れた原因として最も正しいものはどれか。"
    choices:
      - id: "a"
        text: "外国の侵略が相次いだため"
        explanation: "平安時代に外国の侵略はほとんどありませんでした。"
      - id: "b"
        text: "国司（こくし）が税を私物化し、地方政治が腐敗したため"
        explanation: "正解です。国司が収入を増やすために農民を搾取したり、実際には赴任せず収入だけ受け取る遙任（ようにん）が増えるなど、地方政治が乱れました。"
      - id: "c"
        text: "地方の大名が幕府の命令を無視したため"
        explanation: "平安時代にはまだ幕府も大名も存在しませんでした。"
      - id: "d"
        text: "農民一揆が各地で起きたため"
        explanation: "農民一揆が多発するのは室町時代以降です。"
    answer: "b"

  - id: "jhs-sh-he-023"
    text: "平安時代に発達した、귀족の建築様式で、庭に池を配した建物を何というか。"
    choices:
      - id: "a"
        text: "書院造（しょいんづくり）"
        explanation: "書院造は室町時代に発達した建築様式です。"
      - id: "b"
        text: "寝殿造（しんでんづくり）"
        explanation: "正解です。寝殿造は平安時代の貴族の邸宅の建築様式で、南に向いた寝殿（主殿）を中心に、庭に池を配した建物です。"
      - id: "c"
        text: "数寄屋造（すきやづくり）"
        explanation: "数寄屋造は江戸時代に発達した建築様式です。"
      - id: "d"
