questions:
- id: jhs-sh-pa-001
  text: 旧石器時代の人々が使用した石器の特徴として正しいものはどれか。
  choices:
  - id: a
    text: 磨いて作った磨製石器を使用していた
    explanation: 磨製石器は縄文時代以降に普及しました。旧石器時代は打製石器です。
  - id: b
    text: 打ち割って作った打製石器を使用していた
    explanation: 正解です。旧石器時代は石を打ち割って作る打製石器を使用していました。
  - id: c
    text: 鉄製の道具を主に使用していた
    explanation: 鉄器は弥生時代後期以降に日本に伝わりました。
  - id: d
    text: 青銅製の道具を主に使用していた
    explanation: 青銅器は弥生時代に伝わりましたが、主に祭祀用でした。
  answer: b
- id: jhs-sh-pa-002
  text: 縄文時代の人々の生活として正しいものはどれか。
  choices:
  - id: a
    text: 稲作を中心とした農耕生活を送っていた
    explanation: 稲作が始まったのは弥生時代です。縄文時代は狩猟・採集が中心でした。
  - id: b
    text: 狩猟・採集・漁労を中心とした生活を送っていた
    explanation: 正解です。縄文時代の人々は狩猟・採集・漁労で食料を得ていました。
  - id: c
    text: 大規模な水田を作って米を生産していた
    explanation: 水田稲作は弥生時代に始まりました。
  - id: d
    text: 鉄製農具を使って畑を耕していた
    explanation: 鉄製農具は弥生時代後期以降に普及しました。
  answer: b
- id: jhs-sh-pa-003
  text: 縄文時代の遺跡として有名な、青森県にある大規模集落遺跡の名前はどれか。
  choices:
  - id: a
    text: 吉野ヶ里遺跡
    explanation: 吉野ヶ里遺跡は佐賀県にある弥生時代の遺跡です。
  - id: b
    text: 三内丸山遺跡
    explanation: 正解です。青森県にある縄文時代の大規模集落遺跡です。
  - id: c
    text: 登呂遺跡
    explanation: 登呂遺跡は静岡県にある弥生時代の遺跡です。
  - id: d
    text: 纒向遺跡
    explanation: 纒向遺跡は奈良県にある古墳時代の遺跡です。
  answer: b
- id: jhs-sh-pa-004
  text: 縄文時代に使われた土器の特徴はどれか。
  choices:
  - id: a
    text: 表面がなめらかで薄く作られた弥生土器
    explanation: 薄くなめらかな土器は弥生土器の特徴です。
  - id: b
    text: 縄目の文様がついた厚くて黒っぽい縄文土器
    explanation: 正解です。縄文土器は縄目の文様が特徴で、厚くて黒っぽい色をしています。
  - id: c
    text: 高温で焼いた須恵器
    explanation: 須恵器は古墳時代後期から使われた土器です。
  - id: d
    text: 赤みを帯びた薄手の土師器
    explanation: 土師器は古墳時代以降に作られた土器です。
  answer: b
- id: jhs-sh-pa-005
  text: 弥生時代に大陸から伝わったものとして正しいものはどれか。
  choices:
  - id: a
    text: 縄文土器と弓矢
    explanation: 縄文土器と弓矢は縄文時代からすでに使われていました。
  - id: b
    text: 稲作と金属器
    explanation: 正解です。弥生時代に大陸から稲作と金属器が伝わりました。
  - id: c
    text: 仏教と漢字
    explanation: 仏教と漢字が伝わったのは古墳時代です。
  - id: d
    text: 儒教と律令制度
    explanation: 律令制度が整うのは奈良時代です。
  answer: b
- id: jhs-sh-pa-006
  text: 弥生時代の代表的な遺跡で、佐賀県にある環濠集落はどれか。
  choices:
  - id: a
    text: 三内丸山遺跡
    explanation: 三内丸山遺跡は青森県の縄文時代の遺跡です。
  - id: b
    text: 吉野ヶ里遺跡
    explanation: 正解です。吉野ヶ里遺跡は佐賀県にある弥生時代の環濠集落遺跡です。
  - id: c
    text: 岩宿遺跡
    explanation: 岩宿遺跡は群馬県にある旧石器時代の遺跡です。
  - id: d
    text: 大森貝塚
    explanation: 大森貝塚は東京都にある縄文時代の貝塚です。
  answer: b
- id: jhs-sh-pa-007
  text: 「魏志倭人伝」に記された女王国の支配者は誰か。
  choices:
  - id: a
    text: 推古天皇
    explanation: 推古天皇は飛鳥時代の天皇で、卑弥呼とは別の人物です。
  - id: b
    text: 卑弥呼
    explanation: 正解です。卑弥呼は邪馬台国の女王で、魏に使いを送り「親魏倭王」の称号を得ました。
  - id: c
    text: 神功皇后
    explanation: 神功皇后は日本の伝説上の人物で、三韓征伐で知られますが魏志倭人伝の女王ではありません。
  - id: d
    text: 持統天皇
    explanation: 持統天皇は飛鳥時代の天皇です。
  answer: b
- id: jhs-sh-pa-008
  text: 古墳時代に大陸から日本に伝わったものとして正しいものはどれか。
  choices:
  - id: a
    text: 稲作と青銅器
    explanation: 稲作と青銅器は弥生時代に伝わりました。
  - id: b
    text: 仏教と儒教・漢字
    explanation: 正解です。古墳時代（5世紀頃）に仏教・儒教・漢字が伝わりました。
  - id: c
    text: 律令制度と仮名文字
    explanation: 律令制度が整うのは奈良時代、仮名文字は平安時代です。
  - id: d
    text: 鉄砲と火薬
    explanation: 鉄砲が伝わったのは1543年（戦国時代）です。
  answer: b
- id: jhs-sh-pa-009
  text: 古墳の周りに並べられた土製の人形や動物の像を何というか。
  choices:
  - id: a
    text: 埴輪（はにわ）
    explanation: 正解です。埴輪は古墳の周りに並べられた土製の像です。
  - id: b
    text: 土偶（どぐう）
    explanation: 土偶は縄文時代に作られた土製の人形です。古墳とは関係ありません。
  - id: c
    text: 勾玉（まがたま）
    explanation: 勾玉は装飾品で、古墳時代の宝物として副葬されましたが、古墳の外には並べません。
  - id: d
    text: 銅鐸（どうたく）
    explanation: 銅鐸は弥生時代の青銅器で祭祀に使われました。
  answer: a
- id: jhs-sh-pa-010
  text: 日本最大の前方後円墳はどれか。
  choices:
  - id: a
    text: 箸墓古墳
    explanation: 箸墓古墳は奈良県にある大型古墳ですが、最大ではありません。
  - id: b
    text: 大仙陵古墳（仁徳天皇陵）
    explanation: 正解です。大阪府堺市にある大仙陵古墳は世界最大級の墓で、日本最大の前方後円墳です。
  - id: c
    text: 誉田御廟山古墳（応神天皇陵）
    explanation: 誉田御廟山古墳は2番目に大きい前方後円墳です。
  - id: d
    text: 高松塚古墳
    explanation: 高松塚古墳は奈良県にある小規模な古墳で、壁画で有名です。
  answer: b
- id: jhs-sh-pa-011
  text: 縄文時代に人々が住んでいた家はどれか。
  choices:
  - id: a
    text: 平地式住居
    explanation: 平地式住居は弥生時代以降に広まりました。
  - id: b
    text: 竪穴式住居
    explanation: 正解です。縄文時代の人々は地面を掘り下げた竪穴式住居に住んでいました。
  - id: c
    text: 高床式倉庫
    explanation: 高床式倉庫は弥生時代に稲の保管のために作られたものです。
  - id: d
    text: 城郭建築
    explanation: 城郭建築は戦国時代以降のものです。
  answer: b
- id: jhs-sh-pa-012
  text: 弥生時代の特徴として正しいものはどれか。
  choices:
  - id: a
    text: 貧富の差や身分の差がなく平等な社会だった
    explanation: 弥生時代には稲作の普及により貧富の差や身分の差が生まれました。
  - id: b
    text: 稲作の普及により貧富の差や争いが生まれた
    explanation: 正解です。弥生時代には稲作が普及し、富の蓄積が生まれ、貧富の差や村同士の争いが起きました。
  - id: c
    text: 完全に孤立した集落が多く、村同士の交流はなかった
    explanation: 弥生時代には村同士の交流や争いがありました。
  - id: d
    text: 大規模な古墳を作り始めた
    explanation: 古墳を作り始めたのは古墳時代（3世紀後半）からです。
  answer: b
- id: jhs-sh-pa-013
  text: 旧石器時代の遺跡が発見され、日本にも旧石器時代があったことを証明した群馬県の遺跡はどれか。
  choices:
  - id: a
    text: 吉野ヶ里遺跡
    explanation: 吉野ヶ里遺跡は佐賀県の弥生時代の遺跡です。
  - id: b
    text: 岩宿遺跡
    explanation: 正解です。1949年に相沢忠洋が群馬県の岩宿で打製石器を発見し、日本の旧石器時代の存在が証明されました。
  - id: c
    text: 三内丸山遺跡
    explanation: 三内丸山遺跡は青森県の縄文時代の遺跡です。
  - id: d
    text: 登呂遺跡
    explanation: 登呂遺跡は静岡県の弥生時代の遺跡です。
  answer: b
- id: jhs-sh-pa-014
  text: 縄文時代の人々がたんぱく質などを得るために食べたものとして、その残骸が遺跡として残っているものはどれか。
  choices:
  - id: a
    text: 米や麦などの穀物
    explanation: 米や麦の栽培は縄文時代にはまだ普及していませんでした。
  - id: b
    text: 貝や魚などの海の幸
    explanation: 正解です。縄文時代の人々は貝や魚を食べ、その残骸が貝塚として残っています。
  - id: c
    text: 牛や豚などの家畜
    explanation: 日本で牛や豚などの家畜が普及するのはずっと後のことです。
  - id: d
    text: 豆腐や納豆などの大豆製品
    explanation: 大豆製品が普及するのは飛鳥時代以降です。
  answer: b
- id: jhs-sh-pa-015
  text: 弥生時代の稲作で使われた、稲を刈る道具はどれか。
  choices:
  - id: a
    text: 鉄製の鎌
    explanation: 鉄製の鎌が広まるのは古墳時代以降です。弥生時代初期は石包丁でした。
  - id: b
    text: 石包丁（いしぼうちょう）
    explanation: 正解です。弥生時代には石包丁という半月形の石器で稲の穂を摘み取っていました。
  - id: c
    text: 木製の鍬（くわ）
    explanation: 木製の鍬は土を耕す道具で、稲を刈る道具ではありません。
  - id: d
    text: 青銅製の剣
    explanation: 青銅器は祭祀用が多く、農具として使われることは少なかったです。
  answer: b
- id: jhs-sh-pa-016
  text: 古墳時代に朝鮮半島から日本に渡来した人々（渡来人）がもたらしたものとして正しいものはどれか。
  choices:
  - id: a
    text: 稲作と青銅器
    explanation: 稲作と青銅器は弥生時代に伝わりました。
  - id: b
    text: 機織り・須恵器・漢字・仏教などの技術や文化
    explanation: 正解です。渡来人は機織り・陶器（須恵器）・漢字・儒教・仏教など多くの技術と文化をもたらしました。
  - id: c
    text: 鉄砲・火薬の製造技術
    explanation: 鉄砲が伝わったのは1543年（戦国時代）です。
  - id: d
    text: 活版印刷技術
    explanation: 活版印刷は戦国時代末にキリスト教宣教師がもたらしました。
  answer: b
- id: jhs-sh-pa-017
  text: 大和政権（ヤマト王権）の大王たちが5世紀に中国の王朝に使いを送り、「倭の五王」として知られるが、その目的として最も正しいものはどれか。
  choices:
  - id: a
    text: 中国から米の種を輸入するため
    explanation: 稲作はすでに弥生時代に伝わっており、この目的ではありませんでした。
  - id: b
    text: 中国皇帝から権威をもらい、朝鮮半島での立場を有利にするため
    explanation: 正解です。倭の五王は中国皇帝から将軍号などをもらい、朝鮮半島における支配権を認めてもらおうとしました。
  - id: c
    text: 中国の軍事力を借りて他国を征服するため
    explanation: 中国の軍事力を借りるためではなく、外交上の権威付けが目的でした。
  - id: d
    text: 仏教を日本に広めるため
    explanation: 仏教の公式伝来は538年（または552年）で、倭の五王の時代とは別の目的です。
  answer: b
- id: jhs-sh-pa-018
  text: 縄文時代に作られた、女性をかたどったとされる土製の人形を何というか。
  choices:
  - id: a
    text: 埴輪（はにわ）
    explanation: 埴輪は古墳時代に古墳の周りに並べられたものです。
  - id: b
    text: 土偶（どぐう）
    explanation: 正解です。土偶は縄文時代に作られた土製の人形で、豊かな実りを祈るために使われたと考えられています。
  - id: c
    text: 勾玉（まがたま）
    explanation: 勾玉は装飾品（アクセサリー）です。
  - id: d
    text: 銅鐸（どうたく）
    explanation: 銅鐸は弥生時代の青銅器で、祭祀に使われました。
  answer: b
- id: jhs-sh-pa-019
  text: 弥生時代の代表的な青銅器で、近畿地方を中心に出土し、祭祀に使われたと考えられるものはどれか。
  choices:
  - id: a
    text: 銅剣
    explanation: 銅剣は武器や祭祀具として使われましたが、近畿地方の代表的なものは銅鐸です。
  - id: b
    text: 銅鐸（どうたく）
    explanation: 正解です。銅鐸は近畿地方を中心に出土した弥生時代の青銅器で、祭祀用と考えられています。
  - id: c
    text: 銅矛（どうほこ）
    explanation: 銅矛は九州北部を中心に出土しました。
  - id: d
    text: 鉄鏡
    explanation: 鉄鏡は古墳時代の副葬品です。
  answer: b
- id: jhs-sh-pa-020
  text: 古墳時代の有力な豪族で、大和政権の中で大王家に次ぐ権力を持ち、祭祀を担った一族はどれか。
  choices:
  - id: a
    text: 藤原氏
    explanation: 藤原氏が台頭するのは飛鳥時代以降です。
  - id: b
    text: 物部氏と蘇我氏
    explanation: 正解です。物部氏（軍事・祭祀担当）と蘇我氏（財政・外交担当）が古墳時代後期の有力豪族でした。
  - id: c
    text: 平氏と源氏
    explanation: 平氏と源氏が台頭するのは平安時代中期以降です。
  - id: d
    text: 橘氏と菅原氏
    explanation: 橘氏・菅原氏は奈良〜平安時代の貴族です。
  answer: b
- id: jhs-sh-pa-021
  text: 弥生時代の遺跡で、静岡県にあり、水田跡が見つかった有名な遺跡はどれか。
  choices:
  - id: a
    text: 吉野ヶ里遺跡
    explanation: 吉野ヶ里遺跡は佐賀県にある環濠集落遺跡です。
  - id: b
    text: 登呂遺跡
    explanation: 正解です。静岡県にある登呂遺跡は弥生時代の水田跡や住居跡が発見された有名な遺跡です。
  - id: c
    text: 三内丸山遺跡
    explanation: 三内丸山遺跡は青森県の縄文時代の遺跡です。
  - id: d
    text: 岩宿遺跡
    explanation: 岩宿遺跡は群馬県の旧石器時代の遺跡です。
  answer: b
- id: jhs-sh-pa-022
  text: 邪馬台国の位置について、現在の学説では主にどこが有力とされているか。
  choices:
  - id: a
    text: 北海道説と沖縄説
    explanation: 北海道説や沖縄説はほとんど支持されていません。
  - id: b
    text: 九州説と近畿説
    explanation: 正解です。邪馬台国の位置については九州北部説と近畿の大和説が主な学説として議論されています。
  - id: c
    text: 朝鮮半島説と中国大陸説
    explanation: 邪馬台国が日本国外にあったという説は主流ではありません。
  - id: d
    text: 関東説と東北説
    explanation: これらの説は主流ではありません。
  answer: b
- id: jhs-sh-pa-023
  text: 古墳の形のうち、前が四角形で後ろが丸い形の古墳を何というか。
  choices:
  - id: a
    text: 円墳（えんぷん）
    explanation: 円墳は丸い形だけの古墳です。
  - id: b
    text: 前方後円墳（ぜんぽうこうえんふん）
    explanation: 正解です。前が方形（四角）、後ろが円形の鍵穴型の古墳を前方後円墳といいます。
  - id: c
    text: 方墳（ほうふん）
    explanation: 方墳は四角い形の古墳です。
  - id: d
    text: 上円下方墳（じょうえんかほうふん）
    explanation: 上円下方墳は下が方形で上が円形の特殊な古墳です。
  answer: b
- id: jhs-sh-pa-024
  text: 卑弥呼が中国の魏に使いを送った年として正しいものはどれか。
  choices:
  - id: a
    text: 57年
    explanation: 57年は奴国の王が後漢に使いを送り、金印をもらった年です。
  - id: b
    text: 239年
    explanation: 正解です。239年に卑弥呼は魏に使いを送り、「親魏倭王」の称号と金印・銅鏡などをもらいました。
  - id: c
    text: 663年
    explanation: 663年は白村江の戦いの年です。
  - id: d
    text: 538年
    explanation: 538年は仏教が日本に公式に伝わったとされる年です。
  answer: b
- id: jhs-sh-pa-025
  text: 大和政権（ヤマト王権）が日本を統一していく過程で、地方の有力者を国造（くにのみやつこ）や県主（あがたぬし）に任命した理由として最も正しいものはどれか。
  choices:
  - id: a
    text: 地方の有力者をすべて滅ぼして直接支配するため
    explanation: すべてを滅ぼすのではなく、地方の有力者を取り込んで間接的に支配しました。
  - id: b
    text: 地方の有力者を取り込み、地方を間接的に支配するため
    explanation: 正解です。大和政権は地方の有力者を国造・県主に任命することで、彼らを支配体制に組み込み、地方を間接的に統治しました。
