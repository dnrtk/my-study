questions:
  - id: "jhs-sh-ed-001"
    text: "1603年に江戸幕府を開いた人物は誰か。"
    choices:
      - id: "a"
        text: "豊臣秀吉"
        explanation: "豊臣秀吉は天下を統一しましたが、江戸幕府を開いたのは徳川家康です。"
      - id: "b"
        text: "徳川家康（とくがわいえやす）"
        explanation: "正解です。1600年の関ヶ原の戦いで天下を決した徳川家康は、1603年に征夷大将軍に任命され、江戸幕府を開きました。"
      - id: "c"
        text: "徳川秀忠"
        explanation: "徳川秀忠は家康の息子で2代将軍です。"
      - id: "d"
        text: "徳川家光"
        explanation: "徳川家光は3代将軍で、参勤交代などを制度化しました。"
    answer: "b"

  - id: "jhs-sh-ed-002"
    text: "江戸幕府が大名を統制するために定めた法律はどれか。"
    choices:
      - id: "a"
        text: "御成敗式目"
        explanation: "御成敗式目は鎌倉幕府の武家法です。"
      - id: "b"
        text: "武家諸法度（ぶけしょはっと）"
        explanation: "正解です。武家諸法度は大名が守るべき規則を定めた法律で、1615年に初めて制定されました。無断の築城・婚姻の禁止などが規定されています。"
      - id: "c"
        text: "公家諸法度"
        explanation: "公家諸法度は朝廷・公家を統制するための法律です。"
      - id: "d"
        text: "禁中並公家諸法度"
        explanation: "禁中並公家諸法度は天皇・朝廷を統制する法律です。"
    answer: "b"

  - id: "jhs-sh-ed-003"
    text: "3代将軍徳川家光が1635年に制度化した、大名が1年おきに江戸と領国を行き来する制度はどれか。"
    choices:
      - id: "a"
        text: "国替え（くにがえ）"
        explanation: "国替えは大名の領地を変更する措置です。"
      - id: "b"
        text: "参勤交代（さんきんこうたい）"
        explanation: "正解です。参勤交代は大名が1年おきに江戸と国元を往復する制度で、莫大な費用がかかることで大名の財政を弱め、幕府への反抗を防ぎました。"
      - id: "c"
        text: "上知（あげち）"
        explanation: "上知は大名の領地を幕府に返上させることです。"
      - id: "d"
        text: "転封（てんぽう）"
        explanation: "転封は大名の領地を別の土地に移し替えることです。"
    answer: "b"

  - id: "jhs-sh-ed-004"
    text: "江戸幕府の鎖国体制で認められていた貿易相手国はどれか。"
    choices:
      - id: "a"
        text: "スペインとポルトガル"
        explanation: "スペイン・ポルトガルは1624年・1639年に来航を禁止されました。"
      - id: "b"
        text: "オランダと中国（清）"
        explanation: "正解です。鎖国体制下でも長崎の出島でオランダと、唐人屋敷で中国（明・清）との貿易が続けられました。"
      - id: "c"
        text: "イギリスとフランス"
        explanation: "イギリスは1623年に自ら平戸商館を閉鎖し、フランスは貿易関係がありませんでした。"
      - id: "d"
        text: "アメリカとロシア"
        explanation: "アメリカとロシアの来航は幕末まで認められていませんでした。"
    answer: "b"

  - id: "jhs-sh-ed-005"
    text: "江戸幕府が1637年のキリスト教徒らによる反乱をきっかけに出した命令はどれか。"
    choices:
      - id: "a"
        text: "刀狩り令"
        explanation: "刀狩り令は豊臣秀吉が1588年に出した命令です。"
      - id: "b"
        text: "ポルトガル船来航禁止（鎖国の完成）"
        explanation: "正解です。1637年の島原・天草の一揆（島原の乱）を機に、1639年にポルトガル船の来航が禁止され、鎖国体制がほぼ完成しました。"
      - id: "c"
        text: "株仲間の禁止"
        explanation: "株仲間の禁止は天保の改革（1841年）で行われました。"
      - id: "d"
        text: "参勤交代の廃止"
        explanation: "参勤交代は1635年に制度化され、幕末まで続きました。"
    answer: "b"

  - id: "jhs-sh-ed-006"
    text: "江戸時代に農村で広まった、同じ村の農民が共同で農作業や自治を行う組織はどれか。"
    choices:
      - id: "a"
        text: "座（ざ）"
        explanation: "座は室町時代の商工業者の同業者組合です。"
      - id: "b"
        text: "五人組（ごにんぐみ）"
        explanation: "正解です。五人組は江戸幕府が農民を5戸ずつ組にまとめ、年貢の連帯納入・犯罪防止・キリシタン摘発などに互いに責任を負わせた制度です。"
      - id: "c"
        text: "惣（そう）"
        explanation: "惣は室町時代の農村自治組織です。"
      - id: "d"
        text: "株仲間"
        explanation: "株仲間は江戸時代の商工業者の組合です。"
    answer: "b"

  - id: "jhs-sh-ed-007"
    text: "8代将軍徳川吉宗が行った改革はどれか。"
    choices:
      - id: "a"
        text: "寛政の改革"
        explanation: "寛政の改革は松平定信が行いました。"
      - id: "b"
        text: "享保の改革（きょうほうのかいかく）"
        explanation: "正解です。8代将軍徳川吉宗は享保の改革（1716〜45年頃）で公事方御定書の制定・目安箱設置・上米の制などの政策を行いました。"
      - id: "c"
        text: "天保の改革"
        explanation: "天保の改革は老中水野忠邦が行いました。"
      - id: "d"
        text: "田沼時代の重商主義政策"
        explanation: "田沼意次の政策は商業重視の政策で、享保の改革とは別です。"
    answer: "b"

  - id: "jhs-sh-ed-008"
    text: "江戸時代中期に発展した、上方（大阪・京都）の町人が担った文化はどれか。"
    choices:
      - id: "a"
        text: "東山文化"
        explanation: "東山文化は室町時代の文化です。"
      - id: "b"
        text: "元禄文化（げんろくぶんか）"
        explanation: "正解です。17世紀末〜18世紀初め、上方（大阪・京都）の町人を中心に栄えた文化を元禄文化といいます。松尾芭蕉・近松門左衛門・井原西鶴などが活躍しました。"
      - id: "c"
        text: "化政文化"
        explanation: "化政文化は19世紀初め、江戸の町人が担った文化です。"
      - id: "d"
        text: "天平文化"
        explanation: "天平文化は奈良時代の文化です。"
    answer: "b"

  - id: "jhs-sh-ed-009"
    text: "元禄文化を代表する俳人で、「奥の細道」を著した人物は誰か。"
    choices:
      - id: "a"
        text: "与謝蕪村"
        explanation: "与謝蕪村は化政文化期の俳人・画家です。"
      - id: "b"
        text: "松尾芭蕉（まつおばしょう）"
        explanation: "正解です。松尾芭蕉は元禄文化の代表的な俳人で、「奥の細道」の旅で多くの名句を残しました。「古池や蛙飛びこむ水の音」で有名です。"
      - id: "c"
        text: "小林一茶"
        explanation: "小林一茶は化政文化期の俳人です。"
      - id: "d"
        text: "紀貫之"
        explanation: "紀貫之は平安時代の歌人です。"
    answer: "b"

  - id: "jhs-sh-ed-010"
    text: "江戸時代後期に江戸の町人を中心に発展した文化はどれか。"
    choices:
      - id: "a"
        text: "元禄文化"
        explanation: "元禄文化は上方（大阪・京都）を中心とした文化です。"
      - id: "b"
        text: "化政文化（かせいぶんか）"
        explanation: "正解です。19世紀初め（文化・文政年間）、江戸の町人を中心に発展した文化を化政文化といいます。葛飾北斎・歌川広重・十返舎一九・滝沢馬琴などが活躍しました。"
      - id: "c"
        text: "東山文化"
        explanation: "東山文化は室町時代の文化です。"
      - id: "d"
        text: "桃山文化"
        explanation: "桃山文化は安土桃山時代の文化です。"
    answer: "b"

  - id: "jhs-sh-ed-011"
    text: "化政文化を代表する浮世絵師で、「富嶽三十六景」を描いたのは誰か。"
    choices:
      - id: "a"
        text: "歌川広重"
        explanation: "歌川広重は「東海道五十三次」で有名な浮世絵師です。"
      - id: "b"
        text: "葛飾北斎（かつしかほくさい）"
        explanation: "正解です。葛飾北斎は「富嶽三十六景（とみのきく さんじゅうろっけい）」をはじめとする浮世絵で知られ、海外にも大きな影響を与えました。"
      - id: "c"
        text: "菱川師宣"
        explanation: "菱川師宣は元禄文化期に活躍した浮世絵の先駆者です。"
      - id: "d"
        text: "狩野永徳"
        explanation: "狩野永徳は安土桃山時代の絵師です。"
    answer: "b"

  - id: "jhs-sh-ed-012"
    text: "江戸時代に農民が年貢の軽減などを求めて起こした一揆を何というか。"
    choices:
      - id: "a"
        text: "土一揆"
        explanation: "土一揆は室町時代の一揆です。"
      - id: "b"
        text: "百姓一揆（ひゃくしょういっき）"
        explanation: "正解です。江戸時代に農民が年貢の軽減・不正役人の処罰などを求めて領主に抵抗した集団的行動を百姓一揆といいます。"
      - id: "c"
        text: "一向一揆"
        explanation: "一向一揆は主に室町〜戦国時代に浄土真宗信者が起こした一揆です。"
      - id: "d"
        text: "打ちこわし"
        explanation: "打ちこわしは都市の貧民が米屋などを壊した行動で、百姓一揆とは区別されます。"
    answer: "b"

  - id: "jhs-sh-ed-013"
    text: "江戸時代に杉田玄白らが翻訳したオランダ語の医学解剖書はどれか。"
    choices:
      - id: "a"
        text: "農業全書"
        explanation: "農業全書は宮崎安貞が著した農業技術書です。"
      - id: "b"
        text: "解体新書（かいたいしんしょ）"
        explanation: "正解です。杉田玄白・前野良沢らは1774年にオランダ語の解剖書「ターヘル・アナトミア」を翻訳し「解体新書」として出版しました。蘭学の発展に貢献しました。"
      - id: "c"
        text: "日本書紀"
        explanation: "日本書紀は奈良時代の歴史書です。"
      - id: "d"
        text: "古事記伝"
        explanation: "古事記伝は本居宣長が古事記を研究した書物です。"
    answer: "b"

  - id: "jhs-sh-ed-014"
    text: "江戸時代に国学を大成し、「古事記伝」を著した人物は誰か。"
    choices:
      - id: "a"
        text: "平賀源内"
        explanation: "平賀源内は蘭学者・発明家で、エレキテルを作りました。"
      - id: "b"
        text: "本居宣長（もとおりのりなが）"
        explanation: "正解です。本居宣長は古事記の研究を通じて国学を大成し、日本古来の精神（大和心）を重んじる思想を広めました。"
      - id: "c"
        text: "伊能忠敬"
        explanation: "伊能忠敬は日本全国を測量して正確な地図（大日本沿海輿地全図）を作成した人物です。"
      - id: "d"
        text: "吉田松陰"
        explanation: "吉田松陰は幕末の思想家・教育者です。"
    answer: "b"

  - id: "jhs-sh-ed-015"
    text: "江戸時代に松平定信が行った改革はどれか。"
    choices:
      - id: "a"
        text: "享保の改革"
        explanation: "享保の改革は徳川吉宗が行いました。"
      - id: "b"
        text: "寛政の改革（かんせいのかいかく）"
        explanation: "正解です。松平定信は老中として寛政の改革（1787〜93年）を行い、倹約令・農村復興・旗本・御家人の借金帳消しなどを実施しました。"
      - id: "c"
        text: "天保の改革"
        explanation: "天保の改革は水野忠邦が行いました。"
      - id: "d"
        text: "安政の改革"
        explanation: "安政の改革という特定の改革はありません。"
    answer: "b"

  - id: "jhs-sh-ed-016"
    text: "江戸幕府が3代将軍家光の時代に発令した、日本人の海外渡航・帰国を禁じた命令はどれか。"
    choices:
      - id: "a"
        text: "異国船打払令"
        explanation: "異国船打払令は1825年に外国船を打ち払うよう命じた法令です。"
      - id: "b"
        text: "鎖国令（さこくれい）"
        explanation: "正解です。1635年の鎖国令で、日本人の海外渡航と帰国が全面的に禁止されました。"
      - id: "c"
        text: "禁教令"
        explanation: "禁教令（1612〜13年）はキリスト教を禁止した命令です。"
      - id: "d"
        text: "一国一城令"
        explanation: "一国一城令（1615年）は大名の城を一つに限った命令です。"
    answer: "b"

  - id: "jhs-sh-ed-017"
    text: "江戸時代の身分制度について、人口の最も多い身分はどれか。"
    choices:
      - id: "a"
        text: "武士"
        explanation: "武士は支配階級ですが、人口割合は約7〜8%程度でした。"
      - id: "b"
        text: "百姓（農民）"
        explanation: "正解です。江戸時代の人口の約80〜85%を百姓（農民）が占めており、最も人口が多い身分でした。"
      - id: "c"
        text: "町人（商人・職人）"
        explanation: "町人は人口の約6〜7%程度でした。"
      - id: "d"
        text: "公家（貴族）"
        explanation: "公家は人口のごく少数でした。"
    answer: "b"

  - id: "jhs-sh-ed-018"
    text: "江戸時代に庶民の子供が読み書き・そろばんを学んだ施設はどれか。"
    choices:
      - id: "a"
        text: "藩校（はんこう）"
        explanation: "藩校は武士の子弟が学ぶ学校です。"
      - id: "b"
        text: "寺子屋（てらこや）"
        explanation: "正解です。寺子屋は江戸時代に庶民の子供が読み・書き・そろばんなどを学んだ施設で、幕末には全国に数万か所あったとされます。"
      - id: "c"
        text: "郷校（ごうこう）"
        explanation: "郷校は地方で武士や農民が学ぶ学校の一形態です。"
      - id: "d"
        text: "大学寮"
        explanation: "大学寮は奈良時代の貴族・官人養成機関です。"
    answer: "b"

  - id: "jhs-sh-ed-019"
    text: "江戸時代に水野忠邦が行った改革はどれか。"
    choices:
      - id: "a"
        text: "享保の改革"
        explanation: "享保の改革は徳川吉宗が行いました。"
      - id: "b"
        text: "天保の改革（てんぽうのかいかく）"
        explanation: "正解です。水野忠邦は老中として天保の改革（1841〜43年）を行い、倹約令・株仲間の解散・人返し令などを実施しましたが、反発を受けて失敗しました。"
      - id: "c"
        text: "寛政の改革"
        explanation: "寛政の改革は松平定信が行いました。"
      - id: "d"
        text: "文久の改革"
        explanation: "文久の改革は幕末（1862年）に行われた改革です。"
    answer: "b"

  - id: "jhs-sh-ed-020"
    text: "江戸時代に鎖国下で許可されていた朝鮮との外交関係はどのようなものか。"
    choices:
      - id: "a"
        text: "長崎で朝鮮人屋敷を設けて貿易した"
        explanation: "朝鮮との関係は長崎ではなく対馬藩を通じて行われました。"
      - id: "b"
        text: "対馬藩を仲介として朝鮮（李朝）と国交・貿易があった"
        explanation: "正解です。鎖国中も対馬藩（宗氏）が朝鮮との外交・貿易を仲介し、将軍就任時には朝鮮から通信使が江戸を訪れました。"
      - id: "c"
        text: "朝鮮との関係はすべて断絶していた"
        explanation: "朝鮮とは対馬藩を通じて交流が続いていました。"
      - id: "d"
        text: "薩摩藩が直接朝鮮と貿易した"
        explanation: "薩摩藩は琉球王国（現在の沖縄）との関係を担っていました。"
    answer: "b"

  - id: "jhs-sh-ed-021"
    text: "江戸幕府の組織において、将軍の補佐役として幕府の政治を実質的に動かした役職はどれか。"
    choices:
      - id: "a"
        text: "管領（かんれい）"
        explanation: "管領は室町幕府の将軍補佐役です。"
      - id: "b"
        text: "老中（ろうじゅう）"
        explanation: "正解です。老中は江戸幕府の最高役職で、複数名が月番で政務を担当し、将軍を補佐して幕政を運営しました。"
      - id: "c"
        text: "大老（たいろう）"
        explanation: "大老は老中の上位に置かれる最高職ですが、臨時的な役職で常設ではありませんでした。"
      - id: "d"
        text: "執権（しっけん）"
        explanation: "執権は鎌倉幕府の将軍補佐役です。"
    answer: "b"

  - id: "jhs-sh-ed-022"
    text: "江戸時代に新井白石が行った政策として正しいものはどれか。"
    choices:
      - id: "a"
        text: "享保の改革"
        explanation: "享保の改革は徳川吉宗が行いました。"
      - id: "b"
        text: "正徳の治（しょうとくのち）"
        explanation: "正解です。6代・7代将軍の時代に新井白石は儒学に基づいた政治改革（正徳の治）を行い、長崎貿易の制限・朝鮮通信使の接待簡素化などを実施しました。"
      - id: "c"
        text: "田沼政治"
        explanation: "田沼意次による重商主義政策は18世紀後半の政策です。"
      - id: "d"
        text: "寛政の改革"
        explanation: "寛政の改革は松平定信が行いました。"
    answer: "b"

  - id: "jhs-sh-ed-023"
    text: "江戸時代の農業発展として正しいものはどれか。"
    choices:
      - id: "a"
        text: "稲作が初めて本格的に始まった"
        explanation: "稲作は弥生時代から行われています。"
      - id: "b"
        text: "新田開発が進み、農業技術（肥料・農具）が向上した"
        explanation: "正解です。江戸時代には積極的に新田が開発され、干鰯（ほしか）などの金肥・備中鍬（びっちゅうぐわ）・千歯こきなどの農具改良により生産量が増加しました。"
      - id: "c"
        text: "農民が土地を自由に売買できるようになった"
        explanation: "田畑永代売買禁止令（1643年）で土地の売買は禁止されていました。"
      - id: "d"
        text: "大規模な農業経営会社が設立された"
        explanation: "江戸時代に近代的な農業経営会社は存在しませんでした。"
    answer: "b"

  - id: "jhs-sh-ed-024"
    text: "江戸時代に「東海道中膝栗毛」を著した作家は誰か。"
    choices:
      - id: "a"
        text: "滝沢馬琴"
        explanation: "滝沢馬琴は「南総里見八犬伝」を著した作家です。"
      - id: "b"
        text: "十返舎一九（じっぺんしゃいっく）"
        explanation: "正解です。十返舎一九は化政文化期の作家で、弥次さんと喜多さんが東海道を旅する滑稽本「東海道中膝栗毛」を著しました。"
      - id: "c"
        text: "近松門左衛門"
        explanation: "近松門左衛門は元禄文化期の浄瑠璃・歌舞伎作者です。"
      - id: "d"
        text: "井原西鶴"
        explanation: "井原西鶴は元禄文化期の浮世草子作者です。"
    answer: "b"

  - id: "jhs-sh-ed-025"
    text: "1853年にアメリカの使節としてペリーが来航した際に持参した、開国を求める書簡はどこの大統領のものか。"
    choices:
      - id: "a"
        text: "ウィルソン大統領"
        explanation: "ウィルソンは第一次世界大戦期の大統領です。"
      - id: "b"
        text: "フィルモア大統領"
        explanation: "正解です。ペリーは第13代大統領ミラード・フィルモアの親書を携えて来航し、開国・通商を要求しました。"
      - id: "c"
        text: "リンカーン大統領"
        explanation: "リンカーンは南北戦争期（1861〜65年）の大統領です。"
      - id: "d"
        text: "ワシントン大統領"
        explanation: "ワシントンは初代大統領（1789〜97年）で、ペリー来航の時代とは異なります。"
    answer: "b"

  - id: "jhs-sh-ed-026"
    text: "江戸幕府の大名を親藩・譜代・外様に区別した際、「親藩」とはどのような大名か。"
    choices:
      - id: "a"
        text: "関ヶ原の戦いで東軍に味方した大名"
        explanation: "関ヶ原で東軍に味方したのは主に譜代大名です。"
      - id: "b"
        text: "徳川氏の一族（徳川御三家など）"
        explanation: "正解です。親藩は徳川家康の子孫や一族の大名で、尾張・紀伊・水戸の御三家が代表的です。将軍家に後継者がいないときに跡継ぎを出しました。"
      - id: "c"
        text: "関ヶ原以前から徳川氏に仕えた大名"
        explanation: "それは譜代大名の説明です。"
      - id: "d"
        text: "関ヶ原の戦いで西軍に属した大名"
        explanation: "関ヶ原で西軍についた大名は外様大名とされました。"
    answer: "b"

  - id: "jhs-sh-ed-027"
    text: "江戸幕府が外様大名を江戸から遠い地に配置した理由として正しいものはどれか。"
    choices:
      - id: "a"
        text: "外様大名は農業に向いた土地を与えられたため"
        explanation: "土地の農業適性が理由ではありません。"
      - id: "b"
        text: "幕府への反乱を防ぐため、遠隔地に置いて監視しやすくした"
        explanation: "正解です。関ヶ原で西軍についた外様大名は信頼できないとして、薩摩・長州・仙台など江戸から遠い地に配置され、反乱があっても江戸に迫るまで時間がかかるよう計算されました。"
      - id: "c"
        text: "外様大名が自ら遠い土地を希望したため"
        explanation: "外様大名が自発的に遠方を希望したわけではありません。"
      - id: "d"
        text: "外様大名は海外との貿易を担ったため"
        explanation: "江戸時代の貿易は幕府が管理しており、外様大名が担ったわけではありません。"
    answer: "b"

  - id: "jhs-sh-ed-028"
    text: "江戸時代に将軍の補佐として置かれた「老中」の下に、旗本・御家人を管理する役職はどれか。"
    choices:
      - id: "a"
        text: "管領（かんれい）"
        explanation: "管領は室町幕府の役職です。"
      - id: "b"
        text: "若年寄（わかどしより）"
        explanation: "正解です。若年寄は老中の下に置かれ、旗本・御家人の監督などを担当した役職です。"
      - id: "c"
        text: "勘定奉行"
        explanation: "勘定奉行は幕府の財政・領地の行政を担当する役職です。"
      - id: "d"
        text: "町奉行"
        explanation: "町奉行は城下町の行政・司法・警察を担当する役職です。"
    answer: "b"

  - id: "jhs-sh-ed-029"
    text: "江戸時代に幕府の直轄都市（江戸・大坂・京都など）の行政・警察を担当した役職はどれか。"
    choices:
      - id: "a"
        text: "郡代（ぐんだい）"
        explanation: "郡代は農村部の天領（幕府直轄地）を管轄する役職です。"
      - id: "b"
        text: "町奉行（まちぶぎょう）"
        explanation: "正解です。町奉行は幕府の直轄都市（三都など）で行政・裁判・消防・警察などを担った役職で、江戸では南北2名が月番で担当しました。"
      - id: "c"
        text: "代官（だいかん）"
        explanation: "代官は農村部の天領を管理する下級役人です。"
      - id: "d"
        text: "寺社奉行"
        explanation: "寺社奉行は寺社・僧侶・神職を管轄する役職です。"
    answer: "b"

  - id: "jhs-sh-ed-030"
    text: "江戸時代に大坂が「天下の台所」と呼ばれた理由として正しいものはどれか。"
    choices:
      - id: "a"
        text: "将軍が大坂に住んでいたため"
        explanation: "将軍は江戸に住んでおり、大坂には住んでいませんでした。"
      - id: "b"
        text: "全国の米や商品が集まり、日本の経済・流通の中心地だったため"
        explanation: "正解です。大坂には各藩の蔵屋敷が置かれ、全国の米や物産が集まりました。堂島の米市場など経済の中心として機能したため「天下の台所」と呼ばれました。"
      - id: "c"
        text: "大坂が日本一の農業生産地だったため"
        explanation: "大坂は農業生産より商業・流通の中心地でした。"
      - id: "d"
        text: "大坂で最も美味しい料理が作られていたため"
        explanation: "「台所」は比喩的表現で、実際の料理の意味ではありません。"
    answer: "b"

  - id: "jhs-sh-ed-031"
    text: "江戸時代に西廻り航路（北前船）と東廻り航路を整備した人物は誰か。"
    choices:
      - id: "a"
        text: "田沼意次"
        explanation: "田沼意次は18世紀後半に重商主義政策を行った老中です。"
      - id: "b"
        text: "河村瑞賢（かわむらずいけん）"
        explanation: "正解です。河村瑞賢は17世紀後半に東廻り航路（太平洋廻り）・西廻り航路（日本海廻り）を整備し、全国的な流通ネットワークを確立しました。"
      - id: "c"
        text: "徳川光圀"
        explanation: "徳川光圀（水戸黄門）は水戸藩主で「大日本史」の編纂で有名です。"
      - id: "d"
        text: "松尾芭蕉"
        explanation: "松尾芭蕉は俳人で、航路整備とは関係ありません。"
    answer: "b"

  - id: "jhs-sh-ed-032"
    text: "江戸時代に幕府が農民に課した主な税は何か。"
    choices:
      - id: "a"
        text: "消費税"
        explanation: "消費税は近代の制度です。"
      - id: "b"
        text: "年貢（ねんぐ）"
        explanation: "正解です。年貢は農民が収穫した米の一定割合（概ね40〜50%）を領主（幕府・藩）に納める税で、江戸時代の財政の根幹でした。四公六民・五公五民などの比率がありました。"
      - id: "c"
        text: "地租（ちそ）"
        explanation: "地租は明治時代の地租改正後の税の名称です。"
      - id: "d"
        text: "商業税"
        explanation: "農民に課された主な税は年貢で、商業税ではありません。"
    answer: "b"

  - id: "jhs-sh-ed-033"
    text: "江戸時代に蝦夷地（北海道）を支配し、アイヌとの交易を独占した藩はどれか。"
    choices:
      - id: "a"
        text: "薩摩藩"
        explanation: "薩摩藩は琉球王国を支配しました。"
      - id: "b"
        text: "松前藩（まつまえはん）"
        explanation: "正解です。松前藩は江戸時代を通じて蝦夷地を支配し、アイヌ民族との交易（場所請負制）を独占しました。"
      - id: "c"
        text: "対馬藩"
        explanation: "対馬藩は朝鮮との交易を担いました。"
      - id: "d"
        text: "仙台藩"
        explanation: "仙台藩は伊達氏が支配した東北の大藩です。"
    answer: "b"

  - id: "jhs-sh-ed-034"
    text: "江戸幕府が初期に定めた「一国一城令」（1615年）の内容はどれか。"
    choices:
      - id: "a"
        text: "全国の城をすべて取り壊すこと"
        explanation: "全城の取り壊しではなく、居城以外の城の取り壊しです。"
      - id: "b"
        text: "大名は居城一つだけを持ち、その他の城を取り壊すこと"
        explanation: "正解です。一国一城令は各大名が居城以外の城・陣屋をすべて取り壊すことを命じたもので、大名の軍事力を制限しました。"
      - id: "c"
        text: "将軍だけが城を持つこと"
        explanation: "将軍のみに城が許可されたわけではなく、各大名が居城一つを持つことが認められました。"
      - id: "d"
        text: "城の建設を全面的に禁止すること"
        explanation: "城の建設を全面禁止したのではなく、居城以外の取り壊しを命じました。"
    answer: "b"

  - id: "jhs-sh-ed-035"
    text: "江戸時代に薩摩藩が支配し、中国・日本との交易を行っていた王国はどれか。"
    choices:
      - id: "a"
        text: "朝鮮王朝（李朝）"
        explanation: "朝鮮王朝との交易は対馬藩が担いました。"
      - id: "b"
        text: "琉球王国（りゅうきゅうおうこく）"
        explanation: "正解です。1609年の薩摩藩による琉球侵攻後、琉球王国は薩摩藩の支配下に置かれながらも、中国（清）との朝貢貿易を続け、日本はその利益を得ました。"
      - id: "c"
        text: "蝦夷地"
        explanation: "蝦夷地は松前藩が支配しました。"
      - id: "d"
        text: "対馬"
        explanation: "対馬は対馬藩の領地で、朝鮮との交易を担いました。"
    answer: "b"

  - id: "jhs-sh-ed-036"
    text: "江戸時代に田沼意次が行った政策の特徴として正しいものはどれか。"
    choices:
      - id: "a"
        text: "農業を重視して商業を規制した"
        explanation: "田沼意次の政策は農業重視ではなく商業重視でした。"
      - id: "b"
        text: "商業・貿易を奨励し、株仲間を公認して税を取った"
        explanation: "正解です。田沼意次は商品経済の発展を利用して財政を立て直すため、株仲間の公認・長崎貿易の拡大・印旛沼の干拓などの重商主義政策を行いました。"
      - id: "c"
        text: "倹約令を出して庶民の生活を引き締めた"
        explanation: "倹約令を重視したのは吉宗・松平定信・水野忠邦などです。"
      - id: "d"
        text: "農民への借金帳消しを行った"
        explanation: "農民への徳政令的な政策は享保・寛政の改革での施策です。"
    answer: "b"

  - id: "jhs-sh-ed-037"
    text: "江戸時代に特定商品の専売制・株仲間の公認など重商主義政策を推進したが、賄賂政治と批判された老中は誰か。"
    choices:
      - id: "a"
        text: "松平定信"
        explanation: "松平定信は寛政の改革を行った倹約重視の老中です。"
      - id: "b"
        text: "田沼意次（たぬまおきつぐ）"
        explanation: "正解です。田沼意次は商業振興策で経済を活性化しようとしましたが、賄賂政治が横行したと批判されました。「お蔭参り」ブームや浮世絵の発展もこの時代です。"
      - id: "c"
        text: "水野忠邦"
        explanation: "水野忠邦は天保の改革を行った老中です。"
      - id: "d"
        text: "徳川吉宗"
        explanation: "徳川吉宗は享保の改革を行った将軍です。"
    answer: "b"

  - id: "jhs-sh-ed-038"
    text: "江戸時代に庶民が神社仏閣にお参りする旅（お伊勢参りなど）が盛んになった理由はどれか。"
    choices:
      - id: "a"
        text: "幕府が参拝を義務付けたため"
        explanation: "幕府が参拝を義務付けたわけではありません。"
      - id: "b"
        text: "街道が整備されて旅が容易になり、庶民の生活にゆとりが生まれたため"
        explanation: "正解です。江戸時代中期以降、五街道などが整備されて旅が安全になり、経済発展で庶民の生活に余裕が生まれたため、お伊勢参りや善光寺参りなどの旅が盛んになりました。"
      - id: "c"
        text: "旅をしないと重税が課されたため"
        explanation: "旅をしないことへの課税はありませんでした。"
      - id: "d"
        text: "キリスト教禁止の代わりに神社仏閣への参拝が義務化されたため"
        explanation: "キリシタン禁止と参拝の義務化は宗門改めの寺請制度ですが、旅の普及の直接原因ではありません。"
    answer: "b"

  - id: "jhs-sh-ed-039"
    text: "江戸時代に蘭学者・杉田玄白らが解体新書を翻訳するきっかけとなった出来事はどれか。"
    choices:
      - id: "a"
        text: "オランダ商館から解剖学の教科書を贈られたため"
        explanation: "正確なきっかけは異なります。"
      - id: "b"
        text: "小塚原（こづかっぱら）の刑場で死刑囚の解剖を見学し、オランダの解剖書の正確さを実感したため"
        explanation: "正解です。杉田玄白・前野良沢らは1771年に小塚原の刑場で腑分け（解剖）を見学し、オランダ語の解剖書「ターヘル・アナトミア」の正確さに驚き、翻訳を決意しました。"
      - id: "c"
        text: "江戸幕府から翻訳を命じられたため"
        explanation: "幕府の命令で翻訳したわけではありません。"
      - id: "d"
        text: "長崎でオランダ人医師から直接学んだため"
        explanation: "杉田玄白らは長崎に行ったわけではありませんでした。"
    answer: "b"

  - id: "jhs-sh-ed-040"
    text: "江戸時代に全国を測量して正確な日本地図（大日本沿海輿地全図）を作成した人物は誰か。"
    choices:
      - id: "a"
        text: "杉田玄白"
        explanation: "杉田玄白は解体新書を翻訳した蘭学者です。"
      - id: "b"
        text: "伊能忠敬（いのうただたか）"
        explanation: "正解です。伊能忠敬は50歳を超えてから17年かけて全国を歩いて測量し、正確な日本地図（大日本沿海輿地全図）を作成しました。"
      - id: "c"
        text: "本居宣長"
        explanation: "本居宣長は国学者で、「古事記伝」を著しました。"
      - id: "d"
        text: "平賀源内"
        explanation: "平賀源内はエレキテルなどを発明した蘭学者・発明家です。"
    answer: "b"

  - id: "jhs-sh-ed-041"
    text: "江戸時代後期に「東海道五十三次」で知られる浮世絵を描いた絵師は誰か。"
    choices:
      - id: "a"
        text: "葛飾北斎"
        explanation: "葛飾北斎は「富嶽三十六景」で有名な絵師です。"
      - id: "b"
        text: "歌川広重（うたがわひろしげ）"
        explanation: "正解です。歌川広重は東海道の53の宿場を描いた「東海道五十三次」で知られる化政文化期の浮世絵師です。"
      - id: "c"
        text: "菱川師宣"
        explanation: "菱川師宣は元禄期の浮世絵の先駆者で「見返り美人図」が有名です。"
      - id: "d"
        text: "喜多川歌麿"
        explanation: "喜多川歌麿は美人画で知られる浮世絵師です。"
    answer: "b"

  - id: "jhs-sh-ed-042"
    text: "江戸時代の三大改革のうち、「享保・寛政・天保」の改革に共通するテーマはどれか。"
    choices:
      - id: "a"
        text: "商業の振興と貿易の拡大"
        explanation: "商業振興は田沼意次の政策で、三大改革の共通テーマではありません。"
      - id: "b"
        text: "財政再建・倹約・農村復興"
        explanation: "正解です。享保・寛政・天保の三大改革はいずれも幕府財政の悪化に対応し、倹約令の発布・農村復興・質素な生活の奨励という共通した方向性を持っていました。"
      - id: "c"
        text: "民主主義の推進"
        explanation: "民主主義は江戸時代の価値観にはありません。"
      - id: "d"
        text: "外国との積極的な貿易"
        explanation: "江戸時代は鎖国政策をとっており、積極的な外国貿易は行いませんでした。"
    answer: "b"

  - id: "jhs-sh-ed-043"
    text: "江戸時代の武士の生活として正しいものはどれか。"
    choices:
      - id: "a"
        text: "武士は商売をして生計を立てた"
        explanation: "武士は原則として商売を行うことは恥とされていました。"
      - id: "b"
        text: "武士は主に藩から支給される俸禄（石高）で生活した"
        explanation: "正解です。武士は領主（幕府や藩）から石高に応じた米（俸禄）を支給されて生活しました。江戸時代後期には俸禄では生活できず内職をする武士も増えました。"
      - id: "c"
        text: "武士は農地を耕して自給自足した"
        explanation: "農業を行ったのは農民で、武士は農業をしないことが原則でした。"
      - id: "d"
        text: "武士は全員が城に住んでいた"
        explanation: "武士全員が城に住んでいたわけではなく、城下町の武家屋敷に住みました。"
    answer: "b"

  - id: "jhs-sh-ed-044"
    text: "江戸時代に発達した俳諧（はいかい）の特徴として正しいものはどれか。"
    choices:
      - id: "a"
        text: "漢文で書かれた中国風の詩"
        explanation: "俳諧は日本語で詠む詩の一形式です。"
      - id: "b"
        text: "5・7・5の17音からなる短い詩（俳句の前身）"
        explanation: "正解です。俳諧は連歌から発展した5・7・5の発句を中心とする詩の形式で、松尾芭蕉がその芸術性を高め、後に正岡子規が「俳句」として独立させました。"
      - id: "c"
        text: "5・7・5・7・7の31音からなる和歌"
        explanation: "31音は和歌（短歌）の形式です。"
      - id: "d"
        text: "物語形式の長編文学"
        explanation: "俳諧は物語ではなく短い詩の形式です。"
    answer: "b"

  - id: "jhs-sh-ed-045"
    text: "1637年に起きた島原・天草の一揆（島原の乱）で、農民・キリシタンの一揆軍が立てこもった場所はどれか。"
    choices:
      - id: "a"
        text: "熊本城"
        explanation: "熊本城は江戸時代の城で、一揆軍が立てこもった場所ではありません。"
      - id: "b"
        text: "原城（はらじょう）"
        explanation: "正解です。島原の乱では天草四郎（益田時貞）を指導者に3万7千人余りが旧原城に立てこもり、幕府の大軍に包囲されて全滅しました。"
      - id: "c"
        text: "大坂城"
        explanation: "大坂城は豊臣・徳川の大坂の陣の舞台です。"
      - id: "d"
        text: "長崎の出島"
        explanation: "出島はオランダ商館が置かれた場所です。"
    answer: "b"

  - id: "jhs-sh-ed-046"
    text: "江戸時代の幕府が寺院を使ってキリシタンの取り締まりを行った制度を何というか。"
    choices:
      - id: "a"
        text: "五人組制度"
        explanation: "五人組は農村での連帯責任制度です。"
      - id: "b"
        text: "寺請制度（てらうけせいど）"
        explanation: "正解です。寺請制度は、すべての人々がいずれかの寺に檀家として所属し、キリシタンでないことを証明させる制度で、宗門人別帳が作られました。"
      - id: "c"
        text: "検地制度"
        explanation: "検地は土地調査の制度です。"
      - id: "d"
        text: "踏み絵制度"
        explanation: "踏み絵はキリシタン摘発の手段の一つですが、制度の総称は寺請制度です。"
    answer: "b"

  - id: "jhs-sh-ed-047"
    text: "江戸時代に武士が守るべき道徳として広まった思想はどれか。"
    choices:
      - id: "a"
        text: "仏教の八正道"
        explanation: "八正道は仏教の道徳ですが、武士の道徳の主流ではありません。"
      - id: "b"
        text: "儒学（朱子学）・武士道"
        explanation: "正解です。江戸幕府は儒学（特に朱子学）を官学として奨励し、忠・孝・礼などを重視する価値観が武士の道徳として広まりました。また武士道も発展しました。"
      - id: "c"
        text: "キリスト教の教え"
        explanation: "キリスト教は禁止されており、武士の道徳にはなりません。"
      - id: "d"
        text: "神道の精神"
        explanation: "神道は重視されましたが、武士の道徳の主流は儒学でした。"
    answer: "b"

  - id: "jhs-sh-ed-048"
    text: "江戸時代後期に外国船が頻繁に日本近海に現れ始めた背景として正しいものはどれか。"
    choices:
      - id: "a"
        text: "日本が外国に宣戦布告したため"
        explanation: "日本が外国に宣戦布告したわけではありません。"
      - id: "b"
        text: "産業革命が進んだ欧米諸国が市場・資源を求めてアジアに進出してきたため"
        explanation: "正解です。18〜19世紀に産業革命を遂げた欧米列強がアジアへの進出を強め、日本近海にもロシア・イギリス・アメリカなどの船が現れ、開国を求めるようになりました。"
      - id: "c"
        text: "日本人が海外に積極的に移住したため"
        explanation: "鎖国下では日本人の海外移住は禁止されていました。"
      - id: "d"
        text: "日本の貿易商品が世界中で人気になったため"
        explanation: "日本が自ら貿易を求めて外国を呼び込んだのではありません。"
    answer: "b"

  - id: "jhs-sh-ed-049"
    text: "江戸時代に藩が独自に発行した紙幣を何というか。"
    choices:
      - id: "a"
        text: "寛永通宝"
        explanation: "寛永通宝は銅銭で、幕府が発行した全国通用の貨幣です。"
      - id: "b"
        text: "藩札（はんさつ）"
        explanation: "正解です。藩札は各藩が独自に発行した紙幣で、藩内でのみ通用しました。明治維新後に廃止されました。"
      - id: "c"
        text: "小判（こばん）"
        explanation: "小判は幕府が発行した金貨で、全国通用の貨幣です。"
      - id: "d"
        text: "米切手"
        explanation: "米切手は堂島米市場で使われた証券です。"
    answer: "b"

  - id: "jhs-sh-ed-050"
    text: "江戸時代初期に徳川家康が鷹狩のために整備し、後に公式の諸侯との会見に使われた城はどれか。"
    choices:
      - id: "a"
        text: "姫路城"
        explanation: "姫路城は西の拠点の城で、鷹狩とは関係ありません。"
      - id: "b"
        text: "二条城（にじょうじょう）"
        explanation: "正解です。二条城は徳川家康が京都御所の警護と将軍上洛時の宿所のために建設した城で、1867年には徳川慶喜が大政奉還を宣言した場所でもあります。"
      - id: "c"
        text: "大阪城"
        explanation: "大阪城は豊臣秀吉が築き、後に徳川秀忠が再建した城です。"
      - id: "d"
        text: "名古屋城"
        explanation: "名古屋城は徳川義直（尾張藩）のために建設された城です。"
    answer: "b"

  - id: "jhs-sh-ed-051"
    text: "江戸時代に商人の力が増大した結果、武士の間で生まれた皮肉を込めた言葉はどれか。"
    choices:
      - id: "a"
        text: "武士は食わねど高楊枝"
        explanation: "「武士は食わねど高楊枝」は武士の面目・気概を表す言葉で、商人への皮肉ではありません。"
      - id: "b"
        text: "武士の商法"
        explanation: "正解です。「武士の商法」は商売に不向きな武士が商売をすることの失敗を表す言葉で、商人が繁栄する一方で武士が経済的に困窮した江戸時代の状況を反映しています。"
      - id: "c"
        text: "石に立つ矢"
        explanation: "「石に立つ矢」は強い意志で不可能を可能にするという意味の言葉です。"
      - id: "d"
        text: "塵も積もれば山となる"
        explanation: "これは小さなものが積み重なって大きくなるという意味の言葉です。"
    answer: "b"

  - id: "jhs-sh-ed-052"
    text: "江戸時代の「三都」とは江戸・大坂とどこか。"
    choices:
      - id: "a"
        text: "名古屋"
        explanation: "名古屋（尾張）は大都市でしたが、三都には含まれません。"
      - id: "b"
        text: "京都（きょうと）"
        explanation: "正解です。江戸（政治）・大坂（経済・商業）・京都（文化・伝統工業）の三都が江戸時代の三大都市でした。"
      - id: "c"
        text: "長崎"
        explanation: "長崎は貿易港として重要でしたが、三都には含まれません。"
      - id: "d"
        text: "金沢"
        explanation: "金沢は加賀百万石の城下町ですが、三都には含まれません。"
    answer: "b"

  - id: "jhs-sh-ed-053"
    text: "江戸時代に制定された「生類憐みの令」を出した将軍は誰か。"
    choices:
      - id: "a"
        text: "徳川家康"
        explanation: "徳川家康は初代将軍で、生類憐みの令とは関係ありません。"
      - id: "b"
        text: "徳川綱吉（とくがわつなよし）"
        explanation: "正解です。5代将軍徳川綱吉は犬などの動物の殺生を禁じる生類憐みの令を出し（1685〜1709年頃）、犬将軍とも呼ばれました。"
      - id: "c"
        text: "徳川吉宗"
        explanation: "徳川吉宗は8代将軍で、享保の改革を行いました。"
      - id: "d"
        text: "徳川家光"
        explanation: "徳川家光は3代将軍で、参勤交代などを制度化しました。"
    answer: "b"

  - id: "jhs-sh-ed-054"
    text: "江戸時代に普及した農作業の道具で、稲の脱穀を効率化した「千歯こき」の特徴はどれか。"
    choices:
      - id: "a"
        text: "稲を刈るための鎌"
        explanation: "千歯こきは稲を刈るのではなく、脱穀するための道具です。"
      - id: "b"
        text: "稲穂から米の粒を一度に大量に取り外す（脱穀する）道具"
        explanation: "正解です。千歯こきは多数の歯のついた道具で、稲穂を引き通すことで一度に多くの稲から米粒を取り外す（脱穀する）ことができ、農業の生産性を大きく向上させました。"
      - id: "c"
        text: "田を耕すための農具"
        explanation: "田を耕すのは鍬（くわ）や備中鍬です。"
      - id: "d"
        text: "米を精米する道具"
        explanation: "精米は唐臼（からうす）や水車で行いました。"
    answer: "b"

  - id: "jhs-sh-ed-055"
    text: "江戸時代の「問屋制家内工業」とはどのような生産形態か。"
    choices:
      - id: "a"
        text: "工場に労働者を集めて製品を生産する工場制手工業"
        explanation: "工場に集めて生産するのは工場制手工業（マニュファクチュア）です。"
      - id: "b"
        text: "問屋が農民に原料・道具を貸して家庭内で作らせ、製品を買い取る生産形態"
        explanation: "正解です。問屋制家内工業は農家の副業として発展した生産形態で、問屋商人が原料・道具を農民に渡し、出来た製品を買い取ることで農村での分業が進みました。"
      - id: "c"
        text: "農民が自由に製品を作って市場で販売する形態"
        explanation: "農民が自由に販売するのではなく、問屋が仲介します。"
      - id: "d"
        text: "藩が農民に命じて製品を生産させる形態"
        explanation: "藩の命令による生産ではなく、商人（問屋）との契約的な関係です。"
    answer: "b"

  - id: "jhs-sh-ed-056"
    text: "江戸時代に伊能忠敬が地図作成のために用いた測量技術はどれか。"
    choices:
      - id: "a"
        text: "衛星から電波を受信して位置を測る技術"
        explanation: "衛星測位技術（GPS）は現代の技術です。"
      - id: "b"
        text: "歩測・天文観測・測量器具を使った実地測量"
        explanation: "正解です。伊能忠敬は磁石・測量器具（象限儀など）・天文観測（北極星の高度測定）を組み合わせた実地測量で、全国を歩いて正確な地図を作成しました。"
      - id: "c"
        text: "外国の地図を参考にして日本地図を作成した"
        explanation: "伊能忠敬は実地測量で作成し、外国の地図を参考にしたわけではありません。"
      - id: "d"
        text: "空から見た写真を利用した"
        explanation: "航空写真は近代の技術です。"
    answer: "b"

  - id: "jhs-sh-ed-057"
    text: "江戸時代に発達した「浮世絵（うきよえ）」は主にどのような方法で大量生産されたか。"
    choices:
      - id: "a"
        text: "一枚一枚手描きで作られた"
        explanation: "浮世絵の大量生産は版画技術によるものです。"
      - id: "b"
        text: "木版印刷（多色刷り）で大量に印刷された"
        explanation: "正解です。浮世絵は木版画技術を使った多色刷り（錦絵）で大量に印刷され、庶民が手頃な値段で購入できる大衆文化として広まりました。"
      - id: "c"
        text: "活版印刷機で印刷された"
        explanation: "活版印刷は主に文字の印刷に使われ、浮世絵は木版画です。"
      - id: "d"
        text: "鉛板に絵を刻んで印刷した"
        explanation: "浮世絵は木版で作られています。"
    answer: "b"

  - id: "jhs-sh-ed-058"
    text: "江戸時代に行われた飢饉への対策として、徳川吉宗が享保の改革で行ったことはどれか。"
    choices:
      - id: "a"
        text: "米の輸入を許可した"
        explanation: "鎖国下で米の輸入は行われませんでした。"
      - id: "b"
        text: "甘藷（さつまいも）の栽培を奨励した"
        explanation: "正解です。徳川吉宗は蘭学者・青木昆陽に命じてさつまいもの栽培を研究させ、凶作時の食料として普及を奨励しました。"
      - id: "c"
        text: "農民への米の無償配布を行った"
        explanation: "無償配布が享保の改革の主な施策ではありません。"
      - id: "d"
        text: "米の消費を禁止した"
        explanation: "米の消費禁止は飢饉対策として行われていません。"
    answer: "b"

  - id: "jhs-sh-ed-059"
    text: "江戸時代の主要な街道「五街道」のうち、江戸と京都を結ぶ最も主要な街道はどれか。"
    choices:
      - id: "a"
        text: "奥州街道"
        explanation: "奥州街道は江戸から東北（奥州）へ向かう街道です。"
      - id: "b"
        text: "東海道（とうかいどう）"
        explanation: "正解です。東海道は江戸（日本橋）から京都（三条大橋）を結ぶ全長約500kmの最も重要な街道で、53の宿場（東海道五十三次）がありました。"
      - id: "c"
        text: "中山道"
        explanation: "中山道は江戸と京都を内陸経由で結ぶ街道です。"
      - id: "d"
        text: "日光街道"
        explanation: "日光街道は江戸から日光（東照宮）へ向かう街道です。"
    answer: "b"

  - id: "jhs-sh-ed-060"
    text: "江戸時代の「国学（こくがく）」とはどのような学問か。"
    choices:
      - id: "a"
        text: "西洋の科学技術を研究する学問"
        explanation: "西洋科学技術を研究するのは蘭学です。"
      - id: "b"
        text: "古典文学や歴史書を研究して日本固有の文化・精神を明らかにする学問"
        explanation: "正解です。国学は「古事記」「万葉集」などの古典を研究し、仏教・儒教が伝来する以前の日本固有の精神（大和心・もののあわれ）を明らかにしようとした学問です。"
      - id: "c"
        text: "中国の儒学を研究する学問"
        explanation: "儒学を研究するのは漢学で、国学とは別です。"
      - id: "d"
        text: "農業技術を研究する学問"
        explanation: "農業技術の研究は農学です。"
    answer: "b"

  - id: "jhs-sh-ed-061"
    text: "江戸時代に庶民の子供が通った寺子屋で主に教えられた内容はどれか。"
    choices:
      - id: "a"
        text: "剣術・武道"
        explanation: "剣術・武道は武士が学ぶもので、寺子屋の主な教科ではありません。"
      - id: "b"
        text: "読み・書き・そろばん（計算）"
        explanation: "正解です。寺子屋では「読み書きそろばん」と呼ばれる基礎的な識字能力と計算能力を教え、江戸時代末には日本の識字率が世界的に高い水準になりました。"
      - id: "c"
        text: "漢文・四書五経"
        explanation: "漢文・四書五経は武士が通う藩校などで学ぶものです。"
      - id: "d"
        text: "農業技術"
        explanation: "農業技術の実地指導は寺子屋の主な教科ではありませんでした。"
    answer: "b"

  - id: "jhs-sh-ed-062"
    text: "江戸時代に武士が通った学校で藩が設立したものを何というか。"
    choices:
      - id: "a"
        text: "寺子屋"
        explanation: "寺子屋は庶民の子供が通う私塾です。"
      - id: "b"
        text: "藩校（はんこう）"
        explanation: "正解です。藩校（藩学）は各藩が設立した、武士の子弟が儒学・武芸などを学ぶ学校で、幕末には多くの藩で設立されました。"
      - id: "c"
        text: "私塾（しじゅく）"
        explanation: "私塾は学者・知識人が個人で開いた学習の場で、松下村塾などが有名です。"
      - id: "d"
        text: "大学（だいがく）"
        explanation: "大学（大学校）は近代に設立された高等教育機関です。"
    answer: "b"

  - id: "jhs-sh-ed-063"
    text: "幕末に長州藩士・吉田松陰が長州（山口県）で開いた、明治維新の志士を多く育てた塾はどれか。"
    choices:
      - id: "a"
        text: "適塾（大坂）"
        explanation: "適塾は緒方洪庵が大坂で開いた蘭学の塾です。"
      - id: "b"
        text: "松下村塾（しょうかそんじゅく）"
        explanation: "正解です。吉田松陰が長州・萩で開いた松下村塾では、高杉晋作・伊藤博文・山県有朋など、後の明治政府を担う多くの人物が学びました。"
      - id: "c"
        text: "鳴滝塾"
        explanation: "鳴滝塾はシーボルトが長崎で開いた西洋医学の塾です。"
      - id: "d"
        text: "昌平坂学問所"
        explanation: "昌平坂学問所（昌平黌）は江戸幕府が設立した儒学の学問所です。"
    answer: "b"

  - id: "jhs-sh-ed-064"
    text: "江戸時代に「天保の大飢饉」（1833〜39年）後に大坂で貧民救済を幕府に訴えたが拒否され、反乱を起こした元与力は誰か。"
    choices:
      - id: "a"
        text: "由井正雪"
        explanation: "由井正雪は寛永年間（1651年）に幕府転覆を企てた浪人です。"
      - id: "b"
        text: "大塩平八郎（おおしおへいはちろう）"
        explanation: "正解です。1837年、大坂町奉行所の元与力・大塩平八郎が天保の飢饉に苦しむ民衆救済のために反乱（大塩の乱）を起こしました。短期間で鎮圧されましたが、幕府に衝撃を与えました。"
      - id: "c"
        text: "近藤勇"
        explanation: "近藤勇は幕末の新選組局長です。"
      - id: "d"
        text: "渡辺崋山"
        explanation: "渡辺崋山は蛮社の獄で弾圧された蘭学者です。"
    answer: "b"

  - id: "jhs-sh-ed-065"
    text: "江戸時代後期に蘭学者が外国情勢を研究・紹介したため幕府に弾圧された事件はどれか。"
    choices:
      - id: "a"
        text: "安政の大獄"
        explanation: "安政の大獄は幕末の尊王攘夷派への弾圧です。"
      - id: "b"
        text: "蛮社の獄（ばんしゃのごく）"
        explanation: "正解です。1839年に高野長英・渡辺崋山らが異国船打払令を批判したとして弾圧された蛮社の獄は、蘭学者が幕府政策を批判したことへの弾圧でした。"
      - id: "c"
        text: "シーボルト事件"
        explanation: "シーボルト事件（1828年）はオランダ人医師シーボルトが禁制の日本地図を国外に持ち出そうとした事件です。"
      - id: "d"
        text: "堺事件"
        explanation: "堺事件（1868年）は明治維新直後の外国人殺傷事件です。"
    answer: "b"

  - id: "jhs-sh-ed-066"
    text: "1854年に日本とアメリカが結んだ、下田・函館の2港を開いた条約はどれか。"
    choices:
      - id: "a"
        text: "日米修好通商条約"
        explanation: "日米修好通商条約は1858年に結ばれた貿易開始の条約です。"
      - id: "b"
        text: "日米和親条約（にちべいわしんじょうやく）"
        explanation: "正解です。1854年にペリーとの交渉で結ばれた日米和親条約により、下田・函館の2港が開かれ、約200年の鎖国が終わりました。"
      - id: "c"
        text: "日米安全保障条約"
        explanation: "日米安全保障条約は1951年（戦後）のものです。"
      - id: "d"
        text: "ポーツマス条約"
        explanation: "ポーツマス条約は1905年の日露戦争の講和条約です。"
    answer: "b"

  - id: "jhs-sh-ed-067"
    text: "1858年に大老・井伊直弼が結んだ、アメリカとの貿易を開始する条約はどれか。"
    choices:
      - id: "a"
        text: "日米和親条約"
        explanation: "日米和親条約は1854年の開港条約です。"
      - id: "b"
        text: "日米修好通商条約（にちべいしゅうこうつうしょうじょうやく）"
        explanation: "正解です。1858年に井伊直弼が調印した日米修好通商条約は、函館・神奈川・長崎・新潟・兵庫の5港開港と自由貿易を定めた不平等条約です。"
      - id: "c"
        text: "下関条約"
        explanation: "下関条約は1895年の日清戦争の講和条約です。"
      - id: "d"
        text: "日米安保条約"
        explanation: "日米安保条約は1951年のものです。"
    answer: "b"

  - id: "jhs-sh-ed-068"
    text: "井伊直弼が1858〜59年に行った、尊王攘夷派への大弾圧を何というか。"
    choices:
      - id: "a"
        text: "蛮社の獄"
        explanation: "蛮社の獄は1839年の蘭学者への弾圧です。"
      - id: "b"
        text: "安政の大獄（あんせいのたいごく）"
        explanation: "正解です。1858〜59年に大老・井伊直弼は条約反対派・尊王攘夷派を大量に処罰しました。吉田松陰や橋本左内らが処刑されました。"
      - id: "c"
        text: "桜田門外の変"
        explanation: "桜田門外の変は安政の大獄への報復として井伊直弼が暗殺された事件です。"
      - id: "d"
        text: "天保の改革"
        explanation: "天保の改革は1841〜43年の水野忠邦による改革です。"
    answer: "b"

  - id: "jhs-sh-ed-069"
    text: "1860年に水戸藩士らが江戸城桜田門外で大老・井伊直弼を暗殺した事件はどれか。"
    choices:
      - id: "a"
        text: "安政の大獄"
        explanation: "安政の大獄は井伊直弼が行った弾圧です。"
      - id: "b"
        text: "桜田門外の変（さくらだもんがいのへん）"
        explanation: "正解です。1860年3月、安政の大獄への報復として水戸脱藩士らが桜田門外で井伊直弼を暗殺しました。幕府の権威は大きく失墜しました。"
      - id: "c"
        text: "池田屋事件"
        explanation: "池田屋事件は1864年に尊攘派の志士が新選組に多数討たれた事件です。"
      - id: "d"
        text: "本能寺の変"
        explanation: "本能寺の変は1582年の出来事です。"
    answer: "b"

  - id: "jhs-sh-ed-070"
    text: "幕末に「尊王攘夷」運動を中心的に進めた藩のうち、特に有力だった二藩はどれか。"
    choices:
      - id: "a"
        text: "加賀藩と仙台藩"
        explanation: "加賀藩（前田氏）・仙台藩（伊達氏）は外様大名ですが、尊攘運動の中心ではありませんでした。"
      - id: "b"
        text: "長州藩と薩摩藩"
        explanation: "正解です。長州藩（毛利氏・現山口県）と薩摩藩（島津氏・現鹿児島県）は尊王攘夷運動の中心藩で、後に薩長同盟を結んで倒幕を実現しました。"
      - id: "c"
        text: "水戸藩と尾張藩"
        explanation: "水戸藩は尊王論の拠点でしたが、最終的な倒幕の中心は薩長です。"
      - id: "d"
        text: "土佐藩と肥前藩"
        explanation: "土佐・肥前も明治維新に参加しましたが、中心は薩長です。"
    answer: "b"

  - id: "jhs-sh-ed-071"
    text: "江戸時代後期に「西洋事情」を著し日本の近代化に大きな影響を与えた人物は誰か。"
    choices:
      - id: "a"
        text: "杉田玄白"
        explanation: "杉田玄白は解体新書を翻訳した蘭学者です。"
      - id: "b"
        text: "福沢諭吉（ふくざわゆきち）"
        explanation: "正解です。福沢諭吉は欧米を視察して帰国後に「西洋事情」「学問のすゝめ」などを著し、慶應義塾を設立して日本の近代化・西洋文明の普及に貢献しました。"
      - id: "c"
        text: "本居宣長"
        explanation: "本居宣長は国学者で「古事記伝」を著しました。"
      - id: "d"
        text: "伊能忠敬"
        explanation: "伊能忠敬は日本地図を作成した測量家です。"
    answer: "b"

  - id: "jhs-sh-ed-072"
    text: "江戸時代の身分制度で「士農工商」の外に置かれ、差別されていた人々を何というか。"
    choices:
      - id: "a"
        text: "浪人（ろうにん）"
        explanation: "浪人は主君を持たない武士で、士農工商の外に置かれた差別身分ではありません。"
      - id: "b"
        text: "えた・ひにん"
        explanation: "正解です。えた・ひにんは士農工商の身分制度の下に置かれ、厳しい差別を受けた人々です。差別撤廃は明治4年（1871年）の解放令まで続きましたが、実際の差別はその後も続きました。"
      - id: "c"
        text: "帰化人（きかじん）"
        explanation: "帰化人は外国から日本に移り住んで日本国籍を取得した人々の総称です。"
      - id: "d"
        text: "町人（ちょうにん）"
        explanation: "町人（商人・職人）は士農工商の中に含まれる身分です。"
    answer: "b"

  - id: "jhs-sh-ed-073"
    text: "江戸時代に蘭学の発展に貢献したオランダ人医師で、長崎で多くの日本人弟子を育てた人物は誰か。"
    choices:
      - id: "a"
        text: "ペリー"
        explanation: "ペリーはアメリカの海軍提督で医師ではありません。"
      - id: "b"
        text: "シーボルト"
        explanation: "正解です。フィリップ・フランツ・フォン・シーボルトは出島のオランダ商館医として来日し、長崎郊外の鳴滝に塾を開いて多くの日本人に西洋医学・博物学を教えました。"
      - id: "c"
        text: "ラクスマン"
        explanation: "ラクスマンはロシアの使節で、1792年に通商を求めて来航した人物です。"
      - id: "d"
        text: "モリソン"
        explanation: "モリソン号は日本人漂流民を送還しに来たアメリカ船です。"
    answer: "b"

  - id: "jhs-sh-ed-074"
    text: "幕末に坂本龍馬が薩摩藩と長州藩の仲介をして結んだ同盟を何というか。"
    choices:
      - id: "a"
        text: "日英同盟"
        explanation: "日英同盟は1902年の明治時代のものです。"
      - id: "b"
        text: "薩長同盟（さっちょうどうめい）"
        explanation: "正解です。1866年に坂本龍馬・中岡慎太郎の仲介で、薩摩藩（西郷隆盛）と長州藩（木戸孝允）が同盟を結びました。これにより倒幕に向けた薩長の協力体制ができました。"
      - id: "c"
        text: "日仏同盟"
        explanation: "日仏同盟という歴史的な同盟は存在しません。"
      - id: "d"
        text: "甲相駿三国同盟"
        explanation: "甲相駿三国同盟は戦国時代の武田・北条・今川の同盟です。"
    answer: "b"

  - id: "jhs-sh-ed-075"
    text: "江戸幕府最後の将軍で、1867年に政権を天皇に返上した人物は誰か。"
    choices:
      - id: "a"
        text: "徳川慶喜の父・斉昭"
        explanation: "徳川斉昭は水戸藩主・尊王攘夷論者で、幕府最後の将軍ではありません。"
      - id: "b"
        text: "徳川慶喜（とくがわよしのぶ）"
        explanation: "正解です。江戸幕府第15代将軍・徳川慶喜は1867年10月に二条城で大政奉還を宣言し、政権を朝廷に返しました。これにより江戸幕府が終わりました。"
      - id: "c"
        text: "徳川家茂"
        explanation: "徳川家茂は14代将軍で、慶喜の前の将軍です。"
      - id: "d"
        text: "徳川斉昭"
        explanation: "徳川斉昭は水戸藩主で、江戸幕府の将軍ではありません。"
    answer: "b"

  - id: "jhs-sh-ed-076"
    text: "1867年12月に倒幕派が「王政復古の大号令」を発した目的はどれか。"
    choices:
      - id: "a"
        text: "鎌倉幕府の制度を復活させるため"
        explanation: "鎌倉幕府の復活ではなく、天皇中心の新政府を樹立するためでした。"
      - id: "b"
        text: "天皇中心の新政府を樹立し、幕府・摂関・幕藩体制を廃止するため"
        explanation: "正解です。王政復古の大号令は幕府・摂政・関白を廃止し、天皇を中心とした新政府（総裁・議定・参与の三職）を設置することを宣言しました。"
      - id: "c"
        text: "徳川将軍家を新たな天皇に就けるため"
        explanation: "徳川将軍を天皇にしようとしたのではありません。"
      - id: "d"
        text: "フランスとの軍事同盟を結ぶため"
        explanation: "王政復古の大号令は外交同盟とは関係ありません。"
    answer: "b"

  - id: "jhs-sh-ed-077"
    text: "江戸時代後期に「家斉の大御所時代」と呼ばれた時代の特徴はどれか。"
    choices:
      - id: "a"
        text: "倹約が徹底されて庶民の生活が豊かになった"
        explanation: "大御所時代は倹約重視ではなく、奢侈・享楽的な文化が発展しました。"
      - id: "b"
        text: "11代将軍徳川家斉の治世に文化・文政年間の化政文化が栄えた"
        explanation: "正解です。徳川家斉は50年に渡る長い在任期間中に化政文化が栄えましたが、一方で幕府の財政悪化や綱紀の弛緩も進みました。"
      - id: "c"
        text: "幕府の権力が最も強まった時代"
        explanation: "大御所時代は幕府権力の強化ではなく衰退の時代でもありました。"
      - id: "d"
        text: "西洋との貿易が最も盛んだった時代"
        explanation: "鎖国体制は続いており、西洋貿易は拡大していません。"
    answer: "b"

  - id: "jhs-sh-ed-078"
    text: "江戸時代の農村で見られた「出稼ぎ」について正しいものはどれか。"
    choices:
      - id: "a"
        text: "農村から都市へ出稼ぎに行くことは法律で禁止されていた"
        explanation: "農村からの出稼ぎは幕末に向けて増加し、完全には禁止されていませんでした。"
      - id: "b"
        text: "農閑期（農作業のない冬など）に農民が都市へ出稼ぎに行き、農村の現金収入となった"
        explanation: "正解です。江戸時代後期には農閑期を利用して農民が江戸などの都市に出稼ぎに行く現象が増え、農村から都市への人口移動が進みました。"
      - id: "c"
        text: "出稼ぎによって農村の人口が激減した"
        explanation: "農村人口の激減は一概にはいえません。農村→都市の流入はありましたが、農村人口自体は維持されていました。"
      - id: "d"
        text: "出稼ぎは武士専用の制度だった"
        explanation: "出稼ぎは農民に関わる現象です。"
    answer: "b"

  - id: "jhs-sh-ed-079"
    text: "江戸時代に米の先物取引が行われ、現代の商品取引所の原型となった市場はどこか。"
    choices:
      - id: "a"
        text: "江戸の日本橋魚市場"
        explanation: "日本橋魚市場は魚の取引市場です。"
      - id: "b"
        text: "大坂の堂島米市場（どうじまこめいちば）"
        explanation: "正解です。大坂（現大阪）の堂島に設置された米市場は世界最古の先物取引市場とも言われ、将来の米の価格を先に決めて取引する帳合米取引（先物取引）が行われました。"
      - id: "c"
        text: "京都の西陣市場"
        explanation: "西陣は絹織物の産地で、米の取引市場ではありません。"
      - id: "d"
        text: "長崎の出島"
        explanation: "出島はオランダとの貿易の場で、米の先物取引は行われていません。"
    answer: "b"

  - id: "jhs-sh-ed-080"
    text: "江戸時代の「歌舞伎（かぶき）」の起源として正しいものはどれか。"
    choices:
      - id: "a"
        text: "平安時代の宮廷舞楽が起源"
        explanation: "宮廷舞楽は雅楽で、歌舞伎とは異なります。"
      - id: "b"
        text: "1603年頃に出雲阿国（いずものおくに）が京都で始めた「阿国歌舞伎」が起源"
        explanation: "正解です。出雲大社の巫女・阿国が京都四条河原で始めた「ややこ踊り」（後の阿国歌舞伎）が歌舞伎の起源で、後に女性・若衆を禁じて男性だけの歌舞伎として発展しました。"
      - id: "c"
        text: "江戸幕府が武士の訓練として始めたもの"
        explanation: "歌舞伎は幕府が始めたのではなく、庶民の芸能として発展しました。"
      - id: "d"
        text: "中国から伝わった演劇が起源"
        explanation: "歌舞伎は日本独自の演劇です。"
    answer: "b"

  - id: "jhs-sh-ed-081"
    text: "江戸時代の「浄瑠璃（じょうるり）」について正しいものはどれか。"
    choices:
      - id: "a"
        text: "侍が剣で戦う劇"
        explanation: "浄瑠璃は剣劇ではありません。"
      - id: "b"
        text: "三味線に合わせて語り手が語る人形劇（文楽の前身）"
        explanation: "正解です。浄瑠璃は三味線の伴奏に合わせて太夫（語り手）が語る芸能で、人形を動かす人形浄瑠璃（文楽）として大坂で発展しました。近松門左衛門の作品で有名です。"
      - id: "c"
        text: "能と狂言の合体した芸能"
        explanation: "浄瑠璃は能・狂言とは別の系統の芸能です。"
      - id: "d"
        text: "踊りを中心とした女性だけの芸能"
        explanation: "浄瑠璃の太夫・三味線・人形遣いは男性が担うのが伝統です。"
    answer: "b"

  - id: "jhs-sh-ed-082"
    text: "江戸時代に「俳諧の革新者」として活躍し、「奥の細道」を著した松尾芭蕉の俳句の代表作はどれか。"
    choices:
      - id: "a"
        text: "「春の海 終日のたり のたりかな」"
        explanation: "これは与謝蕪村の句です。"
      - id: "b"
        text: "「古池や 蛙飛びこむ 水の音」"
        explanation: "正解です。「古池や 蛙飛びこむ 水の音」は松尾芭蕉の最も有名な俳句で、静寂の中に蛙が飛び込む音だけが響くわびさびの世界を詠んだものです。"
      - id: "c"
        text: "「雪とけて 村いっぱいの 子どもかな」"
        explanation: "これは小林一茶の句です。"
      - id: "d"
        text: "「菜の花や 月は東に 日は西に」"
        explanation: "これは与謝蕪村の句です。"
    answer: "b"

  - id: "jhs-sh-ed-083"
    text: "江戸時代の「川柳（せんりゅう）」について正しいものはどれか。"
    choices:
      - id: "a"
        text: "天皇や将軍を讃える詩"
        explanation: "川柳は体制を讃えるものではなく、むしろ風刺が多いです。"
      - id: "b"
        text: "5・7・5の17音で世相・人情・笑いを詠んだ庶民の詩"
        explanation: "正解です。川柳は俳句と同じ5・7・5の形式ですが、季語を必要とせず、社会風刺・ユーモア・人間観察を詠んだ庶民の詩として発展しました。"
      - id: "c"
        text: "武士が武芸を称える漢詩"
        explanation: "川柳は漢詩ではなく日本語の詩です。"
      - id: "d"
        text: "女性だけが詠む恋の詩"
        explanation: "川柳は男女を問わず詠まれ、恋だけが題材ではありません。"
    answer: "b"

  - id: "jhs-sh-ed-084"
    text: "江戸時代の「蘭学（らんがく）」とは何か。"
    choices:
      - id: "a"
        text: "中国の漢文・儒学を研究する学問"
        explanation: "中国の学問は漢学（儒学）で、蘭学とは別です。"
      - id: "b"
        text: "オランダ語の書物を通じて西洋の科学・医学・技術を研究する学問"
        explanation: "正解です。鎖国下でも長崎出島のオランダ商館との交流があったため、オランダ語（蘭語）の書物から西洋の科学・医学・天文学などを学ぶ蘭学が発展しました。"
      - id: "c"
        text: "花（蘭の花）の栽培・品種改良を研究する学問"
        explanation: "「蘭」はオランダの漢字表記で、花の蘭ではありません。"
      - id: "d"
        text: "南蛮文化（スペイン・ポルトガル文化）を研究する学問"
        explanation: "南蛮文化の研究は蘭学ではなく、主に戦国時代のことです。"
    answer: "b"

  - id: "jhs-sh-ed-085"
    text: "江戸時代の参勤交代が大名の財政を苦しめた理由はどれか。"
    choices:
      - id: "a"
        text: "参勤交代の費用を幕府が全額徴収したため"
        explanation: "参勤交代の費用は大名が自己負担しました。"
      - id: "b"
        text: "大名が大行列を組んで往復する費用・江戸での滞在費が莫大だったため"
        explanation: "正解です。参勤交代では大名が身分に応じた大行列で往復し、江戸での屋敷維持・家臣の生活費も必要で、藩の財政を圧迫しました。これが幕府による大名統制の経済的手段でもありました。"
      - id: "c"
        text: "参勤交代のたびに新しい馬を購入しなければならなかったため"
        explanation: "馬の購入は参勤交代費用の主要な問題ではありません。"
      - id: "d"
        text: "江戸に到着するたびに将軍への贈り物を義務付けられていたため"
        explanation: "将軍への贈り物は慣行としてありましたが、財政難の主因は往復費用と江戸での維持費です。"
    answer: "b"

  - id: "jhs-sh-ed-086"
    text: "江戸幕府の「鎖国」体制の特徴として正しいものはどれか。"
    choices:
      - id: "a"
        text: "すべての外国との関係を完全に断絶した"
        explanation: "鎖国下でもオランダ・中国・朝鮮・琉球との交流は続けられていました。"
      - id: "b"
        text: "交流する国・場所・商品を幕府が厳しく管理・制限した"
        explanation: "正解です。江戸幕府の鎖国は完全な孤立ではなく、長崎（オランダ・中国）・対馬（朝鮮）・薩摩（琉球）・松前（アイヌ）の四つの窓口を通じて交流を管理・制限するものでした。"
      - id: "c"
        text: "日本人が外国に自由に出かけることを認めた"
        explanation: "鎖国下では日本人の海外渡航・帰国は禁止されていました。"
      - id: "d"
        text: "外国人が日本に自由に入国できた"
        explanation: "外国人の入国も厳しく制限されていました。"
    answer: "b"

  - id: "jhs-sh-ed-087"
    text: "江戸時代に農民の自治的な組織として村落に設置された役職はどれか。"
    choices:
      - id: "a"
        text: "代官（だいかん）"
        explanation: "代官は幕府が派遣する地方行政官で、農民の代表ではありません。"
      - id: "b"
        text: "名主・庄屋・肝煎り（なぬし・しょうや・きもいり）"
        explanation: "正解です。農村の自治的な村役人として、関東では名主・上方（近畿）では庄屋・東北では肝煎りと呼ばれる地位が設けられ、年貢の徴収・村の行政を担いました。"
      - id: "c"
        text: "侍所（さむらいどころ）"
        explanation: "侍所は幕府・藩の軍事・警察機関です。"
      - id: "d"
        text: "問注所（もんちゅうじょ）"
        explanation: "問注所は鎌倉幕府の裁判機関です。"
    answer: "b"

  - id: "jhs-sh-ed-088"
    text: "江戸時代の「商品作物」の栽培について正しいものはどれか。"
    choices:
      - id: "a"
        text: "幕府が商品作物の栽培を奨励して農民を支援した"
        explanation: "幕府は基本的に米の生産を重視し、商品作物を積極的に奨励したわけではありません。"
      - id: "b"
        text: "農民が米以外に綿・藍・菜種・たばこなどの換金作物を栽培して収入を得た"
        explanation: "正解です。江戸時代後期には農民が食料としての米だけでなく、市場で売れる綿・藍・菜種・たばこ・茶・紅花などの商品作物（換金作物）を栽培して現金収入を得るようになりました。"
      - id: "c"
        text: "農民は米だけを栽培することを法律で義務付けられていた"
        explanation: "農民が他の作物を栽培することは認められており、商品作物の栽培は各地で行われました。"
      - id: "d"
        text: "商品作物の栽培は武士の特権だった"
        explanation: "商品作物の栽培は農民が行っていました。"
    answer: "b"

  - id: "jhs-sh-ed-089"
    text: "江戸時代の「目安箱（めやすばこ）」を設置した将軍は誰か。"
    choices:
      - id: "a"
        text: "徳川家康"
        explanation: "目安箱を設置したのは徳川家康ではありません。"
      - id: "b"
        text: "徳川吉宗（8代将軍）"
        explanation: "正解です。8代将軍・徳川吉宗は享保の改革で江戸城の評定所前に目安箱を設置し、庶民の意見・訴えを直接受け付けました。小石川養生所の設立もこれがきっかけです。"
      - id: "c"
        text: "徳川家光（3代将軍）"
        explanation: "目安箱を設置したのは家光ではなく吉宗です。"
      - id: "d"
        text: "徳川綱吉（5代将軍）"
        explanation: "綱吉は生類憐みの令で有名な将軍です。"
    answer: "b"

  - id: "jhs-sh-ed-090"
    text: "江戸時代の幕府の財政収入の主な柱はどれか。"
    choices:
      - id: "a"
        text: "商業税（商人からの税）"
        explanation: "商業税も一部ありましたが、主な収入源は年貢です。"
      - id: "b"
        text: "年貢（天領からの米・金）"
        explanation: "正解です。幕府財政の主な収入は直轄領（天領）の農民から徴収する年貢で、その他に礦山収入・商人からの冥加金・運上金なども収入源でした。"
      - id: "c"
        text: "外国との貿易利益"
        explanation: "鎖国体制下で貿易は制限されており、主な財源ではありませんでした。"
      - id: "d"
        text: "大名からの税"
        explanation: "大名から年貢を徴収するのではなく、大名は参勤交代などの負担を担いました。"
    answer: "b"

  - id: "jhs-sh-ed-091"
    text: "江戸時代に「番所（ばんしょ）」が街道の要所に設けられた目的はどれか。"
    choices:
      - id: "a"
        text: "旅人に休憩所を提供するため"
        explanation: "番所は休憩所ではなく検問所です。"
      - id: "b"
        text: "人・物の往来を監視・管理し、「入り鉄砲に出女」を厳しく取り締まるため"
        explanation: "正解です。関所（番所）では武器（鉄砲）が江戸に持ち込まれることと、大名の人質として江戸に住む妻女が勝手に国元に帰ることを厳しく取り締まりました。"
      - id: "c"
        text: "通行税を徴収して藩の財政収入にするため"
        explanation: "通行税の徴収が主目的ではありませんでした。"
      - id: "d"
        text: "商人の荷物の品質を検査するため"
        explanation: "品質検査が番所の目的ではありません。"
    answer: "b"

  - id: "jhs-sh-ed-092"
    text: "幕末に「攘夷」運動が盛んになった理由はどれか。"
    choices:
      - id: "a"
        text: "外国が日本に軍事援助を申し出たため"
        explanation: "外国の軍事援助の申し出が攘夷運動の理由ではありません。"
      - id: "b"
        text: "開国・不平等条約締結で外国人が日本に入り込み、物価高騰などの経済的混乱が起きたため"
        explanation: "正解です。幕末の開国後、外国との貿易で物価が急騰し、庶民の生活が苦しくなったことや外国人の傍若無人な振る舞いへの反発が攘夷運動の背景にありました。"
      - id: "c"
        text: "外国が日本を完全に支配しようとしたため"
        explanation: "欧米諸国は日本を植民地にしようとはしていませんでした。"
      - id: "d"
        text: "幕府が攘夷運動を奨励したため"
        explanation: "幕府は基本的に攘夷運動を抑制しようとしていました。"
    answer: "b"

  - id: "jhs-sh-ed-093"
    text: "江戸時代の「享保の改革」で徳川吉宗が行った上米（あげまい）の制の内容はどれか。"
    choices:
      - id: "a"
        text: "農民に米を無償で配布した"
        explanation: "上米の制は農民への配布ではなく、大名から米を徴収する制度です。"
      - id: "b"
        text: "大名に石高1万石につき100石の米を幕府に納めさせる代わりに参勤交代を半減した"
        explanation: "正解です。上米の制は財政難の幕府が大名から米を徴収し、その代わりに参勤交代の江戸滞在期間を半年に短縮した制度です。"
      - id: "c"
        text: "農民が収穫した米の一定量を強制的に幕府に売らせる制度"
        explanation: "上米の制は農民ではなく大名が対象です。"
      - id: "d"
        text: "幕府が相場より高い値段で大名から米を買い取る制度"
        explanation: "上米の制は買い取りではなく強制的な納入です。"
    answer: "b"

  - id: "jhs-sh-ed-094"
    text: "江戸時代に長崎の出島で行われたオランダとの貿易で、日本が主に輸出したものはどれか。"
    choices:
      - id: "a"
        text: "米・小麦などの穀物"
        explanation: "穀物はオランダへの主な輸出品ではありません。"
      - id: "b"
        text: "銀・銅・俵物（海産物）"
        explanation: "正解です。出島を通じたオランダ貿易では、日本から銀・銅・俵物（干しアワビ・フカヒレ・いりこなどの海産物）が輸出され、オランダから砂糖・絹織物・薬品・書物などが輸入されました。"
      - id: "c"
        text: "陶磁器・絹織物"
        explanation: "陶磁器・絹織物は輸入品です（中国製が多い）。"
      - id: "d"
        text: "刀剣・鎧・武器"
        explanation: "武器類は主な輸出品ではありませんでした。"
    answer: "b"

  - id: "jhs-sh-ed-095"
    text: "江戸幕府が寺院に農民の宗旨（宗教）を証明させた「寺請制度」によって作られた台帳を何というか。"
    choices:
      - id: "a"
        text: "検地帳"
        explanation: "検地帳は土地調査の記録帳です。"
      - id: "b"
        text: "宗門人別帳（しゅうもんにんべつちょう）"
        explanation: "正解です。寺請制度により作られた宗門人別帳は、人々の宗旨・寺への所属・家族構成を記録したもので、人口把握の台帳としても機能しました。"
      - id: "c"
        text: "武家諸法度"
        explanation: "武家諸法度は大名への規則です。"
      - id: "d"
        text: "郷帳（ごうちょう）"
        explanation: "郷帳は土地・村高を記録した台帳です。"
    answer: "b"

  - id: "jhs-sh-ed-096"
    text: "江戸時代に天文・暦の研究を行い、正確な暦（貞享暦）を作った人物は誰か。"
    choices:
      - id: "a"
        text: "伊能忠敬"
        explanation: "伊能忠敬は地図を作成した人物です。"
      - id: "b"
        text: "渋川春海（しぶかわしゅんかい・安井算哲）"
        explanation: "正解です。渋川春海（安井算哲）は日本独自の天文観測に基づいて貞享暦（1685年）を作成し、日本で初めての国産暦を実現しました。"
      - id: "c"
        text: "間重富"
        explanation: "間重富は幕末の天文学者です。"
      - id: "d"
        text: "高橋至時"
        explanation: "高橋至時は江戸時代後期の天文学者で、伊能忠敬の師です。"
    answer: "b"

  - id: "jhs-sh-ed-097"
    text: "江戸時代に農業の発展に貢献した、干鰯（ほしか）・油かすなどの「金肥（きんぴ）」とはどのようなものか。"
    choices:
      - id: "a"
        text: "金粉を混ぜた高級肥料"
        explanation: "金を混ぜた肥料ではなく、金銭で購入する肥料です。"
      - id: "b"
        text: "お金を出して購入する肥料（商品化された肥料）"
        explanation: "正解です。金肥は干鰯・油かす・ぬかなど金銭で購入できる商品化された肥料で、自家製の草肥・堆肥に代わって江戸時代に普及し、農業生産性の向上に貢献しました。"
      - id: "c"
        text: "金色の鉱物を含む特殊な肥料"
        explanation: "金色の鉱物が含まれる肥料ではありません。"
      - id: "d"
        text: "農民が自家製で作った肥料"
        explanation: "自家製肥料は金肥ではなく「草肥・堆肥」と呼ばれます。"
    answer: "b"

  - id: "jhs-sh-ed-098"
    text: "江戸時代の元禄文化を代表する作家で、「好色一代男」などを著した人物は誰か。"
    choices:
      - id: "a"
        text: "近松門左衛門"
        explanation: "近松門左衛門は浄瑠璃・歌舞伎の脚本作者です。"
      - id: "b"
        text: "井原西鶴（いはらさいかく）"
        explanation: "正解です。井原西鶴は元禄文化期の浮世草子作者で「好色一代男」「日本永代蔵」「世間胸算用」などを著し、町人の生活・欲望をリアルに描きました。"
      - id: "c"
        text: "松尾芭蕉"
        explanation: "松尾芭蕉は俳人です。"
      - id: "d"
        text: "十返舎一九"
        explanation: "十返舎一九は化政文化期の作家です。"
    answer: "b"

  - id: "jhs-sh-ed-099"
    text: "江戸時代に幕府が「朝鮮通信使」を歓迎した理由はどれか。"
    choices:
      - id: "a"
        text: "朝鮮から多額の貢ぎ物をもらうため"
        explanation: "朝鮮通信使から貢ぎ物を受け取るのが目的ではありません。"
      - id: "b"
        text: "将軍の代替わりを朝鮮に通知して国際的な権威を示すため"
        explanation: "正解です。朝鮮通信使は朝鮮国王が日本の将軍の代替わりを祝うために派遣した使節で、幕府はこれを将軍の権威を国内外に示す機会として盛大にもてなしました。"
      - id: "c"
        text: "朝鮮語を学ぶ機会にするため"
        explanation: "朝鮮語学習が主目的ではありませんでした。"
      - id: "d"
        text: "朝鮮との軍事同盟を強化するため"
        explanation: "軍事同盟の強化が目的ではありませんでした。"
    answer: "b"

  - id: "jhs-sh-ed-100"
    text: "1867年に徳川慶喜が行った「大政奉還」とはどのようなことか。"
    choices:
      - id: "a"
        text: "将軍が天皇に謝罪した儀式"
        explanation: "大政奉還は謝罪ではなく、政権の返上です。"
      - id: "b"
        text: "徳川将軍が朝廷（天皇）に政治を行う権限（大政）を返還したこと"
        explanation: "正解です。1867年10月14日、15代将軍・徳川慶喜は二条城で大政奉還を宣言し、1603年から続いた江戸幕府の政治権力を朝廷に返上しました。これにより武家政権が終わりました。"
      - id: "c"
        text: "将軍が大名に土地を分け与えたこと"
        explanation: "大政奉還は土地の分配ではありません。"
      - id: "d"
        text: "江戸幕府が諸外国に降伏したこと"
        explanation: "大政奉還は外国への降伏ではなく、国内の政権返上です。"
    answer: "b"
