questions:
  - id: "jhs-sh-tp-001"
    text: "大正時代に広まった、民主主義・自由主義を求める社会運動の総称はどれか。"
    choices:
      - id: "a"
        text: "明治維新"
        explanation: "明治維新は1868年の出来事です。"
      - id: "b"
        text: "大正デモクラシー"
        explanation: "正解です。大正時代（1912〜26年）に起きた、民主主義・自由主義・普通選挙を求める政治・社会運動の総称を大正デモクラシーといいます。"
      - id: "c"
        text: "自由民権運動"
        explanation: "自由民権運動は明治時代（1870〜80年代）の運動です。"
      - id: "d"
        text: "安保闘争"
        explanation: "安保闘争は昭和時代（1960年）の出来事です。"
    answer: "b"

  - id: "jhs-sh-tp-002"
    text: "大正デモクラシーを理論的に支えた、民本主義を唱えた学者は誰か。"
    choices:
      - id: "a"
        text: "福沢諭吉"
        explanation: "福沢諭吉は明治時代の思想家です。"
      - id: "b"
        text: "吉野作造（よしのさくぞう）"
        explanation: "正解です。東京帝国大学教授の吉野作造は民本主義（民意に基づく政治）を唱え、普通選挙と政党内閣制の実現を主張しました。"
      - id: "c"
        text: "美濃部達吉"
        explanation: "美濃部達吉は「天皇機関説」を唱えた法学者です。"
      - id: "d"
        text: "石橋湛山"
        explanation: "石橋湛山は戦前・戦後活躍したジャーナリスト・政治家です。"
    answer: "b"

  - id: "jhs-sh-tp-003"
    text: "1918年に米の価格が急騰したことで起きた、全国規模の民衆暴動はどれか。"
    choices:
      - id: "a"
        text: "関東大震災"
        explanation: "関東大震災は1923年の天災です。"
      - id: "b"
        text: "米騒動（こめそうどう）"
        explanation: "正解です。第一次世界大戦中のシベリア出兵を見越した米の買い占めで米価が急騰し、1918年に全国各地で民衆が米屋を襲う米騒動が起きました。"
      - id: "c"
        text: "二・二六事件"
        explanation: "二・二六事件は1936年の陸軍青年将校によるクーデター未遂事件です。"
      - id: "d"
        text: "五・一五事件"
        explanation: "五・一五事件は1932年に海軍青年将校が犬養毅首相を暗殺した事件です。"
    answer: "b"

  - id: "jhs-sh-tp-004"
    text: "米騒動の責任をとって寺内正毅内閣が退陣した後、初めて本格的な政党内閣を組織した人物は誰か。"
    choices:
      - id: "a"
        text: "原敬（はらたかし）"
        explanation: "正解です。1918年に立憲政友会総裁の原敬が組閣し、陸・海・外相を除くすべての閣僚を政党員とした、日本初の本格的な政党内閣を実現しました。"
      - id: "b"
        text: "加藤高明"
        explanation: "加藤高明は1925年に普通選挙法を成立させた首相です。"
      - id: "c"
        text: "桂太郎"
        explanation: "桂太郎は明治〜大正時代の首相で、三度内閣を組織しました。"
      - id: "d"
        text: "犬養毅"
        explanation: "犬養毅は1932年の五・一五事件で暗殺された首相です。"
    answer: "a"

  - id: "jhs-sh-tp-005"
    text: "1925年に加藤高明内閣が定めた、25歳以上の男子全員に選挙権を与える法律はどれか。"
    choices:
      - id: "a"
        text: "国会議員選挙法"
        explanation: "「国会議員選挙法」という法律名は正確ではありません。"
      - id: "b"
        text: "普通選挙法（ふつうせんきょほう）"
        explanation: "正解です。1925年に成立した普通選挙法により、納税額に関係なく満25歳以上の男子全員に衆議院議員の選挙権が与えられました。"
      - id: "c"
        text: "婦人参政権法"
        explanation: "女性の選挙権は戦後（1945年）に認められました。"
      - id: "d"
        text: "公職選挙法"
        explanation: "公職選挙法は戦後（1950年）に制定されました。"
    answer: "b"

  - id: "jhs-sh-tp-006"
    text: "普通選挙法と同年（1925年）に、社会主義運動を取り締まるために制定された法律はどれか。"
    choices:
      - id: "a"
        text: "安全保障条約"
        explanation: "安全保障条約（日米安保）は戦後（1951年）のものです。"
      - id: "b"
        text: "治安維持法（ちあんいじほう）"
        explanation: "正解です。1925年に社会主義・共産主義運動を取り締まるために制定された治安維持法は、後に適用範囲が拡大され、多くの反体制的な人々が弾圧されました。"
      - id: "c"
        text: "国家総動員法"
        explanation: "国家総動員法は1938年に戦時体制強化のために制定されました。"
      - id: "d"
        text: "治安警察法"
        explanation: "治安警察法は1900年に労働運動を規制するために制定された法律です。"
    answer: "b"

  - id: "jhs-sh-tp-007"
    text: "1923年9月1日に起きた、関東地方を中心とした大地震を何というか。"
    choices:
      - id: "a"
        text: "阪神淡路大震災"
        explanation: "阪神淡路大震災は1995年の出来事です。"
      - id: "b"
        text: "関東大震災（かんとうだいしんさい）"
        explanation: "正解です。1923年9月1日に起きたマグニチュード7.9の大地震で、東京・横浜を中心に10万人以上が死亡・行方不明となりました。"
      - id: "c"
        text: "東日本大震災"
        explanation: "東日本大震災は2011年の出来事です。"
      - id: "d"
        text: "濃尾地震"
        explanation: "濃尾地震は1891年に愛知・岐阜で起きた地震です。"
    answer: "b"

  - id: "jhs-sh-tp-008"
    text: "1931年に日本の軍部が中国東北部（満州）を占領するきっかけとなった事件はどれか。"
    choices:
      - id: "a"
        text: "五・一五事件"
        explanation: "五・一五事件は1932年の国内クーデター事件です。"
      - id: "b"
        text: "満州事変（まんしゅうじへん）"
        explanation: "正解です。1931年に関東軍が南満州鉄道の線路を爆破し（柳条湖事件）、これを中国軍の行為として満州全土を占領した事件を満州事変といいます。"
      - id: "c"
        text: "盧溝橋事件"
        explanation: "盧溝橋事件は1937年に日中戦争が始まるきっかけとなった事件です。"
      - id: "d"
        text: "張作霖爆殺事件"
        explanation: "張作霖爆殺事件は1928年に起きた事件で、満州事変の前段階となりました。"
    answer: "b"

  - id: "jhs-sh-tp-009"
    text: "1932年に満州に建てられた日本の傀儡国家はどれか。"
    choices:
      - id: "a"
        text: "大韓帝国"
        explanation: "大韓帝国は1897〜1910年の朝鮮の国名です。"
      - id: "b"
        text: "満州国（まんしゅうこく）"
        explanation: "正解です。1932年に日本の関東軍は清の最後の皇帝・溥儀を元首として満州国を建国しました。国際社会はこれを認めず、日本は国際連盟を脱退しました。"
      - id: "c"
        text: "中華民国"
        explanation: "中華民国は1912年に成立した中国の国家です。"
      - id: "d"
        text: "蒙古聯合自治政府"
        explanation: "蒙古聯合自治政府は内モンゴルの日本の傀儡政権です。"
    answer: "b"

  - id: "jhs-sh-tp-010"
    text: "1933年に日本が満州国を認めないとした国際連盟の報告書に反発して行ったことはどれか。"
    choices:
      - id: "a"
        text: "国際連合を設立した"
        explanation: "国際連合は第二次世界大戦後（1945年）に設立されました。"
      - id: "b"
        text: "国際連盟を脱退した"
        explanation: "正解です。リットン調査団の報告書で満州国が認められないと判断されると、日本は1933年に国際連盟を脱退しました。"
      - id: "c"
        text: "国際連盟に残り交渉を続けた"
        explanation: "日本は脱退を選びました。"
      - id: "d"
        text: "満州国の解体を受け入れた"
        explanation: "日本は満州国の解体を拒否して脱退しました。"
    answer: "b"

  - id: "jhs-sh-tp-011"
    text: "1936年に陸軍の青年将校たちが起こしたクーデター未遂事件はどれか。"
    choices:
      - id: "a"
        text: "五・一五事件"
        explanation: "五・一五事件は1932年に海軍青年将校が犬養毅首相を暗殺した事件です。"
      - id: "b"
        text: "二・二六事件（にいにいろくじけん）"
        explanation: "正解です。1936年2月26日に陸軍の青年将校たちが約1400名の兵士を率いて反乱を起こし、高橋是清大蔵大臣らを殺害しましたが、数日後に鎮圧されました。"
      - id: "c"
        text: "五・一五事件"
        explanation: "五・一五事件は1932年の事件です。"
      - id: "d"
        text: "血盟団事件"
        explanation: "血盟団事件は1932年に政財界人を次々と暗殺した事件です。"
    answer: "b"

  - id: "jhs-sh-tp-012"
    text: "1937年7月、北京郊外の橋での日中両軍の衝突をきっかけに始まった戦争はどれか。"
    choices:
      - id: "a"
        text: "満州事変"
        explanation: "満州事変は1931年の出来事です。"
      - id: "b"
        text: "日中戦争（にっちゅうせんそう）"
        explanation: "正解です。1937年の盧溝橋事件をきっかけに日中戦争（支那事変）が始まり、日本は中国各地に戦線を拡大しましたが、長期化しました。"
      - id: "c"
        text: "太平洋戦争"
        explanation: "太平洋戦争は1941年12月の真珠湾攻撃で始まりました。"
      - id: "d"
        text: "日露戦争"
        explanation: "日露戦争は1904〜05年の出来事です。"
    answer: "b"

  - id: "jhs-sh-tp-013"
    text: "1938年に日本が戦時体制を整えるために定めた、国家のすべての資源を戦争に動員できる法律はどれか。"
    choices:
      - id: "a"
        text: "治安維持法"
        explanation: "治安維持法は1925年に社会主義運動を取り締まるために制定されました。"
      - id: "b"
        text: "国家総動員法（こっかそうどういんほう）"
        explanation: "正解です。1938年に制定された国家総動員法は、議会の承認なしに人員・物資・資金などの資源を戦争に動員できる権限を政府に与えました。"
      - id: "c"
        text: "軍需産業法"
        explanation: "「軍需産業法」という名前の法律は存在しません。"
      - id: "d"
        text: "徴兵令"
        explanation: "徴兵令は明治時代（1873年）に定められた兵役義務の法律です。"
    answer: "b"

  - id: "jhs-sh-tp-014"
    text: "1939年に始まった第二次世界大戦は、どの国の侵略が直接のきっかけになったか。"
    choices:
      - id: "a"
        text: "日本のアジア侵略"
        explanation: "日本のアジア侵略が第二次世界大戦の直接のきっかけではありません。"
      - id: "b"
        text: "ドイツのポーランド侵攻"
        explanation: "正解です。1939年9月にナチス・ドイツのポーランド侵攻に対し、イギリス・フランスが宣戦布告して第二次世界大戦が始まりました。"
      - id: "c"
        text: "イタリアのエチオピア侵略"
        explanation: "イタリアのエチオピア侵略は1935年で、第二次世界大戦の直接のきっかけではありません。"
      - id: "d"
        text: "ソ連のフィンランド侵攻"
        explanation: "ソ連のフィンランド侵攻（冬戦争）は1939年末ですが、第二次世界大戦の直接のきっかけではありません。"
    answer: "b"

  - id: "jhs-sh-tp-015"
    text: "1940年に日本・ドイツ・イタリアが結んだ軍事同盟はどれか。"
    choices:
      - id: "a"
        text: "三国協商"
        explanation: "三国協商は第一次世界大戦前のイギリス・フランス・ロシアの協力関係です。"
      - id: "b"
        text: "日独伊三国同盟（にちどくいさんごくどうめい）"
        explanation: "正解です。1940年に日本・ドイツ・イタリアが締結した軍事同盟で、枢軸国（軍事同盟国）としてともに戦うことを約束しました。"
      - id: "c"
        text: "日英同盟"
        explanation: "日英同盟は1902年に日本とイギリスが結んだ同盟で、1923年に解消されました。"
      - id: "d"
        text: "三国干渉"
        explanation: "三国干渉はロシア・フランス・ドイツが日本に対し行った外交干渉（1895年）です。"
    answer: "b"

  - id: "jhs-sh-tp-016"
    text: "1941年12月8日に日本がハワイの真珠湾を奇襲攻撃して始まった戦争はどれか。"
    choices:
      - id: "a"
        text: "日清戦争"
        explanation: "日清戦争は1894〜95年の出来事です。"
      - id: "b"
        text: "太平洋戦争（たいへいようせんそう）"
        explanation: "正解です。1941年12月8日の真珠湾攻撃によってアメリカとの戦争（太平洋戦争）が始まり、日本は東南アジア・太平洋地域へ戦線を拡大しました。"
      - id: "c"
        text: "日中戦争"
        explanation: "日中戦争は1937年から始まっていました。"
      - id: "d"
        text: "第一次世界大戦"
        explanation: "第一次世界大戦は1914〜18年の出来事です。"
    answer: "b"

  - id: "jhs-sh-tp-017"
    text: "第一次世界大戦中に日本が経済成長した理由として正しいものはどれか。"
    choices:
      - id: "a"
        text: "日本が戦争に積極的に参戦して戦利品を得たため"
        explanation: "日本はアジアでの戦線には参加しましたが、主にヨーロッパの戦争に積極的には参戦しませんでした。"
      - id: "b"
        text: "ヨーロッパ諸国が戦争で手が回らない間に、アジア市場への輸出を拡大したため"
        explanation: "正解です。ヨーロッパ列強が戦争に集中している間に、日本は綿製品などの工業製品をアジア市場に大量輸出し、大戦景気（成金の時代）を迎えました。"
      - id: "c"
        text: "アメリカから大量の援助を受けたため"
        explanation: "日本がアメリカから大量の援助を受けた事実はありません。"
      - id: "d"
        text: "石油資源を新たに発見したため"
        explanation: "石油発見が経済成長の理由ではありません。"
    answer: "b"

  - id: "jhs-sh-tp-018"
    text: "大正時代に活発になった労働者や農民の権利運動について正しいものはどれか。"
    choices:
      - id: "a"
        text: "武士階級が中心となって権利を要求した"
        explanation: "大正時代にはすでに武士階級は存在しません。"
      - id: "b"
        text: "労働組合の結成・ストライキ・小作争議などが増加した"
        explanation: "正解です。大正時代には工場労働者による労働組合の結成・ストライキ、農村では小作料の引き下げを求める小作争議が増加しました。"
      - id: "c"
        text: "農民が土地を無償で与えられるよう要求した"
        explanation: "農民一揆（小作争議）は主に小作料の引き下げを求めるもので、土地の無償給付を要求するものではありませんでした。"
      - id: "d"
        text: "運動は皆無で、すべての人々は政府に従順だった"
        explanation: "大正時代は多くの社会運動が起きた時代です。"
    answer: "b"

  - id: "jhs-sh-tp-019"
    text: "1922年に結成された、部落差別撤廃を目指す組織はどれか。"
    choices:
      - id: "a"
        text: "大日本婦人会"
        explanation: "大日本婦人会は戦時中の女性団体です。"
      - id: "b"
        text: "全国水平社（ぜんこくすいへいしゃ）"
        explanation: "正解です。1922年に設立された全国水平社は、部落差別の撤廃を求めて「人の世に熱あれ、人間に光あれ」と宣言し、被差別部落の人々が自らの手で差別解放を目指した組織です。"
      - id: "c"
        text: "新婦人協会"
        explanation: "新婦人協会は平塚らいてうらが1920年に設立した女性解放運動団体です。"
      - id: "d"
        text: "大政翼賛会"
        explanation: "大政翼賛会は1940年に設立された政府主導の国民統制組織です。"
    answer: "b"

  - id: "jhs-sh-tp-020"
    text: "大正・昭和初期に女性解放・参政権運動を進めた人物として正しいものはどれか。"
    choices:
      - id: "a"
        text: "紫式部"
        explanation: "紫式部は平安時代の女流作家です。"
      - id: "b"
        text: "平塚らいてう（ひらつからいちょう）"
        explanation: "正解です。平塚らいてうは1911年に女性文芸誌「青鞜」を創刊し、「元始、女性は太陽であった」と宣言、その後新婦人協会を設立して女性の政治参加権を求めて活動しました。"
      - id: "c"
        text: "樋口一葉"
        explanation: "樋口一葉は明治時代の女流作家で、現在の5千円札の肖像です。"
      - id: "d"
        text: "与謝野晶子"
        explanation: "与謝野晶子は歌人・文学者で、日露戦争に反対する詩「君死にたまふことなかれ」で有名です。女性解放運動家として平塚らいてうと並ぶ存在でもあります。"
    answer: "b"

  - id: "jhs-sh-tp-021"
    text: "昭和初期の1929年にアメリカで始まり、世界に波及した経済の大混乱を何というか。"
    choices:
      - id: "a"
        text: "リーマンショック"
        explanation: "リーマンショックは2008年のアメリカの金融危機です。"
      - id: "b"
        text: "世界恐慌（せかいきょうこう）"
        explanation: "正解です。1929年10月24日（暗黒の木曜日）にニューヨーク株式市場が大暴落し、世界恐慌が始まりました。世界中で失業者が増加し、日本でも昭和恐慌が起きました。"
      - id: "c"
        text: "石油ショック"
        explanation: "石油ショックは1973年の中東情勢による石油価格高騰の危機です。"
      - id: "d"
        text: "バブル崩壊"
        explanation: "バブル崩壊は1991年頃の日本の経済危機です。"
    answer: "b"

  - id: "jhs-sh-tp-022"
    text: "1932年に海軍の青年将校が犬養毅首相を官邸で暗殺した事件はどれか。"
    choices:
      - id: "a"
        text: "二・二六事件"
        explanation: "二・二六事件は1936年に陸軍青年将校が起こしたクーデター未遂事件です。"
      - id: "b"
        text: "五・一五事件（ごいちごじけん）"
        explanation: "正解です。1932年5月15日に海軍の青年将校が首相官邸に乱入し、「話せばわかる」と言う犬養毅首相を「問答無用」と撃って暗殺した事件です。"
      - id: "c"
        text: "桜田門外の変"
        explanation: "桜田門外の変は1860年に大老井伊直弼が暗殺された事件です。"
      - id: "d"
        text: "血盟団事件"
        explanation: "血盟団事件は1932年に財界人らを次々と暗殺した事件で、五・一五事件とは別です。"
    answer: "b"

  - id: "jhs-sh-tp-023"
    text: "太平洋戦争中に日本の都市に対して行われた、アメリカによる大規模な空爆を何というか。"
    choices:
      - id: "a"
        text: "神風特攻隊"
        explanation: "神風特攻隊は日本の自爆攻撃部隊です。"
      - id: "b"
        text: "空襲（くうしゅう）・東京大空襲"
        explanation: "正解です。1945年3月10日の東京大空襲をはじめ、アメリカのB-29爆撃機による日本各都市への無差別爆撃が行われ、多数の民間人が犠牲になりました。"
      - id: "c"
        text: "艦砲射撃"
        explanation: "艦砲射撃は沖縄戦などで行われましたが、都市への攻撃の中心は空襲でした。"
      - id: "d"
        text: "核攻撃のみ"
        explanation: "原子爆弾攻撃は広島・長崎への2回ですが、都市への攻撃は空襲全体でした。"
    answer: "b"

  - id: "jhs-sh-tp-024"
    text: "1945年8月6日と9日に、アメリカが初めて実戦で使用した兵器はどれか。"
    choices:
      - id: "a"
        text: "毒ガス兵器"
        explanation: "毒ガスは第一次世界大戦で使用されましたが、日本への攻撃ではこれは使われませんでした。"
      - id: "b"
        text: "原子爆弾（げんしばくだん）"
        explanation: "正解です。1945年8月6日に広島、8月9日に長崎に原子爆弾が投下されました。広島では約14万人、長崎では約7万4千人が年末までに死亡しました。"
      - id: "c"
        text: "水素爆弾"
        explanation: "水素爆弾（核融合爆弾）は原子爆弾より後に開発されました。"
      - id: "d"
        text: "生物兵器"
        explanation: "生物兵器は使用されませんでした。"
    answer: "b"

  - id: "jhs-sh-tp-025"
    text: "1945年8月15日に昭和天皇がラジオ放送で日本国民に伝えたことはどれか。"
    choices:
      - id: "a"
        text: "戦争に勝利したこと"
        explanation: "8月15日は終戦（敗戦）を伝える放送です。"
      - id: "b"
        text: "ポツダム宣言の受諾（終戦）"
        explanation: "正解です。1945年8月15日、昭和天皇はラジオ放送（玉音放送）でポツダム宣言の受諾・終戦を国民に伝えました。この日が「終戦の日」とされています。"
      - id: "c"
        text: "戦争の継続"
        explanation: "8月15日はあくまで終戦の宣言です。"
      - id: "d"
        text: "原子爆弾投下への抗議"
        explanation: "玉音放送は原子爆弾への抗議ではなく、終戦の通告でした。"
    answer: "b"

  - id: "jhs-sh-tp-026"
    text: "1914年に始まった第一次世界大戦で、日本はどの立場で参戦したか。"
    choices:
      - id: "a"
        text: "ドイツ・オーストリア側（同盟国側）"
        explanation: "日本は同盟国（ドイツ側）ではなく連合国側で参戦しました。"
      - id: "b"
        text: "中立を保ち参戦しなかった"
        explanation: "日本は中立ではなく、日英同盟を根拠に連合国側で参戦しました。"
      - id: "c"
        text: "日英同盟を根拠に連合国（イギリス・フランス側）として参戦"
        explanation: "正解です。日本は1914年、日英同盟を根拠に連合国側として第一次世界大戦に参戦し、中国・太平洋のドイツ権益を占領しました。"
      - id: "d"
        text: "アメリカと共同で独自の中立軍を組織した"
        explanation: "そのような事実はありません。"
    answer: "c"

  - id: "jhs-sh-tp-027"
    text: "日本が第一次世界大戦中の1915年、中国（袁世凱政府）に突きつけた不平等要求は何か。"
    choices:
      - id: "a"
        text: "日韓議定書"
        explanation: "日韓議定書は1904年の日露戦争時の文書です。"
      - id: "b"
        text: "二十一か条の要求"
        explanation: "正解です。1915年、日本は中国の袁世凱政府に対し、山東省のドイツ権益の継承や満州での利権拡大などを内容とする二十一か条の要求を突きつけました。中国では屈辱的と反発されました。"
      - id: "c"
        text: "下関条約"
        explanation: "下関条約は1895年の日清戦争後の講和条約です。"
      - id: "d"
        text: "ポーツマス条約"
        explanation: "ポーツマス条約は1905年の日露戦争後の講和条約です。"
    answer: "b"

  - id: "jhs-sh-tp-028"
    text: "第一次世界大戦の講和条約として1919年に結ばれた条約はどれか。"
    choices:
      - id: "a"
        text: "ポーツマス条約"
        explanation: "ポーツマス条約は1905年の日露戦争後の講和条約です。"
      - id: "b"
        text: "ベルサイユ条約"
        explanation: "正解です。1919年、パリ講和会議でベルサイユ条約が締結されました。ドイツは領土の喪失・賠償金・軍備制限を課されました。"
      - id: "c"
        text: "サンフランシスコ平和条約"
        explanation: "サンフランシスコ平和条約は1951年の第二次世界大戦後のものです。"
      - id: "d"
        text: "日米和親条約"
        explanation: "日米和親条約は1854年のペリー来航後の条約です。"
    answer: "b"

  - id: "jhs-sh-tp-029"
    text: "1920年に設立された、世界平和と国際協調を目的とする国際機関はどれか。"
    choices:
      - id: "a"
        text: "国際連合（国連）"
        explanation: "国際連合は第二次世界大戦後の1945年に設立されました。"
      - id: "b"
        text: "国際連盟"
        explanation: "正解です。1920年にウィルソン米大統領の提唱で国際連盟が設立されました。本部はジュネーブに置かれ、日本はイギリス・フランスなどとともに常任理事国となりました。なお提唱したアメリカは議会の反対で加盟しませんでした。"
      - id: "c"
        text: "世界銀行"
        explanation: "世界銀行は1944年のブレトン・ウッズ協定に基づき設立された金融機関です。"
      - id: "d"
        text: "NATO（北大西洋条約機構）"
        explanation: "NATOは1949年に設立された軍事同盟です。"
    answer: "b"

  - id: "jhs-sh-tp-030"
    text: "1919年に朝鮮で起きた、日本の支配に反対する大規模な独立運動はどれか。"
    choices:
      - id: "a"
        text: "甲午農民運動（東学党の乱）"
        explanation: "甲午農民運動は1894年の出来事です。"
      - id: "b"
        text: "三・一独立運動（さんいちどくりつうんどう）"
        explanation: "正解です。1919年3月1日、朝鮮各地で「独立万歳」を叫ぶ独立運動が起き、日本の武力弾圧によって多数の死傷者が出ました。これをきっかけに日本は「武断政治」から「文化政治」に転換しました。"
      - id: "c"
        text: "五・四運動"
        explanation: "五・四運動は1919年に中国で起きた反日・反帝国主義運動です。"
      - id: "d"
        text: "光州学生運動"
        explanation: "光州学生運動は1929年に朝鮮で起きた学生による独立運動です。"
    answer: "b"

  - id: "jhs-sh-tp-031"
    text: "1919年に中国で起きた、ベルサイユ条約への反発を契機とする反日・民族運動はどれか。"
    choices:
      - id: "a"
        text: "三・一独立運動"
        explanation: "三・一独立運動は1919年に朝鮮で起きた独立運動です。"
      - id: "b"
        text: "五・四運動（ごしうんどう）"
        explanation: "正解です。1919年5月4日、ベルサイユ条約で山東省が日本に引き渡されたことに反発した北京の学生が抗議運動を起こし、全国に広がりました。これが中国ナショナリズムの高まりにつながりました。"
      - id: "c"
        text: "辛亥革命"
        explanation: "辛亥革命は1911〜12年の中国革命です。"
      - id: "d"
        text: "文化大革命"
        explanation: "文化大革命は1966〜76年に中国で起きた政治運動です。"
    answer: "b"

  - id: "jhs-sh-tp-032"
    text: "1923年9月1日に関東地方を襲った大地震の名称はどれか。"
    choices:
      - id: "a"
        text: "阪神・淡路大震災"
        explanation: "阪神・淡路大震災は1995年1月17日の出来事です。"
      - id: "b"
        text: "関東大震災（かんとうだいしんさい）"
        explanation: "正解です。1923年9月1日、マグニチュード7.9の大地震が関東地方を直撃し、東京・横浜を中心に約10万5千人が死亡・行方不明になりました。地震後の混乱の中で朝鮮人・中国人への虐殺事件も起きました。"
      - id: "c"
        text: "東日本大震災"
        explanation: "東日本大震災は2011年3月11日の出来事です。"
      - id: "d"
        text: "濃尾地震"
        explanation: "濃尾地震は1891年に起きた大地震です。"
    answer: "b"

  - id: "jhs-sh-tp-033"
    text: "1925年に成立した、満25歳以上のすべての男性に選挙権を認めた法律はどれか。"
    choices:
      - id: "a"
        text: "国家総動員法"
        explanation: "国家総動員法は1938年に制定された、戦時体制のための法律です。"
      - id: "b"
        text: "普通選挙法（ふつうせんきょほう）"
        explanation: "正解です。1925年、加藤高明内閣のもとで普通選挙法が成立し、25歳以上のすべての男性に選挙権が与えられました。これにより選挙人数は約4倍になりました。"
      - id: "c"
        text: "大日本帝国憲法"
        explanation: "大日本帝国憲法は1889年に発布されたものです。"
      - id: "d"
        text: "日本国憲法"
        explanation: "日本国憲法は1946年に公布、1947年に施行されたものです。"
    answer: "b"

  - id: "jhs-sh-tp-034"
    text: "普通選挙法と同じ年（1925年）に制定された、社会主義・共産主義運動を取り締まる法律はどれか。"
    choices:
      - id: "a"
        text: "戒厳令"
        explanation: "戒厳令は非常時に軍が行政・司法権を掌握する制度で、別のものです。"
      - id: "b"
        text: "治安維持法（ちあんいじほう）"
        explanation: "正解です。1925年、普通選挙法と同時に治安維持法が制定されました。社会主義・共産主義運動や国体（天皇制）の変革を目的とする運動を厳しく取り締まりました。後に適用範囲が拡大され、多くの活動家が弾圧されました。"
      - id: "c"
        text: "治安警察法"
        explanation: "治安警察法は1900年に制定された労働運動・政治活動取り締まり法です。"
      - id: "d"
        text: "国家総動員法"
        explanation: "国家総動員法は1938年に制定されました。"
    answer: "b"

  - id: "jhs-sh-tp-035"
    text: "1928年に行われた、普通選挙法による初めての衆議院議員選挙の特徴はどれか。"
    choices:
      - id: "a"
        text: "女性も投票できた"
        explanation: "女性参政権は1945年に認められ、1946年の選挙から実施されました。"
      - id: "b"
        text: "25歳以上の男性全員が投票できた（第一回普通選挙）"
        explanation: "正解です。1928年の第16回衆議院議員選挙は、普通選挙法に基づく最初の選挙で、納税額の制限なく25歳以上の男性全員に投票権がありました。有権者数が大幅に増えました。"
      - id: "c"
        text: "20歳以上の男女が投票できた"
        explanation: "20歳以上の男女全員が投票できるようになったのは1946年からです。"
      - id: "d"
        text: "一定額以上の納税者のみ投票できた"
        explanation: "普通選挙法は納税要件を撤廃しました。"
    answer: "b"

  - id: "jhs-sh-tp-036"
    text: "1931年、関東軍が奉天郊外の柳条湖で南満州鉄道の線路を爆破し、中国軍の仕業として満州を占領した事件を何というか。"
    choices:
      - id: "a"
        text: "張作霖爆殺事件"
        explanation: "張作霖爆殺事件は1928年に関東軍が中国軍閥の張作霖を暗殺した事件です。"
      - id: "b"
        text: "満州事変（まんしゅうじへん）"
        explanation: "正解です。1931年9月18日、関東軍は柳条湖で自ら南満州鉄道の線路を爆破し、中国軍の仕業として満州全土を占領しました。これが満州事変です。翌年には満州国が建国されました。"
      - id: "c"
        text: "日中戦争"
        explanation: "日中戦争は1937年の盧溝橋事件がきっかけで始まった本格的な戦争です。"
      - id: "d"
        text: "盧溝橋事件"
        explanation: "盧溝橋事件は1937年に北京郊外で起きた日中武力衝突です。"
    answer: "b"

  - id: "jhs-sh-tp-037"
    text: "1932年に日本が建国を宣言した、満州（中国東北部）に作った国の名称はどれか。"
    choices:
      - id: "a"
        text: "中華民国"
        explanation: "中華民国は1912年に建国された中国の国家です。"
      - id: "b"
        text: "満州国（まんしゅうこく）"
        explanation: "正解です。1932年、日本は満州事変で占領した地域に満州国を建国しました。清朝最後の皇帝・溥儀（ふぎ）を執政（後に皇帝）に立て、実際には関東軍が支配する傀儡国家でした。"
      - id: "c"
        text: "朝鮮"
        explanation: "朝鮮は1910年の韓国併合で日本の植民地となっていましたが、満州国ではありません。"
      - id: "d"
        text: "蒙古聯合自治政府"
        explanation: "蒙古聯合自治政府は1939年に内蒙古に作られた別の傀儡政権です。"
    answer: "b"

  - id: "jhs-sh-tp-038"
    text: "満州事変を調査するために国際連盟が派遣した調査団の名称はどれか。"
    choices:
      - id: "a"
        text: "パリ委員会"
        explanation: "そのような調査団はありません。"
      - id: "b"
        text: "リットン調査団"
        explanation: "正解です。国際連盟はイギリスのリットン卿を団長とする調査団を派遣しました。1932年に報告書を提出し、満州における中国の主権を認め、満州国の即時承認には反対しました。"
      - id: "c"
        text: "国際連合安全保障理事会"
        explanation: "国際連合は1945年設立で、1930年代には存在しませんでした。"
      - id: "d"
        text: "ハーグ常設仲裁裁判所"
        explanation: "ハーグの仲裁裁判所とは別の機関です。"
    answer: "b"

  - id: "jhs-sh-tp-039"
    text: "1933年、日本が国際連盟の勧告（満州からの撤退）を不服として行ったことはどれか。"
    choices:
      - id: "a"
        text: "国際連盟に宣戦布告した"
        explanation: "国際連盟に宣戦布告という事実はありません。"
      - id: "b"
        text: "国際連盟を脱退した"
        explanation: "正解です。1933年、国際連盟総会で満州国不承認・日本軍の撤退が勧告されると、日本全権の松岡洋右は議場から退場し、日本は国際連盟を脱退しました。これにより国際的な孤立が深まりました。"
      - id: "c"
        text: "満州から軍を撤退させた"
        explanation: "日本は撤退勧告を拒否して国際連盟を脱退しました。"
      - id: "d"
        text: "国際連盟の常任理事国を辞退した"
        explanation: "日本は脱退したのであって、常任理事国のみ辞退したのではありません。"
    answer: "b"

  - id: "jhs-sh-tp-040"
    text: "1936年2月26日、陸軍の青年将校が東京の主要政府機関を占拠した事件はどれか。"
    choices:
      - id: "a"
        text: "五・一五事件"
        explanation: "五・一五事件は1932年に海軍青年将校が犬養毅首相を暗殺した事件です。"
      - id: "b"
        text: "二・二六事件（にいにいろくじけん）"
        explanation: "正解です。1936年2月26日、皇道派の陸軍青年将校が約1400名の兵を率いて首相官邸・陸軍省などを占拠し、斎藤実内大臣ら重臣を殺害しました。4日後に鎮圧されましたが、軍部の政治的発言力が一層強まりました。"
      - id: "c"
        text: "張作霖爆殺事件"
        explanation: "張作霖爆殺事件は1928年に起きた事件です。"
      - id: "d"
        text: "桜田門外の変"
        explanation: "桜田門外の変は1860年の事件です。"
    answer: "b"

  - id: "jhs-sh-tp-041"
    text: "1937年7月、北京郊外で日中両軍が衝突し、日中戦争の発端となった事件はどれか。"
    choices:
      - id: "a"
        text: "柳条湖事件"
        explanation: "柳条湖事件は1931年の満州事変の発端となった事件です。"
      - id: "b"
        text: "盧溝橋事件（ろこうきょうじけん）"
        explanation: "正解です。1937年7月7日、北京郊外の盧溝橋付近で日中両軍が衝突し、これが日中戦争（支那事変）の発端となりました。戦火は上海・南京へと拡大しました。"
      - id: "c"
        text: "満州事変"
        explanation: "満州事変は1931年の出来事です。"
      - id: "d"
        text: "二・二六事件"
        explanation: "二・二六事件は1936年の陸軍のクーデター未遂事件です。"
    answer: "b"

  - id: "jhs-sh-tp-042"
    text: "1937年末、日本軍が占領した中国の首都で多数の民間人を殺害したとされる事件はどれか。"
    choices:
      - id: "a"
        text: "上海事変"
        explanation: "上海事変は上海での戦闘ですが、南京での虐殺ではありません。"
      - id: "b"
        text: "南京大虐殺（なんきんだいぎゃくさつ）"
        explanation: "正解です。1937年12月、日本軍は中国の首都南京を占領し、多数の中国人（軍人・捕虜・民間人）を殺害したとされます。犠牲者数については現在も日中間で見解が異なります。"
      - id: "c"
        text: "通州事件"
        explanation: "通州事件は1937年に中国人警備隊が日本人居留民を殺害した事件です。"
      - id: "d"
        text: "重慶爆撃"
        explanation: "重慶爆撃は日本軍による中国の臨時首都・重慶への無差別爆撃です。"
    answer: "b"

  - id: "jhs-sh-tp-043"
    text: "1938年に制定された、政府が議会の承認なしに人・物資を戦争に動員できる法律はどれか。"
    choices:
      - id: "a"
        text: "治安維持法"
        explanation: "治安維持法は1925年制定の、社会主義運動取り締まり法です。"
      - id: "b"
        text: "国家総動員法（こっかそうどういんほう）"
        explanation: "正解です。1938年、第一次近衛内閣のもとで国家総動員法が制定されました。政府は議会の承認なしに、労働力・物資・資金などを戦争のために動員できるようになりました。"
      - id: "c"
        text: "軍需産業動員法"
        explanation: "そのような法律名ではありません。国家総動員法が正しいです。"
      - id: "d"
        text: "大政翼賛会規約"
        explanation: "大政翼賛会は1940年に組織された政治団体で、法律ではありません。"
    answer: "b"

  - id: "jhs-sh-tp-044"
    text: "1940年に既存の政党や政治団体が解散・合流してできた、戦時下の政治組織はどれか。"
    choices:
      - id: "a"
        text: "立憲政友会"
        explanation: "立憲政友会は1940年に解散しました。"
      - id: "b"
        text: "大政翼賛会（たいせいよくさんかい）"
        explanation: "正解です。1940年、第二次近衛文麿内閣のもとで既存の政党はすべて解散させられ、大政翼賛会が結成されました。「挙国一致」体制を作る目的で設立され、全国の町内会・隣組もその傘下に置かれました。"
      - id: "c"
        text: "国民政府"
        explanation: "国民政府は中国の蒋介石の政権です。"
      - id: "d"
        text: "内務省"
        explanation: "内務省は政府の行政機関であり、政治団体ではありません。"
    answer: "b"

  - id: "jhs-sh-tp-045"
    text: "1940年に日本・ドイツ・イタリアが結んだ軍事同盟はどれか。"
    choices:
      - id: "a"
        text: "日英同盟"
        explanation: "日英同盟は1902年に締結されたもので、1923年に廃棄されました。"
      - id: "b"
        text: "日独伊三国同盟（にちどくいさんごくどうめい）"
        explanation: "正解です。1940年9月、日本・ドイツ・イタリアは日独伊三国同盟を締結しました。三国の一つが攻撃された場合、他の二国が援助することを約束し、事実上アメリカを仮想敵国とする同盟でした。"
      - id: "c"
        text: "日ソ中立条約"
        explanation: "日ソ中立条約は1941年に日本とソ連が結んだ中立条約です。"
      - id: "d"
        text: "ワルシャワ条約機構"
        explanation: "ワルシャワ条約機構は1955年に設立されたソ連主導の軍事同盟です。"
    answer: "b"

  - id: "jhs-sh-tp-046"
    text: "1941年4月、日本とソビエト連邦が互いに中立を守ることを約束した条約はどれか。"
    choices:
      - id: "a"
        text: "日露講和条約（ポーツマス条約）"
        explanation: "ポーツマス条約は1905年の日露戦争後の講和条約です。"
      - id: "b"
        text: "日ソ中立条約（にちそちゅうりつじょうやく）"
        explanation: "正解です。1941年4月、日本とソビエト連邦は日ソ中立条約を締結し、互いに中立を守ることを約束しました。これにより日本は南方進出に専念できましたが、1945年8月、ソ連はこの条約を破って日本に宣戦布告しました。"
      - id: "c"
        text: "日独不可侵条約"
        explanation: "そのような条約はありません。独ソ不可侵条約（1939年）と混同しないようにしましょう。"
      - id: "d"
        text: "日中平和友好条約"
        explanation: "日中平和友好条約は1978年締結のものです。"
    answer: "b"

  - id: "jhs-sh-tp-047"
    text: "1941年12月8日、日本が奇襲攻撃した場所はどこか。"
    choices:
      - id: "a"
        text: "グアム島"
        explanation: "グアム島への攻撃もありましたが、最初の奇襲攻撃はハワイのアメリカ軍基地です。"
      - id: "b"
        text: "ハワイの真珠湾（パールハーバー）"
        explanation: "正解です。1941年12月8日（現地時間7日）、日本海軍はハワイの真珠湾にあるアメリカ太平洋艦隊基地を奇襲攻撃しました。同時にマレー半島にも上陸し、太平洋戦争が始まりました。"
      - id: "c"
        text: "フィリピン・マニラ"
        explanation: "マニラへの攻撃もありましたが、開戦の「奇襲」は真珠湾が最初です。"
      - id: "d"
        text: "シンガポール"
        explanation: "シンガポールは1942年2月に陥落しましたが、開戦の奇襲攻撃ではありません。"
    answer: "b"

  - id: "jhs-sh-tp-048"
    text: "太平洋戦争で日本がアメリカに対して宣戦布告した際の、当時の日本の内閣総理大臣は誰か。"
    choices:
      - id: "a"
        text: "近衛文麿（このえふみまろ）"
        explanation: "近衛文麿は1941年10月に総理を辞任しており、開戦時の首相ではありません。"
      - id: "b"
        text: "東条英機（とうじょうひでき）"
        explanation: "正解です。1941年10月に組閣した東条英機内閣のもとで、12月8日に太平洋戦争が始まりました。東条英機は首相兼陸軍大臣として戦争を指導しました。"
      - id: "c"
        text: "山本五十六（やまもといそろく）"
        explanation: "山本五十六は連合艦隊司令長官（軍人）であり、首相ではありません。"
      - id: "d"
        text: "米内光政（よないみつまさ）"
        explanation: "米内光政は1940年の首相で、開戦時の首相ではありません。"
    answer: "b"

  - id: "jhs-sh-tp-049"
    text: "太平洋戦争中の1942年6月、日本海軍がアメリカ海軍に大敗し、制海権・制空権を失う転機となった海戦はどれか。"
    choices:
      - id: "a"
        text: "真珠湾攻撃"
        explanation: "真珠湾攻撃は1941年12月8日の日本の奇襲で、日本が勝利しました。"
      - id: "b"
        text: "ミッドウェー海戦（みっどうぇーかいせん）"
        explanation: "正解です。1942年6月のミッドウェー海戦で日本は空母4隻を失う大敗を喫しました。この海戦を境に太平洋での戦局が日本に不利になりました。"
      - id: "c"
        text: "沖縄戦"
        explanation: "沖縄戦は1945年の地上戦で、ミッドウェー海戦とは別です。"
      - id: "d"
        text: "レイテ湾海戦"
        explanation: "レイテ湾海戦は1944年のフィリピンでの海戦です。"
    answer: "b"

  - id: "jhs-sh-tp-050"
    text: "太平洋戦争中、政府が戦争遂行のために国民に課した生活上の制限はどれか。"
    choices:
      - id: "a"
        text: "農業の集団化"
        explanation: "農業の集団化はソ連などの社会主義国の政策で、日本ではありません。"
      - id: "b"
        text: "食料・衣料などの配給制（はいきゅうせい）"
        explanation: "正解です。戦時中、食料・衣料・燃料などが配給制となり、国民は通帳を持って決まった量だけ受け取りました。砂糖・米・味噌・醤油なども配給制になり、生活は苦しくなりました。"
      - id: "c"
        text: "外国旅行の奨励"
        explanation: "戦時中は渡航制限があり、外国旅行が奨励されるようなことはありません。"
      - id: "d"
        text: "電話の普及促進"
        explanation: "そのような政策は戦時下では行われていません。"
    answer: "b"

  - id: "jhs-sh-tp-051"
    text: "戦時中、学校生徒が工場や農村などで働かされた制度を何というか。"
    choices:
      - id: "a"
        text: "学制改革"
        explanation: "学制改革は戦後の教育制度の変革です。"
      - id: "b"
        text: "勤労動員（きんろうどういん）"
        explanation: "正解です。戦時中、中学生以上の生徒・学生が工場・農村・鉱山などで強制的に働かされました。これを勤労動員といいます。授業よりも勤労動員の日数の方が多くなる学校もありました。"
      - id: "c"
        text: "義務教育の拡充"
        explanation: "戦時中は義務教育の拡充ではなく、むしろ学業が犠牲になりました。"
      - id: "d"
        text: "職業訓練制度"
        explanation: "勤労動員は特定の職業訓練ではなく、戦時の労働力確保のための制度です。"
    answer: "b"

  - id: "jhs-sh-tp-052"
    text: "太平洋戦争末期、大学生などを戦場に送り込んだ措置を何というか。"
    choices:
      - id: "a"
        text: "徴兵令"
        explanation: "徴兵令は明治時代（1873年）に制定された制度で、これとは別です。"
      - id: "b"
        text: "学徒出陣（がくとしゅつじん）"
        explanation: "正解です。1943年、戦局の悪化により、それまで兵役が猶予されていた文科系の大学生・専門学校生も徴兵されることになりました。これを学徒出陣といいます。全国各地で出陣式が行われました。"
      - id: "c"
        text: "赤紙による召集"
        explanation: "赤紙（召集令状）は一般の徴兵制度によるもので、学徒出陣とは制度が異なります。"
      - id: "d"
        text: "特攻隊の組織"
        explanation: "特攻隊は航空機などで敵艦に体当たりする特別攻撃隊で、学徒出陣とは異なります。"
    answer: "b"

  - id: "jhs-sh-tp-053"
    text: "太平洋戦争末期、爆弾を積んだ航空機ごと敵艦に体当たりする攻撃方法の部隊を何というか。"
    choices:
      - id: "a"
        text: "神風（かみかぜ）特攻隊"
        explanation: "正解です。1944年秋頃から、爆弾を積んだ航空機が米艦隊に体当たりする「特攻（神風特攻隊）」が行われました。多くの若い兵士が命を落とし、「玉砕」「一億玉砕」などの言葉も使われました。"
      - id: "b"
        text: "万歳突撃隊"
        explanation: "万歳突撃は銃剣を持って敵陣に突撃する地上戦での戦法で、特攻隊とは異なります。"
      - id: "c"
        text: "空中格闘部隊"
        explanation: "空中格闘（ドッグファイト）は通常の航空戦で、特攻とは異なります。"
      - id: "d"
        text: "爆撃隊"
        explanation: "爆撃隊は通常の爆弾投下部隊で、体当たり攻撃の特攻隊とは異なります。"
    answer: "a"

  - id: "jhs-sh-tp-054"
    text: "1945年4月〜6月、沖縄本島で行われた地上戦の結果はどうなったか。"
    choices:
      - id: "a"
        text: "日本軍がアメリカ軍を撃退した"
        explanation: "沖縄戦では日本軍は敗れ、沖縄はアメリカの占領下に置かれました。"
      - id: "b"
        text: "日米両軍と多数の沖縄県民が犠牲になり、日本軍は壊滅した"
        explanation: "正解です。1945年4月〜6月の沖縄戦では、日本軍の組織的抵抗は終わり、一般住民を含む沖縄県民の4人に1人（約12万人）が死亡したとされます。この戦いでの犠牲が、政府の本土決戦への方針を揺るがすきっかけになりました。"
      - id: "c"
        text: "沖縄県民は全員無事に避難した"
        explanation: "沖縄戦では多数の住民が犠牲になりました。"
      - id: "d"
        text: "アメリカ軍の上陸は阻止された"
        explanation: "アメリカ軍は沖縄本島に上陸し、制圧しました。"
    answer: "b"

  - id: "jhs-sh-tp-055"
    text: "1945年7月26日、アメリカ・イギリス・中国が日本に無条件降伏を求めた宣言はどれか。"
    choices:
      - id: "a"
        text: "カイロ宣言"
        explanation: "カイロ宣言は1943年にアメリカ・イギリス・中国が発表した戦後処理の基本方針です。"
      - id: "b"
        text: "ポツダム宣言（ぽつだむせんげん）"
        explanation: "正解です。1945年7月26日、アメリカのトルーマン、イギリスのチャーチル、中国の蒋介石がポツダム宣言を発表し、日本に無条件降伏を求めました。日本は当初黙殺しましたが、原爆投下とソ連参戦を経て8月14日に受諾を決定しました。"
      - id: "c"
        text: "ヤルタ協定"
        explanation: "ヤルタ協定は1945年2月の米英ソ首脳会談での秘密協定です。"
      - id: "d"
        text: "大西洋憲章"
        explanation: "大西洋憲章は1941年に米英が発表した戦後世界の基本原則です。"
    answer: "b"

  - id: "jhs-sh-tp-056"
    text: "第一次世界大戦中の好景気で急成長した、新興の資産家を何と呼んだか。"
    choices:
      - id: "a"
        text: "財閥（ざいばつ）"
        explanation: "財閥は三井・三菱などの大資本グループで、戦前から存在していました。"
      - id: "b"
        text: "成金（なりきん）"
        explanation: "正解です。第一次世界大戦中、ヨーロッパが戦争で輸出できなくなった商品の需要を日本が埋め、輸出が急増しました。この好景気で急に大金持ちになった人々を「成金」と呼びました。将棋の「と金」（成った歩）に例えた言葉です。"
      - id: "c"
        text: "士族"
        explanation: "士族は明治維新後の旧武士階級の称号です。"
      - id: "d"
        text: "農村地主"
        explanation: "農村地主は大正時代の好景気とはやや別の存在です。"
    answer: "b"

  - id: "jhs-sh-tp-057"
    text: "1929年、日本でも昭和恐慌が起きたが、その直接のきっかけとなった世界的な経済危機はどれか。"
    choices:
      - id: "a"
        text: "第一次世界大戦の勃発"
        explanation: "第一次世界大戦は1914年で、むしろ日本経済には好景気をもたらしました。"
      - id: "b"
        text: "世界恐慌（世界大恐慌）"
        explanation: "正解です。1929年のニューヨーク株式市場の大暴落を発端とする世界恐慌が日本にも波及し、昭和恐慌（深刻な不況）が起きました。農村では娘の身売りなどが社会問題化しました。"
      - id: "c"
        text: "石油ショック"
        explanation: "石油ショックは1973年の出来事です。"
      - id: "d"
        text: "バブル崩壊"
        explanation: "バブル崩壊は1991年頃の出来事です。"
    answer: "b"

  - id: "jhs-sh-tp-058"
    text: "近代日本で、首相・閣僚などの要職を独占し、経済と政治に大きな影響力を持った大資本グループを何というか。"
    choices:
      - id: "a"
        text: "商工会議所"
        explanation: "商工会議所は商工業者の団体で、財閥とは異なります。"
      - id: "b"
        text: "財閥（ざいばつ）"
        explanation: "正解です。三井・三菱・住友・安田などの財閥は、銀行・商社・鉱山・工場などを傘下に持つ巨大企業集団で、日本経済に大きな影響力を持ちました。戦後GHQによって解体されました。"
      - id: "c"
        text: "藩閥（はんばつ）"
        explanation: "藩閥は薩摩・長州など特定の藩出身者が政府を独占した明治初期の派閥です。"
      - id: "d"
        text: "政党"
        explanation: "財閥は政党とは別の経済集団です。"
    answer: "b"

  - id: "jhs-sh-tp-059"
    text: "大正時代に発達した、新聞・雑誌・ラジオなどの情報媒体の普及を指す言葉はどれか。"
    choices:
      - id: "a"
        text: "文明開化"
        explanation: "文明開化は明治時代の西洋文化受容の動きです。"
      - id: "b"
        text: "マスメディア（大衆メディア）の発達"
        explanation: "正解です。大正時代には全国紙の新聞・総合雑誌・週刊誌が急増し、1925年にはラジオ放送も始まりました。情報が大衆に広く伝わるようになり、大衆文化・消費文化が発達しました。"
      - id: "c"
        text: "インターネットの普及"
        explanation: "インターネットは20世紀末以降のものです。"
      - id: "d"
        text: "廃刀令"
        explanation: "廃刀令は1876年に発令された刀の帯刀禁止令です。"
    answer: "b"

  - id: "jhs-sh-tp-060"
    text: "大正時代の都市部で広まった、洋食・洋服・映画などの新しい生活様式を何というか。"
    choices:
      - id: "a"
        text: "江戸時代の伝統文化の復興"
        explanation: "大正の都市文化は伝統文化の復興ではなく、西洋文化と融合した新しい文化です。"
      - id: "b"
        text: "大衆文化・モダン文化（近代都市文化）"
        explanation: "正解です。大正時代、都市部では洋食・洋服・映画・デパートなどが普及し、「モダン」な生活様式が広まりました。「モボ（モダンボーイ）」「モガ（モダンガール）」という言葉も生まれました。"
      - id: "c"
        text: "軍国主義を称える文化運動"
        explanation: "大正の都市文化は軍国主義的な文化ではなく、自由・個性を重んじる文化です。"
      - id: "d"
        text: "農村の生活様式を都市化する運動"
        explanation: "大正の都市文化は主に都市部で起きた現象です。"
    answer: "b"

  - id: "jhs-sh-tp-061"
    text: "大正時代、都市の新中間層（会社員・官僚など）の間で広まったライフスタイルを何というか。"
    choices:
      - id: "a"
        text: "士農工商の文化"
        explanation: "士農工商は江戸時代の身分制度に関する概念です。"
      - id: "b"
        text: "サラリーマン文化・都市型大衆文化"
        explanation: "正解です。大正時代には都市部でサラリーマン（会社員）が増え、洋風の生活様式（洋食・洋服・映画・デパート）が普及しました。「職業婦人」（タイピスト・電話交換手など）も登場しました。"
      - id: "c"
        text: "農民文化の都市移植"
        explanation: "大正の都市文化は農村文化の移植ではなく、近代的・西洋的な生活様式です。"
      - id: "d"
        text: "武士道の復活"
        explanation: "大正時代の都市文化は武士道の復活ではありません。"
    answer: "b"

  - id: "jhs-sh-tp-062"
    text: "1925年3月に日本で始まったラジオ放送を行った最初の放送局はどれか。"
    choices:
      - id: "a"
        text: "NHK（現在の日本放送協会）"
        explanation: "NHKは現在の名称ですが、放送を開始したのは社団法人東京放送局（JOAK）で、後に日本放送協会に発展しました。"
      - id: "b"
        text: "社団法人東京放送局（後のNHK）"
        explanation: "正解です。1925年3月、東京放送局（JOAK）がラジオ放送を開始しました。同年、大阪・名古屋でも放送が始まり、1926年に三放送局が合併して社団法人日本放送協会（NHK）が設立されました。"
      - id: "c"
        text: "フジテレビ"
        explanation: "フジテレビは1959年開局のテレビ放送局です。"
      - id: "d"
        text: "民間放送局"
        explanation: "日本の民間放送は1951年に始まりました。"
    answer: "b"

  - id: "jhs-sh-tp-063"
    text: "1928年に中国軍閥の張作霖が乗る列車を関東軍が爆破・暗殺した事件を何というか。"
    choices:
      - id: "a"
        text: "柳条湖事件"
        explanation: "柳条湖事件は1931年の満州事変の発端となった鉄道爆破事件です。"
      - id: "b"
        text: "張作霖爆殺事件（ちょうさくりんばくさつじけん）"
        explanation: "正解です。1928年6月、関東軍は中国軍閥の張作霖が乗る列車を奉天郊外で爆破し暗殺しました。陸軍は事実を隠ぺいしようとしましたが、田中義一首相が責任を取って内閣総辞職しました。"
      - id: "c"
        text: "五・一五事件"
        explanation: "五・一五事件は1932年に犬養毅首相が暗殺された事件です。"
      - id: "d"
        text: "盧溝橋事件"
        explanation: "盧溝橋事件は1937年の日中戦争の発端となった事件です。"
    answer: "b"

  - id: "jhs-sh-tp-064"
    text: "大正時代に女性解放・参政権を求めて活動した人物で、「元始、女性は太陽であった」と訴えた人物は誰か。"
    choices:
      - id: "a"
        text: "与謝野晶子（よさのあきこ）"
        explanation: "与謝野晶子は歌人・思想家で、「君死にたまふことなかれ」で知られますが、「元始、女性は太陽であった」の言葉は別の人物です。"
      - id: "b"
        text: "平塚らいてう（ひらつからいちょう）"
        explanation: "正解です。平塚らいてう（雷鳥）は1911年に女性文芸誌「青鞜」を創刊し、その創刊号で「元始、女性は太陽であった」と書きました。後に市川房枝らと新婦人協会を設立し、女性参政権運動を進めました。"
      - id: "c"
        text: "津田梅子（つだうめこ）"
        explanation: "津田梅子は岩倉使節団に同行した女子留学生で、津田塾大学の創設者です。"
      - id: "d"
        text: "樋口一葉（ひぐちいちよう）"
        explanation: "樋口一葉は明治時代の小説家で、「たけくらべ」などで知られます。"
    answer: "b"

  - id: "jhs-sh-tp-065"
    text: "大正時代の労働運動に関する説明として正しいものはどれか。"
    choices:
      - id: "a"
        text: "労働者の権利は完全に保障され、争議は一度も起きなかった"
        explanation: "大正時代には多くの労働争議が起きました。"
      - id: "b"
        text: "工場労働者が増加し、賃金・待遇改善を求める労働争議が増えた"
        explanation: "正解です。大正時代には工業化が進み、都市部の工場労働者が増加しました。劣悪な労働条件に対して賃金引き上げや待遇改善を求める労働争議・ストライキが頻発し、1912年には友愛会（労働組合の前身）が設立されました。"
      - id: "c"
        text: "農業従事者が減り、労働問題は存在しなかった"
        explanation: "大正時代にも農業従事者は多く、小作争議も起きていました。"
      - id: "d"
        text: "政府が積極的に労働者の権利を守る法律を制定した"
        explanation: "大正時代の政府は労働運動を抑制しており、労働者保護の法整備は不十分でした。"
    answer: "b"

  - id: "jhs-sh-tp-066"
    text: "1922年に設立された、被差別部落の人々が差別撤廃を求めて結成した組織はどれか。"
    choices:
      - id: "a"
        text: "普通選挙期成同盟"
        explanation: "普通選挙期成同盟は普通選挙権を求めた政治団体です。"
      - id: "b"
        text: "全国水平社（ぜんこくすいへいしゃ）"
        explanation: "正解です。1922年、被差別部落出身者たちが「人の世に熱あれ、人間に光あれ」をスローガンとする全国水平社を設立しました。これは日本初の部落差別撤廃を求める全国組織でした。"
      - id: "c"
        text: "日本農民組合"
        explanation: "日本農民組合は農民の権利を守るための組織です。"
      - id: "d"
        text: "大日本帝国陸軍"
        explanation: "大日本帝国陸軍は軍事組織です。"
    answer: "b"

  - id: "jhs-sh-tp-067"
    text: "1931〜1932年頃、軍部・右翼のテロや政変が相次いだ日本の政治状況を何と表現するか。"
    choices:
      - id: "a"
        text: "大正デモクラシーの全盛期"
        explanation: "大正デモクラシーは1910〜20年代の民主主義的な動きで、1930年代には後退していました。"
      - id: "b"
        text: "軍部の台頭・ファシズムの進展"
        explanation: "正解です。五・一五事件（1932年）などにより政党政治が終わり、軍部が政治に強い影響力を持つようになりました。欧州でもドイツのヒトラー、イタリアのムッソリーニが台頭した時期と重なります。"
      - id: "c"
        text: "議会制民主主義の確立"
        explanation: "1930年代は議会制民主主義の確立ではなく、その後退・崩壊の時期です。"
      - id: "d"
        text: "農村の近代化の時代"
        explanation: "1930年代は昭和恐慌で農村は深刻な不況に苦しんでいた時期です。"
    answer: "b"

  - id: "jhs-sh-tp-068"
    text: "ドイツでナチ党政権を樹立し、第二次世界大戦を起こした独裁者は誰か。"
    choices:
      - id: "a"
        text: "ムッソリーニ"
        explanation: "ムッソリーニはイタリアのファシスト独裁者です。"
      - id: "b"
        text: "アドルフ・ヒトラー"
        explanation: "正解です。ナチ党のアドルフ・ヒトラーは1933年にドイツ首相に就任し、独裁体制を確立しました。ユダヤ人迫害（ホロコースト）と侵略戦争を進め、1939年にポーランド侵攻で第二次世界大戦が始まりました。"
      - id: "c"
        text: "スターリン"
        explanation: "スターリンはソビエト連邦の独裁者です。"
      - id: "d"
        text: "フランコ"
        explanation: "フランコはスペインの独裁者です。"
    answer: "b"

  - id: "jhs-sh-tp-069"
    text: "1939年にドイツがポーランドを侵攻して始まった戦争はどれか。"
    choices:
      - id: "a"
        text: "第一次世界大戦"
        explanation: "第一次世界大戦は1914〜18年の戦争です。"
      - id: "b"
        text: "第二次世界大戦（だいにじせかいたいせん）"
        explanation: "正解です。1939年9月1日、ドイツがポーランドに侵攻し、英仏がドイツに宣戦布告して第二次世界大戦が始まりました。1941年12月に日本が太平洋戦争を始めたことで世界規模の戦争となりました。"
      - id: "c"
        text: "朝鮮戦争"
        explanation: "朝鮮戦争は1950〜53年の朝鮮半島での戦争です。"
      - id: "d"
        text: "冷戦"
        explanation: "冷戦は1945年以降の米ソの対立で、直接の軍事衝突ではありません。"
    answer: "b"

  - id: "jhs-sh-tp-070"
    text: "世界恐慌への対策としてアメリカのルーズベルト大統領が行った経済政策はどれか。"
    choices:
      - id: "a"
        text: "ブロック経済"
        explanation: "ブロック経済はイギリス・フランスなど植民地を持つ国が行った政策です。"
      - id: "b"
        text: "ニューディール政策"
        explanation: "正解です。1933年、アメリカのフランクリン・ルーズベルト大統領は「ニューディール（新規まき直し）」と呼ばれる政策を実施しました。公共事業（ダム建設など）で雇用を創出し、農業・金融改革も行いました。"
      - id: "c"
        text: "五カ年計画"
        explanation: "五カ年計画はソビエト連邦のスターリンが行った計画経済政策です。"
      - id: "d"
        text: "植民地開放政策"
        explanation: "アメリカはニューディール政策を行いました。"
    answer: "b"

  - id: "jhs-sh-tp-071"
    text: "世界恐慌後、イギリスやフランスなど植民地を持つ国が行った、自国と植民地だけで経済圏を閉じる政策はどれか。"
    choices:
      - id: "a"
        text: "ニューディール政策"
        explanation: "ニューディール政策はアメリカの国内経済対策です。"
      - id: "b"
        text: "ブロック経済（ぶろっくけいざい）"
        explanation: "正解です。世界恐慌後、イギリス・フランスなど植民地を持つ国は自国と植民地だけの経済ブロックを作り、高い関税で外国品を排除するブロック経済を行いました。これが植民地を持たない日本・ドイツ・イタリアの侵略行動を促す一因となりました。"
      - id: "c"
        text: "自由貿易協定"
        explanation: "ブロック経済は自由貿易の反対で、排他的な経済圏を作る政策です。"
      - id: "d"
        text: "五カ年計画"
        explanation: "五カ年計画はソ連の計画経済政策です。"
    answer: "b"

  - id: "jhs-sh-tp-072"
    text: "1925年、日本初のラジオ放送が始まった年と同じ年に制定された二つの重要な法律の組み合わせはどれか。"
    choices:
      - id: "a"
        text: "大日本帝国憲法と教育勅語"
        explanation: "大日本帝国憲法は1889年、教育勅語は1890年です。"
      - id: "b"
        text: "普通選挙法と治安維持法"
        explanation: "正解です。1925年には普通選挙法（男性普通選挙）と治安維持法（社会主義取り締まり）が同じ加藤高明内閣のもとで成立しました。民主主義の拡大と思想弾圧の強化が同時に行われた象徴的な出来事です。"
      - id: "c"
        text: "国家総動員法と大政翼賛会設立"
        explanation: "国家総動員法は1938年、大政翼賛会設立は1940年です。"
      - id: "d"
        text: "日米安全保障条約と日本国憲法"
        explanation: "日米安保条約は1951年、日本国憲法は1946年公布・1947年施行です。"
    answer: "b"

  - id: "jhs-sh-tp-073"
    text: "太平洋戦争中、戦争を指導した日本の最高司令官（統帥権者）は誰か。"
    choices:
      - id: "a"
        text: "東条英機のみ"
        explanation: "東条英機は首相兼陸軍大臣で戦争を指導しましたが、大元帥（統帥権者）は天皇です。"
      - id: "b"
        text: "昭和天皇（大元帥・統帥権者）"
        explanation: "正解です。大日本帝国憲法のもとでは天皇が軍を統帥する大元帥でした。昭和天皇は形式上すべての軍事作戦の最高指揮官でしたが、実際の戦争指導は統帥部（参謀本部・軍令部）と内閣が行いました。"
      - id: "c"
        text: "山本五十六"
        explanation: "山本五十六は連合艦隊司令長官で、大元帥ではありません。"
      - id: "d"
        text: "天皇には軍事の権限はなかった"
        explanation: "大日本帝国憲法では天皇が大元帥として統帥権を持ちました。"
    answer: "b"

  - id: "jhs-sh-tp-074"
    text: "アメリカが日本への石油輸出を禁止するなど経済制裁を強化する原因となった、1941年7月の日本の軍事行動はどれか。"
    choices:
      - id: "a"
        text: "真珠湾攻撃"
        explanation: "真珠湾攻撃は1941年12月8日のことで、石油禁輸より後です。"
      - id: "b"
        text: "南部仏印進駐（なんぶふついんしんちゅう）"
        explanation: "正解です。1941年7月、日本軍は南部フランス領インドシナ（南部仏印）に進駐しました。これに対しアメリカは日本への石油輸出を全面禁止し、日本の石油備蓄は急速に減少しました。これが太平洋戦争開戦の大きな原因の一つとなりました。"
      - id: "c"
        text: "満州事変"
        explanation: "満州事変は1931年の出来事です。"
      - id: "d"
        text: "北部仏印進駐"
        explanation: "北部仏印進駐は1940年で、これもアメリカの反発を招きましたが、石油全面禁輸は南部仏印進駐後です。"
    answer: "b"

  - id: "jhs-sh-tp-075"
    text: "太平洋戦争直前、アメリカが日本に提示した和平交渉の条件文書はどれか。"
    choices:
      - id: "a"
        text: "ポーツマス条約"
        explanation: "ポーツマス条約は1905年の日露戦争後の講和条約です。"
      - id: "b"
        text: "ハル・ノート"
        explanation: "正解です。1941年11月、アメリカの国務長官コーデル・ハルが日本に提示した文書がハル・ノートです。中国・仏印からの撤兵、日独伊三国同盟の無効化などを要求する強硬な内容で、日本はこれを「最後通牒」と判断し、開戦を決意しました。"
      - id: "c"
        text: "ポツダム宣言"
        explanation: "ポツダム宣言は1945年7月の無条件降伏を求める宣言です。"
      - id: "d"
        text: "マーシャル・プラン"
        explanation: "マーシャル・プランは1947年の欧州復興援助計画です。"
    answer: "b"

  - id: "jhs-sh-tp-076"
    text: "1945年8月8日、日ソ中立条約を破ってソ連が対日宣戦布告した背景の秘密協定はどれか。"
    choices:
      - id: "a"
        text: "ベルサイユ条約"
        explanation: "ベルサイユ条約は1919年の第一次世界大戦後の講和条約です。"
      - id: "b"
        text: "ヤルタ協定"
        explanation: "正解です。1945年2月のヤルタ会談で、ソ連のスターリンはドイツ敗北後3カ月以内に対日参戦することを米英に約束しました（見返りに南樺太・千島列島の獲得などを要求）。ドイツ降伏から3カ月後の8月8日にソ連は日本に宣戦布告しました。"
      - id: "c"
        text: "ポツダム宣言"
        explanation: "ポツダム宣言は対日降伏勧告であり、ソ連参戦の秘密協定ではありません。"
      - id: "d"
        text: "カイロ宣言"
        explanation: "カイロ宣言は1943年の米英中による対日方針声明で、ソ連参戦の約束ではありません。"
    answer: "b"

  - id: "jhs-sh-tp-077"
    text: "太平洋戦争中の戦時体制下で、国民を統制するために組織された町内の相互監視・相互扶助の単位はどれか。"
    choices:
      - id: "a"
        text: "村会（むらかい）"
        explanation: "村会は村の議決機関です。"
      - id: "b"
        text: "隣組（となりぐみ）"
        explanation: "正解です。戦時中、行政の末端組織として10戸前後の近隣住民による「隣組」が組織されました。空襲への対処・物資の配給・国債の購入などを担い、戦争遂行のための地域統制に利用されました。"
      - id: "c"
        text: "五人組"
        explanation: "五人組は江戸時代の連帯責任の制度です。"
      - id: "d"
        text: "保安隊"
        explanation: "保安隊は1950年代の自衛隊の前身となる組織です。"
    answer: "b"

  - id: "jhs-sh-tp-078"
    text: "太平洋戦争中、都市部の子供たちが空襲から守るため地方へ避難させられた措置を何というか。"
    choices:
      - id: "a"
        text: "学徒出陣"
        explanation: "学徒出陣は大学生などを軍に召集することです。"
      - id: "b"
        text: "学童疎開（がくどうそかい）・集団疎開"
        explanation: "正解です。1944年頃から、空襲が激しくなった都市部の国民学校（小学校）の児童が農村の親戚宅や寺などに集団で疎開しました。これを学童疎開（集団疎開）といいます。親と離れた子供たちは農村で生活を送りました。"
      - id: "c"
        text: "勤労動員"
        explanation: "勤労動員は学生を工場などで働かせることです。"
      - id: "d"
        text: "移民奨励"
        explanation: "移民奨励は別の政策です。"
    answer: "b"

  - id: "jhs-sh-tp-079"
    text: "第一次世界大戦末期から戦後にかけて世界中で猛威をふるったパンデミックはどれか。"
    choices:
      - id: "a"
        text: "ペスト（黒死病）"
        explanation: "ペストは14世紀に大流行した感染症で、20世紀初頭のパンデミックとは別です。"
      - id: "b"
        text: "スペイン風邪（スペインかぜ）"
        explanation: "正解です。1918〜1920年に世界中で流行したスペイン風邪（インフルエンザ）は、全世界で約5000万人（一説では1億人以上）もの命を奪い、第一次世界大戦の戦死者数をはるかに上回る被害をもたらしました。日本でも約39万人が死亡したとされます。"
      - id: "c"
        text: "コレラ"
        explanation: "コレラは19世紀に何度もパンデミックを起こしましたが、第一次世界大戦後の主要パンデミックはスペイン風邪です。"
      - id: "d"
        text: "天然痘"
        explanation: "天然痘は歴史的に多くの命を奪いましたが、第一次世界大戦後の最大のパンデミックはスペイン風邪です。"
    answer: "b"

  - id: "jhs-sh-tp-080"
    text: "大正〜昭和初期に活躍した、「羅生門」「鼻」「蜘蛛の糸」などの短編小説で有名な作家は誰か。"
    choices:
      - id: "a"
        text: "夏目漱石（なつめそうせき）"
        explanation: "夏目漱石は「吾輩は猫である」「坊っちゃん」などで知られる明治〜大正の小説家ですが、羅生門の作者は別の人物です。"
      - id: "b"
        text: "芥川龍之介（あくたがわりゅうのすけ）"
        explanation: "正解です。芥川龍之介は「羅生門」「鼻」「藪の中」「蜘蛛の糸」などの短編小説で知られる大正時代を代表する作家です。その業績を称えて設けられた文学賞が「芥川賞」です。"
      - id: "c"
        text: "川端康成（かわばたやすなり）"
        explanation: "川端康成は「雪国」「伊豆の踊子」などで知られ、1968年にノーベル文学賞を受賞しました。"
      - id: "d"
        text: "島崎藤村（しまざきとうそん）"
        explanation: "島崎藤村は「破戒」「夜明け前」などで知られる明治〜昭和初期の作家です。"
    answer: "b"

  - id: "jhs-sh-tp-081"
    text: "大正時代、普通選挙・護憲（憲政擁護）などを求めて起こった政治運動を総称して何というか。"
    choices:
      - id: "a"
        text: "自由民権運動"
        explanation: "自由民権運動は明治時代（1870〜80年代）の運動です。"
      - id: "b"
        text: "護憲運動（憲政擁護運動）"
        explanation: "正解です。大正時代に政党・民衆が藩閥・軍部主導の内閣に反対し、議会政治（憲政）を守ろうとする「護憲運動（憲政擁護運動）」が盛んになりました。1912〜13年の第一次護憲運動、1924年の第二次護憲運動が代表的です。"
      - id: "c"
        text: "安保闘争"
        explanation: "安保闘争は1960年の日米安保条約改定反対運動です。"
      - id: "d"
        text: "五・四運動"
        explanation: "五・四運動は中国の民族運動です。"
    answer: "b"

  - id: "jhs-sh-tp-082"
    text: "日本で初めて本格的な政党内閣を組閣した、「平民宰相」と呼ばれた人物は誰か。"
    choices:
      - id: "a"
        text: "西園寺公望（さいおんじきんもち）"
        explanation: "西園寺公望は立憲政友会総裁として内閣を組閣しましたが、「平民宰相」と呼ばれたのは別の人物です。"
      - id: "b"
        text: "原敬（はらたかし）"
        explanation: "正解です。1918年、立憲政友会総裁の原敬が内閣を組閣しました。陸軍・海軍・外務を除く大臣を政党員で占めた初の本格的な政党内閣で、旧武士階級（華族）ではなく平民出身だったため「平民宰相」と呼ばれました。1921年に暗殺されました。"
      - id: "c"
        text: "加藤高明（かとうたかあき）"
        explanation: "加藤高明は普通選挙法を成立させた首相ですが、最初の本格的な政党内閣は原敬内閣です。"
      - id: "d"
        text: "山県有朋（やまがたありとも）"
        explanation: "山県有朋は藩閥政治家であり、政党内閣ではありませんでした。"
    answer: "b"

  - id: "jhs-sh-tp-083"
    text: "昭和初期の農業恐慌で最も深刻な被害を受けたのはどの地域か。"
    choices:
      - id: "a"
        text: "都市部の工業地帯"
        explanation: "農業恐慌の被害が最も深刻だったのは農村部、特に東北地方などです。"
      - id: "b"
        text: "東北・北海道などの農村地帯"
        explanation: "正解です。昭和恐慌期（1930年代初め）に米価・繭価が暴落し、東北・北海道などの農村は深刻な打撃を受けました。娘を身売りする農家が続出し、軍部はこの農村の窮状を利用して政党政治への不満を煽りました。"
      - id: "c"
        text: "九州・沖縄の漁業地帯"
        explanation: "農業恐慌の最大の被害地は東北・北海道です。"
      - id: "d"
        text: "大阪・名古屋の工業地帯"
        explanation: "工業地帯も世界恐慌で打撃を受けましたが、農業恐慌の直撃は農村部です。"
    answer: "b"

  - id: "jhs-sh-tp-084"
    text: "五・一五事件（1932年）で犬養毅首相が暗殺された後、日本の政治はどう変化したか。"
    choices:
      - id: "a"
        text: "政党内閣が引き続き維持された"
        explanation: "五・一五事件後、政党内閣は終わりを告げました。"
      - id: "b"
        text: "軍部・官僚主導の「挙国一致内閣」が続き、政党政治が終わった"
        explanation: "正解です。1932年の五・一五事件で犬養毅首相が暗殺されると、以後は軍部の意向を受けた「挙国一致内閣」が続き、戦前・戦中を通じて本格的な政党内閣は復活しませんでした。"
      - id: "c"
        text: "普通選挙法が廃止された"
        explanation: "普通選挙法が廃止されたという事実はありません。"
      - id: "d"
        text: "天皇の直接統治が始まった"
        explanation: "天皇の直接統治という変化は起きていません。"
    answer: "b"

  - id: "jhs-sh-tp-085"
    text: "日中戦争（1937〜45年）に関して、日本が最後まで占領できなかった中国の拠点はどれか。"
    choices:
      - id: "a"
        text: "上海"
        explanation: "上海は1937年に日本軍が占領しました。"
      - id: "b"
        text: "重慶（ちょんちん）"
        explanation: "正解です。中国国民党政府（蒋介石）は首都を南京から武漢、さらに重慶に移して抗戦を続けました。重慶は山間部に位置し、日本軍は大規模な爆撃を行いましたが、最後まで陥落させることができませんでした。"
      - id: "c"
        text: "北京"
        explanation: "北京（北平）は1937年に日本軍が占領しました。"
      - id: "d"
        text: "南京"
        explanation: "南京は1937年12月に日本軍が占領しました。"
    answer: "b"

  - id: "jhs-sh-tp-086"
    text: "大正〜昭和前期に活躍した、「赤とんぼ」「この道」などの曲を作曲した音楽家は誰か。"
    choices:
      - id: "a"
        text: "瀧廉太郎（たきれんたろう）"
        explanation: "瀧廉太郎は明治時代の作曲家で「荒城の月」「花」などを作曲しました。「赤とんぼ」の作曲者は別の人物です。"
      - id: "b"
        text: "山田耕筰（やまだこうさく）"
        explanation: "正解です。山田耕筰は大正・昭和初期の作曲家・指揮者で「赤とんぼ」「この道」「からたちの花」などを作曲した日本近代音楽の先駆者です。日本で初めて本格的な管弦楽団を組織したことでも知られます。"
      - id: "c"
        text: "中山晋平（なかやましんぺい）"
        explanation: "中山晋平は「シャボン玉」「波浮の港」などを作曲した大衆音楽作曲家です。"
      - id: "d"
        text: "古賀政男（こがまさお）"
        explanation: "古賀政男は昭和時代の演歌・歌謡曲作曲家です。"
    answer: "b"

  - id: "jhs-sh-tp-087"
    text: "1935年に起き、学者が公職を追われた「天皇機関説問題」で攻撃された人物は誰か。"
    choices:
      - id: "a"
        text: "吉野作造"
        explanation: "吉野作造は「民本主義」を唱えた政治学者です。"
      - id: "b"
        text: "美濃部達吉（みのべたつきち）"
        explanation: "正解です。美濃部達吉は「天皇機関説」（天皇は国家という法人の最高機関であり、統治権は国家にある）を唱えた東京帝国大学教授です。1935年、軍部・右翼から「国体に反する」と攻撃され、議員辞職・著書発禁の処分を受けました。"
      - id: "c"
        text: "平塚らいてう"
        explanation: "平塚らいてうは女性解放運動家です。"
      - id: "d"
        text: "石橋湛山"
        explanation: "石橋湛山はジャーナリスト・政治家で、戦前に植民地放棄論を唱えました。"
    answer: "b"

  - id: "jhs-sh-tp-088"
    text: "1941〜45年の太平洋戦争で、日本が占領したアジア・太平洋地域として正しいものはどれか。"
    choices:
      - id: "a"
        text: "日本はオーストラリア本土を占領した"
        explanation: "日本軍はオーストラリア本土には上陸・占領していません。"
      - id: "b"
        text: "フィリピン・マレー半島・ビルマ・インドネシアなど広大な地域を占領した"
        explanation: "正解です。開戦から半年ほどで、日本はフィリピン・マレー半島・シンガポール・ビルマ・インドネシア（蘭領東インド）・ニューギニアなどを占領しました。「大東亜共栄圏」の建設を唱えましたが、各地で住民の反発を招きました。"
      - id: "c"
        text: "インド本土を占領した"
        explanation: "日本軍はインパール作戦で大敗し、インド本土は占領していません。"
      - id: "d"
        text: "占領した地域ではすべて歓迎された"
        explanation: "日本軍の占領は各地で住民の反発・抵抗運動を招きました。"
    answer: "b"

  - id: "jhs-sh-tp-089"
    text: "1944年7月のサイパン島陥落が日本本土に与えた最大の影響はどれか。"
    choices:
      - id: "a"
        text: "特に大きな影響はなかった"
        explanation: "サイパン島陥落はB-29の日本本土攻撃圏内に入ることを意味し、非常に大きな影響がありました。"
      - id: "b"
        text: "B-29爆撃機による日本本土への空襲が可能になった"
        explanation: "正解です。1944年7月、アメリカ軍がサイパン島を占領すると、B-29爆撃機の航続距離内に日本本土が入りました。これ以降、日本各都市への本格的な空襲が始まりました。また東条英機内閣はサイパン陥落の責任を取って総辞職しました。"
      - id: "c"
        text: "日本が講和交渉を申し入れた"
        explanation: "サイパン陥落後も日本政府は戦争継続を選択しました。"
      - id: "d"
        text: "日本軍がサイパン島を奪還した"
        explanation: "サイパン島は奪還されず、アメリカが保持し続けました。"
    answer: "b"

  - id: "jhs-sh-tp-090"
    text: "大正〜昭和初期に全国に広まった、農村で地主と小作人の間で起きた土地をめぐる争いを何というか。"
    choices:
      - id: "a"
        text: "百姓一揆"
        explanation: "百姓一揆は江戸時代の農民の抵抗運動です。"
      - id: "b"
        text: "小作争議（こさくそうぎ）"
        explanation: "正解です。大正〜昭和初期、高い小作料や不当解約に苦しむ農民が地主に対して小作料の引き下げや納付拒否などを求める「小作争議」を起こすようになりました。1922年には日本農民組合が設立されました。"
      - id: "c"
        text: "農地改革"
        explanation: "農地改革は戦後GHQの指導のもとで行われた政策です。"
      - id: "d"
        text: "土地一揆"
        explanation: "土地一揆は江戸時代の農民の反抗運動です。"
    answer: "b"

  - id: "jhs-sh-tp-091"
    text: "大正時代の「文化住宅」の特徴を正しく説明しているものはどれか。"
    choices:
      - id: "a"
        text: "農村の茅葺き屋根の伝統家屋"
        explanation: "文化住宅は伝統家屋ではなく、西洋風の近代的住宅です。"
      - id: "b"
        text: "西洋風の玄関・居間・ダイニングキッチンを取り入れた近代的な住宅"
        explanation: "正解です。大正時代、都市部では「文化住宅」と呼ばれる西洋的要素を取り入れた住宅が広まりました。廊下・個室・ダイニングキッチン・洗面所など近代的な間取りを持ち、サラリーマン層の憧れとなりました。"
      - id: "c"
        text: "武家屋敷を改築した大型の邸宅"
        explanation: "文化住宅は武家屋敷とは異なる近代的な住宅です。"
      - id: "d"
        text: "コンクリート製の高層集合住宅"
        explanation: "高層集合住宅（マンション）は戦後に普及したものです。"
    answer: "b"

  - id: "jhs-sh-tp-092"
    text: "1926年に大正天皇が崩御し、新しい元号に変わった。その元号はどれか。"
    choices:
      - id: "a"
        text: "明治"
        explanation: "明治は1868〜1912年の元号です。"
      - id: "b"
        text: "昭和（しょうわ）"
        explanation: "正解です。1926年12月25日に大正天皇が崩御し、皇太子裕仁親王（後の昭和天皇）が即位して元号が「昭和」に改められました。昭和は1989年1月7日まで続きました。"
      - id: "c"
        text: "平成"
        explanation: "平成は1989〜2019年の元号です。"
      - id: "d"
        text: "令和"
        explanation: "令和は2019年〜現在の元号です。"
    answer: "b"

  - id: "jhs-sh-tp-093"
    text: "1937年に始まった日中戦争を、日本政府が「戦争」ではなく「支那事変」と呼んだ主な理由はどれか。"
    choices:
      - id: "a"
        text: "中国側が最初に攻撃したから"
        explanation: "「事変」と呼んだ理由はこれではありません。"
      - id: "b"
        text: "「戦争」と認めるとアメリカの中立法が発動し、石油などの輸入が止まる恐れがあったから"
        explanation: "正解です。当時のアメリカには「中立法」があり、交戦国への兵器・物資の輸出を禁止していました。日本が「戦争」と認めると中立法が発動して石油などの輸入が止まる恐れがあったため、「事変（事件）」という言葉を使いました。"
      - id: "c"
        text: "日本軍が負け続けていたから"
        explanation: "1937〜38年は日本軍が優勢でした。"
      - id: "d"
        text: "中国が正式な国家ではなかったから"
        explanation: "中国（中華民国）は国際的に認められた国家でした。"
    answer: "b"

  - id: "jhs-sh-tp-094"
    text: "1944年、日本陸軍がインド北東部への進攻を試みて大敗した作戦はどれか。"
    choices:
      - id: "a"
        text: "ガダルカナル島の戦い"
        explanation: "ガダルカナル島の戦いは1942〜43年の南太平洋での戦いです。"
      - id: "b"
        text: "インパール作戦（いんぱーるさくせん）"
        explanation: "正解です。1944年、日本陸軍はインド北東部のインパールを攻略しようとしましたが、無謀な補給計画のもとで3万人以上が死亡し大失敗しました。「史上最悪の作戦」とも言われます。"
      - id: "c"
        text: "真珠湾攻撃"
        explanation: "真珠湾攻撃は1941年12月8日の日本の奇襲成功作戦です。"
      - id: "d"
        text: "マレー作戦"
        explanation: "マレー作戦は1941〜42年に日本軍がマレー半島を制圧した成功した作戦です。"
    answer: "b"

  - id: "jhs-sh-tp-095"
    text: "太平洋戦争中、戦争遂行のために金属類（鍋・釣り鐘など）が供出させられた理由はどれか。"
    choices:
      - id: "a"
        text: "美術品として海外に輸出するため"
        explanation: "金属類の回収目的は美術品の輸出ではありません。"
      - id: "b"
        text: "軍需物資（兵器・弾薬など）の原料とするため"
        explanation: "正解です。戦時中、鉄・銅・アルミなど金属が不足し、家庭の鍋・やかん・寺の釣り鐘・銅像なども軍に供出させられました。これらを溶かして兵器・弾薬の原料にするためです。"
      - id: "c"
        text: "工場のオートメーション化を進めるため"
        explanation: "金属供出は工場の自動化ではなく、直接の軍需物資不足の補充です。"
      - id: "d"
        text: "国民の財産を政府が管理するため"
        explanation: "財産管理ではなく、兵器製造のための原料確保が目的でした。"
    answer: "b"

  - id: "jhs-sh-tp-096"
    text: "1937年以降の戦時下に、政府が「ぜいたくは敵だ」などの標語で進めた運動はどれか。"
    choices:
      - id: "a"
        text: "国民が自発的に節約を申し合わせた運動"
        explanation: "これらの標語は国民の自発的な取り決めではなく、政府・軍部主導の運動の一環でした。"
      - id: "b"
        text: "国民精神総動員運動（こくみんせいしんそうどういんうんどう）"
        explanation: "正解です。日中戦争開始後の1937年、政府は「国民精神総動員運動」を推進し、生活の節約・贅沢の禁止・戦意高揚を国民に求めました。「欲しがりません勝つまでは」などの標語はその一環として広まりました。"
      - id: "c"
        text: "文明開化運動"
        explanation: "文明開化運動は明治時代の西洋文化受容の動きです。"
      - id: "d"
        text: "自由民権運動"
        explanation: "自由民権運動は明治時代の民主主義を求める運動です。"
    answer: "b"

  - id: "jhs-sh-tp-097"
    text: "1941年末から始まった太平洋戦争で、日本が宣戦布告した相手はどれか。"
    choices:
      - id: "a"
        text: "中国（中華民国）のみ"
        explanation: "日本は中国との戦いをそもそも「事変」と呼び、正式な宣戦布告はしていませんでした。"
      - id: "b"
        text: "アメリカ・イギリスなど連合国"
        explanation: "正解です。1941年12月8日、日本はアメリカ・イギリスに対して宣戦布告しました。その後オランダ・オーストラリアなどとも交戦状態になりました。日本はソ連には1945年8月まで宣戦布告していませんでした（日ソ中立条約があったため）。"
      - id: "c"
        text: "ソビエト連邦のみ"
        explanation: "太平洋戦争でのソ連への宣戦布告は1945年8月のソ連からの対日宣戦布告後のことです。"
      - id: "d"
        text: "ドイツとイタリア"
        explanation: "ドイツ・イタリアは日独伊三国同盟の同盟国であり、日本は宣戦布告していません。"
    answer: "b"

  - id: "jhs-sh-tp-098"
    text: "1945年の原子爆弾投下を命じたアメリカの大統領は誰か。"
    choices:
      - id: "a"
        text: "フランクリン・ルーズベルト"
        explanation: "ルーズベルトは1945年4月に死去しており、原爆投下命令を下したのは副大統領から昇格したトルーマンです。"
      - id: "b"
        text: "ハリー・トルーマン"
        explanation: "正解です。1945年8月、ルーズベルトの死去を受けて副大統領から大統領に昇格したハリー・トルーマンが、広島・長崎への原子爆弾投下を命令しました。"
      - id: "c"
        text: "ドワイト・アイゼンハワー"
        explanation: "アイゼンハワーはノルマンディー上陸作戦を指揮した将軍で、後に大統領になりましたが原爆投下命令者ではありません。"
      - id: "d"
        text: "ダグラス・マッカーサー"
        explanation: "マッカーサーは連合国軍最高司令官（元帥）で、後にGHQとして日本を占領統治しました。"
    answer: "b"

  - id: "jhs-sh-tp-099"
    text: "太平洋戦争終結後、日本の戦争指導者を裁いた国際軍事裁判はどれか。"
    choices:
      - id: "a"
        text: "ニュルンベルク裁判"
        explanation: "ニュルンベルク裁判はドイツの戦争犯罪者を裁いた裁判です。"
      - id: "b"
        text: "東京裁判（極東国際軍事裁判）"
        explanation: "正解です。1946〜48年、東京で極東国際軍事裁判（東京裁判）が開かれ、東条英機ら日本の戦争指導者28名が「平和に対する罪」「人道に対する罪」などで裁かれました。東条英機ら7名が絞首刑となりました。"
      - id: "c"
        text: "ハーグ国際司法裁判所"
        explanation: "ハーグ国際司法裁判所は国家間の紛争を解決する機関で、個人を裁く裁判所とは異なります。"
      - id: "d"
        text: "サンフランシスコ平和会議"
        explanation: "サンフランシスコ平和会議は1951年の日本の独立回復に関する会議です。"
    answer: "b"

  - id: "jhs-sh-tp-100"
    text: "1945年8月15日の終戦後、連合国による日本占領はどのような形で行われたか。"
    choices:
      - id: "a"
        text: "終戦後すぐに日本の完全独立が認められた"
        explanation: "終戦後、日本はGHQの占領下に置かれ、独立回復は1952年のサンフランシスコ平和条約発効まで待つことになりました。"
      - id: "b"
        text: "マッカーサー率いるGHQが進駐し、日本政府を通じた間接統治が行われた"
        explanation: "正解です。1945年8月15日の玉音放送後、9月2日に東京湾の戦艦ミズーリ号上で降伏文書に調印しました。その後、連合国軍最高司令官マッカーサーを頂点とするGHQ（連合国軍最高司令官総司令部）が日本に進駐し、日本政府を通じた間接統治を行いました。"
      - id: "c"
        text: "降伏文書調印後、すぐに新しい日本国憲法が施行された"
        explanation: "日本国憲法の公布は1946年11月3日、施行は1947年5月3日で、降伏文書調印（1945年9月2日）の直後ではありません。"
      - id: "d"
        text: "日本はソ連の単独占領を受けた"
        explanation: "日本はアメリカを中心とする連合国（GHQ）の占領を受けました。ソ連の単独占領ではありません。"
    answer: "b"
