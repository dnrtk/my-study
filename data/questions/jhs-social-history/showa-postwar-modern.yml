questions:
- id: jhs-sh-sp-001
  text: 第二次世界大戦後に日本を占領したGHQの最高司令官は誰か。
  choices:
  - id: a
    text: アイゼンハワー
    explanation: アイゼンハワーは後のアメリカ大統領で、占領軍最高司令官ではありません。
  - id: b
    text: マッカーサー
    explanation: 正解です。連合国軍最高司令官総司令部（GHQ）のダグラス・マッカーサー元帥が日本占領を指揮し、民主化・非軍事化政策を推進しました。
  - id: c
    text: トルーマン
    explanation: トルーマンはアメリカ大統領で、GHQ最高司令官ではありません。
  - id: d
    text: リッジウェイ
    explanation: リッジウェイはマッカーサーの後任の最高司令官（1951〜52年）です。
  answer: b
- id: jhs-sh-sp-002
  text: 1946年に公布され、1947年5月3日に施行された日本の新しい憲法はどれか。
  choices:
  - id: a
    text: 大日本帝国憲法
    explanation: 大日本帝国憲法は1889年に公布された旧憲法です。
  - id: b
    text: 日本国憲法
    explanation: 正解です。1946年11月3日に公布・1947年5月3日に施行された日本国憲法は、国民主権・基本的人権の尊重・平和主義の三原則を掲げています。
  - id: c
    text: 民主憲法
    explanation: 「民主憲法」という正式名称の憲法はありません。
  - id: d
    text: GHQ憲法
    explanation: 「GHQ憲法」という正式名称の憲法はありません。
  answer: b
- id: jhs-sh-sp-003
  text: 日本国憲法の三大原則はどれか。
  choices:
  - id: a
    text: 天皇主権・軍備の維持・基本的人権の尊重
    explanation: 天皇主権は大日本帝国憲法の原則で、日本国憲法では国民主権です。
  - id: b
    text: 国民主権・基本的人権の尊重・平和主義
    explanation: 正解です。日本国憲法の三大原則は「国民主権」「基本的人権の尊重」「平和主義（戦争放棄）」です。
  - id: c
    text: 国民主権・軍隊の強化・資本主義の推進
    explanation: 軍隊の強化は日本国憲法の原則と逆で、第9条で戦争放棄・戦力不保持を規定しています。
  - id: d
    text: 天皇主権・民主主義・経済成長
    explanation: 天皇主権は日本国憲法の原則ではありません。
  answer: b
- id: jhs-sh-sp-004
  text: 戦後のGHQの占領政策として行われた農地改革の内容として正しいものはどれか。
  choices:
  - id: a
    text: 地主の土地をすべて国有化した
    explanation: 土地は国有化されたのではなく、農民に売り渡されました。
  - id: b
    text: 地主の土地を安く買い上げ、農民に売り渡した
    explanation: 正解です。農地改革（1945〜50年）により、不在地主の農地や在村地主の一定以上の農地が政府に買収され、小作農に安価で売り渡されました。これにより自作農が増加しました。
  - id: c
    text: 農民から土地を取り上げて大農場を作った
    explanation: 農地改革は逆に農民への土地分配です。
  - id: d
    text: 農業を全面的に禁止して工業化を進めた
    explanation: 農業禁止は行われていません。
  answer: b
- id: jhs-sh-sp-005
  text: 1951年に日本が連合国と結んだ、日本の主権を回復した条約はどれか。
  choices:
  - id: a
    text: ポーツマス条約
    explanation: ポーツマス条約は1905年の日露戦争の講和条約です。
  - id: b
    text: サンフランシスコ平和条約
    explanation: 正解です。1951年9月にサンフランシスコで結ばれた講和条約により、日本は翌1952年4月に主権を回復しました。ただしソ連・中国（中華人民共和国）は調印しませんでした。
  - id: c
    text: 日米安全保障条約
    explanation: 日米安全保障条約はサンフランシスコ平和条約と同日に署名された日米間の軍事同盟です。
  - id: d
    text: 日ソ共同宣言
    explanation: 日ソ共同宣言は1956年に結ばれ、ソ連との国交を回復しました。
  answer: b
- id: jhs-sh-sp-006
  text: 1950年に朝鮮半島で起きた南北間の戦争を何というか。
  choices:
  - id: a
    text: ベトナム戦争
    explanation: ベトナム戦争は1960〜75年の出来事です。
  - id: b
    text: 朝鮮戦争
    explanation: 正解です。1950年に北朝鮮が韓国に侵攻して始まった朝鮮戦争は、アメリカを中心とした国連軍が介入し、1953年に休戦協定が結ばれました。日本は兵站基地として特需景気となりました。
  - id: c
    text: 湾岸戦争
    explanation: 湾岸戦争は1991年の出来事です。
  - id: d
    text: 太平洋戦争
    explanation: 太平洋戦争は1941〜45年の出来事です。
  answer: b
- id: jhs-sh-sp-007
  text: 1955年から約18年間続いた、日本の高い経済成長率を何というか。
  choices:
  - id: a
    text: バブル経済
    explanation: バブル経済は1980年代後半のものです。
  - id: b
    text: 高度経済成長
    explanation: 正解です。1955年頃から1973年の石油ショックまで、日本経済は年率10%前後の高い成長を続けました（高度経済成長）。この間に「もはや戦後ではない」と言われるほど生活水準が向上しました。
  - id: c
    text: 明治の産業革命
    explanation: 明治の産業革命は明治時代の出来事です。
  - id: d
    text: 戦後復興期
    explanation: 戦後復興期は高度経済成長の前の段階です。
  answer: b
- id: jhs-sh-sp-008
  text: 1960年に結ばれた、日本とアメリカの安全保障を定めた条約はどれか。
  choices:
  - id: a
    text: 日米和親条約
    explanation: 日米和親条約は1854年に結ばれた開国の条約です。
  - id: b
    text: 日米安全保障条約
    explanation: 正解です。1960年に改定された日米安全保障条約（新安保条約）は、日本にアメリカ軍基地を置くことを認め、日本への攻撃にアメリカが対応することを取り決めました。改定に際して安保闘争が起きました。
  - id: c
    text: 日米通商航海条約
    explanation: 日米通商航海条約は明治時代の不平等条約改正に関する条約です。
  - id: d
    text: 日米地位協定
    explanation: 日米地位協定は在日アメリカ軍の法的地位を定めた協定です。
  answer: b
- id: jhs-sh-sp-009
  text: 1964年に日本で開催された国際的なスポーツ大会はどれか。
  choices:
  - id: a
    text: ワールドカップ（サッカー）
    explanation: 日本でのサッカーワールドカップは2002年の出来事です。
  - id: b
    text: 東京オリンピック
    explanation: 正解です。1964年10月に開催された東京オリンピック（アジア初）は、高度経済成長下の日本の復興・発展を世界に示し、東海道新幹線の開業・首都高速道路の整備とともに行われました。
  - id: c
    text: 大阪万博
    explanation: 大阪万博（日本万国博覧会）は1970年の出来事です。
  - id: d
    text: 札幌冬季オリンピック
    explanation: 札幌冬季オリンピックは1972年の出来事です。
  answer: b
- id: jhs-sh-sp-010
  text: 1973年に中東の産油国が石油価格を大幅に引き上げたことで起きた経済危機を何というか。
  choices:
  - id: a
    text: 世界恐慌
    explanation: 世界恐慌は1929年に始まったアメリカ発の経済危機です。
  - id: b
    text: 石油ショック
    explanation: 正解です。1973年の第四次中東戦争を契機に産油国が石油価格を引き上げ（第一次石油ショック）、日本でも物価が急上昇し高度経済成長が終わりました。
  - id: c
    text: バブル崩壊
    explanation: バブル崩壊は1991年頃の日本の経済危機です。
  - id: d
    text: リーマンショック
    explanation: リーマンショックは2008年のアメリカ発の金融危機です。
  answer: b
- id: jhs-sh-sp-011
  text: 戦後、公害問題が深刻化した日本で、四大公害病の一つとして知られる、熊本県で発生した水銀中毒病はどれか。
  choices:
  - id: a
    text: イタイイタイ病
    explanation: イタイイタイ病は富山県の神通川流域で発生したカドミウム中毒です。
  - id: b
    text: 水俣病
    explanation: 正解です。熊本県の水俣市でチッソ工場が排出したメチル水銀が魚を汚染し、それを食べた人々が発症した公害病が水俣病です。四大公害病の一つです。
  - id: c
    text: 四日市ぜんそく
    explanation: 四日市ぜんそくは三重県四日市市の石油化学コンビナートによる大気汚染が原因です。
  - id: d
    text: 新潟水俣病
    explanation: 新潟水俣病は新潟県の阿賀野川流域で発生した水銀中毒です。水俣病と同様の症状ですが別の病気です。
  answer: b
- id: jhs-sh-sp-012
  text: 1972年に日本に返還された、かつてアメリカが施政権を持っていた島はどれか。
  choices:
  - id: a
    text: 小笠原諸島
    explanation: 小笠原諸島が日本に返還されたのは1968年です。
  - id: b
    text: 沖縄
    explanation: 正解です。佐藤栄作首相の交渉により、1972年5月15日に沖縄が日本に返還されました。現在もアメリカ軍基地が多く残ります。
  - id: c
    text: 北方領土
    explanation: 北方領土は現在もロシアが占拠しており、日本に返還されていません。
  - id: d
    text: 竹島
    explanation: 竹島は韓国が実効支配しており、日本との間で領有権争いが続いています。
  answer: b
- id: jhs-sh-sp-013
  text: 1956年に日本が加盟を認められた国際機関はどれか。
  choices:
  - id: a
    text: 国際連盟
    explanation: 国際連盟は第二次世界大戦後に解散しています。
  - id: b
    text: 国際連合（こくさいれんごう）
    explanation: 正解です。日ソ共同宣言（1956年）により日ソ間の国交が回復し、ソ連の拒否権がなくなったことで、日本は1956年12月に国際連合への加盟が認められました。
  - id: c
    text: NATO（北大西洋条約機構）
    explanation: NATOは西側諸国の軍事同盟で、日本は加盟していません。
  - id: d
    text: ASEAN（東南アジア諸国連合）
    explanation: ASEANは東南アジアの地域協力機構で、日本は加盟していません。
  answer: b
- id: jhs-sh-sp-014
  text: 1965年に韓国との国交を正常化した条約はどれか。
  choices:
  - id: a
    text: 日韓併合条約
    explanation: 日韓併合条約は1910年に朝鮮を日本が植民地化した条約です。
  - id: b
    text: 日韓基本条約
    explanation: 正解です。1965年に結ばれた日韓基本条約で、日本と大韓民国の外交関係が正常化しました。日本は韓国政府を朝鮮半島の唯一の合法政府として認めました。
  - id: c
    text: 日韓漁業協定
    explanation: 日韓漁業協定は漁業に関する取り決めです。
  - id: d
    text: 日朝平壌宣言
    explanation: 日朝平壌宣言は2002年に北朝鮮との間で署名されたものです。
  answer: b
- id: jhs-sh-sp-015
  text: 1972年に田中角栄首相が中国（中華人民共和国）と国交を正常化した際に発表したものはどれか。
  choices:
  - id: a
    text: 日中平和友好条約
    explanation: 日中平和友好条約は1978年に締結されました。国交正常化は1972年の日中共同声明です。
  - id: b
    text: 日中共同声明
    explanation: 正解です。1972年9月に田中角栄首相が北京を訪問し、周恩来首相と日中共同声明を発表して国交を正常化しました。
  - id: c
    text: 日中韓共同宣言
    explanation: 「日中韓共同宣言」という形での国交正常化はありません。
  - id: d
    text: 日中貿易協定
    explanation: 国交正常化は日中共同声明によるもので、貿易協定ではありません。
  answer: b
- id: jhs-sh-sp-016
  text: 1980年代後半に土地・株価が異常に値上がりした日本の経済現象を何というか。
  choices:
  - id: a
    text: 高度経済成長
    explanation: 高度経済成長は1955〜73年の出来事です。
  - id: b
    text: バブル経済
    explanation: 正解です。1980年代後半に土地や株式の価格が実態以上に膨らんだ状態をバブル経済といい、1991年頃に崩壊して「失われた10年（20年）」と呼ばれる長期停滞に入りました。
  - id: c
    text: 石油ショック
    explanation: 石油ショックは1973年・79年の出来事です。
  - id: d
    text: 戦後復興
    explanation: 戦後復興は1945〜55年頃の出来事です。
  answer: b
- id: jhs-sh-sp-017
  text: GHQが行った財閥解体の目的として正しいものはどれか。
  choices:
  - id: a
    text: 日本の農業を強化するため
    explanation: 財閥解体は農業強化が目的ではありません。
  - id: b
    text: 三井・三菱などの巨大企業集団を解体し、経済の民主化を進めるため
    explanation: 正解です。GHQは戦争を支えた三井・三菱・住友・安田などの財閥を解体し、経済力の分散と民主的な競争市場の形成を目指しました。
  - id: c
    text: 外国企業が日本市場に参入しやすくするため
    explanation: 外国企業の参入促進が主目的ではありませんでした。
  - id: d
    text: 日本の軍事産業を維持するため
    explanation: 財閥解体は軍国主義の経済的基盤を崩す目的もありました。
  answer: b
- id: jhs-sh-sp-018
  text: 1989年に昭和天皇が崩御し、新しく始まった元号はどれか。
  choices:
  - id: a
    text: 令和
    explanation: 令和は2019年に始まった元号です。
  - id: b
    text: 平成
    explanation: 正解です。1989年1月8日に昭和天皇が崩御し、皇太子明仁（あきひと）親王が即位、元号が「平成」に改まりました。
  - id: c
    text: 大正
    explanation: 大正は1912〜26年の元号です。
  - id: d
    text: 昭和
    explanation: 昭和は1926〜89年の元号で、平成の前の元号です。
  answer: b
- id: jhs-sh-sp-019
  text: 1995年に兵庫県南部を中心に起きた、戦後最大級の都市直下型地震はどれか。
  choices:
  - id: a
    text: 関東大震災
    explanation: 関東大震災は1923年の出来事です。
  - id: b
    text: 阪神淡路大震災
    explanation: 正解です。1995年1月17日に兵庫県南部で発生したマグニチュード7.3の地震で、神戸市を中心に約6400人が死亡した戦後最大の都市直下型地震です。
  - id: c
    text: 東日本大震災
    explanation: 東日本大震災は2011年の出来事です。
  - id: d
    text: 熊本地震
    explanation: 熊本地震は2016年の出来事です。
  answer: b
- id: jhs-sh-sp-020
  text: 2011年3月11日に東北地方を中心に発生した、東日本大震災で起きた原子力事故はどこで起きたか。
  choices:
  - id: a
    text: 女川原子力発電所
    explanation: 女川原子力発電所は冷温停止に成功し、大事故は起きませんでした。
  - id: b
    text: 東京電力福島第一原子力発電所
    explanation: 正解です。2011年の東日本大震災の津波により、福島県の東京電力福島第一原子力発電所で炉心溶融（メルトダウン）が起き、大量の放射性物質が放出される事故が起きました。
  - id: c
    text: 東海原子力発電所
    explanation: 東海原子力発電所は茨城県にありますが、今回の大事故は起きていません。
  - id: d
    text: 福島第二原子力発電所
    explanation: 福島第二原発は事故を防ぐことができました。
  answer: b
- id: jhs-sh-sp-021
  text: 戦後の農地改革・財閥解体・労働組合の奨励などのGHQの民主化政策の総称を何というか。
  choices:
  - id: a
    text: 文明開化政策
    explanation: 文明開化は明治時代の近代化政策です。
  - id: b
    text: 占領改革
    explanation: 正解です。GHQが日本に対して行った農地改革・財閥解体・労働組合の奨励・婦人参政権の付与・教育改革などを総称して占領改革（または民主化政策）といいます。
  - id: c
    text: 高度経済成長政策
    explanation: 高度経済成長は1955年以降の出来事です。
  - id: d
    text: 福祉国家政策
    explanation: 「福祉国家政策」はGHQの政策の総称として使われる言葉ではありません。
  answer: b
- id: jhs-sh-sp-022
  text: 戦後に女性が初めて選挙権を得たのはいつか。
  choices:
  - id: a
    text: 1925年の普通選挙法の改正
    explanation: 1925年の普通選挙法は男性のみが対象でした。
  - id: b
    text: 1945年の選挙法改正
    explanation: 正解です。1945年12月に選挙法が改正され、満20歳以上の男女すべてに選挙権が与えられました。翌1946年4月の選挙には39名の女性議員が誕生しました。
  - id: c
    text: 1947年の日本国憲法施行
    explanation: 日本国憲法施行（1947年）では平等権が定められましたが、女性参政権は1945年の選挙法改正で実現しました。
  - id: d
    text: 1960年の安保改定
    explanation: 1960年は日米安保条約の改定の年で、女性参政権とは無関係です。
  answer: b
- id: jhs-sh-sp-023
  text: 冷戦とは何か。
  choices:
  - id: a
    text: 日本と中国が領土問題で対立した争い
    explanation: 冷戦は日中間の争いではありません。
  - id: b
    text: アメリカを中心とする西側諸国とソ連を中心とする東側諸国の軍事的・政治的対立
    explanation: 正解です。第二次世界大戦後から1989〜91年のソ連崩壊まで、資本主義の西側陣営（アメリカなど）と社会主義の東側陣営（ソ連など）が直接戦わずに対立し続けた状態を冷戦（冷たい戦争）といいます。
  - id: c
    text: 温暖化に反対する国際的な環境運動
    explanation: 冷戦は環境問題ではなく、政治・軍事的な対立です。
  - id: d
    text: 日本とロシアの北方領土をめぐる外交的対立
    explanation: 冷戦は日露間の領土問題ではなく、東西陣営間の世界的な対立です。
  answer: b
- id: jhs-sh-sp-024
  text: 1951年にサンフランシスコ平和条約と同時に日本とアメリカが締結した条約はどれか。
  choices:
  - id: a
    text: 日米通商条約
    explanation: 「日米通商条約」はサンフランシスコ講和と同時ではありません。
  - id: b
    text: 日米安全保障条約
    explanation: 正解です。サンフランシスコ平和条約と同日（1951年9月8日）に日米安全保障条約が締結され、アメリカ軍の日本駐留が認められました。
  - id: c
    text: 日米地位協定
    explanation: 日米地位協定は1960年に新安保条約とともに結ばれました。
  - id: d
    text: 日米貿易摩擦協定
    explanation: 「日米貿易摩擦協定」という正式な条約はありません。
  answer: b
- id: jhs-sh-sp-025
  text: 1978年に締結され、日中友好関係の法的な基礎となった条約はどれか。
  choices:
  - id: a
    text: 日中共同声明
    explanation: 日中共同声明は1972年の国交正常化の文書です。条約ではありません。
  - id: b
    text: 日中平和友好条約
    explanation: 正解です。1978年に福田赳夫内閣のもとで締結された日中平和友好条約により、日本と中国の平和友好関係の法的な基礎が確立されました。
  - id: c
    text: 日中漁業協定
    explanation: 日中漁業協定は漁業に関する取り決めです。
  - id: d
    text: 日中韓自由貿易協定
    explanation: 日中韓自由貿易協定は交渉中の経済協定です。
  answer: b
- id: jhs-sh-sp-026
  text: 1950年に勃発し、国連軍も参加した朝鮮半島での戦争はどれか。
  choices:
  - id: a
    text: ベトナム戦争
    explanation: ベトナム戦争は1960年代〜1975年の東南アジアでの戦争です。
  - id: b
    text: 朝鮮戦争
    explanation: 正解です。1950年6月、北朝鮮（北緯38度線以北）が韓国（以南）に侵攻して朝鮮戦争が勃発しました。アメリカを中心とする国連軍が韓国側に立って参戦し、中国義勇軍が北朝鮮側に参戦しました。1953年に休戦協定が結ばれましたが、正式な終戦はまだです。
  - id: c
    text: 第一次世界大戦
    explanation: 第一次世界大戦は1914〜18年のヨーロッパを中心とした戦争です。
  - id: d
    text: 中東戦争
    explanation: 中東戦争はイスラエルとアラブ諸国の間の戦争です。
  answer: b
- id: jhs-sh-sp-027
  text: 朝鮮戦争が日本経済に与えた影響として正しいものはどれか。
  choices:
  - id: a
    text: 朝鮮戦争により日本は多大な戦争被害を受けた
    explanation: 朝鮮戦争は朝鮮半島での戦争で、日本は直接の戦場になりませんでした。
  - id: b
    text: アメリカ軍の軍需物資・サービスへの需要が高まり、特需景気が生まれた
    explanation: 正解です。朝鮮戦争では米軍が日本を兵站基地として利用し、武器・弾薬・食料・修理サービスなどの注文（朝鮮特需）が相次ぎました。これが戦後日本の経済復興を大きく加速させました。
  - id: c
    text: 日本は朝鮮半島への大規模な支援のために財政難になった
    explanation: 日本は支援を強制されたのではなく、特需景気を享受しました。
  - id: d
    text: 日本経済への影響はほとんどなかった
    explanation: 朝鮮特需は日本の経済復興を大きく後押ししました。
  answer: b
- id: jhs-sh-sp-028
  text: 1951年のサンフランシスコ平和条約に関する説明で正しいものはどれか。
  choices:
  - id: a
    text: ソ連・中国も含むすべての連合国と条約を結んだ
    explanation: ソ連はサンフランシスコ平和条約に調印せず、中国（中華人民共和国）も会議に招待されませんでした。
  - id: b
    text: ソ連は調印せず、日本は西側諸国と単独講和を結んだ
    explanation: 正解です。1951年9月8日、サンフランシスコで48カ国が条約に調印しましたが、ソ連・チェコスロバキア・ポーランドは調印を拒否しました。また中国（中華人民共和国）は招待されませんでした。条約は1952年4月28日に発効し、日本は独立を回復しました。
  - id: c
    text: 条約発効によって沖縄・小笠原諸島もすぐに日本に返還された
    explanation: 沖縄の返還は1972年、小笠原諸島の返還は1968年で、条約発効と同時ではありません。
  - id: d
    text: 条約締結後、日本はすぐに軍隊を再建した
    explanation: 日本は1950年に警察予備隊を設立し、後に自衛隊となりましたが、大規模な軍隊を再建したわけではありません。
  answer: b
- id: jhs-sh-sp-029
  text: 1950年、朝鮮戦争勃発に伴いGHQの指令で設置された武装組織で、後の自衛隊の前身はどれか。
  choices:
  - id: a
    text: 帝国陸軍
    explanation: 帝国陸軍は1945年の敗戦で解体されました。
  - id: b
    text: 警察予備隊
    explanation: 正解です。1950年、朝鮮戦争で在日米軍が出動したため、GHQの指令で警察予備隊が設立されました。1952年に保安隊、1954年に陸上・海上・航空自衛隊に改組されました。
  - id: c
    text: 憲兵隊
    explanation: 憲兵隊は戦前の軍の警察組織で、敗戦後に解体されました。
  - id: d
    text: 国民義勇隊
    explanation: 国民義勇隊は太平洋戦争末期の組織で、警察予備隊とは異なります。
  answer: b
- id: jhs-sh-sp-030
  text: 戦後日本の高度経済成長期（1955〜1973年頃）に関する説明で正しいものはどれか。
  choices:
  - id: a
    text: この時期、日本の経済成長率は年平均1〜2%程度だった
    explanation: 高度経済成長期の日本は年平均約10%という驚異的な成長を遂げました。
  - id: b
    text: 年平均約10%の経済成長を遂げ、GNPが世界第2位になった
    explanation: 正解です。1955〜73年の高度経済成長期、日本の経済は年平均約10%という驚異的な成長を遂げました。1968年にはGNP（国民総生産）が西ドイツを抜いて資本主義国第2位となりました。この時期に三種の神器（白黒テレビ・洗濯機・冷蔵庫）が普及しました。
  - id: c
    text: 高度経済成長期に日本の農業生産が飛躍的に増大した
    explanation: 高度経済成長期は製造業・サービス業が中心で、農業から工業への人口移動が起きました。
  - id: d
    text: 高度経済成長期には公害問題は発生しなかった
    explanation: 高度経済成長の負の側面として、水俣病・四日市ぜんそく・イタイイタイ病などの深刻な公害問題が発生しました。
  answer: b
- id: jhs-sh-sp-031
  text: 高度経済成長期に普及した「三種の神器」として正しい組み合わせはどれか。
  choices:
  - id: a
    text: 自動車・パソコン・スマートフォン
    explanation: パソコン・スマートフォンは後の時代のものです。
  - id: b
    text: 白黒テレビ・洗濯機・冷蔵庫
    explanation: 正解です。1950年代後半の高度経済成長期に、白黒テレビ・洗濯機・冷蔵庫の三品目が「三種の神器」と呼ばれ、家庭への普及が急速に進みました。1960年代後半にはカラーテレビ・クーラー・自動車が「3C」として人気を集めました。
  - id: c
    text: 電話・ラジオ・新聞
    explanation: 電話・ラジオ・新聞は「三種の神器」ではありません。
  - id: d
    text: 蒸気機関車・電報・電灯
    explanation: これらは明治時代に普及した文明開化の象徴です。
  answer: b
- id: jhs-sh-sp-032
  text: 1964年に開催された東京オリンピックの意義として正しいものはどれか。
  choices:
  - id: a
    text: 日本が初めてオリンピックに参加した大会だった
    explanation: 日本は1912年のストックホルム大会から参加しており、東京は初参加ではありません。
  - id: b
    text: 戦後日本の国際社会への復帰と経済成長を世界にアピールした
    explanation: 正解です。1964年の東京オリンピックは、アジアで初めて開催されたオリンピックでした。新幹線（東海道）の開通・首都高速道路の整備なども行われ、高度経済成長を遂げた日本が国際社会に復帰したことを象徴するイベントでした。
  - id: c
    text: 東京オリンピックは戦前から計画されていた通りに開催された
    explanation: 1940年の東京オリンピックは戦争のために返上・中止となり、1964年は新たに招致した別の大会です。
  - id: d
    text: 東京オリンピックの開催と同時に、沖縄が日本に返還された
    explanation: 沖縄の返還は1972年のことで、東京オリンピック（1964年）と同時ではありません。
  answer: b
- id: jhs-sh-sp-033
  text: 1973年に起きた石油危機（オイルショック）の原因はどれか。
  choices:
  - id: a
    text: 日本がアラブ諸国と戦争したため
    explanation: 日本はアラブ諸国と戦争をしていません。
  - id: b
    text: 中東戦争をきっかけにアラブ産油国が石油の輸出を制限・価格を大幅に引き上げた
    explanation: 正解です。1973年10月の第4次中東戦争（イスラエルvsエジプト・シリアなど）を機に、アラブ産油国はイスラエル支持国への石油禁輸・価格引き上げを断行しました。石油価格が4倍以上に跳ね上がり、日本でも深刻な物不足・物価高騰（狂乱物価）が起きました。
  - id: c
    text: 日本の石油田が枯渇したため
    explanation: 日本は石油をほぼ輸入に頼っており、石油田の枯渇が直接原因ではありません。
  - id: d
    text: ソ連が石油の輸出を停止したため
    explanation: 石油危機の原因はアラブ産油国による制限であり、ソ連ではありません。
  answer: b
- id: jhs-sh-sp-034
  text: 高度経済成長期に深刻化した四大公害病のうち、熊本県で発生した水俣病の原因はどれか。
  choices:
  - id: a
    text: 大気中の二酸化炭素増加
    explanation: 水俣病は大気汚染ではなく水質汚染による病気です。
  - id: b
    text: 工場から排出されたメチル水銀による水質汚染
    explanation: 正解です。熊本県水俣市のチッソ工場が排出したメチル水銀が海に流れ込み、魚介類を通じて人間に蓄積されたことで水俣病が発生しました。手足のしびれ・視野狭窄・言語障害などの神経症状が現れました。
  - id: c
    text: 農薬の散布による土壌汚染
    explanation: 水俣病は農薬ではなく工場排水のメチル水銀が原因です。
  - id: d
    text: 放射線の被曝による影響
    explanation: 水俣病は放射線被曝ではなく、メチル水銀中毒です。
  answer: b
- id: jhs-sh-sp-035
  text: 高度経済成長期に発生した四大公害病として正しいものはどれか。
  choices:
  - id: a
    text: 水俣病・イタイイタイ病・四日市ぜんそく・新潟水俣病
    explanation: 正解です。日本の四大公害病は、熊本県の水俣病（メチル水銀）・富山県のイタイイタイ病（カドミウム）・三重県の四日市ぜんそく（大気汚染）・新潟県の第二水俣病（メチル水銀）です。
  - id: b
    text: スペイン風邪・コレラ・天然痘・ペスト
    explanation: これらは感染症であり、工業化による公害病ではありません。
  - id: c
    text: 原爆症・放射線障害・核爆発症・被爆病
    explanation: これらは核兵器による被害であり、高度経済成長期の公害病ではありません。
  - id: d
    text: 農薬中毒・土壌汚染病・食品添加物病・水道汚染病
    explanation: これらは四大公害病の正式な呼称ではありません。
  answer: a
- id: jhs-sh-sp-036
  text: 1960年に、日米安保条約の改定をめぐり日本で起きた大規模な反対運動はどれか。
  choices:
  - id: a
    text: 学徒出陣
    explanation: 学徒出陣は太平洋戦争中（1943年）のことです。
  - id: b
    text: 安保闘争
    explanation: 正解です。1960年、岸信介内閣が日米安全保障条約を改定しようとすると、労働組合・学生・市民が大規模な反対運動（安保闘争）を展開しました。国会を包囲するデモ隊の中、条約は強行採決され、岸首相は退陣しました。
  - id: c
    text: 米騒動
    explanation: 米騒動は1918年の大正時代の出来事です。
  - id: d
    text: 五・一五事件
    explanation: 五・一五事件は1932年の軍部によるクーデターです。
  answer: b
- id: jhs-sh-sp-037
  text: 1972年に実現した沖縄の施政権返還について正しいものはどれか。
  choices:
  - id: a
    text: 沖縄はサンフランシスコ平和条約（1952年）と同時に返還された
    explanation: サンフランシスコ平和条約により沖縄はアメリカの施政権下に置かれ、返還は1972年です。
  - id: b
    text: 佐藤栄作内閣のもとで交渉し、1972年5月に日本に返還された
    explanation: 正解です。佐藤栄作首相はニクソン大統領との交渉で沖縄返還を実現しました。1972年5月15日、沖縄の施政権が日本に返還されました。ただし米軍基地はそのまま存続しました。佐藤栄作はこの功績などでノーベル平和賞を受賞しました。
  - id: c
    text: 沖縄返還後、すべての米軍基地は撤去された
    explanation: 沖縄返還後も米軍基地は存続し、現在も多くの基地が置かれています。
  - id: d
    text: 沖縄は1960年の安保改定と同時に返還された
    explanation: 安保改定は1960年、沖縄返還は1972年です。
  answer: b
- id: jhs-sh-sp-038
  text: 1955年から始まった「55年体制」とはどのような状態を指すか。
  choices:
  - id: a
    text: 軍部が政権を握っていた状態
    explanation: 55年体制は戦後民主主義下での政党政治の状態で、軍部の支配ではありません。
  - id: b
    text: 自由民主党が政権を独占し、社会党が野党第一党として対立する政治状況
    explanation: 正解です。1955年に保守勢力が合流して自由民主党（自民党）が結成され、同年社会党も統一されました。自民党が政権を維持し続け、社会党が最大野党として対立するという「55年体制」が1993年まで続きました。
  - id: c
    text: 共産党が与党として政権を握っていた状態
    explanation: 共産党は戦後の日本で与党になったことはありません。
  - id: d
    text: 複数の政党が頻繁に政権交代を繰り返す状態
    explanation: 55年体制は自民党の長期政権が特徴であり、頻繁な政権交代ではありません。
  answer: b
- id: jhs-sh-sp-039
  text: 1956年に日本が加盟を認められた国際機関はどれか。
  choices:
  - id: a
    text: 国際連盟
    explanation: 国際連盟は第二次世界大戦後に解散しており、1956年には存在しませんでした。
  - id: b
    text: 国際連合（国連）
    explanation: 正解です。1951年のサンフランシスコ平和条約で独立を回復した日本は、1956年12月に国際連合への加盟が承認されました。これにより日本は国際社会への本格的な復帰を果たしました。
  - id: c
    text: NATO（北大西洋条約機構）
    explanation: 日本はNATOの加盟国ではありません。
  - id: d
    text: ASEAN（東南アジア諸国連合）
    explanation: ASEANは東南アジア諸国の地域機構で、日本は加盟していません。
  answer: b
- id: jhs-sh-sp-040
  text: 1965年に日本と韓国が正式な外交関係を樹立した条約はどれか。
  choices:
  - id: a
    text: 日韓議定書
    explanation: 日韓議定書は1904年の日露戦争時の文書です。
  - id: b
    text: 日韓基本条約
    explanation: 正解です。1965年、佐藤栄作内閣のもとで日韓基本条約が締結され、日本と韓国の国交が正常化されました。日本は韓国を朝鮮半島における唯一の合法政府として認めました。
  - id: c
    text: サンフランシスコ平和条約
    explanation: サンフランシスコ平和条約は1951年の対日講和条約です。
  - id: d
    text: 日朝平壌宣言
    explanation: 日朝平壌宣言は2002年の日本と北朝鮮の宣言です。
  answer: b
- id: jhs-sh-sp-041
  text: 1972年に田中角栄首相が中国を訪問し、日中国交正常化を宣言した文書はどれか。
  choices:
  - id: a
    text: 日中平和友好条約
    explanation: 日中平和友好条約は1978年締結の条約です。国交正常化は1972年の共同声明で行われました。
  - id: b
    text: 日中共同声明
    explanation: 正解です。1972年9月、田中角栄首相が北京を訪問し、周恩来首相との間で日中共同声明に調印しました。これにより日本と中国（中華人民共和国）の国交が正常化されました。
  - id: c
    text: 日中漁業協定
    explanation: 日中漁業協定は漁業に関する取り決めで、国交正常化の文書ではありません。
  - id: d
    text: 日中修好通商条約
    explanation: そのような名称の条約はありません。
  answer: b
- id: jhs-sh-sp-042
  text: 1989年〜1991年頃に起きた、日本の経済が実態を超えて膨れ上がった現象を何というか。
  choices:
  - id: a
    text: 高度経済成長
    explanation: 高度経済成長は1955〜73年の実態を伴った経済成長です。
  - id: b
    text: バブル経済
    explanation: 正解です。1980年代後半から1990年代初頭にかけて、日本では株価・地価が実態を大幅に超えて高騰するバブル経済が起きました。1991年頃にバブルが崩壊し、「失われた10年（20年）」と呼ばれる長期不況に突入しました。
  - id: c
    text: 石油ショック
    explanation: 石油ショックは1973年・79年の石油危機です。
  - id: d
    text: 世界恐慌
    explanation: 世界恐慌は1929年のアメリカ発の世界的大不況です。
  answer: b
- id: jhs-sh-sp-043
  text: 1995年1月17日に起きた阪神・淡路大震災について正しいものはどれか。
  choices:
  - id: a
    text: 死者・行方不明者が約230人だった
    explanation: 阪神・淡路大震災の死者は約6434人（関連死含む）です。
  - id: b
    text: 死者・行方不明者約6000人を超え、近代日本最大の都市型直下地震だった
    explanation: 正解です。1995年1月17日早朝、兵庫県南部を震源とするマグニチュード7.3の地震が起きました。死者・行方不明者は6434人以上にのぼり、神戸市などの都市部に壊滅的な被害をもたらしました。ボランティア活動が全国から集まったことも注目されました。
  - id: c
    text: 地震の被害は農村部に集中し、都市への影響は少なかった
    explanation: 阪神・淡路大震災は神戸・西宮などの都市部に大きな被害をもたらしました。
  - id: d
    text: 政府の迅速な対応により被害が最小限に抑えられた
    explanation: 初動対応の遅れが批判され、危機管理体制の問題が指摘されました。
  answer: b
- id: jhs-sh-sp-044
  text: 2011年3月11日に起きた東日本大震災について正しいものはどれか。
  choices:
  - id: a
    text: マグニチュード6.0の地震で、津波は発生しなかった
    explanation: 東日本大震災はマグニチュード9.0の巨大地震で、大規模な津波が発生しました。
  - id: b
    text: マグニチュード9.0の巨大地震と津波により約2万人が死亡・行方不明となった
    explanation: 正解です。2011年3月11日、三陸沖を震源とするマグニチュード9.0の超巨大地震が発生しました。大津波が東北沿岸を襲い、死者・行方不明者は約2万2000人にのぼりました。また福島第一原子力発電所の事故も起きました。
  - id: c
    text: 地震の被害は関東地方のみに限られた
    explanation: 東日本大震災は東北地方を中心に広範囲に甚大な被害をもたらしました。
  - id: d
    text: 原子力発電所の事故は起きなかった
    explanation: 東日本大震災では福島第一原子力発電所の事故が発生しました。
  answer: b
- id: jhs-sh-sp-045
  text: 戦後日本の民主化政策としてGHQが指令したものとして正しいものはどれか。
  choices:
  - id: a
    text: 財閥の強化・拡大
    explanation: GHQは財閥を強化ではなく、解体しました。
  - id: b
    text: 財閥解体・農地改革・労働改革など
    explanation: 正解です。GHQは日本の民主化のために財閥解体（三井・三菱・住友・安田など）、農地改革（地主の土地を小作農に安く売却）、労働組合の結成奨励、女性参政権の付与など多くの改革を指令しました。
  - id: c
    text: 天皇制の即時廃止
    explanation: GHQは天皇制を廃止せず、象徴天皇制として存続させました。
  - id: d
    text: 軍国主義の継続を認めた
    explanation: GHQは軍国主義の解体・民主化を推進しました。
  answer: b
- id: jhs-sh-sp-046
  text: 日本国憲法が公布された日と施行された日として正しいものはどれか。
  choices:
  - id: a
    text: 1945年8月15日に公布、同年9月2日に施行
    explanation: 8月15日は終戦の日、9月2日は降伏文書調印の日です。憲法の日付ではありません。
  - id: b
    text: 1946年11月3日に公布、1947年5月3日に施行
    explanation: 正解です。日本国憲法は1946年11月3日（明治節・現在の文化の日）に公布され、6カ月後の1947年5月3日（現在の憲法記念日）に施行されました。
  - id: c
    text: 1951年9月8日に公布、1952年4月28日に施行
    explanation: これはサンフランシスコ平和条約の署名日と発効日です。
  - id: d
    text: 1945年11月3日に公布、翌年5月3日に施行
    explanation: 1945年11月3日は終戦直後で、日本国憲法の公布は1946年11月3日です。
  answer: b
- id: jhs-sh-sp-047
  text: 日本国憲法の三大原則として正しい組み合わせはどれか。
  choices:
  - id: a
    text: 天皇主権・戦争放棄・基本的人権の保障
    explanation: 日本国憲法では国民主権であり、天皇主権ではありません。
  - id: b
    text: 国民主権・基本的人権の尊重・平和主義
    explanation: 正解です。日本国憲法の三大原則は①国民主権（主権は国民にある）、②基本的人権の尊重（人権は侵すことのできない永久の権利）、③平和主義・戦争の放棄（第9条）です。
  - id: c
    text: 国民主権・植民地拡大・社会主義の実現
    explanation: 植民地拡大・社会主義の実現は日本国憲法の原則ではありません。
  - id: d
    text: 天皇主権・富国強兵・議会制民主主義
    explanation: これは大日本帝国憲法・明治時代の政策に近い内容で、日本国憲法の三大原則ではありません。
  answer: b
- id: jhs-sh-sp-048
  text: 日本国憲法第9条の内容として正しいものはどれか。
  choices:
  - id: a
    text: 日本は軍事力を強化して国家を守る義務がある
    explanation: 第9条は戦争放棄と戦力不保持を定めており、軍事力強化を定めていません。
  - id: b
    text: 戦争を永久に放棄し、戦力を保持しないことを定めている
    explanation: 正解です。日本国憲法第9条は、①国際紛争を解決する手段としての戦争の放棄、②陸海空軍その他の戦力の不保持、③交戦権の否認を定めています。この条文は「平和条項」とも呼ばれます。
  - id: c
    text: 天皇を国家元首として規定している
    explanation: 天皇については第1条に「象徴」として規定されており、第9条の内容は戦争放棄です。
  - id: d
    text: 選挙権の付与条件を規定している
    explanation: 選挙権は別の条文に規定されており、第9条の内容は戦争放棄です。
  answer: b
- id: jhs-sh-sp-049
  text: 戦後に行われた農地改革の内容として正しいものはどれか。
  choices:
  - id: a
    text: 大地主の土地をさらに拡大した
    explanation: 農地改革は地主の土地を小作農に売却させるものであり、拡大ではありません。
  - id: b
    text: 地主が持つ小作地を国が買い上げて小作農に安く売却し、自作農を増やした
    explanation: 正解です。GHQの指令のもと農地改革が行われ、地主が持つ小作地を政府が強制買収し、小作農に安く売却しました。これにより多くの農家が自作農となり、農村の民主化が進みました。寄生地主制は解体されました。
  - id: c
    text: 農業を集団化して国営農場を作った
    explanation: これはソ連型の農業政策で、日本の農地改革とは異なります。
  - id: d
    text: 農村部の人口を都市に移住させた
    explanation: 農地改革は農村の土地制度改革であり、人口移動の政策ではありません。
  answer: b
- id: jhs-sh-sp-050
  text: 戦後日本に設置されたGHQ（連合国軍最高司令官総司令部）の最高司令官は誰か。
  choices:
  - id: a
    text: ハリー・トルーマン
    explanation: トルーマンはアメリカの大統領でGHQの最高司令官ではありません。
  - id: b
    text: ダグラス・マッカーサー
    explanation: 正解です。連合国軍最高司令官（SCAP）のダグラス・マッカーサー元帥がGHQを率い、1945〜1951年まで日本の間接統治を行いました。1950年の朝鮮戦争ではトルーマン大統領と対立して解任されました。
  - id: c
    text: フランクリン・ルーズベルト
    explanation: ルーズベルトは1945年4月に死去しており、戦後日本の占領を指揮していません。
  - id: d
    text: アイゼンハワー
    explanation: アイゼンハワーはGHQ最高司令官ではなく、後にアメリカ大統領になりました。
  answer: b
- id: jhs-sh-sp-051
  text: 高度経済成長期に「所得倍増計画」を掲げた内閣総理大臣は誰か。
  choices:
  - id: a
    text: 吉田茂（よしだしげる）
    explanation: 吉田茂は戦後初期（1946〜47年、1948〜54年）の首相で、所得倍増計画は別の人物が提唱しました。
  - id: b
    text: 池田勇人（いけだはやと）
    explanation: 正解です。1960年、岸信介の後を継いで首相となった池田勇人は「所得倍増計画」を掲げ、10年間で国民所得を2倍にする目標を立てました。高度経済成長を推進し、実際には10年以内に目標が達成されました。
  - id: c
    text: 佐藤栄作（さとうえいさく）
    explanation: 佐藤栄作は1964〜72年の首相で、沖縄返還を実現した人物です。
  - id: d
    text: 田中角栄（たなかかくえい）
    explanation: 田中角栄は1972〜74年の首相で、日中国交正常化・日本列島改造論で知られます。
  answer: b
- id: jhs-sh-sp-052
  text: 戦後日本の女性参政権について正しいものはどれか。
  choices:
  - id: a
    text: 日本国憲法の施行（1947年）に合わせて女性参政権が認められた
    explanation: 女性参政権の付与は1945年12月、初の女性議員誕生は1946年の選挙です。
  - id: b
    text: 1945年12月に選挙法が改正され、20歳以上の男女に選挙権が認められた
    explanation: 正解です。1945年12月の選挙法改正により、20歳以上の男女すべてに選挙権が認められました。翌1946年4月の選挙では初めて女性が投票し、39人の女性議員が誕生しました。
  - id: c
    text: 明治時代に女性参政権は既に認められていた
    explanation: 明治時代は女性の参政権はなく、戦後に初めて認められました。
  - id: d
    text: 沖縄返還（1972年）と同時に女性参政権が認められた
    explanation: 女性参政権は1945年12月に認められており、沖縄返還と同時ではありません。
  answer: b
- id: jhs-sh-sp-053
  text: 1954年に設立された日本の防衛組織はどれか。
  choices:
  - id: a
    text: 帝国陸軍
    explanation: 帝国陸軍は1945年の敗戦で解体されました。
  - id: b
    text: 自衛隊
    explanation: 正解です。1950年の警察予備隊、1952年の保安隊を経て、1954年に防衛庁（現防衛省）と陸上・海上・航空の三自衛隊が設立されました。日本国憲法第9条との関係で「戦力」ではなく「実力組織」と位置づけられています。
  - id: c
    text: NATO軍
    explanation: 日本はNATOの加盟国ではなく、NATO軍は日本の防衛組織ではありません。
  - id: d
    text: 国民義勇隊
    explanation: 国民義勇隊は太平洋戦争末期の組織です。
  answer: b
- id: jhs-sh-sp-054
  text: 1968年、作家の川端康成が受賞した国際的な文学賞はどれか。
  choices:
  - id: a
    text: ピューリッツァー賞
    explanation: ピューリッツァー賞はアメリカのジャーナリズム・文学賞で、川端康成は受賞していません。
  - id: b
    text: ノーベル文学賞
    explanation: 正解です。川端康成は「雪国」「伊豆の踊子」「古都」などの作品で1968年にノーベル文学賞を受賞しました。日本人初のノーベル文学賞受賞者です。
  - id: c
    text: 芥川賞
    explanation: 芥川賞は日本の国内文学賞です。
  - id: d
    text: ゴンクール賞
    explanation: ゴンクール賞はフランスの文学賞で、川端康成は受賞していません。
  answer: b
- id: jhs-sh-sp-055
  text: 1946年に日本が連合国（GHQ）と結んだ、戦後日本の教育方針を示した文書はどれか。
  choices:
  - id: a
    text: 教育勅語（きょういくちょくご）
    explanation: 教育勅語は1890年に明治天皇が発布したもので、戦後に廃止されました。
  - id: b
    text: 教育基本法（きょういくきほんほう）
    explanation: 正解です。1947年、日本国憲法の精神に基づき教育基本法が制定されました。民主的な人格の形成・機会均等などを基本理念とし、教育勅語に代わる教育の根本法として位置づけられました。
  - id: c
    text: 学習指導要領
    explanation: 学習指導要領は教育課程の基準を示す文書で、教育の根本法とは異なります。
  - id: d
    text: 米国教育使節団報告書
    explanation: 米国教育使節団報告書はGHQが日本の教育改革について提言した文書ですが、教育基本法とは別のものです。
  answer: b
- id: jhs-sh-sp-056
  text: 戦後の学制改革（1947年）により設立された学校教育制度として正しいものはどれか。
  choices:
  - id: a
    text: 小学校5年・中学校4年・高校3年・大学4年
    explanation: これは正しい年数ではありません。
  - id: b
    text: 小学校6年・中学校3年・高校3年・大学4年
    explanation: 正解です。戦後の学制改革により、アメリカにならった6・3・3・4制（小6・中3・高3・大4）が導入されました。義務教育は小学校6年・中学校3年の計9年となり、高校・大学は進学制度になりました。
  - id: c
    text: 小学校4年・中学校4年・高校4年・大学4年
    explanation: これは正しい年数ではありません。
  - id: d
    text: 尋常小学校6年のみ義務教育で、その後は旧制中学・高専・大学に分かれる
    explanation: これは戦前（旧制）の学制に近い内容です。
  answer: b
- id: jhs-sh-sp-057
  text: 1950年代後半から普及した、家庭に電気・ガス・水道などを供給する社会基盤を何というか。
  choices:
  - id: a
    text: サプライチェーン
    explanation: サプライチェーンは商品の製造・流通の連鎖を指す経営用語です。
  - id: b
    text: 社会インフラの整備
    explanation: 正解です。高度経済成長期に電気・ガス・水道・道路・鉄道などの社会インフラが全国的に整備されました。これにより農村部でも都市型の生活様式が広まりました。
  - id: c
    text: 軍需産業の拡大
    explanation: 高度経済成長期は軍需産業ではなく、民間の製造業・サービス業が主役でした。
  - id: d
    text: 植民地開発
    explanation: 戦後日本には植民地はありません。
  answer: b
- id: jhs-sh-sp-058
  text: 1950〜60年代に日本と韓国・東南アジア諸国の間で結ばれた、戦時中の損害に対する補償の協定はどれか。
  choices:
  - id: a
    text: ODA（政府開発援助）
    explanation: ODAは発展途上国への経済援助で、賠償協定とは異なります。
  - id: b
    text: 賠償協定（ばいしょうきょうてい）・経済協力協定
    explanation: 正解です。戦後日本はフィリピン・インドネシア・ビルマ（ミャンマー）・ベトナムなどに賠償を、韓国とは1965年の日韓基本条約に基づく経済協力という形で補償を行いました。これらは戦後処理の重要な一部でした。
  - id: c
    text: 日米安保条約
    explanation: 日米安保条約はアメリカとの軍事同盟条約で、賠償協定ではありません。
  - id: d
    text: ヤルタ協定
    explanation: ヤルタ協定は1945年の米英ソ首脳会談での秘密協定です。
  answer: b
- id: jhs-sh-sp-059
  text: 1980年代に日本が世界最大の貿易黒字国となり、特にアメリカとの間に生じた経済問題はどれか。
  choices:
  - id: a
    text: 日本がアメリカから多額の借金をした
    explanation: 日本は債権国（貸す側）で、アメリカへの輸出超過が問題でした。
  - id: b
    text: 日米貿易摩擦
    explanation: 正解です。1980年代、日本の自動車・電気製品・半導体などがアメリカ市場に大量輸出され、アメリカの製造業が打撃を受けました。これにより日米間の貿易摩擦が深刻化し、日本はアメリカの要求で輸出自主規制などを行いました。
  - id: c
    text: 日本がアメリカに軍事支援を求めた
    explanation: 日米貿易摩擦は軍事ではなく経済問題です。
  - id: d
    text: 日本が食料をアメリカから過剰輸入した
    explanation: 日米貿易摩擦は日本からアメリカへの輸出超過が問題であり、食料輸入とは逆方向です。
  answer: b
- id: jhs-sh-sp-060
  text: 1993年に日本で起きた「55年体制の崩壊」とは何を意味するか。
  choices:
  - id: a
    text: 自民党が分裂し、野党連立による細川護熙内閣が誕生した
    explanation: 正解です。1993年、自民党の分裂・野党の結集により、自民党は衆議院選挙で過半数を失いました。細川護熙を首相とする非自民・非共産の8党派連立政権が発足し、1955年から38年間続いた「55年体制（自民党一党支配）」が崩壊しました。
  - id: b
    text: 共産党が政権を獲得した
    explanation: 1993年に政権を獲得したのは共産党ではなく、細川護熙率いる連立政権です。
  - id: c
    text: 天皇制が廃止された
    explanation: 55年体制の崩壊は天皇制廃止とは無関係です。
  - id: d
    text: 日本が軍事大国化した
    explanation: 55年体制の崩壊は軍事政策ではなく政権交代に関することです。
  answer: a
- id: jhs-sh-sp-061
  text: 1946年にGHQの指令のもとで行われた財閥解体の目的はどれか。
  choices:
  - id: a
    text: 日本の企業を外国資本に売却するため
    explanation: 財閥解体の目的は外国資本への売却ではなく、経済の民主化です。
  - id: b
    text: 経済力の集中を排除し、自由競争による経済の民主化を進めるため
    explanation: 正解です。GHQは三井・三菱・住友・安田などの財閥が軍国主義を支えたと判断し、財閥の持株会社を解体、株式を一般に公開させました。これにより経済力の集中が排除され、自由競争が促進されました。
  - id: c
    text: 日本経済を農業中心に転換するため
    explanation: 財閥解体は農業化政策ではなく、工業・商業の民主化を目指すものでした。
  - id: d
    text: 日本の技術をアメリカに移転するため
    explanation: 財閥解体の目的は技術移転ではなく、経済の民主化です。
  answer: b
- id: jhs-sh-sp-062
  text: 1968年から始まった小笠原諸島の返還と、1972年の沖縄返還において共通していることはどれか。
  choices:
  - id: a
    text: どちらもソ連との交渉で実現した
    explanation: 小笠原・沖縄の返還はアメリカとの交渉で実現しました。
  - id: b
    text: どちらも佐藤栄作内閣のもとでアメリカとの交渉により実現した
    explanation: 正解です。小笠原諸島の返還（1968年）も沖縄の返還（1972年）も、佐藤栄作内閣がアメリカと交渉して実現しました。佐藤栄作はこの功績などで1974年にノーベル平和賞を受賞しました。
  - id: c
    text: どちらも国民投票で決定された
    explanation: 小笠原・沖縄の返還は国民投票ではなく、政府間交渉で実現しました。
  - id: d
    text: どちらも1972年に同時に返還された
    explanation: 小笠原諸島の返還は1968年、沖縄の返還は1972年で別々です。
  answer: b
- id: jhs-sh-sp-063
  text: 1979年のイラン革命・イラン・イラク戦争などを背景に起きた第二次石油危機の日本への影響はどれか。
  choices:
  - id: a
    text: 日本経済は全く影響を受けなかった
    explanation: 第二次石油危機も日本経済に大きな影響を与えました。
  - id: b
    text: 石油価格が再び高騰し、省エネ・代替エネルギーへの転換が進んだ
    explanation: 正解です。1979年の第二次石油危機でも石油価格が急騰しましたが、第一次の教訓から省エネ技術の開発・代替エネルギーへの転換が進み、第一次ほどの混乱にはなりませんでした。
  - id: c
    text: 日本は石油を自国で生産していたため影響がなかった
    explanation: 日本はほぼすべての石油を輸入に頼っており、石油危機の影響を大きく受けました。
  - id: d
    text: 石油価格の高騰により日本は戦争に突入した
    explanation: 日本は石油危機を省エネ・技術革新で乗り越えました。
  answer: b
- id: jhs-sh-sp-064
  text: 1956年に日本とソビエト連邦が戦争状態を終わらせた文書はどれか。
  choices:
  - id: a
    text: ポーツマス条約
    explanation: ポーツマス条約は1905年の日露戦争後の講和条約です。
  - id: b
    text: 日ソ共同宣言
    explanation: 正解です。1956年10月、鳩山一郎首相がモスクワを訪問し、日ソ共同宣言に調印しました。これにより両国の戦争状態が終わり、外交関係が回復しました。ソ連が国連の日本加盟を支持することも約束され、同年12月に日本は国連に加盟しました。なお北方領土問題により平和条約は未締結のままです。
  - id: c
    text: サンフランシスコ平和条約
    explanation: サンフランシスコ平和条約はソ連が調印しておらず、日ソの戦争終結は別の文書によります。
  - id: d
    text: 日ソ中立条約
    explanation: 日ソ中立条約は1941年締結のもので、ソ連は1945年に破棄しています。
  answer: b
- id: jhs-sh-sp-065
  text: 1980年代後半、バブル経済期の日本の特徴として正しいものはどれか。
  choices:
  - id: a
    text: 農産物の輸出が急増し、農業大国となった
    explanation: バブル経済は農業ではなく金融・不動産・株式市場の過熱が特徴です。
  - id: b
    text: 株価・地価が異常に高騰し、企業や個人が土地・株の売買で利益を得た
    explanation: 正解です。1980年代後半、金融緩和などを背景に日本の株価・地価が実態を大幅に超えて上昇しました。企業や個人が土地・株の売買で大きな利益を得る一方、高騰した地価で住宅購入が困難になりました。1991年頃にバブルが崩壊し、長期不況が始まりました。
  - id: c
    text: 深刻なデフレが続き、国民生活が苦しかった
    explanation: バブル経済期は物価・資産価格の高騰期であり、デフレではありませんでした。
  - id: d
    text: 軍事費が急増し、自衛隊が大幅に拡大した
    explanation: バブル経済期の特徴は軍事費ではなく、金融・不動産市場の過熱です。
  answer: b
- id: jhs-sh-sp-066
  text: 戦後日本で「経済大国」と呼ばれるようになったのはいつ頃か。
  choices:
  - id: a
    text: 1945年の敗戦直後
    explanation: 敗戦直後の日本は焼け野原で経済は壊滅状態でした。
  - id: b
    text: 1960〜70年代の高度経済成長を経た後
    explanation: 正解です。1955〜73年の高度経済成長を経て、日本は1968年にGNPが資本主義国第2位となり、「経済大国」と呼ばれるようになりました。ただし公害問題・貿易摩擦などの新たな課題も浮上しました。
  - id: c
    text: 1990年代のバブル崩壊後
    explanation: バブル崩壊後は「失われた10年」と呼ばれる不況期で、経済大国化ではありません。
  - id: d
    text: 2000年代の情報技術革命の後
    explanation: 日本の経済大国化は2000年代ではなく、1960〜70年代の高度成長によるものです。
  answer: b
- id: jhs-sh-sp-067
  text: 1990年代に日本で起きた長期経済停滞（バブル崩壊後の不況）を何と呼ぶか。
  choices:
  - id: a
    text: 石油ショック
    explanation: 石油ショックは1973年・1979年の出来事です。
  - id: b
    text: 失われた10年
    explanation: 正解です。1991年頃のバブル崩壊後、日本経済は長期にわたって低成長・デフレが続きました。この時期を「失われた10年（後に20年とも言われる）」と呼びます。多くの企業が倒産し、就職難（就職氷河期）なども起きました。
  - id: c
    text: 高度経済成長
    explanation: 高度経済成長は1955〜73年の好景気の時代で、バブル崩壊後ではありません。
  - id: d
    text: 昭和恐慌
    explanation: 昭和恐慌は1930年代初頭の経済危機です。
  answer: b
- id: jhs-sh-sp-068
  text: 日本の経済成長の裏側として起きた公害問題への対策として、1971年に設置された行政機関はどれか。
  choices:
  - id: a
    text: 農林水産省
    explanation: 農林水産省は農業・林業・水産業を所管する省庁です。
  - id: b
    text: 環境庁（現・環境省）
    explanation: 正解です。深刻化する公害問題に対応するため、1971年に環境庁が設置されました（2001年に環境省に昇格）。1967年には公害対策基本法が制定され、その後四日市公害訴訟・水俣病訴訟などで企業側が敗訴し、環境保護の重要性が認識されました。
  - id: c
    text: 通商産業省（現・経済産業省）
    explanation: 通商産業省は経済・産業政策を担う省庁で、環境庁とは別です。
  - id: d
    text: 防衛庁（現・防衛省）
    explanation: 防衛庁は軍事・安全保障を担う機関で、公害対策とは関係ありません。
  answer: b
- id: jhs-sh-sp-069
  text: 第二次世界大戦後の冷戦時代、日本はどちらの陣営に属したか。
  choices:
  - id: a
    text: ソ連を中心とする東側陣営（社会主義圏）
    explanation: 日本はソ連陣営ではなく、アメリカ陣営に属しました。
  - id: b
    text: アメリカを中心とする西側陣営（資本主義・民主主義圏）
    explanation: 正解です。日本はサンフランシスコ平和条約・日米安保条約に基づき、アメリカを中心とする西側陣営に属しました。冷戦期間中、日本はアメリカの軍事的核抑止力の傘下に置かれました。
  - id: c
    text: どちらにも属さない非同盟中立の立場を取った
    explanation: 日本は非同盟ではなく、日米安保条約によりアメリカ陣営に属しました。
  - id: d
    text: 中国と同盟を結び、独自の中立陣営を形成した
    explanation: 日本と中国の国交正常化は1972年で、中国との同盟陣営を形成したわけではありません。
  answer: b
- id: jhs-sh-sp-070
  text: 1989年11月9日に崩壊し、冷戦終結の象徴となった構造物はどれか。
  choices:
  - id: a
    text: 万里の長城
    explanation: 万里の長城は中国の古代城壁で、冷戦とは関係ありません。
  - id: b
    text: ベルリンの壁
    explanation: 正解です。1961年に東西ドイツの分断を象徴するベルリンの壁が建設されました。1989年11月9日、東ドイツ政府の旅行制限撤廃発表をきっかけに、市民が壁を崩壊させました。これが冷戦終結の象徴となり、1990年にドイツは統一されました。
  - id: c
    text: 北方領土の要塞
    explanation: 北方領土の要塞が冷戦終結の象徴になったわけではありません。
  - id: d
    text: 朝鮮半島の38度線
    explanation: 38度線は北朝鮮と韓国の境界線で、現在も存在します。
  answer: b
- id: jhs-sh-sp-071
  text: 1991年のソビエト連邦崩壊後、日本外交に生じた変化として正しいものはどれか。
  choices:
  - id: a
    text: 日ソ同盟が締結された
    explanation: 日ソ同盟は締結されていません。
  - id: b
    text: 冷戦構造の終焉により、日本の外交課題が多様化した
    explanation: 正解です。ソ連崩壊・冷戦終結により、日本外交は米ソ二極構造への対応から、北方領土問題・北朝鮮の核問題・中国の台頭・PKO活動など多様な課題への対応へと変化しました。
  - id: c
    text: 日本は独自の核抑止力を持つようになった
    explanation: 日本は非核三原則（持たず・作らず・持ち込ませず）を維持しており、核兵器を持っていません。
  - id: d
    text: 日本とロシアは平和条約を締結した
    explanation: 日露（日ソ）平和条約は2024年現在も未締結のままです。
  answer: b
- id: jhs-sh-sp-072
  text: 1992年に制定され、日本の自衛隊が国連平和維持活動（PKO）に参加できるようにした法律はどれか。
  choices:
  - id: a
    text: 防衛庁設置法
    explanation: 防衛庁設置法は自衛隊の設立に関する法律で、PKO参加とは別です。
  - id: b
    text: PKO協力法
    explanation: 正解です。1992年に国際平和協力法（PKO協力法）が制定され、自衛隊が国連平和維持活動に参加できるようになりました。同年、カンボジア（UNTAC）への派遣が日本初のPKO活動となりました。
  - id: c
    text: 日米安全保障条約
    explanation: 日米安保条約はPKO参加の根拠ではなく、日米の軍事同盟条約です。
  - id: d
    text: 国家総動員法
    explanation: 国家総動員法は1938年の戦時法で、廃止されています。
  answer: b
- id: jhs-sh-sp-073
  text: 2002年の日朝首脳会談で、北朝鮮が初めて公式に認めた問題はどれか。
  choices:
  - id: a
    text: 核兵器の開発
    explanation: 北朝鮮が首脳会談で認めたのは核開発ではなく、日本人拉致問題です。
  - id: b
    text: 北朝鮮による日本人拉致問題
    explanation: 正解です。2002年9月、小泉純一郎首相が平壌を訪問し、金正日総書記と会談しました。この日朝首脳会談で北朝鮮は日本人の拉致を公式に認め、謝罪しました。拉致被害者5人とその家族の一部が帰国しましたが、問題は現在も未解決です。
  - id: c
    text: 韓国への軍事侵攻計画
    explanation: そのような公式認定はありませんでした。
  - id: d
    text: 北方領土の占領
    explanation: 北方領土はロシア（旧ソ連）が占領しており、北朝鮮とは関係ありません。
  answer: b
- id: jhs-sh-sp-074
  text: 日本が「非核三原則」として定めた内容はどれか。
  choices:
  - id: a
    text: 核兵器を使わず・売らず・作らず
    explanation: 非核三原則は「持たず・作らず・持ち込ませず」です。
  - id: b
    text: 核兵器を持たず・作らず・持ち込ませず
    explanation: 正解です。佐藤栄作首相が1967年に国会で示した「持たず・作らず・持ち込ませず」が非核三原則です。アメリカ軍の核搭載艦船の日本への寄港は事実上黙認されているとの指摘もありますが、政府の公式方針として維持されています。
  - id: c
    text: 核兵器を研究せず・輸出せず・反対せず
    explanation: これは非核三原則の正しい内容ではありません。
  - id: d
    text: 核エネルギーを平和目的のみに使用する三原則
    explanation: 非核三原則は核エネルギーの平和利用ではなく、核兵器に関するものです。
  answer: b
- id: jhs-sh-sp-075
  text: 1945年の原子爆弾投下を受け、日本が世界に向けて訴え続けている立場はどれか。
  choices:
  - id: a
    text: 核兵器の拡散を積極的に推進する
    explanation: 日本は核兵器の拡散推進ではなく、核廃絶を訴えています。
  - id: b
    text: 被爆体験に基づく核兵器廃絶・核軍縮の推進
    explanation: 正解です。広島・長崎への原爆投下を経験した日本は、世界で唯一の被爆国として毎年8月6日（広島）・9日（長崎）に平和式典を開催し、核兵器廃絶を世界に訴えています。ヒロシマ・ナガサキの名は核廃絶運動の象徴となっています。
  - id: c
    text: 核兵器開発を秘密裏に進める
    explanation: 日本は非核三原則を掲げており、核兵器開発は行っていません。
  - id: d
    text: 原子爆弾投下への復讐として報復を誓う
    explanation: 日本の平和運動は報復ではなく、核廃絶・平和を訴えるものです。
  answer: b
- id: jhs-sh-sp-076
  text: 高度経済成長期に日本各地で整備が進んだ高速道路・新幹線などの交通インフラに関して正しいものはどれか。
  choices:
  - id: a
    text: 東海道新幹線は1964年のオリンピック後に開通した
    explanation: 東海道新幹線は1964年10月1日、東京オリンピック開幕の9日前に開業しました。
  - id: b
    text: 東海道新幹線は1964年の東京オリンピックに合わせて開業した
    explanation: 正解です。1964年10月1日、東京〜新大阪間の東海道新幹線が開業しました。東京オリンピック（10月10日開幕）直前のことで、高度経済成長を象徴するインフラ整備となりました。最高時速210kmで、当時世界最速の鉄道でした。
  - id: c
    text: 高速道路は全国に均一に整備された
    explanation: 高速道路は都市間・主要幹線から整備が進み、地方部への普及には時間がかかりました。
  - id: d
    text: 新幹線はGHQの指令で戦後すぐに建設された
    explanation: 新幹線の建設はGHQ指令ではなく、高度経済成長期の日本政府の政策によるものです。
  answer: b
- id: jhs-sh-sp-077
  text: 2011年の東日本大震災で発生した原子力発電所事故はどこで起きたか。
  choices:
  - id: a
    text: 新潟県の柏崎刈羽原子力発電所
    explanation: 柏崎刈羽原発は東日本大震災では事故を起こしていません（2007年の中越沖地震では被害がありました）。
  - id: b
    text: 福島県の福島第一原子力発電所
    explanation: 正解です。2011年3月11日の東日本大震災による津波で、東京電力福島第一原子力発電所が電源を失い冷却できなくなり、炉心溶融（メルトダウン）が起きました。放射性物質が大量に放出され、周辺住民が避難を余儀なくされました。
  - id: c
    text: 宮城県の女川原子力発電所
    explanation: 女川原発は東日本大震災で損傷しましたが、福島第一のような重大事故にはなりませんでした。
  - id: d
    text: 茨城県の東海第二原子力発電所
    explanation: 東海第二原発も緊急停止しましたが、福島第一のような重大事故にはなりませんでした。
  answer: b
- id: jhs-sh-sp-078
  text: 「一億総中流」と呼ばれた1960〜70年代の日本社会の特徴はどれか。
  choices:
  - id: a
    text: 国民の大半が極端な貧富の差の中で生活していた
    explanation: 「一億総中流」は貧富の差が小さく、多くが中産階級と感じていた状態です。
  - id: b
    text: 多くの国民が自分を「中流階級」と感じ、生活水準が均質化した
    explanation: 正解です。高度経済成長により、大多数の国民が「自分は中産階級」と意識するようになりました（内閣府の調査でも約90%が中流と回答）。テレビ・冷蔵庫・自動車など耐久消費財が全国に普及し、生活様式が均質化しました。
  - id: c
    text: 農業従事者が全人口の大半を占めていた
    explanation: 高度経済成長期には農業から製造業・サービス業への人口移動が進みました。
  - id: d
    text: 国民所得格差が世界最大の水準だった
    explanation: 「一億総中流」は所得格差が比較的小さかった状態を指します。
  answer: b
- id: jhs-sh-sp-079
  text: 戦後日本の教育制度改革で、1947年に義務教育の年数はどう変化したか。
  choices:
  - id: a
    text: 義務教育は小学校6年のみになった
    explanation: 戦後の学制改革では義務教育が9年（小6・中3）に延長されました。
  - id: b
    text: 義務教育が9年（小学校6年・中学校3年）に延長された
    explanation: 正解です。戦前の義務教育は国民学校（小学校）6年でしたが、1947年の学校教育法で新制中学校3年が加わり、義務教育が9年となりました。これにより中学校が無償の義務教育機関となりました。
  - id: c
    text: 義務教育は廃止された
    explanation: 戦後の教育改革では義務教育が廃止ではなく、むしろ延長されました。
  - id: d
    text: 義務教育が12年（小6・中3・高3）になった
    explanation: 高校は義務教育ではなく、進学制度です。
  answer: b
- id: jhs-sh-sp-080
  text: 1972年に沖縄が返還された際、沖縄県民の間にあった要求として正しいものはどれか。
  choices:
  - id: a
    text: 核兵器付き・基地付きでよいので早期返還を望む声のみだった
    explanation: 多くの県民は「核抜き・本土並み」（米軍基地の縮小・核兵器持ち込み禁止）を強く要求していました。
  - id: b
    text: 「核抜き・本土並み」（米軍基地の縮小・核兵器持ち込みなし）を求める声が多かった
    explanation: 正解です。沖縄県民は「核抜き・本土並み」の返還を強く求めていました。実際には核兵器の持ち込みなしで返還されましたが、米軍基地は返還後も大規模に存続し、現在も沖縄の基地問題は続いています。
  - id: c
    text: 沖縄の独立（琉球共和国の建設）だけを求めていた
    explanation: 独立運動も一部ありましたが、「核抜き・本土並み」の日本復帰を求める声が多数でした。
  - id: d
    text: アメリカ領にとどまることを望んでいた
    explanation: 多くの沖縄県民は日本への復帰を求めていました。
  answer: b
- id: jhs-sh-sp-081
  text: 1987年頃から始まった「バブル景気」の特徴として正しいものはどれか。
  choices:
  - id: a
    text: 輸出の激増による製造業の空前の好景気
    explanation: バブル景気の主な特徴は製造業の輸出ではなく、金融・不動産市場の過熱です。
  - id: b
    text: 低金利政策により資金が株・土地に流れ込み、資産価格が急騰した
    explanation: 正解です。1985年のプラザ合意後の円高不況対策として低金利政策が続いたため、余剰資金が株式市場・不動産市場に流れ込み、日経平均株価や地価が実態とかけ離れた水準まで高騰しました。
  - id: c
    text: 農業の生産性が飛躍的に上がり農村が豊かになった
    explanation: バブル景気の恩恵は主に都市部の金融・不動産・サービス業に集中しました。
  - id: d
    text: 北朝鮮との貿易が急増した
    explanation: バブル景気と北朝鮮貿易の急増は関係ありません。
  answer: b
- id: jhs-sh-sp-082
  text: 2001年のアメリカ同時多発テロ後に制定された、日本の自衛隊がインド洋で活動できるようにした法律はどれか。
  choices:
  - id: a
    text: PKO協力法
    explanation: PKO協力法は1992年制定の国連平和維持活動への参加を可能にした法律です。
  - id: b
    text: テロ対策特別措置法
    explanation: 正解です。2001年9月11日の米同時多発テロ後、日本はテロ対策特別措置法を制定し、インド洋でアメリカ軍などに燃料補給を行う自衛隊を派遣しました。また2003年にはイラク特措法を制定し、イラクへも自衛隊を派遣しました。
  - id: c
    text: 安全保障関連法（安保法制）
    explanation: 安保法制（集団的自衛権を可能にする法律）は2015年に成立したものです。
  - id: d
    text: 日米安全保障条約
    explanation: 日米安保条約はテロ対策のために制定された法律ではありません。
  answer: b
- id: jhs-sh-sp-083
  text: 戦後日本で長期にわたり政権を担った吉田茂首相の外交方針はどれか。
  choices:
  - id: a
    text: ソ連と友好関係を結び、独自の外交路線を歩む
    explanation: 吉田茂はソ連ではなくアメリカとの協調を基本に置いた外交を行いました。
  - id: b
    text: 日米安保体制のもとでアメリカに安全保障を依存し、経済成長に集中する
    explanation: 正解です。吉田茂は「吉田ドクトリン」とも呼ばれる外交方針のもと、アメリカに安全保障を依存することで軍事費を抑え、経済復興・成長に集中する路線を採りました。この路線は戦後日本外交の基本となりました。
  - id: c
    text: 軍備を急速に増強して自主防衛を目指す
    explanation: 吉田茂は軽武装・経済優先路線で、急速な軍備増強はしませんでした。
  - id: d
    text: 中立政策を採りアメリカとも距離を置く
    explanation: 吉田茂の路線は中立ではなく、日米同盟を基軸とするものでした。
  answer: b
- id: jhs-sh-sp-084
  text: 日本の高度経済成長を支えた産業構造の変化として正しいものはどれか。
  choices:
  - id: a
    text: 農業・漁業など第一次産業の比率が急増した
    explanation: 高度経済成長期は製造業（第二次産業）・サービス業（第三次産業）の割合が増え、第一次産業の比率は低下しました。
  - id: b
    text: 鉄鋼・造船・電機・自動車などの重化学工業が発展した
    explanation: 正解です。高度経済成長期に鉄鋼・石油化学・造船・電機・自動車などの重化学工業が急速に発展しました。太平洋岸には臨海工業地帯が形成され、工場労働者が増加しました。
  - id: c
    text: 繊維・農産物加工などの軽工業が中心だった
    explanation: 明治時代は繊維産業が主力でしたが、高度経済成長期は重化学工業が主役です。
  - id: d
    text: 外国企業が日本に大量進出して経済を牽引した
    explanation: 高度経済成長は主に日本国内企業の発展によるもので、外資進出が主役ではありませんでした。
  answer: b
- id: jhs-sh-sp-085
  text: 2009年に実現した、民主党を中心とする連立政権への政権交代の意義はどれか。
  choices:
  - id: a
    text: 55年体制以降初めての本格的な政権交代だった
    explanation: 1993年に細川内閣が成立しており、それが最初の本格的な政権交代でした。
  - id: b
    text: 2009年の衆院選で民主党が大勝し、鳩山由紀夫内閣が成立した
    explanation: 正解です。2009年の衆議院議員選挙で民主党が自民党に大勝し、鳩山由紀夫を首相とする民主党中心の連立政権が発足しました。「政権交代」が実現しましたが、沖縄基地問題・東日本大震災への対応などで迷走し、2012年に自民党が政権を奪還しました。
  - id: c
    text: 共産党が初めて政権に参加した
    explanation: 共産党は2009年の連立政権に参加していません。
  - id: d
    text: 日本で初めて首相が国民の直接選挙で選ばれた
    explanation: 日本では首相は国会（衆議院）で選ばれ、国民の直接選挙ではありません。
  answer: b
- id: jhs-sh-sp-086
  text: 現在も日本とロシア（旧ソ連）の間で未解決のままとなっている領土問題はどれか。
  choices:
  - id: a
    text: 竹島問題
    explanation: 竹島問題は日本と韓国の間の領土問題です。
  - id: b
    text: 北方領土問題
    explanation: 正解です。北方領土（択捉島・国後島・色丹島・歯舞群島）は1945年のソ連参戦後に占領され、現在もロシアが実効支配しています。日本はこれら4島の返還を求め、平和条約が締結されておらず、未解決の外交問題となっています。
  - id: c
    text: 尖閣諸島問題
    explanation: 尖閣諸島問題は日本と中国・台湾の間の領土問題です。
  - id: d
    text: 沖縄問題
    explanation: 沖縄は1972年にすでに日本に返還されています。
  answer: b
- id: jhs-sh-sp-087
  text: 日本が戦後に経験した「豊かさ」の象徴として、1970年に大阪で開催されたイベントはどれか。
  choices:
  - id: a
    text: 東京オリンピック
    explanation: 東京オリンピックは1964年の開催です。
  - id: b
    text: 日本万国博覧会
    explanation: 正解です。1970年3月〜9月、大阪の千里丘陵で日本万国博覧会（EXPO'70）が開催されました。「人類の進歩と調和」をテーマに77カ国が参加し、6400万人以上が来場しました。太陽の塔（岡本太郎）が象徴的な作品として知られます。
  - id: c
    text: サッポロ冬季オリンピック
    explanation: 札幌冬季オリンピックは1972年の開催です。
  - id: d
    text: 神戸ポートアイランド博覧会
    explanation: 神戸ポートピア博は1981年の開催です。
  answer: b
- id: jhs-sh-sp-088
  text: 国連の人間環境会議（1972年・ストックホルム）や、地球サミット（1992年・リオデジャネイロ）が扱った主要なテーマはどれか。
  choices:
  - id: a
    text: 軍縮・核廃絶
    explanation: 核廃絶は国連の重要課題ですが、環境会議・地球サミットの主要テーマは環境問題です。
  - id: b
    text: 地球環境問題
    explanation: 正解です。1972年のストックホルム会議から地球規模の環境問題が国際的な課題となり、1992年のリオ地球サミットでは気候変動枠組条約・生物多様性条約が採択されました。日本も環境外交に積極的に関与するようになりました。
  - id: c
    text: 宇宙開発・月面探査
    explanation: 国連環境会議のテーマは宇宙開発ではありません。
  - id: d
    text: 世界貿易ルールの制定
    explanation: 世界貿易ルールはWTO（世界貿易機関）などが扱うもので、環境会議のテーマとは異なります。
  answer: b
- id: jhs-sh-sp-089
  text: 1997年に京都で採択された、温室効果ガスの削減目標を定めた国際的な条約はどれか。
  choices:
  - id: a
    text: パリ協定
    explanation: パリ協定は2015年の気候変動対策の国際的な合意です。
  - id: b
    text: 京都議定書
    explanation: 正解です。1997年、京都で開催された気候変動枠組条約第3回締約国会議（COP3）で京都議定書が採択されました。先進国に対して温室効果ガスの削減数値目標を定めましたが、アメリカは離脱し、中国・インドなどの新興国に義務がないなど問題もありました。
  - id: c
    text: モントリオール議定書
    explanation: モントリオール議定書は1987年のオゾン層保護に関する国際条約です。
  - id: d
    text: ラムサール条約
    explanation: ラムサール条約は1971年の水鳥の生息地としての湿地保護に関する条約です。
  answer: b
- id: jhs-sh-sp-090
  text: 戦後日本が加盟した主要な国際経済機関のうち、先進国の経済協調を目的とする会議はどれか。
  choices:
  - id: a
    text: OPEC（石油輸出国機構）
    explanation: OPECは産油国の組織で、日本は加盟していません。
  - id: b
    text: G7（主要7カ国首脳会議・先進国首脳会議）
    explanation: 正解です。日本はアメリカ・イギリス・フランス・西ドイツ・イタリア・カナダと並んで、主要先進国首脳会議（サミット・G7）の創設メンバーの一つです。1975年にフランスで第1回が開催されました。
  - id: c
    text: ASEAN（東南アジア諸国連合）
    explanation: ASEANは東南アジアの地域機構で、日本は加盟国ではありません。
  - id: d
    text: ワルシャワ条約機構
    explanation: ワルシャワ条約機構はソ連主導の東側軍事同盟で、日本は無関係です。
  answer: b
- id: jhs-sh-sp-091
  text: 戦後日本でテレビ放送が始まった年はいつか。
  choices:
  - id: a
    text: 1945年（終戦の年）
    explanation: 1945年はまだテレビ放送は始まっていません。
  - id: b
    text: 1953年
    explanation: 正解です。1953年2月1日、NHKが日本で初めてテレビの本放送を開始しました。同年8月には日本テレビ放送網（NTV）が民放初のテレビ放送を開始しました。1964年の東京オリンピックをきっかけにテレビが一気に普及しました。
  - id: c
    text: 1964年（東京オリンピックの年）
    explanation: テレビ放送の開始は1953年で、東京オリンピック（1964年）のカラーテレビ中継でさらに普及しました。
  - id: d
    text: 1970年（大阪万博の年）
    explanation: テレビ放送は1953年に始まっており、1970年は白黒テレビがすでに各家庭に普及した後です。
  answer: b
- id: jhs-sh-sp-092
  text: 戦後日本の労働運動に関して、労働者の権利を保障する戦後に制定された法律の組み合わせはどれか。
  choices:
  - id: a
    text: 国家総動員法・治安維持法・戒厳令
    explanation: これらは戦時・戦前の法律で、労働者保護を目的とするものではありません。
  - id: b
    text: 労働基準法・労働組合法・労働関係調整法
    explanation: 正解です。戦後、GHQの民主化政策のもとで労働三法が制定されました。労働基準法（1947年：最低労働条件の設定）、労働組合法（1945年：組合結成・団体交渉権の保障）、労働関係調整法（1946年：労使紛争の調整）が主な内容です。
  - id: c
    text: 徴兵令・教育勅語・大日本帝国憲法
    explanation: これらは戦前の制度で、労働者保護を目的とするものではありません。
  - id: d
    text: 農地改革法・財閥解体法・戦時賠償法
    explanation: 農地改革は行われましたが、「財閥解体法」「戦時賠償法」は正式な法律名ではありません。
  answer: b
- id: jhs-sh-sp-093
  text: 日本が1964年のOECD（経済協力開発機構）加盟で世界から認められたことは何か。
  choices:
  - id: a
    text: 軍事大国としての地位
    explanation: OECD加盟は軍事大国ではなく、経済的先進国としての認定です。
  - id: b
    text: 先進工業国・経済大国としての国際的地位
    explanation: 正解です。1964年、日本はOECD（経済協力開発機構）に加盟しました。これは日本が先進工業国の仲間入りをしたことを国際社会が認めたことを意味しました。同年の東京オリンピック開催と合わせ、戦後復興と経済成長の達成を象徴しました。
  - id: c
    text: 核保有国としての認定
    explanation: OECDは核保有とは無関係な経済協力機構です。
  - id: d
    text: 発展途上国からの卒業と先進国援助の開始
    explanation: ODA（政府開発援助）も拡大しましたが、OECD加盟の意義はまず先進工業国としての認定です。
  answer: b
- id: jhs-sh-sp-094
  text: 戦後日本に与えられた新しい憲法（日本国憲法）で、天皇の地位はどのように定められたか。
  choices:
  - id: a
    text: 天皇は国家の主権者として政治的権力を持つ
    explanation: 大日本帝国憲法では天皇主権でしたが、日本国憲法では異なります。
  - id: b
    text: 天皇は日本国・日本国民統合の「象徴」であり、政治的権能を持たない
    explanation: 正解です。日本国憲法第1条は「天皇は、日本国の象徴であり日本国民統合の象徴」と定めています。天皇の地位は国民の総意に基づき、内閣の助言と承認のもとで「国事行為」のみを行います。政治的権能（権力）は持ちません。
  - id: c
    text: 天皇制は廃止され、大統領制が導入された
    explanation: 日本国憲法のもとでも天皇制は存続し、大統領制は採用されていません。
  - id: d
    text: 天皇は軍の最高司令官（大元帥）として軍事権を持つ
    explanation: 大日本帝国憲法では天皇が大元帥でしたが、日本国憲法では軍事権を持ちません。
  answer: b
- id: jhs-sh-sp-095
  text: 1975年から始まった先進国首脳会議（サミット・G7）を日本で最初に開催した都市はどこか。
  choices:
  - id: a
    text: 東京（1975年）
    explanation: 第1回サミットは1975年にフランスのランブイエで開催されました。
  - id: b
    text: 東京（1979年・第5回）
    explanation: 正解です。日本で最初のサミット開催は1979年の第5回東京サミットでした。大平正芳首相が議長を務めました。その後、東京（1986年）・東京（1993年）・沖縄（2000年）・北海道洞爺湖（2008年）・伊勢志摩（2016年）・広島（2023年）などで開催されています。
  - id: c
    text: 大阪（1970年）
    explanation: 1970年は大阪万博の年で、サミットはまだ始まっていませんでした。
  - id: d
    text: 広島（1945年）
    explanation: 1945年の広島はサミット開催の年ではなく、原爆投下の年です。
  answer: b
- id: jhs-sh-sp-096
  text: 戦後日本の高齢化・少子化問題に関する説明として正しいものはどれか。
  choices:
  - id: a
    text: 日本は戦後一貫して高い出生率を維持している
    explanation: 日本は戦後、特に1970年代以降出生率が低下し、少子高齢化が進んでいます。
  - id: b
    text: 出生率の低下・平均寿命の延伸により、少子高齢社会となった
    explanation: 正解です。高度経済成長期以降、出生率が低下し、同時に医療の充実・生活水準の向上で平均寿命が延びました。日本は世界でも有数の長寿国となった一方、少子高齢化・人口減少が深刻な社会問題となっています。
  - id: c
    text: 日本の人口は戦後から現在まで増加し続けている
    explanation: 日本の人口は2008年頃をピークに減少に転じています。
  - id: d
    text: 高齢化は日本だけの問題で、他の先進国には見られない
    explanation: 少子高齢化は日本だけでなく多くの先進国に共通する課題です。
  answer: b
- id: jhs-sh-sp-097
  text: 2015年に国連で採択された、持続可能な開発のための2030年アジェンダに含まれる目標はどれか。
  choices:
  - id: a
    text: 軍備増強による世界平和の実現
    explanation: 2030年アジェンダは軍備増強ではなく、持続可能な開発・平和・人権の目標を掲げています。
  - id: b
    text: SDGsの17の目標達成
    explanation: 正解です。2015年9月の国連サミットで「持続可能な開発のための2030アジェンダ」が採択され、SDGs（Sustainable
      Development Goals：持続可能な開発目標）として17の目標・169のターゲットが設定されました。貧困撲滅・気候変動対策・教育・ジェンダー平等などが含まれます。
  - id: c
    text: 先進国の植民地支配の復活
    explanation: SDGsは植民地支配とは正反対の持続可能な開発を目指しています。
  - id: d
    text: 国連安全保障理事会の廃止
    explanation: SDGsは国連機構の廃止ではなく、地球全体の持続可能な発展を目指すものです。
  answer: b
- id: jhs-sh-sp-098
  text: 現在の日本が抱える「北方領土問題」に関して正しいものはどれか。
  choices:
  - id: a
    text: 北方領土はすでに日本に返還されている
    explanation: 北方領土は現在もロシアが実効支配しており、返還されていません。
  - id: b
    text: 択捉島・国後島・色丹島・歯舞群島の4島をロシアが占領しており、日本が返還を求めている
    explanation: 正解です。1945年8〜9月、ソ連は日本に宣戦布告後、北方4島（択捉島・国後島・色丹島・歯舞群島）を占領しました。日本はこれらが「固有の領土」として返還を求めていますが、日露平和条約は未締結のまま、領土問題は解決していません。
  - id: c
    text: 北方領土問題はすでに国際裁判所で解決されている
    explanation: 北方領土問題は国際裁判所での解決はなされておらず、未解決のままです。
  - id: d
    text: 北方領土はアメリカが占領している
    explanation: 北方領土はロシア（旧ソ連）が占領しており、アメリカではありません。
  answer: b
- id: jhs-sh-sp-099
  text: 1989年に昭和天皇が崩御し、新しい元号に変わった。その元号はどれか。
  choices:
  - id: a
    text: 昭和
    explanation: 昭和は1926〜1989年1月7日まで続いた元号です。
  - id: b
    text: 平成
    explanation: 正解です。1989年1月7日に昭和天皇が崩御し、皇太子明仁親王（後の上皇）が即位して元号が「平成」に改められました。平成は2019年4月30日まで続き、翌5月1日からは「令和」となりました。
  - id: c
    text: 令和
    explanation: 令和は2019年5月1日から現在の元号です。
  - id: d
    text: 大正
    explanation: 大正は1912〜1926年の元号です。
  answer: b
- id: jhs-sh-sp-100
  text: 「戦後日本」の歴史を振り返ったとき、最も重要な変化として正しいものはどれか。
  choices:
  - id: a
    text: 軍国主義・帝国主義から民主主義・平和主義への転換
    explanation: 正解です。戦後日本の最大の変化は、大日本帝国憲法下の天皇主権・軍国主義・帝国主義から、日本国憲法下の国民主権・基本的人権・平和主義への抜本的な転換です。この変化が戦後の民主化・経済成長・国際社会復帰の基盤となりました。
  - id: b
    text: 日本が核保有大国となった
    explanation: 日本は非核三原則を掲げており、核保有国にはなっていません。
  - id: c
    text: 日本が再び植民地を獲得した
    explanation: 戦後日本は植民地を持たず、国際社会の一員として平和外交を行っています。
  - id: d
    text: 天皇が政治の実権を握るようになった
    explanation: 戦後の象徴天皇制のもとでは、天皇は政治的権能を持ちません。
  answer: a
