questions:
- id: jhs-sh-ka-001
  text: 源頼朝が1185年（または1192年）に開いた幕府はどこに置かれたか。
  choices:
  - id: a
    text: 京都
    explanation: 幕府は京都ではなく関東に置かれました。
  - id: b
    text: 鎌倉（神奈川県）
    explanation: 正解です。源頼朝は神奈川県の鎌倉に幕府を開き、武士による政治体制（鎌倉幕府）を確立しました。
  - id: c
    text: 室町（京都）
    explanation: 室町に幕府を置いたのは足利尊氏（室町幕府）です。
  - id: d
    text: 江戸（東京）
    explanation: 江戸に幕府を置いたのは徳川家康（江戸幕府）です。
  answer: b
- id: jhs-sh-ka-002
  text: 鎌倉幕府の将軍を補佐し、実質的な政治の実権を握った役職はどれか。
  choices:
  - id: a
    text: 摂政（せっしょう）
    explanation: 摂政は天皇を補佐する朝廷の役職です。
  - id: b
    text: 執権（しっけん）
    explanation: 正解です。執権は鎌倉幕府において将軍の補佐役として設けられた役職で、北条氏が世襲しました。
  - id: c
    text: 管領（かんれい）
    explanation: 管領は室町幕府の将軍補佐役です。
  - id: d
    text: 老中（ろうじゅう）
    explanation: 老中は江戸幕府の政務を担った役職です。
  answer: b
- id: jhs-sh-ka-003
  text: 1221年に後鳥羽上皇が幕府打倒を目指して起こした乱はどれか。
  choices:
  - id: a
    text: 壬申の乱
    explanation: 壬申の乱は672年の出来事です。
  - id: b
    text: 承久の乱
    explanation: 正解です。1221年に後鳥羽上皇が幕府打倒を呼びかけ承久の乱が起きましたが、幕府軍に敗れ、上皇は隠岐に流されました。
  - id: c
    text: 保元の乱
    explanation: 保元の乱は1156年の出来事です。
  - id: d
    text: 応仁の乱
    explanation: 応仁の乱は1467年の出来事です。
  answer: b
- id: jhs-sh-ka-004
  text: 承久の乱の後、京都に置かれた武士の役所で、朝廷を監視し西国の武士を統括した機関を何というか。
  choices:
  - id: a
    text: 六波羅探題（ろくはらたんだい）
    explanation: 正解です。承久の乱後、幕府は京都の六波羅に六波羅探題を設置し、朝廷の監視と西国の武士の統括を行いました。
  - id: b
    text: 問注所（もんちゅうじょ）
    explanation: 問注所は鎌倉幕府の裁判所です。
  - id: c
    text: 政所（まんどころ）
    explanation: 政所は鎌倉幕府の財政を担当する機関です。
  - id: d
    text: 侍所（さむらいどころ）
    explanation: 侍所は武士の統括と警察を担当する機関です。
  answer: a
- id: jhs-sh-ka-005
  text: 1232年に北条泰時が制定した、武士のための法律はどれか。
  choices:
  - id: a
    text: 十七条憲法
    explanation: 十七条憲法は飛鳥時代に聖徳太子が定めた役人の心得です。
  - id: b
    text: 御成敗式目
    explanation: 正解です。1232年に北条泰時が制定した御成敗式目（貞永式目）は、武士社会の慣習をまとめた日本初の武家法で、51条からなります。
  - id: c
    text: 大宝律令
    explanation: 大宝律令は701年の奈良時代の法律です。
  - id: d
    text: 武家諸法度
    explanation: 武家諸法度は江戸時代に江戸幕府が定めた法律です。
  answer: b
- id: jhs-sh-ka-006
  text: 鎌倉時代に二度行われたモンゴル（元）の日本侵攻を何というか。
  choices:
  - id: a
    text: 刀伊の入寇（といのにゅうこう）
    explanation: 刀伊の入寇は平安時代（1019年）に北方民族が北九州を襲撃した事件です。
  - id: b
    text: 元寇（げんこう）
    explanation: 正解です。1274年の文永の役と1281年の弘安の役の二度の元軍侵攻を元寇（または蒙古襲来）といいます。
  - id: c
    text: 倭寇（わこう）
    explanation: 倭寇は日本の海賊が朝鮮・中国沿岸を荒らした活動です。
  - id: d
    text: 黒船来航
    explanation: 黒船来航は1853年のペリー来航のことです。
  answer: b
- id: jhs-sh-ka-007
  text: 元寇で元軍を撃退した際に活躍したとされる気象現象はどれか。
  choices:
  - id: a
    text: 大地震
    explanation: 地震ではなく暴風雨が元軍を退けたとされます。
  - id: b
    text: 暴風雨
    explanation: 正解です。文永の役・弘安の役ともに、暴風雨により元軍の船が大きな損害を受けて撤退しました。これを「神風（かみかぜ）」と呼びました。
  - id: c
    text: 大噴火
    explanation: 噴火ではなく暴風雨です。
  - id: d
    text: 大干ばつ
    explanation: 干ばつではなく暴風雨です。
  answer: b
- id: jhs-sh-ka-008
  text: 元寇後に幕府が行き詰まった理由として正しいものはどれか。
  choices:
  - id: a
    text: 元軍に敗北して国内が混乱したため
    explanation: 幕府は元軍を退けましたが、その後に問題が起きました。
  - id: b
    text: 戦いに貢献した御家人への恩賞の土地が不足したため
    explanation: 正解です。元寇は外国からの侵略であったため新たに獲得した土地がなく、幕府は御家人への恩賞を十分に与えられず、御家人の不満が高まりました。
  - id: c
    text: 天皇が幕府を廃止しようとしたため
    explanation: 天皇が幕府廃止を試みたのは後醍醐天皇で、元寇後の問題とは直接の関係はありません。
  - id: d
    text: 外国との貿易が禁止されたため
    explanation: 元寇後に貿易が禁止されたわけではありません。
  answer: b
- id: jhs-sh-ka-009
  text: 鎌倉時代に法然が開いた仏教の宗派はどれか。
  choices:
  - id: a
    text: 天台宗
    explanation: 天台宗は平安時代初期に最澄が開きました。
  - id: b
    text: 浄土宗
    explanation: 正解です。法然は「南無阿弥陀仏」と唱えれば誰でも極楽浄土に往生できると説き、浄土宗を開きました。
  - id: c
    text: 浄土真宗
    explanation: 浄土真宗は法然の弟子・親鸞が開きました。
  - id: d
    text: 臨済宗
    explanation: 臨済宗は栄西が宋から伝えた禅宗の一派です。
  answer: b
- id: jhs-sh-ka-010
  text: 鎌倉時代に親鸞が開いた宗派はどれか。
  choices:
  - id: a
    text: 浄土宗
    explanation: 浄土宗は法然が開きました。親鸞は法然の弟子です。
  - id: b
    text: 浄土真宗
    explanation: 正解です。親鸞は師・法然の教えを発展させ、善人よりも悪人こそ救われると説く悪人正機説を唱え、浄土真宗（一向宗）を開きました。
  - id: c
    text: 日蓮宗
    explanation: 日蓮宗は日蓮が開きました。
  - id: d
    text: 曹洞宗
    explanation: 曹洞宗は道元が宋から伝えた禅宗の一派です。
  answer: b
- id: jhs-sh-ka-011
  text: 鎌倉時代に日蓮が開き、「南無妙法蓮華経」を唱えることを中心とした宗派はどれか。
  choices:
  - id: a
    text: 浄土真宗
    explanation: 浄土真宗は親鸞が開き、「南無阿弥陀仏」を唱えます。
  - id: b
    text: 日蓮宗
    explanation: 正解です。日蓮は法華経こそが正しい教えだとし、「南無妙法蓮華経（なむみょうほうれんげきょう）」の題目を唱えることを説きました。
  - id: c
    text: 臨済宗
    explanation: 臨済宗は栄西が伝えた禅宗で、座禅と問答（公案）を重視します。
  - id: d
    text: 天台宗
    explanation: 天台宗は最澄が開きました。
  answer: b
- id: jhs-sh-ka-012
  text: 鎌倉時代に宋から帰国した栄西が伝え、座禅を組んで悟りを開くことを重視する宗派はどれか。
  choices:
  - id: a
    text: 浄土宗
    explanation: 浄土宗は「南無阿弥陀仏」を唱えることを中心とします。
  - id: b
    text: 臨済宗
    explanation: 正解です。栄西が宋から伝えた臨済宗は座禅と公案（問答）によって悟りを目指す禅宗で、武士に広まりました。
  - id: c
    text: 日蓮宗
    explanation: 日蓮宗は日蓮が開き、法華経の題目を唱えます。
  - id: d
    text: 時宗
    explanation: 時宗は一遍が開いた宗派です。
  answer: b
- id: jhs-sh-ka-013
  text: 鎌倉幕府の主従関係において、将軍が御家人に与えたものとして正しいものはどれか。
  choices:
  - id: a
    text: 土地（御恩）と引き換えに、御家人は戦いの義務（奉公）を負った
    explanation: 正解です。将軍は御家人の先祖伝来の土地の支配を保証（本領安堵）したり、新たな土地を与える（新恩給与）御恩を与え、御家人はその見返りとして軍役などの奉公を行いました。
  - id: b
    text: 税を免除する代わりに御家人は武器を提供した
    explanation: 税の免除が御恩の主な内容ではありません。
  - id: c
    text: お金（貨幣）を与える代わりに御家人は農業に従事した
    explanation: これは封建的主従関係の描写として誤りです。
  - id: d
    text: 官位を与える代わりに御家人は朝廷に仕えた
    explanation: 官位は朝廷が与えるもので、幕府との関係とは異なります。
  answer: a
- id: jhs-sh-ka-014
  text: 鎌倉幕府が1333年に滅亡した直接の原因として正しいものはどれか。
  choices:
  - id: a
    text: 元軍に敗北したため
    explanation: 幕府は元軍を撃退しており、元寇が原因ではありません。
  - id: b
    text: 後醍醐天皇の倒幕運動に足利尊氏・新田義貞らが呼応して幕府を攻撃したため
    explanation: 正解です。後醍醐天皇の倒幕計画に足利尊氏・新田義貞らが加わり、1333年に鎌倉幕府は滅亡しました。
  - id: c
    text: 大規模な農民一揆（土一揆）が起きたため
    explanation: 土一揆が多発するのは室町時代です。
  - id: d
    text: 病気や飢饉で人口が激減したため
    explanation: 病気・飢饉は一因ですが、直接の滅亡原因ではありません。
  answer: b
- id: jhs-sh-ka-015
  text: 鎌倉時代の農業の発展として正しいものはどれか。
  choices:
  - id: a
    text: 稲作が初めて始まった
    explanation: 稲作は弥生時代に始まりました。
  - id: b
    text: 牛馬を使った農耕や二毛作が広まった
    explanation: 正解です。鎌倉時代には牛や馬を使った深耕・鉄製農具の普及、同じ土地で一年に稲と麦を作る二毛作が西日本で広まりました。
  - id: c
    text: サツマイモやジャガイモの栽培が始まった
    explanation: サツマイモ・ジャガイモは江戸時代に南蛮から伝わりました。
  - id: d
    text: 大規模な灌漑施設が初めて作られた
    explanation: 灌漑施設は古代から作られており、鎌倉時代が初めてではありません。
  answer: b
- id: jhs-sh-ka-016
  text: 鎌倉時代の文学として有名な、源平の合戦を題材にした軍記物語はどれか。
  choices:
  - id: a
    text: 源氏物語
    explanation: 源氏物語は平安時代の物語です。
  - id: b
    text: 平家物語
    explanation: 正解です。「祇園精舎の鐘の声、諸行無常の響きあり」で始まる平家物語は、源平の合戦を描いた鎌倉時代の軍記物語です。
  - id: c
    text: 太平記
    explanation: 太平記は南北朝時代の争いを描いた軍記物語です。
  - id: d
    text: 万葉集
    explanation: 万葉集は奈良時代の和歌集です。
  answer: b
- id: jhs-sh-ka-017
  text: 鎌倉時代に宋から道元が伝えた禅宗の一派で、座禅によって悟りを得ることを重視する宗派はどれか。
  choices:
  - id: a
    text: 臨済宗
    explanation: 臨済宗は栄西が伝えた禅宗で、公案（問答）も重視します。
  - id: b
    text: 曹洞宗
    explanation: 正解です。道元が宋から伝えた曹洞宗は、ただひたすら座禅を組む「只管打坐（しかんたざ）」を重視しました。
  - id: c
    text: 浄土宗
    explanation: 浄土宗は法然が開き、念仏を唱えます。
  - id: d
    text: 浄土真宗
    explanation: 浄土真宗は親鸞が開きました。
  answer: b
- id: jhs-sh-ka-018
  text: 鎌倉幕府の機構で、御家人を統括し、軍事・警察の役割を担う機関はどれか。
  choices:
  - id: a
    text: 政所（まんどころ）
    explanation: 政所は財政・行政を担当する機関です。
  - id: b
    text: 侍所（さむらいどころ）
    explanation: 正解です。侍所は御家人を統括し、軍事・警察などを担当した鎌倉幕府の機関です。
  - id: c
    text: 問注所（もんちゅうじょ）
    explanation: 問注所は裁判を担当する機関です。
  - id: d
    text: 評定衆（ひょうじょうしゅう）
    explanation: 評定衆は幕府の重要事項を合議する機関です。
  answer: b
- id: jhs-sh-ka-019
  text: 鎌倉時代に幕府が地方の国ごとに置いた軍事・警察担当の役人は何か。
  choices:
  - id: a
    text: 国司（こくし）
    explanation: 国司は朝廷が派遣する地方行政官で、律令制度の役職です。
  - id: b
    text: 守護（しゅご）
    explanation: 正解です。守護は幕府が各国（令制国）に置いた軍事・警察担当の役人で、後に大名へと発展します。
  - id: c
    text: 地頭（じとう）
    explanation: 地頭は荘園・公領に置かれた年貢徴収と土地管理の役人です。
  - id: d
    text: 郡代（ぐんだい）
    explanation: 郡代は江戸幕府の地方行政官です。
  answer: b
- id: jhs-sh-ka-020
  text: 鎌倉時代に幕府が荘園や公領に置いた、年貢徴収・土地管理を行う役人は何か。
  choices:
  - id: a
    text: 守護
    explanation: 守護は各国の軍事・警察を担当する役人です。
  - id: b
    text: 地頭（じとう）
    explanation: 正解です。地頭は幕府が荘園・公領に置いた役人で、年貢の徴収・土地管理・治安維持を行いました。
  - id: c
    text: 国司
    explanation: 国司は朝廷の地方行政官です。
  - id: d
    text: 大名（だいみょう）
    explanation: 大名は室町時代以降に各地の領国を支配した武士です。
  answer: b
- id: jhs-sh-ka-021
  text: 鎌倉時代に行われた「徳政令」が御家人を救うために定めたことはどれか。
  choices:
  - id: a
    text: 御家人の年貢を全額免除した
    explanation: 年貢の全額免除ではありません。
  - id: b
    text: 御家人が手放した土地を無償で取り戻せるようにした
    explanation: 正解です。1297年の永仁の徳政令は、借金のかたに手放した御家人の土地を無償で取り戻せるよう定めましたが、その後の御家人への金貸しを困難にするなど逆効果もありました。
  - id: c
    text: 御家人に新たな土地を無償で与えた
    explanation: 与える土地がなかったことが幕府の問題でした。
  - id: d
    text: 御家人の軍役を半減した
    explanation: 軍役の軽減が徳政令の内容ではありません。
  answer: b
- id: jhs-sh-ka-022
  text: 鎌倉時代の工芸・彫刻として有名な東大寺南大門の金剛力士像を制作した人物はどれか。
  choices:
  - id: a
    text: 雪舟
    explanation: 雪舟は室町時代の水墨画家です。
  - id: b
    text: 運慶・快慶（うんけい・かいけい）
    explanation: 正解です。運慶・快慶らが制作した東大寺南大門の金剛力士像は、写実的で力強い鎌倉彫刻の代表作です。
  - id: c
    text: 鳥羽僧正（覚猷）
    explanation: 鳥羽僧正は平安時代末期の絵師で、鳥獣戯画の作者とされます。
  - id: d
    text: 本阿弥光悦
    explanation: 本阿弥光悦は江戸時代初期の芸術家です。
  answer: b
- id: jhs-sh-ka-023
  text: 鎌倉時代に一遍が開いた宗派で、踊り念仏で有名なものはどれか。
  choices:
  - id: a
    text: 浄土宗
    explanation: 浄土宗は法然が開いた宗派です。
  - id: b
    text: 時宗
    explanation: 正解です。一遍が開いた時宗は、念仏を唱えながら踊る踊り念仏（念仏踊り）で全国を巡って布教しました。
  - id: c
    text: 曹洞宗
    explanation: 曹洞宗は道元が伝えた禅宗の一派です。
  - id: d
    text: 日蓮宗
    explanation: 日蓮宗は日蓮が開き、法華経の題目を唱えます。
  answer: b
- id: jhs-sh-ka-024
  text: 源頼朝が各地に守護・地頭を置く権利を朝廷から認めさせた年はどれか。
  choices:
  - id: a
    text: 1192年
    explanation: 1192年は源頼朝が征夷大将軍に任命された年です。
  - id: b
    text: 1185年
    explanation: 正解です。1185年に源頼朝は壇ノ浦の戦いで平氏を滅ぼすとともに、守護・地頭の設置権を朝廷から認めさせ、幕府の実質的な支配体制を確立しました。
  - id: c
    text: 1221年
    explanation: 1221年は承久の乱が起きた年です。
  - id: d
    text: 1232年
    explanation: 1232年は御成敗式目が制定された年です。
  answer: b
- id: jhs-sh-ka-025
  text: 鎌倉幕府で北条氏が執権の地位を独占した政治体制を何というか。
  choices:
  - id: a
    text: 摂関政治
    explanation: 摂関政治は平安時代に藤原氏が行った政治です。
  - id: b
    text: 執権政治
    explanation: 正解です。北条時政・義時以来、北条氏が代々執権の地位を独占して幕府の実権を握った政治体制を執権政治といいます。
  - id: c
    text: 院政
    explanation: 院政は上皇が行う政治です。
  - id: d
    text: 幕藩体制
    explanation: 幕藩体制は江戸時代の幕府と藩による支配体制です。
  answer: b
