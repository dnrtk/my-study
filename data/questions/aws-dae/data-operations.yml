questions:
  - id: "aws-dae-do-001"
    text: "ある企業がAWS Glueジョブを使用してETLパイプラインを運用している。Glueジョブが失敗した場合に、運用チームへ即座に通知を送信したい。最も運用負荷が低い方法はどれか。"
    choices:
      - id: "a"
        text: "AWS Glueジョブの失敗イベントをAmazon EventBridgeルールで検知し、Amazon SNSトピックに通知を送信する"
        explanation: "正しい。AWS Glueジョブはジョブステータスの変更イベントをEventBridgeに自動的に送信する。EventBridgeルールでGlue Job State Changeイベントの失敗をフィルタし、SNSトピックをターゲットに設定するのが最も運用負荷が低い構成である。"
      - id: "b"
        text: "AWS Glueジョブの出力ログをCloudWatch Logsで監視し、メトリクスフィルターでエラーを検知してCloudWatchアラームからSNSに通知する"
        explanation: "不正解。技術的には可能だが、メトリクスフィルターの設定・管理が必要であり、EventBridgeルールを使う方法と比較して運用負荷が高い。"
      - id: "c"
        text: "AWS Lambda関数を定期的に実行してGlue APIのGetJobRunsを呼び出し、失敗したジョブを検知して通知する"
        explanation: "不正解。ポーリング方式は非効率であり、検知の遅延が発生する。イベント駆動型のEventBridgeを使用する方が適切である。"
      - id: "d"
        text: "AWS Glueジョブのブックマーク機能を有効化し、失敗時に自動的にSNS通知を送信する"
        explanation: "不正解。Glueジョブブックマークはジョブが処理済みのデータを追跡する機能であり、失敗通知の仕組みではない。"
    answer: "a"

  - id: "aws-dae-do-002"
    text: "データエンジニアがAmazon MWAAを使用して複数のETLジョブを含むデータパイプラインをオーケストレーションしている。DAGの実行状況を監視し、タスクの失敗やSLA違反を検知する必要がある。最も適切なアプローチはどれか。"
    choices:
      - id: "a"
        text: "Amazon MWAAのCloudWatch メトリクスのみを使用してDAGの成功率を監視する"
        explanation: "不正解。CloudWatchメトリクスだけではタスクレベルの詳細な失敗検知やSLA違反の監視には不十分である。"
      - id: "b"
        text: "Apache AirflowのSLA機能を設定し、MWAAのCloudWatchメトリクスとCloudWatch Logsを組み合わせてDAGおよびタスクレベルの監視を行う"
        explanation: "正しい。Apache AirflowにはSLA機能が組み込まれており、タスクの実行時間がしきい値を超えた場合にアラートを発行できる。MWAAはCloudWatchにメトリクスとログを自動的に送信するため、これらを組み合わせることで包括的な監視が可能になる。"
      - id: "c"
        text: "AWS Step Functionsに移行して、組み込みのエラーハンドリングとリトライ機能を使用する"
        explanation: "不正解。Step Functionsへの移行はオーケストレーションの選択肢として有効だが、既存のMWAA環境から移行するのは設問の要件に対して過剰である。"
      - id: "d"
        text: "カスタムLambda関数でMWAAのメタデータベースに直接クエリを実行してDAGの状態を取得する"
        explanation: "不正解。MWAAのメタデータベースへの直接アクセスはセキュリティリスクがあり、マネージドサービスの利点を損なう。"
    answer: "b"

  - id: "aws-dae-do-003"
    text: "企業がAWS Glue ETLジョブでS3からデータを取り込んでいるが、ソースデータに欠損値や重複レコードが含まれることがある。データ品質を自動的に検証し、品質基準を満たさないデータをパイプラインから除外したい。最も効率的な方法はどれか。"
    choices:
      - id: "a"
        text: "AWS Glue Data Qualityを使用してDQDLルールを定義し、EvaluateDataQualityトランスフォームをETLジョブに組み込む"
        explanation: "正しい。AWS Glue Data QualityはData Quality Definition Language (DQDL)を使用してルールを定義でき、EvaluateDataQualityトランスフォームをGlue ETLジョブ内に直接組み込むことで、パイプライン内でデータ品質を検証し、品質基準を満たさないレコードを自動的にフィルタリングできる。"
      - id: "b"
        text: "Amazon Athenaでデータ取り込み後にSQLクエリを実行し、品質チェックを行う"
        explanation: "不正解。Athenaでの事後チェックはバッチ処理後に行われるため、パイプライン内でのリアルタイムなデータ品質検証にはならない。"
      - id: "c"
        text: "AWS Lambda関数でカスタムバリデーションロジックを実装し、S3イベントトリガーで実行する"
        explanation: "不正解。カスタムコードの開発・保守が必要であり、Glue Data Qualityのマネージド機能を使う方が効率的である。"
      - id: "d"
        text: "Amazon DataBrewのプロファイリングジョブを使用してデータ品質レポートを生成する"
        explanation: "不正解。DataBrewのプロファイリングはデータの統計情報を可視化するが、ETLパイプライン内でのリアルタイムなデータフィルタリングには適さない。"
    answer: "a"

  - id: "aws-dae-do-004"
    text: "データレイクのパイプラインで、毎日のETLジョブが予定時刻に開始されないことがある。ジョブは複数のデータソースの到着に依存しており、すべてのソースデータが揃ってからジョブを開始したい。最も適切なアーキテクチャはどれか。"
    choices:
      - id: "a"
        text: "Amazon EventBridgeスケジューラで固定時刻にジョブを起動し、データがない場合はリトライする"
        explanation: "不正解。固定時刻の起動ではデータの到着タイミングに対応できず、不要なリトライが発生する可能性がある。"
      - id: "b"
        text: "各データソースのS3バケットにS3イベント通知を設定し、すべてのソースが到着したことをAWS Step Functionsで追跡してからGlueジョブを起動する"
        explanation: "正しい。S3イベント通知でデータ到着をイベント駆動で検知し、Step Functionsのステートマシンで複数のデータソースの到着状態を管理することで、すべてのデータが揃った時点でジョブを開始できる。"
      - id: "c"
        text: "AWS Glueトリガーのスケジュールタイプを使用し、ジョブの開始前にカタログのテーブルを確認する条件を追加する"
        explanation: "不正解。Glueトリガーのスケジュールタイプは固定時刻での起動であり、複数のデータソースの到着を条件とする柔軟な制御には向かない。"
      - id: "d"
        text: "Amazon SQSキューに各データソースの到着メッセージを送信し、Lambda関数でキューをポーリングしてすべてが揃ったらジョブを起動する"
        explanation: "不正解。技術的には可能だが、到着状態の管理ロジックをカスタム実装する必要があり、Step Functionsを使う方がワークフロー管理に適している。"
    answer: "b"

  - id: "aws-dae-do-005"
    text: "企業がAWS上でデータ分析基盤を運用しており、AWSリソースの設定変更を追跡し、コンプライアンス違反を検知したい。例えば、S3バケットの暗号化が無効化された場合に自動的に検知・通知する仕組みを構築する必要がある。最も適切なサービスの組み合わせはどれか。"
    choices:
      - id: "a"
        text: "AWS CloudTrailでAPI呼び出しを記録し、CloudWatch Logsで特定のAPI呼び出しを検索する"
        explanation: "不正解。CloudTrailはAPI呼び出しの記録に適しているが、リソースの設定状態の継続的な評価やコンプライアンスルールの自動チェックにはAWS Configが適している。"
      - id: "b"
        text: "AWS Configルールを使用してリソースの設定変更を継続的に評価し、非準拠リソースをEventBridge経由でSNSに通知する"
        explanation: "正しい。AWS Configはリソースの設定変更を継続的に記録・評価し、Configルールで定義したコンプライアンス基準に基づいて非準拠リソースを自動検知できる。検知結果はEventBridgeを通じてSNSに通知できる。"
      - id: "c"
        text: "Amazon GuardDutyを使用してセキュリティ脅威を検知し、自動修復する"
        explanation: "不正解。GuardDutyはセキュリティ脅威の検知サービスであり、リソース設定のコンプライアンス評価には適さない。"
      - id: "d"
        text: "AWS Systems Manager Inventoryを使用してリソースの設定情報を収集し、手動でコンプライアンスを確認する"
        explanation: "不正解。Systems Manager Inventoryは主にEC2インスタンスのソフトウェアインベントリ管理に使用され、S3バケットの暗号化設定のようなリソース設定のコンプライアンス評価にはAWS Configが適切である。"
    answer: "b"

  - id: "aws-dae-do-006"
    text: "データエンジニアがAWS Step Functionsを使用して大規模なCSVファイル（数百万行）のバッチ処理パイプラインを構築している。S3に保存された大量のCSVファイルを並列で処理する必要がある。最も効率的なアプローチはどれか。"
    choices:
      - id: "a"
        text: "Step FunctionsのDistributed Mapステートを使用して、S3オブジェクトを最大10,000の並列子ワークフローで処理する"
        explanation: "正しい。Step FunctionsのDistributed Mapステートは大規模な並列処理に特化しており、S3内の数百万のオブジェクトに対して最大10,000の並列実行が可能である。データセットが256KiBを超える場合や大量の反復処理が必要な場合に最適である。"
      - id: "b"
        text: "Step FunctionsのInline Mapステートを使用して、各CSVファイルを順次処理する"
        explanation: "不正解。Inline Mapステートは最大40の並列実行に制限されており、大規模なバッチ処理には不十分である。"
      - id: "c"
        text: "AWS Lambda関数を直接S3イベントでトリガーし、各ファイルを個別に処理する"
        explanation: "不正解。Lambda単体では大量ファイルの並列処理のオーケストレーションや、エラーハンドリング、リトライ管理が困難である。"
      - id: "d"
        text: "Amazon EMRクラスターを起動してSparkジョブで全ファイルを処理する"
        explanation: "不正解。EMRは大規模データ処理に適しているが、クラスターの管理が必要であり、サーバーレスのStep Functions Distributed Mapと比較して運用負荷が高い。"
    answer: "a"

  - id: "aws-dae-do-007"
    text: "企業のデータパイプラインでは、Amazon Redshiftクラスターに対して複数のETLジョブが並行して書き込みを行っている。最近、クエリのパフォーマンスが著しく低下している。原因を特定するために最初に確認すべきものはどれか。"
    choices:
      - id: "a"
        text: "Amazon Redshiftのシステムテーブル（STL_ALERT_EVENT_LOG、SVL_QUERY_SUMMARY）を確認し、クエリの実行計画とアラートを分析する"
        explanation: "正しい。Redshiftのシステムテーブルはクエリパフォーマンスの診断に最も有用である。STL_ALERT_EVENT_LOGはクエリ実行中の問題（ディスクスピル、不均等なデータ分散など）を記録し、SVL_QUERY_SUMMARYはクエリの実行計画の詳細を提供する。"
      - id: "b"
        text: "CloudWatchのRedshiftメトリクスでCPU使用率とディスク使用量を確認する"
        explanation: "不正解。CloudWatchメトリクスはクラスターレベルの全般的な健全性を示すが、特定のクエリのパフォーマンス低下の根本原因を特定するには不十分である。"
      - id: "c"
        text: "AWS CloudTrailログでRedshiftに対するAPI呼び出しを確認する"
        explanation: "不正解。CloudTrailはマネジメントイベント（クラスターの作成、変更など）を記録するが、クエリのパフォーマンス問題の診断には使用できない。"
      - id: "d"
        text: "Redshiftクラスターのノード数を即座に増やしてパフォーマンスを改善する"
        explanation: "不正解。原因を特定せずにノードを追加してもパフォーマンスが改善しない場合がある。まず根本原因の分析が必要である。"
    answer: "a"

  - id: "aws-dae-do-008"
    text: "企業がAWS Glue DataBrewを使用してデータの前処理を行い、AWS Glue ETLジョブでデータ変換を実行している。パイプライン全体のコストを最適化するために、最も効果的な方法はどれか。"
    choices:
      - id: "a"
        text: "AWS Glue ETLジョブでAuto Scalingを有効にし、ワーカー数を動的に調整する"
        explanation: "正しい。AWS Glue ETLジョブのAuto Scaling機能を有効にすることで、ジョブの実行中にワーカー数が自動的にスケールアップ・ダウンし、実際に必要なリソースのみを使用するためコストを最適化できる。過剰なプロビジョニングを防ぎ、処理量に応じたリソース配分が実現する。"
      - id: "b"
        text: "すべてのGlueジョブをG.1Xワーカータイプに統一して管理を簡素化する"
        explanation: "不正解。ワーカータイプの統一は管理を簡素化するかもしれないが、ジョブの特性に応じた適切なワーカータイプを選択しない場合、コストの無駄が発生する可能性がある。"
      - id: "c"
        text: "AWS Glueジョブのタイムアウト設定を短くして、長時間実行されるジョブを強制終了する"
        explanation: "不正解。タイムアウトの短縮はコスト上限の管理には有用だが、ジョブが正常に完了しない可能性があり、コスト最適化の主要な手段としては不適切である。"
      - id: "d"
        text: "AWS Budgetsでアラートを設定し、コストが閾値を超えた場合に通知する"
        explanation: "不正解。AWS Budgetsはコスト監視とアラート通知に有用だが、パイプライン自体のコスト最適化にはならない。コスト可視化と最適化は異なる概念である。"
    answer: "a"

  - id: "aws-dae-do-009"
    text: "データエンジニアが複数のAWSアカウントにまたがるデータパイプラインのログを一元管理したい。各アカウントのGlueジョブ、Lambda関数、Step Functionsのログを統合的に検索・分析する必要がある。最も適切なアプローチはどれか。"
    choices:
      - id: "a"
        text: "各アカウントのCloudWatch Logsにサブスクリプションフィルターを設定し、中央アカウントのCloudWatch Logsにログを集約する"
        explanation: "正しい。CloudWatch Logsのクロスアカウントサブスクリプションフィルターを使用することで、複数アカウントのログを中央アカウントに集約できる。集約後はCloudWatch Logs Insightsで統合的な検索・分析が可能になる。"
      - id: "b"
        text: "各アカウントのCloudWatch Logsを個別に確認し、手動でログを突き合わせる"
        explanation: "不正解。手動での確認は運用負荷が高く、スケーラブルでない。複数アカウントの管理には自動化された集約メカニズムが必要である。"
      - id: "c"
        text: "AWS CloudTrailの組織トレイルを設定して、すべてのアカウントのログを記録する"
        explanation: "不正解。CloudTrailはAPI呼び出しの監査ログを記録するサービスであり、アプリケーションログやジョブ実行ログの集約には適さない。"
      - id: "d"
        text: "各アカウントからS3バケットにログをエクスポートし、Amazon Athenaで分析する"
        explanation: "不正解。S3へのエクスポートとAthenaでの分析は可能だが、リアルタイムのログ検索にはCloudWatch Logs Insightsの方が適している。また、エクスポートの設定と管理が煩雑になる。"
    answer: "a"

  - id: "aws-dae-do-010"
    text: "企業がAWSのデータ分析基盤の月額コストが予算を超過している。コストの内訳を分析し、最もコストがかかっているサービスやリソースを特定したい。最初に使用すべきAWSサービスはどれか。"
    choices:
      - id: "a"
        text: "AWS Budgetsでカスタム予算を作成し、超過アラートを設定する"
        explanation: "不正解。AWS Budgetsは予算の設定とアラート通知に適しているが、コストの詳細な内訳分析やリソース別のコスト特定にはCost Explorerが適切である。"
      - id: "b"
        text: "AWS Cost Explorerを使用して、サービス別・リソース別のコスト内訳を分析し、コスト増加の要因を特定する"
        explanation: "正しい。AWS Cost Explorerはコストの詳細な内訳をサービス別、リソース別、タグ別に可視化・分析できる。フィルタリングやグルーピング機能を使用して、コスト増加の主要因を迅速に特定できる。"
      - id: "c"
        text: "AWS Pricing Calculatorで現在の構成のコストを再見積もりする"
        explanation: "不正解。Pricing Calculatorは新しい構成の見積もりに使用するツールであり、実際の利用コストの分析には使用できない。"
      - id: "d"
        text: "AWS Trusted Advisorのコスト最適化チェックを確認する"
        explanation: "不正解。Trusted Advisorはコスト最適化の推奨事項を提供するが、コストの詳細な内訳分析にはCost Explorerの方が適切である。"
    answer: "b"

  - id: "aws-dae-do-011"
    text: "データパイプラインでAWS Glueクローラーを使用してS3上の新しいデータのスキーマを自動検出している。しかし、スキーマの変更（カラムの追加や型の変更）が発生した際にパイプラインが破損することがある。スキーマの変更を安全に管理する方法として最も適切なものはどれか。"
    choices:
      - id: "a"
        text: "Glueクローラーのスキーマ変更ポリシーを「LOG」に設定し、スキーマ変更をCloudWatch Logsに記録してEventBridgeで通知する。変更の検証後に手動でカタログを更新する"
        explanation: "正しい。クローラーのスキーマ変更ポリシーを「LOG」に設定すると、スキーマの変更を検知しても自動的にカタログを更新せず、CloudWatch Logsに記録する。これにより、予期しないスキーマ変更によるパイプラインの破損を防ぎ、変更を検証してから手動で適用できる。"
      - id: "b"
        text: "Glueクローラーのスキーマ変更ポリシーを「UPDATE_IN_DATABASE」に設定して常に最新のスキーマに自動更新する"
        explanation: "不正解。自動更新は便利だが、予期しないスキーマ変更（カラムの型変更やカラム削除など）がそのままカタログに反映され、下流のクエリやETLジョブが破損するリスクがある。"
      - id: "c"
        text: "AWS Glue Schema Registryを使用してAvroスキーマを管理し、互換性チェックを行う"
        explanation: "不正解。Glue Schema RegistryはAvro、JSON Schema、Protobufスキーマの管理に適しているが、S3上のCSVやParquetファイルのスキーマ検出にはクローラーの設定が直接的な解決策である。"
      - id: "d"
        text: "クローラーを無効化し、すべてのテーブル定義を手動でGlue Data Catalogに登録する"
        explanation: "不正解。手動管理はスキーマ変更の検知を遅らせ、運用負荷が増大する。クローラーの設定変更で自動検知と安全な管理を両立できる。"
    answer: "a"

  - id: "aws-dae-do-012"
    text: "企業がAmazon MWAAでApache Airflow DAGを運用しているが、特定のDAGが頻繁にワーカーのメモリ不足で失敗している。この問題を解決するための最も適切なアプローチはどれか。"
    choices:
      - id: "a"
        text: "MWAA環境クラスのサイズを大きくして、ワーカーに割り当てられるメモリを増やす"
        explanation: "正しい。Amazon MWAAの環境クラス（mw1.small、mw1.medium、mw1.large、mw1.2xlarge）を変更することで、ワーカーに割り当てられるメモリとCPUリソースを増やすことができる。メモリ不足が原因の場合、環境クラスのスケールアップが直接的な解決策である。"
      - id: "b"
        text: "DAGのスケジュール間隔を長くして、同時実行されるタスク数を減らす"
        explanation: "不正解。スケジュール間隔の変更はタスクの同時実行数を減らす可能性があるが、個々のタスクのメモリ使用量が問題の場合は解決にならない。"
      - id: "c"
        text: "Airflowの並列実行設定（parallelism）を下げてリソース競合を減らす"
        explanation: "不正解。parallelismの削減は同時実行タスク数を制限するが、個々のタスクが必要とするメモリが環境クラスの上限を超えている場合は根本的な解決にならない。"
      - id: "d"
        text: "MWAA環境を削除して再作成し、最新バージョンのAirflowを使用する"
        explanation: "不正解。環境の再作成はメモリ不足の問題を解決しない。環境クラスのサイズ変更が適切な対処法である。"
    answer: "a"

  - id: "aws-dae-do-013"
    text: "企業がAWS Glue ETLジョブの実行時間を短縮したい。現在、ジョブは大量の小さなファイル（各1KB〜10KB）をS3から読み込んでいる。この「小さなファイル問題」に対処する最も効果的な方法はどれか。"
    choices:
      - id: "a"
        text: "AWS Glueジョブのワーカー数を増やして並列処理能力を向上させる"
        explanation: "不正解。ワーカー数の増加は処理能力を向上させるが、小さなファイル問題の根本原因（ファイルごとのオーバーヘッド）を解決しない。むしろコストが増加する。"
      - id: "b"
        text: "AWS GlueジョブでgroupFilesオプションを使用し、小さなファイルをグループ化して読み込む"
        explanation: "正しい。AWS GlueのgroupFilesオプション（またはgroupSize）を使用すると、複数の小さなファイルを1つのパーティションにグループ化して読み込むことができる。これにより、ファイルごとのI/Oオーバーヘッドが削減され、処理効率が大幅に向上する。"
      - id: "c"
        text: "S3バケットのストレージクラスをS3 Intelligent-Tieringに変更する"
        explanation: "不正解。ストレージクラスの変更はコスト最適化に関連するが、小さなファイルの読み込みパフォーマンスには影響しない。"
      - id: "d"
        text: "AWS GlueジョブのタイムアウトをDPU時間の上限に設定する"
        explanation: "不正解。タイムアウト設定はジョブの最大実行時間を制限するものであり、パフォーマンスの改善にはならない。"
    answer: "b"

  - id: "aws-dae-do-014"
    text: "データエンジニアがAmazon EventBridgeを使用して、複数のデータソースからのイベントを統合し、適切なターゲットにルーティングしている。特定のイベントパターンに一致するイベントが発生した際に、順序を保証しながらダウンストリームの処理を実行したい。最も適切な構成はどれか。"
    choices:
      - id: "a"
        text: "EventBridgeルールのターゲットとしてAmazon SQS FIFOキューを設定し、コンシューマーが順序通りにメッセージを処理する"
        explanation: "正しい。Amazon SQS FIFOキューはメッセージの順序を保証し、重複排除機能も提供する。EventBridgeからFIFOキューにイベントを送信することで、ダウンストリームの処理が順序通りに実行される。"
      - id: "b"
        text: "EventBridgeルールのターゲットとしてAmazon SQS標準キューを設定する"
        explanation: "不正解。SQS標準キューはベストエフォートの順序配信であり、メッセージの順序を厳密に保証しない。順序保証が必要な場合はFIFOキューを使用する必要がある。"
      - id: "c"
        text: "EventBridgeルールのターゲットとしてAmazon SNSトピックを設定する"
        explanation: "不正解。SNSはプッシュ型のメッセージングサービスであり、メッセージの順序保証は提供しない（SNS FIFOトピックは存在するが、EventBridgeからの直接連携ではSQS FIFOの方が適切）。"
      - id: "d"
        text: "EventBridgeパイプを使用して、イベントのフィルタリングと変換を行い、Lambda関数に送信する"
        explanation: "不正解。EventBridge Pipesはイベントのフィルタリングと変換に有用だが、Lambda関数への送信だけでは順序保証が担保されない。"
    answer: "a"

  - id: "aws-dae-do-015"
    text: "企業がAWS上のデータパイプラインの障害対応を改善したい。AWS Glueジョブが失敗した場合に、自動的にリトライを実行し、リトライも失敗した場合にはインシデントチケットを自動作成するワークフローを構築したい。最も適切なアーキテクチャはどれか。"
    choices:
      - id: "a"
        text: "AWS Glueジョブの組み込みリトライ設定でリトライ回数を設定し、すべてのリトライが失敗した場合にEventBridgeイベントをトリガーしてStep Functionsでインシデントチケット作成ワークフローを実行する"
        explanation: "正しい。AWS Glueジョブにはジョブレベルの自動リトライ設定（Maximum retries）が組み込まれている。リトライ上限に達して最終的に失敗した場合、GlueジョブステータスイベントがEventBridgeに送信されるため、これをStep FunctionsやLambda関数でキャッチしてインシデントチケットの自動作成に連携できる。"
      - id: "b"
        text: "AWS Step Functionsのステートマシンで全体を管理し、Glueジョブの実行、リトライ、エラーハンドリングをすべてStep Functions内で制御する"
        explanation: "不正解。Step Functionsで全体を管理することも可能だが、Glueジョブの組み込みリトライ機能を活用する方がシンプルで運用負荷が低い。"
      - id: "c"
        text: "CloudWatch AlarmsでGlueジョブの失敗メトリクスを監視し、アラーム発生時にSNS経由で運用チームに手動対応を依頼する"
        explanation: "不正解。手動対応では自動リトライもインシデントチケットの自動作成も実現できず、設問の要件を満たさない。"
      - id: "d"
        text: "AWS Lambda関数でGlueジョブをラップし、Lambda内でリトライロジックとチケット作成ロジックを実装する"
        explanation: "不正解。Lambda関数でのカスタム実装は可能だが、Glueジョブの組み込みリトライ設定とEventBridgeの連携を使う方がコードの保守が少なく、AWS のマネージドサービスの利点を活用できる。"
    answer: "a"
