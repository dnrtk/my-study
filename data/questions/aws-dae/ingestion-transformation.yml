questions:
  - id: "aws-dae-it-001"
    text: "ある企業は、オンプレミスのMySQLデータベースからAmazon S3へデータを移行し、日次バッチでデータレイクに取り込む必要がある。初回のフルロード後、変更されたデータのみを継続的にキャプチャしたい。最も適切なソリューションはどれか。"
    choices:
      - id: "a"
        text: "AWS DMSを使用してフルロードおよび変更データキャプチャを構成し、ターゲットとしてAmazon S3を指定する"
        explanation: "正しい。AWS DMSはフルロードとCDCの両方をサポートし、MySQLからS3への継続的なデータレプリケーションに最適である。CDCにより変更分のみをキャプチャできる。"
      - id: "b"
        text: "AWS Glueクローラーを使用してオンプレミスのMySQLデータベースに接続し、定期的にデータを抽出する"
        explanation: "Glueクローラーはデータカタログのメタデータ検出用であり、データの移行やCDCの機能は提供しない。"
      - id: "c"
        text: "Amazon Kinesis Data Streamsを使用してMySQLのバイナリログをストリーミングする"
        explanation: "Kinesis Data Streams自体にはMySQLのバイナリログを直接読み取る機能はない。プロデューサーの開発が必要となり、DMSと比較して不必要に複雑になる。"
      - id: "d"
        text: "AWS Lambda関数をスケジュール実行し、JDBC接続でMySQLからデータを抽出してS3に書き込む"
        explanation: "Lambda関数には実行時間の上限（15分）があり、大量データの移行には適さない。またCDC機能を自前で実装する必要がある。"
    answer: "a"

  - id: "aws-dae-it-002"
    text: "あるストリーミングアプリケーションは、IoTデバイスから毎秒数千件のレコードを受信している。データをリアルタイムで変換し、1分以内にAmazon S3にParquet形式で配信する必要がある。運用負荷を最小限に抑えるソリューションはどれか。"
    choices:
      - id: "a"
        text: "Amazon Kinesis Data Streamsでデータを受信し、AWS Lambda関数で変換してS3に書き込む"
        explanation: "Lambdaで変換は可能だが、Parquet形式への変換やバッファリング・配信のロジックを自前で実装する必要があり、運用負荷が高い。"
      - id: "b"
        text: "Amazon Data Firehoseを使用し、データ形式変換でParquetを指定してS3に配信する"
        explanation: "正しい。Amazon Data Firehose（旧Kinesis Data Firehose）はParquet/ORC形式への変換を組み込みでサポートし、S3への配信をフルマネージドで行う。バッファリング間隔を60秒に設定することで1分以内の配信が可能である。"
      - id: "c"
        text: "Amazon MSKでデータを受信し、Amazon EMRクラスターでSpark Structured Streamingを使用して変換・配信する"
        explanation: "技術的には可能だが、EMRクラスターの管理が必要となり運用負荷が最小限とは言えない。"
      - id: "d"
        text: "Amazon SQSでデータを受信し、AWS Glueストリーミングジョブで変換してS3に書き込む"
        explanation: "SQSはストリーミングの取り込みには一般的でなく、Glueストリーミングジョブも運用負荷の観点でData Firehoseより複雑である。"
    answer: "b"

  - id: "aws-dae-it-003"
    text: "データエンジニアは、AWS Glue ETLジョブでApache Sparkを使用して大規模なCSVファイルをParquet形式に変換している。ジョブの実行時間が長く、コストが高い。パフォーマンスを改善するために最も効果的な方法はどれか。"
    choices:
      - id: "a"
        text: "Glueジョブのワーカータイプを Standard から G.2X に変更し、ワーカー数を増やす"
        explanation: "正しい。G.2Xワーカータイプはより多くのメモリとCPUを提供し、大規模なデータ変換のパフォーマンスを向上させる。ワーカー数の増加により並列処理能力が向上する。さらにG.4X、G.8Xなども利用可能である。"
      - id: "b"
        text: "AWS Glueのブックマーク機能を有効にする"
        explanation: "ジョブブックマークは既に処理済みのデータを再処理しないようにする機能であり、個々のジョブの実行パフォーマンス自体を改善するものではない。"
      - id: "c"
        text: "Glueジョブのタイムアウト値を増加させる"
        explanation: "タイムアウトを延長してもジョブの実行速度は改善されない。単にジョブが打ち切られるまでの時間を延ばすだけである。"
      - id: "d"
        text: "データカタログのテーブル定義にパーティションキーを追加する"
        explanation: "パーティションキーの追加はクエリ時のパフォーマンスに寄与するが、CSVからParquetへの変換ジョブの実行時間を直接的に短縮するものではない。"
    answer: "a"

  - id: "aws-dae-it-004"
    text: "ある企業はSalesforceからAmazon S3にデータを定期的に転送する必要がある。転送はスケジュールベースで行い、コーディングなしで実現したい。最も適切なサービスはどれか。"
    choices:
      - id: "a"
        text: "Amazon AppFlow"
        explanation: "正しい。Amazon AppFlowはSalesforce等のSaaSアプリケーションとAWSサービス間のデータ転送をノーコードで実現するフルマネージドサービスであり、スケジュールベースの転送をサポートする。"
      - id: "b"
        text: "AWS Glue ETLジョブ"
        explanation: "Glue ETLジョブはSalesforceへの直接コネクタを標準では持たず、カスタムコネクタの設定やコーディングが必要となる。"
      - id: "c"
        text: "AWS Lambda関数とSalesforce REST API"
        explanation: "Lambda関数でSalesforce APIを呼び出すことは可能だが、コーディングが必要であり要件に合致しない。"
      - id: "d"
        text: "Amazon Data Firehose"
        explanation: "Data FirehoseはSalesforceをソースとしてサポートしているが、AppFlowと比較するとSaaSからのスケジュールベースのバッチ転送にはAppFlowがより適切である。"
    answer: "a"

  - id: "aws-dae-it-005"
    text: "データエンジニアは、複数のAWS Glue ETLジョブを順序制御付きで実行し、ジョブの成功・失敗に応じた分岐処理を行いたい。エラー発生時にはリトライを自動で実施する必要がある。最も適切なオーケストレーションサービスはどれか。"
    choices:
      - id: "a"
        text: "AWS Step Functions"
        explanation: "正しい。Step FunctionsはGlueジョブの順序制御、条件分岐、エラーハンドリング（リトライ、キャッチ）をビジュアルワークフローとして定義でき、複雑なETLパイプラインのオーケストレーションに最適である。"
      - id: "b"
        text: "Amazon MWAA（Managed Workflows for Apache Airflow）"
        explanation: "MWAAもワークフローオーケストレーションに適しているが、Airflowの知識が必要であり、Step Functionsと比較すると単純なGlueジョブの順序実行にはオーバースペックとなる。"
      - id: "c"
        text: "AWS Glueワークフロー"
        explanation: "Glueワークフローはトリガーベースの簡易的なオーケストレーションを提供するが、複雑な条件分岐やきめ細かなリトライ制御はStep Functionsの方が優れている。"
      - id: "d"
        text: "Amazon EventBridgeルール"
        explanation: "EventBridgeはイベントルーティングサービスであり、ジョブの順序制御や条件分岐によるワークフロー管理には適さない。"
    answer: "a"

  - id: "aws-dae-it-006"
    text: "ある企業は、Amazon Kinesis Data Streamsのシャード数を事前にプロビジョニングしたくない。トラフィックパターンが予測困難であり、ピーク時のスループットに自動的に対応する必要がある。最も適切なアプローチはどれか。"
    choices:
      - id: "a"
        text: "Kinesis Data Streamsのオンデマンドモードを使用する"
        explanation: "正しい。オンデマンドモードではシャード数を自動的にスケーリングし、トラフィックパターンの変動に対応する。事前のキャパシティプランニングが不要である。"
      - id: "b"
        text: "Kinesis Data Streamsのプロビジョンドモードで、十分に大きなシャード数を設定する"
        explanation: "プロビジョンドモードでは事前にシャード数を決定する必要があり、トラフィックが予測困難な場合にはコスト効率が悪くなる。"
      - id: "c"
        text: "Amazon Data Firehoseに切り替える"
        explanation: "Data Firehoseはストリーム処理のユースケースには適さない場合がある。データを受信してS3等に配信するが、コンシューマーアプリケーションでのリアルタイム処理が必要な場合はKinesis Data Streamsの方が適切である。"
      - id: "d"
        text: "AWS Auto Scalingを使用してKinesis Data Streamsのシャード数を自動調整する"
        explanation: "Kinesis Data StreamsにはAWS Auto Scalingの直接的な統合はない。オンデマンドモードが自動スケーリングの推奨アプローチである。"
    answer: "a"

  - id: "aws-dae-it-007"
    text: "データエンジニアは、AWS GlueのETLジョブで増分データ処理を実装したい。前回のジョブ実行以降に追加された新しいデータのみを処理し、既に処理済みのデータを再処理しないようにする必要がある。最も適切な機能はどれか。"
    choices:
      - id: "a"
        text: "AWS Glueジョブブックマークを有効にする"
        explanation: "正しい。Glueジョブブックマークは前回のジョブ実行で処理したデータの状態を記録し、次回実行時に新しいデータのみを処理する。S3、JDBC、およびGlueデータカタログのソースに対応している。"
      - id: "b"
        text: "AWS GlueのpushdownPredicateを使用する"
        explanation: "pushdownPredicateはデータカタログのパーティションをフィルタリングするために使用されるが、ジョブ実行間の増分処理の状態管理は行わない。"
      - id: "c"
        text: "AWS Glueクローラーのスケジュールを設定する"
        explanation: "クローラーはデータカタログのメタデータを更新するものであり、ETLジョブの増分処理には直接関係しない。"
      - id: "d"
        text: "AWS Glue DataBrewのプロファイリングジョブを使用する"
        explanation: "DataBrewはデータの可視化とクレンジングのためのサービスであり、増分データ処理の機能は提供しない。"
    answer: "a"

  - id: "aws-dae-it-008"
    text: "ある企業は、Apache KafkaベースのストリーミングアーキテクチャをAWSに移行したい。既存のKafkaプロデューサーとコンシューマーのコードを最小限の変更で利用し、インフラストラクチャの管理負荷を軽減したい。最も適切なサービスはどれか。"
    choices:
      - id: "a"
        text: "Amazon Managed Streaming for Apache Kafka"
        explanation: "正しい。Amazon MSKはApache Kafka互換のフルマネージドサービスであり、既存のKafkaプロデューサー・コンシューマーのコードをそのまま利用できる。クラスター管理の負荷を大幅に軽減する。"
      - id: "b"
        text: "Amazon Kinesis Data Streams"
        explanation: "Kinesis Data StreamsはKafkaとAPIが異なるため、既存のKafkaコードの修正が必要となる。最小限の変更という要件に合致しない。"
      - id: "c"
        text: "Amazon SQS"
        explanation: "SQSはメッセージキューサービスであり、Kafkaのようなログベースのストリーミングプラットフォームとは異なる。既存のKafkaコードは使用できない。"
      - id: "d"
        text: "Amazon Data Firehose"
        explanation: "Data Firehoseはデータ配信サービスであり、Kafka互換のAPIを提供しない。コンシューマーアプリケーションのコードを大幅に変更する必要がある。"
    answer: "a"

  - id: "aws-dae-it-009"
    text: "データエンジニアは、Amazon S3に保存されたJSON形式のログデータに対してスキーマを自動検出し、AWS Glueデータカタログにテーブルとして登録したい。最も適切な方法はどれか。"
    choices:
      - id: "a"
        text: "AWS Glueコンソールからテーブルを手動で作成する"
        explanation: "手動作成は可能だが、スキーマの自動検出という要件に合致しない。"
      - id: "b"
        text: "AWS Glueクローラーを作成し、S3のパスを指定して実行する"
        explanation: "正しい。Glueクローラーは指定されたS3パスのデータを走査し、スキーマを自動的に推論してデータカタログにテーブルとして登録する。JSON形式を含む多くのデータ形式に対応している。"
      - id: "c"
        text: "Amazon Athenaで CREATE EXTERNAL TABLE 文を実行する"
        explanation: "Athenaでテーブルを作成できるが、スキーマを手動で定義する必要があり自動検出ではない。"
      - id: "d"
        text: "AWS Lake Formationのブループリントを使用する"
        explanation: "Lake Formationブループリントはデータレイクのワークフローを構築するためのものであり、スキーマ自動検出の最も直接的な方法ではない。"
    answer: "b"

  - id: "aws-dae-it-010"
    text: "あるリアルタイム分析アプリケーションは、Amazon Kinesis Data Streamsからデータを読み取り、5分間のウィンドウ集計を行い、結果をAmazon OpenSearchに書き込む必要がある。SQLベースのクエリで開発したい。最も適切なサービスはどれか。"
    choices:
      - id: "a"
        text: "Amazon Managed Service for Apache Flink"
        explanation: "正しい。Amazon Managed Service for Apache FlinkはSQLベースのストリーム処理をサポートし、ウィンドウ集計やKinesis Data Streamsとの統合が組み込みで提供される。OpenSearchへの出力もサポートしている。"
      - id: "b"
        text: "AWS Lambda関数でKinesis Data Streamsのコンシューマーを実装する"
        explanation: "Lambdaではウィンドウ集計のステート管理が困難であり、SQLベースの開発もできない。"
      - id: "c"
        text: "Amazon EMRでSpark Structured Streamingを使用する"
        explanation: "Spark Structured Streamingはウィンドウ集計が可能だが、SQLベースというよりもScala/Python/Javaでの開発が主であり、EMRクラスターの管理も必要となる。"
      - id: "d"
        text: "Amazon Data Firehoseのデータ変換機能を使用する"
        explanation: "Data Firehoseはレコード単位のLambda変換はできるが、ウィンドウ集計やSQLベースの処理はサポートしない。"
    answer: "a"

  - id: "aws-dae-it-011"
    text: "データエンジニアは、AWS Glue ETLジョブで複数のソースからデータを結合する処理を開発している。ジョブの実行中に特定のDynamicFrameのスキーマの不一致を検出し、エラーレコードを別のS3パスに出力したい。最も適切なアプローチはどれか。"
    choices:
      - id: "a"
        text: "GlueのDynamicFrameのResolveChoice変換を使用してスキーマの不一致を解決し、make_cols オプションで別カラムに分離する"
        explanation: "ResolveChoiceはデータ型の曖昧さを解決するが、エラーレコードを別パスに分離する機能は直接提供しない。"
      - id: "b"
        text: "GlueのDynamicFrameの errorsCount とstageThreshold/totalThresholdを使用してエラーハンドリングを行う"
        explanation: "正しい。AWS GlueのDynamicFrameはエラーレコードをトラッキングする機能を持ち、stageThresholdやtotalThresholdでエラー数の閾値を設定できる。エラーレコードはstacking errorsとして別途取得し、S3に出力可能である。"
      - id: "c"
        text: "try-exceptブロックで例外をキャッチし、失敗したレコードをリストに追加する"
        explanation: "汎用的なPython例外処理では、DynamicFrameの個別レコードレベルのスキーマ不一致を効率的に処理することは困難である。"
      - id: "d"
        text: "AWS Glue Data Qualityルールを使用してスキーマ検証を行う"
        explanation: "Data Qualityはルールベースのデータ品質チェックを行うが、ETLジョブ内でのリアルタイムなエラーレコード分離には直接適さない。"
    answer: "b"

  - id: "aws-dae-it-012"
    text: "ある企業は、Amazon S3に蓄積された大量の半構造化データ（JSON、CSV混在）に対して、データ品質チェックを実施した上でETL処理を行いたい。データの品質ルールはビジネスアナリストが定義・管理し、品質に問題のあるレコードを隔離する必要がある。最も適切なアプローチはどれか。"
    choices:
      - id: "a"
        text: "AWS Glue Data QualityルールをGlue ETLジョブに組み込み、品質チェックに失敗したレコードを別のS3パスに出力する"
        explanation: "正しい。AWS Glue Data QualityはDQDL（Data Quality Definition Language）でルールを定義でき、ETLジョブに統合して品質チェックと不良レコードの隔離を自動化できる。ビジネスアナリストもルールの定義・管理が可能である。"
      - id: "b"
        text: "Amazon Athenaでデータ品質チェック用のSQLクエリを作成し、品質に問題のあるレコードをCTASで別テーブルに出力する"
        explanation: "Athenaでクエリは書けるが、ETLパイプラインへの統合やルールの体系的な管理には適さない。"
      - id: "c"
        text: "AWS Lambda関数で品質チェックロジックを実装し、Step Functionsでオーケストレーションする"
        explanation: "カスタム実装は可能だが、Glue Data Qualityと比較して開発・保守の負荷が大きく、ビジネスアナリストによるルール管理も困難である。"
      - id: "d"
        text: "Amazon Macie を使用してデータ品質を検査する"
        explanation: "MacieはS3内の機密データの検出とデータセキュリティ用のサービスであり、データ品質チェックとは目的が異なる。"
    answer: "a"

  - id: "aws-dae-it-013"
    text: "データエンジニアは、複数のAWSアカウントからCloudTrailログやVPCフローログ等のイベントデータを収集し、中央のデータレイクアカウントのS3バケットに集約したい。イベント駆動でリアルタイムに近い集約を実現するために最も適切なアーキテクチャはどれか。"
    choices:
      - id: "a"
        text: "各アカウントのEventBridgeからクロスアカウントのイベントバスにイベントを送信し、ルールでData Firehoseを経由してS3に配信する"
        explanation: "正しい。Amazon EventBridgeはクロスアカウントのイベントルーティングをサポートしており、イベント駆動で中央アカウントのイベントバスにイベントを集約できる。Data Firehoseと組み合わせることで効率的にS3へ配信可能である。"
      - id: "b"
        text: "各アカウントでAWS Glueジョブをスケジュール実行し、中央アカウントのS3にデータを書き込む"
        explanation: "GlueジョブはバッチETLであり、リアルタイムに近い集約には適さない。またクロスアカウントの権限管理も複雑になる。"
      - id: "c"
        text: "各アカウントのCloudTrailログを直接中央アカウントのS3バケットに配信する設定のみを行う"
        explanation: "CloudTrailは直接S3に配信可能だが、VPCフローログ等の他のイベントデータを統一的に処理する柔軟性に欠ける。"
      - id: "d"
        text: "各アカウントでAWS Lambda関数を定期実行し、ログをS3にコピーする"
        explanation: "Lambda関数の定期実行ではリアルタイムに近い集約は実現困難であり、スケーラビリティの面でも課題がある。"
    answer: "a"

  - id: "aws-dae-it-014"
    text: "ある企業は、Amazon S3のデータレイクにあるデータをApache Iceberg形式のテーブルとして管理したい。ACID トランザクションとタイムトラベルクエリのサポートが必要である。AWS Glue ETLジョブでIcebergテーブルへの書き込みを実装する場合、最も適切な構成はどれか。"
    choices:
      - id: "a"
        text: "AWS Glue 5.0以降を使用し、Icebergコネクタを設定してGlueデータカタログをIcebergカタログとして利用する"
        explanation: "正しい。AWS Glue 5.0以降はApache Icebergをネイティブにサポートしており、GlueデータカタログをIcebergカタログとして使用できる。Glue 5.1ではIceberg 1.10.0をサポートし、フォーマットバージョン3.0（削除ベクター、デフォルトカラム値等）にも対応している。"
      - id: "b"
        text: "AWS Glue 3.0でカスタムJARファイルとしてIcebergライブラリを追加し、S3をカタログとして使用する"
        explanation: "古いバージョンのGlueでカスタムJARを使用する方法は可能だが、Glue 5.0以降のネイティブサポートと比較して管理が煩雑であり推奨されない。"
      - id: "c"
        text: "Amazon EMRでIcebergテーブルを作成し、GlueジョブからEMRクラスターに接続する"
        explanation: "GlueジョブからEMRクラスターに接続する構成は一般的ではなく、不必要に複雑である。Glue自体がIcebergをサポートしている。"
      - id: "d"
        text: "Amazon AthenaでIcebergテーブルを作成し、GlueジョブでAthenaのAPIを呼び出してデータを書き込む"
        explanation: "AthenaのAPIを経由した書き込みはGlue ETLジョブの直接的なIcebergサポートと比較してパフォーマンスと効率性に劣る。"
    answer: "a"

  - id: "aws-dae-it-015"
    text: "データエンジニアは、Amazon MSKトピックからリアルタイムでデータを消費し、複数のAWSサービス（Step Functions、SQS、API Gateway）にイベントを配信したい。フィルタリングと変換を適用した上で、コードを書かずに実現するために最も適切なサービスはどれか。"
    choices:
      - id: "a"
        text: "Amazon EventBridge Pipes"
        explanation: "正しい。EventBridge PipesはAmazon MSKをソースとしてサポートし、フィルタリング、変換（入力トランスフォーマー）、エンリッチメントを適用した上で、Step Functions、SQS、API Gateway等のターゲットにイベントを配信できる。コードレスでポイントツーポイント統合を実現する。"
      - id: "b"
        text: "AWS Lambda関数でMSKトピックをコンシュームし、各サービスにイベントを配信する"
        explanation: "LambdaでMSKのコンシューマーを実装できるが、フィルタリング・変換ロジックのコーディングが必要であり、コードを書かないという要件に合致しない。"
      - id: "c"
        text: "Amazon Data Firehoseを使用してMSKトピックからデータを消費し、各サービスに配信する"
        explanation: "Data FirehoseはMSKからデータを消費できるが、配信先はS3、Redshift、OpenSearch等に限られ、Step FunctionsやSQSへの直接配信はサポートしていない。"
      - id: "d"
        text: "Amazon MSKコネクトでカスタムコネクタを設定する"
        explanation: "MSK Connectはシンクコネクタを使用してデータを外部システムに配信できるが、Step FunctionsやSQSへの標準コネクタは限定的であり、EventBridge Pipesの方がこのユースケースに適している。"
    answer: "a"

  - id: "aws-dae-it-016"
    text: "ある企業は、オンプレミスのデータセンターに保存された150TBのデータをAmazon S3に移行する必要がある。データセンターのインターネット接続帯域は100Mbpsであり、ネットワーク経由の転送では数週間かかる見込みである。移行期間を最短にするために最も適切なソリューションはどれか。"
    choices:
      - id: "a"
        text: "AWS Direct Connectの10Gbps専用接続を設定し、S3へデータを転送する"
        explanation: "Direct Connectの設定には数週間から数ヶ月を要するため、移行期間を最短にするという要件には適さない。また150TBの転送にもなお相当の時間がかかる。"
      - id: "b"
        text: "AWS Snowball Edge Storage Optimized 210TBデバイスを注文し、オンプレミスでデータをコピーしてAWSに返送する"
        explanation: "正しい。Snowball Edge Storage Optimized 210TBデバイスは最大210TBのストレージ容量を持ち、NVMeストレージにより最大1.5GB/秒のデータコピー速度を実現する。150TBのデータは1台のデバイスに収まり、物理的な輸送によりネットワーク帯域の制約を回避できるため、移行期間を大幅に短縮できる。"
      - id: "c"
        text: "AWS DataSyncエージェントをオンプレミスにインストールし、既存のインターネット接続経由でS3に転送する"
        explanation: "DataSyncはデータ転送を最適化するが、100Mbpsの帯域では150TBの転送に依然として数週間かかる。ネットワーク帯域がボトルネックである場合の根本的な解決にはならない。"
      - id: "d"
        text: "Amazon S3 Transfer Accelerationを有効化し、既存のインターネット接続経由で転送を高速化する"
        explanation: "S3 Transfer AccelerationはCloudFrontのエッジロケーションを経由して転送を高速化するが、元のインターネット帯域が100Mbpsという制約は変わらず、150TBの転送時間を劇的に短縮することはできない。"
    answer: "b"

  - id: "aws-dae-it-017"
    text: "ある企業は、オンプレミスのNFSファイルサーバーに蓄積された数百万件のファイルをAmazon S3に定期的に同期する必要がある。転送は暗号化され、帯域幅の制御が可能で、変更されたファイルのみを効率的に転送したい。最も適切なサービスはどれか。"
    choices:
      - id: "a"
        text: "AWS DataSyncエージェントをオンプレミスにデプロイし、NFSサーバーからS3へのタスクを構成する"
        explanation: "正しい。AWS DataSyncはオンプレミスのNFS/SMBストレージからS3への高速データ転送をフルマネージドで提供する。TLSによるインフライト暗号化、帯域幅スロットリング、変更ファイルのみの差分転送、スケジュール実行をサポートする。Enhanced modeでは数百万ファイル規模のデータセットにも対応し、並列処理による高いパフォーマンスを実現する。"
      - id: "b"
        text: "AWS CLIのS3 syncコマンドをcronジョブでスケジュール実行する"
        explanation: "S3 syncは差分転送が可能だが、大量ファイルの転送に最適化されていない。帯域幅制御やインフライト暗号化の管理を自前で実装する必要があり、運用負荷が高い。"
      - id: "c"
        text: "AWS Storage Gatewayのファイルゲートウェイを設置し、NFSインターフェースでS3にデータを格納する"
        explanation: "Storage GatewayのファイルゲートウェイはオンプレミスからS3へのアクセスを提供するが、大量のファイルを定期的に一括同期するユースケースにはDataSyncの方が適切である。ファイルゲートウェイはキャッシュベースのアクセスに最適化されている。"
      - id: "d"
        text: "AWS Transfer Familyを使用してSFTPサーバーを構築し、NFSサーバーからファイルを転送する"
        explanation: "Transfer FamilyはSFTP/FTPS/FTPによるファイル転送用であり、NFSストレージからの直接的な同期機能は提供しない。外部パートナーとのファイル受け渡しに適したサービスである。"
    answer: "a"

  - id: "aws-dae-it-018"
    text: "データエンジニアは、毎晩数万件の画像ファイルに対してサムネイル生成と機械学習モデルによる分類処理を行う必要がある。各ファイルの処理には1〜3分かかり、ジョブ間には依存関係がある。EC2 Spotインスタンスを活用してコストを最適化したい。最も適切なサービスはどれか。"
    choices:
      - id: "a"
        text: "AWS Batchでジョブ定義とジョブキューを作成し、Spotインスタンスを使用するコンピューティング環境を構成する"
        explanation: "正しい。AWS Batchは大規模バッチ処理に最適化されたフルマネージドサービスであり、ジョブ依存関係の定義、優先度キュー、EC2 Spotインスタンスの自動活用をサポートする。需要に応じてコンピューティングリソースを自動スケーリングし、ジョブ完了後にリソースを解放するためコスト効率が高い。"
      - id: "b"
        text: "AWS Lambda関数で各ファイルの処理を実装し、Step Functionsでオーケストレーションする"
        explanation: "Lambda関数は実行時間の上限が15分であり1〜3分の処理には対応できるが、数万件の並列実行ではLambdaの同時実行数制限に達する可能性がある。またSpotインスタンスによるコスト最適化はLambdaでは実現できない。"
      - id: "c"
        text: "AWS Glue ETLジョブで画像処理を実装する"
        explanation: "Glue ETLジョブはApache Sparkベースのデータ変換に最適化されており、個別の画像ファイル処理やML推論のようなワークロードには適さない。Spotインスタンスの直接的な制御も限定的である。"
      - id: "d"
        text: "Amazon EMRクラスターでSparkジョブとして画像処理を実装する"
        explanation: "EMRで画像処理は可能だが、クラスターの管理が必要であり、個別ファイル単位の処理とジョブ依存関係の管理にはAWS Batchの方が適切である。"
    answer: "a"

  - id: "aws-dae-it-019"
    text: "ある企業は、データ変換パイプラインをDockerコンテナとして実装しており、オンプレミスのKubernetesクラスターで運用している。このパイプラインをAWSに移行し、Kubernetesのエコシステム（Helm、Operators等）を引き続き活用しつつ、コントロールプレーンの管理負荷を軽減したい。最も適切なサービスはどれか。"
    choices:
      - id: "a"
        text: "Amazon ECSでFargateを使用してコンテナを実行する"
        explanation: "ECS+FargateはコンテナのサーバーレスでKubernetesの管理負荷は排除できるが、Helm、Operators等のKubernetesエコシステムは利用できない。Kubernetesのエコシステムを活用するという要件に合致しない。"
      - id: "b"
        text: "Amazon EKSを使用し、マネージドノードグループまたはFargateでワーカーノードを運用する"
        explanation: "正しい。Amazon EKSはKubernetes互換のフルマネージドサービスであり、コントロールプレーンの管理をAWSに委任できる。Helm、Operators等のKubernetesエコシステムをそのまま活用でき、マネージドノードグループやFargateを利用することでワーカーノードの管理負荷も軽減可能である。既存のKubernetesマニフェストやCI/CDパイプラインの最小限の変更で移行できる。"
      - id: "c"
        text: "AWS Batchを使用してDockerコンテナのバッチジョブとして実行する"
        explanation: "AWS BatchはDockerコンテナをサポートするが、Kubernetesのエコシステム（Helm、Operators等）は利用できない。バッチ処理向けのサービスであり、Kubernetesベースの継続的なパイプラインには適さない。"
      - id: "d"
        text: "Amazon EC2上にKubernetesクラスターを自前で構築する"
        explanation: "EC2上にKubernetesを自前構築すればエコシステムは活用できるが、コントロールプレーンの管理負荷を軽減するという要件に合致しない。EKSの方が管理負荷を大幅に軽減できる。"
    answer: "b"

  - id: "aws-dae-it-020"
    text: "データエンジニアは、Amazon Managed Service for Apache Flinkを使用してKinesis Data Streamsからのストリームデータを処理している。各レコードを正確に1回だけ処理（Exactly-once）する必要があり、複数のコンシューマーアプリケーションがそれぞれ独立したスループットでデータを読み取る必要がある。最も適切な構成はどれか。"
    choices:
      - id: "a"
        text: "Kinesis Data Streamsの拡張ファンアウトコンシューマーを各アプリケーションに登録し、FlinkのチェックポイントでExactly-onceセマンティクスを有効にする"
        explanation: "正しい。拡張ファンアウト（EFO）はコンシューマーごとにシャードあたり2MB/秒の専用読み取りスループットを提供し、複数コンシューマーが互いに影響を与えずにデータを読み取れる。FlinkのKinesisStreamsSourceはExactly-onceセマンティクスをサポートしており、チェックポイントメカニズムと組み合わせることで各レコードが正確に1回処理されることを保証する。EFOはHTTP/2プッシュモデルにより約65%のレイテンシ削減も実現する。"
      - id: "b"
        text: "Kinesis Data Streamsの標準コンシューマーを使用し、各アプリケーションでGetRecords APIを呼び出す"
        explanation: "標準コンシューマーではシャードあたり2MB/秒の読み取りスループットを全コンシューマーで共有するため、複数アプリケーションが独立したスループットで読み取ることはできない。コンシューマー数が増えると各アプリケーションの実効スループットが低下する。"
      - id: "c"
        text: "Kinesis Data Streamsのシャード数を増やし、At-least-onceセマンティクスで処理した後にアプリケーション側で重複排除を行う"
        explanation: "シャード数の増加は全体のスループットを向上させるが、コンシューマー間の独立したスループットの問題は解決しない。またアプリケーション側での重複排除は開発・運用負荷が高く、Flinkの組み込みExactly-once機能を使用すべきである。"
      - id: "d"
        text: "Amazon Data Firehoseでデータを受信し、各アプリケーション用のS3パスにデータを分配する"
        explanation: "Data Firehoseはリアルタイムストリーム処理ではなくデータ配信サービスであり、Exactly-onceのストリーム処理や複数コンシューマーの独立読み取りという要件には適さない。"
    answer: "a"

  - id: "aws-dae-it-021"
    text: "ある機械学習チームは、ETLパイプラインで生成した特徴量をオンライン推論とバッチ学習の両方で再利用したい。特徴量はリアルタイムで更新される場合とバッチで更新される場合がある。特徴量の一元管理と低レイテンシーのオンライン読み取りを実現するために最も適切なアーキテクチャはどれか。"
    choices:
      - id: "a"
        text: "Amazon SageMaker Feature Storeのオンラインストアとオフラインストアを構成し、AWS GlueジョブからFeature Storeに特徴量を書き込む"
        explanation: "正しい。SageMaker Feature Storeはオンラインストア（低レイテンシー読み取り用）とオフラインストア（バッチ学習用、S3に自動保存）の二重ストアを提供する。Glue ETLジョブやSageMaker Processing JobからPutRecord APIやバッチインジェストで特徴量を書き込める。Feature Processor SDKにより特徴量変換パイプラインの自動化も可能である。特徴量のバージョン管理とタイムスタンプ付きの履歴データも保持される。"
      - id: "b"
        text: "Amazon DynamoDBに特徴量を格納し、S3にもバッチ学習用のコピーをエクスポートする"
        explanation: "DynamoDBは低レイテンシーの読み取りが可能だが、特徴量の一元管理、バージョン管理、ML学習パイプラインとの統合はSageMaker Feature Storeの方が優れている。二重管理の運用負荷も生じる。"
      - id: "c"
        text: "Amazon ElastiCache for Redisに特徴量をキャッシュし、バッチ学習時にはRedisからデータを読み出す"
        explanation: "ElastiCacheは低レイテンシーのキャッシュとして有効だが、特徴量のオフラインストア（履歴管理・バッチ学習用）の機能を持たない。SageMaker Feature Storeのような特徴量管理の統合機能も提供しない。"
      - id: "d"
        text: "Amazon Redshiftに特徴量テーブルを作成し、オンライン推論時にRedshift Data APIで読み取る"
        explanation: "Redshiftは分析用データウェアハウスであり、リアルタイム推論に必要なミリ秒レベルの低レイテンシー読み取りには適さない。Redshift Data APIは非同期実行であるためレイテンシーが高い。"
    answer: "a"

  - id: "aws-dae-it-022"
    text: "ある企業は、Amazon S3に蓄積されたPDF文書や画像ファイルから構造化データを自動抽出し、データレイクに取り込むパイプラインを構築したい。文書のレイアウトは多様であり、スキーマ駆動型の抽出と検証を行った上で、下流のAI/分析ワークロードにデータを提供する必要がある。最も適切なアプローチはどれか。"
    choices:
      - id: "a"
        text: "Amazon Textractで文書からテキストを抽出し、AWS Lambda関数でカスタム解析ロジックを実装する"
        explanation: "Textractはテキスト抽出に優れているが、多様なレイアウトの文書に対するスキーマ駆動型の構造化抽出にはカスタムロジックの開発負荷が高い。Bedrock Data Automationの方が包括的なソリューションを提供する。"
      - id: "b"
        text: "Amazon Bedrock Data Automationを使用し、スキーマ定義に基づいて文書・画像から構造化データを抽出し、S3に出力する"
        explanation: "正しい。Amazon Bedrock Data Automationは基盤モデルを活用して、文書・画像・音声・動画等の非構造化データからスキーマ駆動型の構造化データ抽出を自動化するサービスである。スキーマ定義に基づいた抽出と検証を行い、AI/分析ワークロードに即座に利用可能なデータを生成する。カスタムコードなしで多様なレイアウトの文書に対応できる。"
      - id: "c"
        text: "Amazon Comprehendでエンティティ抽出を行い、結果をGlue ETLジョブで構造化する"
        explanation: "Comprehendは自然言語処理によるエンティティ抽出が可能だが、PDF文書や画像のレイアウト解析やスキーマ駆動型の構造化抽出には対応していない。"
      - id: "d"
        text: "AWS Glue ETLジョブでPDFパーサーライブラリを使用し、データを手動で構造化する"
        explanation: "カスタムPDFパーサーの実装は可能だが、多様なレイアウトへの対応に膨大な開発工数が必要であり、Bedrock Data Automationの基盤モデルによる自動抽出と比較して柔軟性と精度に劣る。"
    answer: "b"

  - id: "aws-dae-it-023"
    text: "ある企業は、社内のマイクロサービスからリアルタイムでデータを収集し、Amazon Kinesis Data Streamsに投入するREST APIエンドポイントを構築したい。APIにはスロットリング、認証、レート制限が必要であり、インフラストラクチャの管理を最小限にしたい。最も適切なアーキテクチャはどれか。"
    choices:
      - id: "a"
        text: "Amazon API GatewayのREST APIを作成し、AWSサービスプロキシ統合でKinesis Data Streamsに直接データを送信する"
        explanation: "正しい。API GatewayのAWSサービスプロキシ統合を使用すると、Lambda関数を介さずにKinesis Data StreamsのPutRecord/PutRecords APIを直接呼び出せる。API Gatewayはスロットリング、APIキー認証、使用量プラン（レート制限）、IAM認証、Cognito認証等のセキュリティ機能を組み込みで提供する。Velocityテンプレートによるリクエスト/レスポンスのデータ変換も可能であり、サーバーレスでインフラ管理が不要である。"
      - id: "b"
        text: "Amazon API GatewayのREST APIを作成し、Lambda関数でリクエストを受け取ってKinesis Data Streamsに書き込む"
        explanation: "Lambda関数を介した構成は機能するが、AWSサービスプロキシ統合を使用すれば不要なLambdaのオーバーヘッドとコストを排除できる。インフラ管理の最小化という観点ではサービスプロキシ統合が優れている。"
      - id: "c"
        text: "Application Load Balancerの背後にEC2インスタンスでAPIサーバーを構築し、Kinesis Data Streamsに書き込む"
        explanation: "EC2インスタンスの管理が必要であり、インフラ管理を最小限にするという要件に合致しない。スロットリングやレート制限も自前で実装する必要がある。"
      - id: "d"
        text: "Amazon Data Firehoseの直接PUTエンドポイントを使用し、マイクロサービスから直接データを送信する"
        explanation: "Data FirehoseのHTTPエンドポイントは存在するが、API Gatewayが提供するスロットリング、認証、レート制限等のAPI管理機能は含まれない。またKinesis Data Streamsへの投入という要件にも合致しない。"
    answer: "a"

  - id: "aws-dae-it-024"
    text: "ある企業は、外部の取引先がSFTPプロトコルでファイルを送信するデータ取り込みパイプラインを構築したい。取引先はSFTP接続先のみを知っていればよく、送信されたファイルはAmazon S3に直接格納し、後続のETL処理を自動トリガーしたい。インフラストラクチャの管理を最小限にするために最も適切なアーキテクチャはどれか。"
    choices:
      - id: "a"
        text: "Amazon EC2上にSFTPサーバーを構築し、受信ファイルをS3にアップロードするスクリプトを実装する"
        explanation: "EC2上のSFTPサーバーは柔軟だが、サーバーの管理・パッチ適用・スケーリング・高可用性の確保が必要であり、インフラ管理の最小化という要件に合致しない。"
      - id: "b"
        text: "AWS Transfer FamilyでSFTPサーバーを作成し、S3をバックエンドストレージとして構成し、マネージドワークフローで後続処理をトリガーする"
        explanation: "正しい。AWS Transfer FamilyはSFTP/FTPS/FTPのフルマネージドサーバーを提供し、受信ファイルをAmazon S3に直接格納する。取引先は標準のSFTPクライアントで接続でき、AWSの知識は不要である。マネージドワークフロー（MFTW）により、ファイル受信時にコピー、タグ付け、暗号化解除等の後続処理を自動トリガーできる。さらにS3イベント通知と組み合わせてLambdaやStep FunctionsでETLパイプラインを起動することも可能である。"
      - id: "c"
        text: "Amazon API GatewayとLambda関数でファイルアップロードAPIを構築し、取引先にAPIキーを発行する"
        explanation: "REST API経由のファイルアップロードは可能だが、取引先がSFTPプロトコルを使用するという要件に合致しない。既存のSFTPワークフローの変更を取引先に強いることになる。"
      - id: "d"
        text: "Amazon S3の署名付きURLを取引先に提供し、直接S3にアップロードしてもらう"
        explanation: "署名付きURLはファイルアップロードに使用できるが、SFTPプロトコルの使用という要件を満たさない。取引先のシステム変更が必要であり、URLの有効期限管理も煩雑になる。"
    answer: "b"

  - id: "aws-dae-it-025"
    text: "ある企業は、複数のマイクロサービスから発生するイベントをAmazon S3のデータレイクに取り込むパイプラインを構築している。イベントは一時的なスパイクが発生する可能性があり、取り込み処理のスケーラビリティとメッセージの紛失防止が必要である。処理に失敗したイベントは後から再処理できるようにしたい。最も適切なアーキテクチャはどれか。"
    choices:
      - id: "a"
        text: "マイクロサービスからAmazon SQSキューにイベントを送信し、AWS Lambda関数のSQSイベントソースマッピングで処理してS3に書き込む。デッドレターキューを設定して処理失敗イベントを隔離する"
        explanation: "正しい。SQSはスパイク時のバッファとして機能し、メッセージの永続化により紛失を防止する。LambdaのSQSイベントソースマッピングはプロビジョンドモードにより最大20,000の同時実行、毎分1,000の同時実行追加が可能であり、高いスケーラビリティを持つ。DLQにより処理失敗イベントを隔離し、後から再処理できる。SQSの可視性タイムアウトとリトライにより、At-least-onceの配信保証も得られる。"
      - id: "b"
        text: "マイクロサービスからAmazon Kinesis Data Streamsにイベントを直接送信し、Lambda関数でコンシュームしてS3に書き込む"
        explanation: "Kinesis Data Streamsは有効だが、一時的なスパイクに対してはシャード数のスケーリングが必要であり、SQSほど柔軟にバッファリングできない。また処理失敗イベントの隔離と再処理にはDLQのようなシンプルな仕組みが標準では提供されない。"
      - id: "c"
        text: "マイクロサービスからAmazon SNSトピックにイベントをパブリッシュし、Lambda関数をサブスクライバーとして設定する"
        explanation: "SNSはファンアウトのパブリッシュ/サブスクライブモデルに適しているが、メッセージの永続化やバッファリング機能が限定的である。スパイク時にLambdaの同時実行数制限に達するとメッセージが失われる可能性がある。"
      - id: "d"
        text: "マイクロサービスからAmazon Data Firehoseに直接イベントを送信し、S3に配信する"
        explanation: "Data FirehoseはS3への配信に適しているが、個別イベントの処理失敗時のDLQベースの再処理メカニズムは提供しない。また配信前のカスタム変換処理はLambda関数の呼び出しに限られ、複雑なビジネスロジックの適用には制約がある。"
    answer: "a"
