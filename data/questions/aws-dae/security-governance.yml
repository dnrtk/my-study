questions:
  - id: "aws-dae-sg-001"
    text: "あるデータエンジニアリングチームが、Amazon S3に保存されたデータレイク内の個人識別情報（PII）を自動的に検出し、各バケットの機密度スコアを可視化したいと考えています。最も適切なAWSサービスはどれですか？"
    choices:
      - id: "a"
        text: "Amazon Macie"
        explanation: "正しい。Amazon Macieは機械学習とパターンマッチングを使用してS3バケット内の機密データ（PII、金融情報、認証情報など）を自動検出し、各バケットの機密度スコアを提供するインタラクティブなデータマップを生成する。"
      - id: "b"
        text: "Amazon GuardDuty"
        explanation: "不正解。GuardDutyは脅威検出サービスであり、悪意のあるアクティビティや不正な動作を検出するが、S3内のPII分類や機密度スコアリングは行わない。"
      - id: "c"
        text: "AWS Config"
        explanation: "不正解。AWS Configはリソースの構成変更を記録・評価するサービスであり、データ内容の機密データ検出機能は持たない。"
      - id: "d"
        text: "Amazon Inspector"
        explanation: "不正解。Amazon InspectorはEC2インスタンスやコンテナイメージの脆弱性を自動検出するサービスであり、S3データの機密情報分類には使用しない。"
    answer: "a"

  - id: "aws-dae-sg-002"
    text: "AWS Lake Formationにおいて、数千のデータアセットに対して効率的にアクセス制御を適用するために推奨されるアプローチはどれですか？"
    choices:
      - id: "a"
        text: "各テーブルに対して個別にIAMポリシーを作成する"
        explanation: "不正解。個別のIAMポリシーでは管理が煩雑になり、大規模な環境ではスケーラブルではない。"
      - id: "b"
        text: "LF-Tag（タグベースアクセス制御: TBAC）を使用してメタデータ属性に基づく権限を付与する"
        explanation: "正しい。LF-Tagベースのアクセス制御（TBAC）は、データアセットにメタデータタグを付与し、タグ値に基づいてアクセス権限を管理する。個別リソースではなくタグ単位で権限を制御するため、単一のポリシーで数千のデータアセットを効率的に管理できる。"
      - id: "c"
        text: "S3バケットポリシーで各テーブルのプレフィックスごとにアクセスを制御する"
        explanation: "不正解。S3バケットポリシーはストレージレベルの制御であり、Lake Formationのカラムレベル・行レベルのきめ細かいアクセス制御には不十分である。"
      - id: "d"
        text: "AWS Glue Data Catalogのリソースポリシーのみで管理する"
        explanation: "不正解。Glue Data Catalogリソースポリシーはカタログレベルの粗粒度な制御であり、テーブル・カラム単位の細粒度制御には適さない。"
    answer: "b"

  - id: "aws-dae-sg-003"
    text: "データパイプラインで使用するデータベース接続パスワードやAPIキーを安全に管理するために、定期的な自動ローテーション機能を備えたAWSサービスはどれですか？"
    choices:
      - id: "a"
        text: "AWS Systems Manager Parameter Store（SecureString）"
        explanation: "不正解。Parameter StoreのSecureStringはKMSで暗号化した値を保存できるが、組み込みの自動ローテーション機能は持たない。"
      - id: "b"
        text: "AWS KMS"
        explanation: "不正解。KMSは暗号鍵の管理と暗号化処理を行うサービスであり、シークレット（パスワード・APIキー）そのものの保存・ローテーションには使用しない。"
      - id: "c"
        text: "AWS Secrets Manager"
        explanation: "正しい。AWS Secrets Managerはデータベース認証情報やAPIキーなどのシークレットを安全に保存し、Lambda関数と連携した自動ローテーション機能を組み込みで提供する。RDS、Redshift、DocumentDBなどのネイティブローテーションもサポートする。"
      - id: "d"
        text: "AWS Certificate Manager"
        explanation: "不正解。Certificate ManagerはSSL/TLS証明書の管理サービスであり、データベースパスワードやAPIキーの管理には使用しない。"
    answer: "c"

  - id: "aws-dae-sg-004"
    text: "VPC内のプライベートサブネットで稼働するAmazon EMRクラスターから、パブリックインターネットを経由せずにAmazon S3にアクセスする最も安全な方法はどれですか？"
    choices:
      - id: "a"
        text: "NATゲートウェイを使用してS3にアクセスする"
        explanation: "不正解。NATゲートウェイはインターネットゲートウェイを経由するため、トラフィックがAWSネットワーク外を通過する可能性がある。"
      - id: "b"
        text: "S3のゲートウェイ型VPCエンドポイントを作成する"
        explanation: "正しい。S3のゲートウェイ型VPCエンドポイントを使用すると、トラフィックはAWSネットワーク内に留まり、パブリックインターネットを経由せずにS3にアクセスできる。追加コストも発生しない。"
      - id: "c"
        text: "S3バケットをパブリックアクセス可能に設定する"
        explanation: "不正解。バケットのパブリックアクセスはセキュリティリスクが極めて高く、推奨されない。"
      - id: "d"
        text: "VPCピアリングを設定してS3にアクセスする"
        explanation: "不正解。S3はマネージドサービスであり、VPCピアリングの対象とはならない。VPCピアリングはVPC間の接続に使用される。"
    answer: "b"

  - id: "aws-dae-sg-005"
    text: "AWS Glueジョブで処理するデータに社会保障番号やクレジットカード番号が含まれている場合、これらの機密データを検出してマスキングするための最も適切な方法はどれですか？"
    choices:
      - id: "a"
        text: "AWS Glueの機密データ検出機能を使用し、エンティティレベルのアクションでマスキングまたは暗号化を適用する"
        explanation: "正しい。AWS Glueの機密データ検出機能は50カ国以上・200種類以上の機密データ（SSN、クレジットカード番号、氏名、運転免許証番号など）を検出でき、エンティティレベルのアクション（リダクション、部分マスキングなど）を適用して保存前に保護できる。"
      - id: "b"
        text: "Amazon Comprehendで全レコードをNLPで解析し、別のLambda関数でマスキングする"
        explanation: "不正解。Comprehendは自然言語処理サービスとしてPII検出が可能だが、Glueジョブ内で直接統合する場合はGlue組み込みの機密データ検出機能を使用する方が効率的で運用負荷が低い。"
      - id: "c"
        text: "正規表現を手動で定義して各フィールドを個別にチェックする"
        explanation: "不正解。手動の正規表現は保守性が低く、国際的なフォーマットの違いや新しいデータタイプへの対応が困難であり、Glue組み込みの検出機能より劣る。"
      - id: "d"
        text: "Amazon Macieでデータを事前スキャンし、結果をGlueジョブに渡す"
        explanation: "不正解。MacieはS3バケットレベルの機密データ検出に適しているが、Glueジョブ内でのリアルタイムなレコード単位のマスキング処理には直接統合できない。"
    answer: "a"

  - id: "aws-dae-sg-006"
    text: "ある企業がAmazon Redshiftクラスターの保存データ（at rest）をカスタマー管理キー（CMK）で暗号化することを求められています。暗号鍵のローテーションスケジュールを企業側で完全に制御するために使用すべきサービスはどれですか？"
    choices:
      - id: "a"
        text: "AWS KMSのカスタマー管理キー（Customer Managed Key）"
        explanation: "正しい。AWS KMSのカスタマー管理キーを使用すると、鍵ポリシー、ローテーションスケジュール（自動ローテーションの有効/無効、期間設定）、アクセス権限をすべて企業側で完全に制御できる。RedshiftはKMS CMKによる保存時暗号化をネイティブサポートする。"
      - id: "b"
        text: "AWS KMSのAWSマネージドキー"
        explanation: "不正解。AWSマネージドキーはAWSが管理し、ローテーションスケジュールをユーザーが制御することはできない。AWSが自動的にローテーションを行う。"
      - id: "c"
        text: "Amazon S3のSSE-S3暗号化"
        explanation: "不正解。SSE-S3はS3固有の暗号化方式であり、Redshiftクラスターの保存データ暗号化には使用できない。また鍵管理もAWSが行う。"
      - id: "d"
        text: "AWS CloudHSM"
        explanation: "不正解。CloudHSMはハードウェアセキュリティモジュールで高度な鍵管理が可能だが、要件がローテーションスケジュールの制御のみであればKMS CMKで十分であり、CloudHSMは過剰でコストも高い。"
    answer: "a"

  - id: "aws-dae-sg-007"
    text: "データエンジニアが、AWS CloudTrailを使用してデータレイクへのアクセスを監査しています。S3バケット内のオブジェクトレベルのAPI操作（GetObject、PutObjectなど）を記録するために必要な設定はどれですか？"
    choices:
      - id: "a"
        text: "CloudTrailの管理イベント記録を有効にする"
        explanation: "不正解。管理イベントはリソースの作成・削除・変更などの管理操作を記録するが、S3オブジェクトレベルのデータ操作（GetObject、PutObjectなど）は記録しない。"
      - id: "b"
        text: "CloudTrailのデータイベント記録で対象S3バケットを指定して有効にする"
        explanation: "正しい。CloudTrailのデータイベント記録を有効にし、対象のS3バケットを指定することで、GetObject、PutObject、DeleteObjectなどのオブジェクトレベルのAPI操作を記録できる。データイベントはデフォルトでは無効であり、明示的に設定が必要である。"
      - id: "c"
        text: "S3サーバーアクセスログを有効にする"
        explanation: "不正解。S3サーバーアクセスログはバケットへのアクセスを記録するが、CloudTrailのデータイベントとは異なる仕組みであり、CloudTrailによる監査統合やEventBridge連携には使えない。"
      - id: "d"
        text: "AWS Configルールでオブジェクトアクセスを監視する"
        explanation: "不正解。AWS Configはリソースの構成変更を記録するサービスであり、個々のオブジェクトレベルのAPIコール記録には対応していない。"
    answer: "b"

  - id: "aws-dae-sg-008"
    text: "ある組織がAWS Lake Formationを使用してデータレイクを管理しています。特定のユーザーグループに対して、テーブル内の給与カラムを非表示にしつつ、他のカラムへのアクセスは許可したいと考えています。最も適切な方法はどれですか？"
    choices:
      - id: "a"
        text: "Lake Formationのカラムレベルセキュリティで給与カラムを除外した権限を付与する"
        explanation: "正しい。Lake Formationはカラムレベルセキュリティをネイティブにサポートしており、特定のプリンシパルに対して特定のカラムを非表示にしながら、テーブルの残りのカラムへのアクセスを許可できる。機密フィールドと非機密フィールドが混在するデータセットに最適である。"
      - id: "b"
        text: "給与カラムを含まないビューをAthenaで作成し、そのビューのみへのアクセスを許可する"
        explanation: "不正解。Athenaビューを使った制御は可能だが、Lake Formationのネイティブ機能を使わないため、一貫したガバナンスの適用が困難であり、Redshift SpectrumやEMRからのアクセスには対応できない。"
      - id: "c"
        text: "S3上のデータファイルから給与カラムを物理的に分離して別バケットに保存する"
        explanation: "不正解。データの物理的分離はETLの複雑化とデータ管理コストの増大を招き、論理的なアクセス制御に比べて非効率的である。"
      - id: "d"
        text: "IAMポリシーでGlue Data CatalogのGetTable APIを制限する"
        explanation: "不正解。IAMポリシーでGetTableを制限するとテーブル全体へのアクセスが制限され、カラム単位の細粒度な制御はできない。"
    answer: "a"

  - id: "aws-dae-sg-009"
    text: "データパイプラインにおいて、Amazon S3からAmazon Redshiftへデータを転送する際の転送中（in transit）の暗号化を確保するために、最も適切な方法はどれですか？"
    choices:
      - id: "a"
        text: "S3バケットポリシーでaws:SecureTransport条件キーを使用してHTTPSを強制し、RedshiftのCOPYコマンドでSSL接続を使用する"
        explanation: "正しい。S3バケットポリシーでaws:SecureTransport条件キーをfalseの場合にDenyすることでHTTPS接続を強制できる。また、RedshiftのCOPYコマンドはデフォルトでSSLを使用してS3からデータを取得するため、転送中の暗号化が確保される。"
      - id: "b"
        text: "S3のSSE-KMSを有効にする"
        explanation: "不正解。SSE-KMSは保存時（at rest）の暗号化であり、転送中（in transit）の暗号化とは関係がない。"
      - id: "c"
        text: "Redshiftクラスターの暗号化を有効にする"
        explanation: "不正解。Redshiftクラスターの暗号化は保存時の暗号化であり、S3からRedshiftへのデータ転送中の暗号化を保証するものではない。"
      - id: "d"
        text: "AWS PrivateLinkのみを設定する"
        explanation: "不正解。PrivateLinkはトラフィックをAWSネットワーク内に留めるが、それ自体が転送中の暗号化（TLS/SSL）を強制するわけではない。暗号化にはSSL/TLS設定が別途必要である。"
    answer: "a"

  - id: "aws-dae-sg-010"
    text: "ある企業がGDPR準拠のために、データレイクに保存された個人データが特定のAWSリージョン（eu-west-1）内にのみ存在することを保証する必要があります。最も適切なアプローチはどれですか？"
    choices:
      - id: "a"
        text: "S3バケットのクロスリージョンレプリケーションを無効にし、SCPで許可リージョンを制限し、AWS Configルールで準拠を監視する"
        explanation: "正しい。SCPで組織レベルでリソース作成を許可するリージョンを制限し、S3クロスリージョンレプリケーションを無効化し、AWS Configルールで構成の準拠を継続的に監視する多層的なアプローチがGDPRのデータ残留要件を最も確実に満たす。"
      - id: "b"
        text: "S3バケットのバージョニングを有効にする"
        explanation: "不正解。バージョニングはオブジェクトの世代管理機能であり、データのリージョン制限とは無関係である。"
      - id: "c"
        text: "IAMポリシーで各ユーザーにリージョン条件を付与する"
        explanation: "不正解。IAMポリシーでの個別制御は管理が煩雑であり、組織全体の統制にはSCPの方が適切である。また、サービスリンクロールなどの間接アクセスを防げない。"
      - id: "d"
        text: "Amazon Macieでリージョン外のデータを検出する"
        explanation: "不正解。MacieはS3内の機密データ検出サービスであり、リージョン間のデータ移動を防止する機能は持たない。検出は可能でも予防的制御にはならない。"
    answer: "a"

  - id: "aws-dae-sg-011"
    text: "AWS Glue Data Catalogに保存されたメタデータ（データベース定義、テーブル定義、接続パスワード）を保存時に暗号化するために使用する機能はどれですか？"
    choices:
      - id: "a"
        text: "Glue Data Catalogの暗号化設定でKMSキーを指定して暗号化を有効にする"
        explanation: "正しい。AWS Glue Data Catalogの暗号化設定を有効にすると、データベース、テーブル、パーティション、接続情報（パスワード含む）、ユーザー定義関数などのカタログオブジェクトがKMSキーで暗号化される。"
      - id: "b"
        text: "Glueジョブのセキュリティ設定でS3暗号化を有効にする"
        explanation: "不正解。Glueジョブのセキュリティ設定のS3暗号化は、ジョブの入出力データやジョブブックマーク等のS3上のデータを暗号化するものであり、Data Catalogのメタデータ暗号化とは別の機能である。"
      - id: "c"
        text: "S3バケットのデフォルト暗号化を有効にする"
        explanation: "不正解。S3バケットの暗号化はS3に保存されるオブジェクトに対する暗号化であり、Glue Data Catalog内部のメタデータには適用されない。"
      - id: "d"
        text: "IAMポリシーでData Catalogへのアクセスを制限する"
        explanation: "不正解。IAMポリシーはアクセス制御であり、暗号化機能ではない。アクセス制御と暗号化は異なるセキュリティレイヤーである。"
    answer: "a"

  - id: "aws-dae-sg-012"
    text: "パブリックインターネットに公開されたWebアプリケーション経由でデータAPIを提供している環境において、SQLインジェクションやクロスサイトスクリプティング（XSS）からAPIを保護するために最も適切なサービスはどれですか？"
    choices:
      - id: "a"
        text: "AWS Shield Standard"
        explanation: "不正解。Shield StandardはDDoS攻撃からの保護を提供するが、SQLインジェクションやXSSなどのアプリケーションレイヤー攻撃には対応しない。"
      - id: "b"
        text: "AWS WAF"
        explanation: "正しい。AWS WAF（Web Application Firewall）はSQLインジェクション、XSS、その他のアプリケーションレイヤー攻撃を検出・ブロックするルールを定義できる。マネージドルールグループにはSQLインジェクションやXSS対策が含まれており、API GatewayやALBに直接適用可能である。"
      - id: "c"
        text: "Amazon GuardDuty"
        explanation: "不正解。GuardDutyは脅威検出サービスであり、ネットワークトラフィックやAPIコールの異常を検出するが、SQLインジェクションやXSSをリアルタイムでブロックする機能は持たない。"
      - id: "d"
        text: "セキュリティグループ"
        explanation: "不正解。セキュリティグループはIPアドレスとポート番号に基づくネットワークレベルのフィルタリングであり、HTTPリクエストの内容（SQLインジェクションやXSSペイロード）を検査する機能はない。"
    answer: "b"

  - id: "aws-dae-sg-013"
    text: "ある企業がAmazon Redshiftのデータを他のAWSアカウントと共有する必要があります。共有先アカウントがデータのコピーを作成せずにクエリを実行できるようにしつつ、きめ細かいアクセス制御を維持するための最も適切な方法はどれですか？"
    choices:
      - id: "a"
        text: "Redshiftデータ共有を使用し、共有先アカウントにデータ共有の読み取り権限を付与する"
        explanation: "正しい。Amazon Redshiftデータ共有機能により、データを物理的にコピーすることなくクラスター間・アカウント間でライブデータを共有できる。プロデューサー側でスキーマやテーブル単位の共有範囲を制御し、コンシューマー側ではデータベースとしてマウントしてクエリを実行できる。"
      - id: "b"
        text: "S3にデータをエクスポートし、クロスアカウントのバケットポリシーでアクセスを許可する"
        explanation: "不正解。S3エクスポートはデータのコピーを作成するため要件に反する。また、リアルタイムのデータ共有にはならない。"
      - id: "c"
        text: "AWS Glue Data Catalogのクロスアカウント共有を使用する"
        explanation: "不正解。Glue Data Catalogのクロスアカウント共有はメタデータの共有であり、Redshiftのデータに直接アクセスするための仕組みではない。"
      - id: "d"
        text: "VPCピアリングを設定して共有先アカウントからRedshiftに直接接続する"
        explanation: "不正解。VPCピアリングでの直接接続はネットワーク経路を確立するだけであり、データ共有のきめ細かいアクセス制御（テーブル・スキーマ単位）は提供しない。"
    answer: "a"

  - id: "aws-dae-sg-014"
    text: "データエンジニアがAWS Glue ETLジョブのセキュリティ設定を構成しています。ジョブが処理するデータの保存時暗号化と、ジョブ内のノード間通信の転送中暗号化の両方を有効にする必要があります。正しい設定の組み合わせはどれですか？"
    choices:
      - id: "a"
        text: "セキュリティ設定でS3暗号化モード（SSE-KMS）を指定し、CloudWatch Logs暗号化を有効にし、ジョブブックマーク暗号化を有効にする"
        explanation: "不正解。これらは保存時暗号化の設定のみであり、ジョブ内ノード間の転送中暗号化（TLS）が含まれていない。"
      - id: "b"
        text: "セキュリティ設定でS3暗号化とCloudWatch Logs暗号化を有効にし、さらにジョブパラメータで転送中暗号化（TLS）を有効にする"
        explanation: "不正解。転送中暗号化はジョブパラメータではなく、セキュリティ設定の一部として構成する。"
      - id: "c"
        text: "セキュリティ設定でS3暗号化（SSE-KMS）、CloudWatch Logs暗号化、ジョブブックマーク暗号化を有効にし、同じセキュリティ設定内で転送中暗号化（TLS）も有効にする"
        explanation: "正しい。AWS Glueのセキュリティ設定では、保存時暗号化（S3暗号化、CloudWatch Logs暗号化、ジョブブックマーク暗号化）と転送中暗号化（ノード間通信のTLS）をまとめて構成できる。これにより保存時と転送中の両方の暗号化要件を満たせる。"
      - id: "d"
        text: "VPC内でGlueジョブを実行すれば自動的にすべての暗号化が有効になる"
        explanation: "不正解。VPC内での実行はネットワーク分離を提供するが、暗号化設定は自動的には有効にならない。セキュリティ設定で明示的に構成する必要がある。"
    answer: "c"

  - id: "aws-dae-sg-015"
    text: "ある企業が複数のAWSアカウントにまたがるデータレイクを運用しており、Lake Formationを使用してクロスアカウントのデータアクセスを管理しています。プロデューサーアカウントのテーブルに対して、コンシューマーアカウントの特定のIAMロールにSELECT権限を付与する際に必要な手順の組み合わせとして正しいものはどれですか？"
    choices:
      - id: "a"
        text: "プロデューサー側でLake Formationの権限をコンシューマーアカウントに付与し、コンシューマー側でAWS RAMの共有招待を承諾し、コンシューマー側のLake Formationで該当IAMロールに権限を付与する"
        explanation: "正しい。Lake Formationのクロスアカウント共有では、プロデューサーがコンシューマーアカウントに権限を付与すると、AWS Resource Access Manager（RAM）を通じて共有が行われる。コンシューマー側でRAMの招待を承諾した後、コンシューマーのLake Formation管理者が自アカウント内のIAMロールに権限を委譲する必要がある。"
      - id: "b"
        text: "プロデューサー側でIAMクロスアカウントロールを作成し、コンシューマー側でAssumeRoleして直接アクセスする"
        explanation: "不正解。IAMクロスアカウントロールによる直接アクセスではLake Formationのきめ細かいアクセス制御（カラムレベル、行レベル）が適用されない。"
      - id: "c"
        text: "プロデューサー側のS3バケットポリシーにコンシューマーアカウントのプリンシパルを追加するだけでよい"
        explanation: "不正解。S3バケットポリシーのみではLake Formationのテーブル・カラムレベルの権限管理が機能せず、ガバナンスが維持できない。"
      - id: "d"
        text: "AWS Glue Data Catalogのリソースポリシーのみでクロスアカウントアクセスを許可する"
        explanation: "不正解。Glue Data Catalogリソースポリシーだけではカラムレベルや行レベルのきめ細かい権限制御ができず、Lake Formationとの統合的なガバナンスが適用されない。"
    answer: "a"

  - id: "aws-dae-sg-016"
    text: "ある大企業が、各事業部門（マーケティング、財務、物流）がそれぞれ自律的にデータを所有・管理しつつ、組織全体でのデータディスカバリとガバナンスを一元化するアーキテクチャを構築しようとしています。AWSでこのデータメッシュアーキテクチャを実現するために最も適切なサービスの組み合わせはどれですか？"
    choices:
      - id: "a"
        text: "各事業部門に個別のAWSアカウントを割り当て、AWS Lake FormationのLF-Tagベースアクセス制御とAWS Glue Data Catalogによるメタデータ管理を組み合わせ、クロスアカウント共有でデータプロダクトを公開する"
        explanation: "正しい。データメッシュではドメインごとにデータの所有権を持ち、データプロダクトとして公開する。AWSでは各ドメインに個別アカウントを割り当て、Lake FormationのLF-Tagで属性ベースの権限管理を行い、Glue Data Catalogでメタデータを一元管理し、クロスアカウント共有でドメイン間のデータ利用を実現する。これはAWS推奨のデータメッシュパターンである。"
      - id: "b"
        text: "単一のAWSアカウントにすべてのデータを集約し、IAMポリシーで事業部門ごとにアクセスを制御する"
        explanation: "不正解。単一アカウントへの集約は中央集権型のデータレイクアーキテクチャであり、各ドメインの自律性を重視するデータメッシュの原則に反する。"
      - id: "c"
        text: "Amazon Redshiftのデータ共有のみを使用して全事業部門のデータを共有する"
        explanation: "不正解。Redshiftデータ共有はRedshift内のデータに限定される。データメッシュでは多様なデータストア（S3、RDS、DynamoDBなど）を横断したガバナンスが必要であり、単一サービスでは不十分である。"
      - id: "d"
        text: "AWS DataSyncを使用して各事業部門のデータを中央バケットに定期同期する"
        explanation: "不正解。DataSyncはデータ転送サービスであり、中央バケットへの同期はデータの物理コピーを伴う。ドメイン所有権やセルフサーブのデータプロダクト公開というデータメッシュの要件を満たさない。"
    answer: "a"

  - id: "aws-dae-sg-017"
    text: "あるデータエンジニアリングチームが、外部の気象データプロバイダーからサードパーティデータを取得し、自社のデータレイクに統合したいと考えています。データのコピーを自社で管理することなく、常にプロバイダーが保持する最新データにアクセスできるようにするために最も適切な方法はどれですか？"
    choices:
      - id: "a"
        text: "AWS Data Exchange for Amazon S3を使用して、プロバイダーのS3バケットから直接データにアクセスする"
        explanation: "正しい。AWS Data Exchange for Amazon S3では、サブスクライバーがデータプロバイダーのS3バケットから直接データにアクセスできる。プロバイダーが保持する同一コピーを参照するため、常に最新データを取得でき、サブスクライバー側でデータコピーを作成・管理する必要がない。"
      - id: "b"
        text: "プロバイダーのAPIエンドポイントを直接呼び出すLambda関数を構築する"
        explanation: "不正解。独自のAPI統合は可能だが、認証管理、エラーハンドリング、サブスクリプション管理を自前で構築する必要があり、AWS Data Exchangeが提供するマネージドな仕組みに比べて運用負荷が高い。"
      - id: "c"
        text: "プロバイダーにS3バケットポリシーでクロスアカウントアクセスを設定してもらう"
        explanation: "不正解。直接のクロスアカウントアクセスでは利用条件の管理、課金、サブスクリプションのライフサイクル管理ができず、AWS Data Exchangeが提供するマーケットプレイス機能の恩恵を受けられない。"
      - id: "d"
        text: "AWS Glueクローラーでプロバイダーのデータソースを定期的にクロールする"
        explanation: "不正解。Glueクローラーはメタデータの検出ツールであり、外部プロバイダーのデータソースに直接アクセスする仕組みではない。データ取得とサブスクリプション管理の機能は持たない。"
    answer: "a"

  - id: "aws-dae-sg-018"
    text: "ある企業がデータガバナンスの一環として、S3データレイク上のデータがどのGlue ETLジョブで変換され、どのテーブルに書き込まれたかを追跡する必要があります。データリネージを実現するために最も適切なアプローチはどれですか？"
    choices:
      - id: "a"
        text: "AWS Glueジョブの実行ログをCloudWatch Logsで収集し、手動でリネージ情報を抽出する"
        explanation: "不正解。CloudWatch Logsからの手動抽出は非効率的であり、ジョブ間の依存関係やデータフローの全体像を体系的に把握することが困難である。"
      - id: "b"
        text: "Amazon DataZoneを使用してGlueジョブのリネージイベントを自動収集し、データリネージを可視化する"
        explanation: "正しい。Amazon DataZoneはAWS Glueジョブのリネージイベントを自動的に収集し、データの変換経路（ソース→変換→ターゲット）を可視化できる。Glue Data CatalogおよびLake Formationと統合され、メタデータとアクセス制御の情報と併せてリネージを一元管理できる。"
      - id: "c"
        text: "AWS CloudTrailのデータイベントでGlue APIコールを記録する"
        explanation: "不正解。CloudTrailはAPIコールの監査ログを提供するが、データレベルのリネージ（どのデータがどこから来てどこに行ったか）を追跡する機能は持たない。"
      - id: "d"
        text: "各Glueジョブのスクリプト内にカスタムメタデータをDynamoDBに書き込むロジックを追加する"
        explanation: "不正解。カスタム実装は可能だが、各ジョブに手動でロジックを追加する保守コストが高く、DataZoneのようなマネージドサービスによる自動収集に比べてスケーラビリティに劣る。"
    answer: "b"

  - id: "aws-dae-sg-019"
    text: "データレイクを運用する企業が、AWS Glue Data Catalogに登録された数百のテーブルに対して、データの機密度（高・中・低）とデータドメイン（顧客・財務・製品）をメタデータとして付与し、ユーザーが目的のデータセットを効率的に発見できるようにしたいと考えています。最も適切なアプローチはどれですか？"
    choices:
      - id: "a"
        text: "各テーブルのDescriptionフィールドに機密度とドメイン情報をフリーテキストで記載する"
        explanation: "不正解。フリーテキストでの記載は検索性が低く、表記揺れが発生しやすい。構造化されたタグに比べてフィルタリングや自動化による活用が困難である。"
      - id: "b"
        text: "Lake FormationのLF-Tagでclassification（高・中・低）とdomain（顧客・財務・製品）のタグキーを定義し、各テーブルに付与する"
        explanation: "正しい。LF-Tagはデータカタログのリソースに構造化されたメタデータを付与する機能であり、タグキーと値のペアでデータの属性を体系的に管理できる。タグによるフィルタリングでデータディスカバリが効率化されるだけでなく、同じタグをアクセス制御にも活用できるため、ガバナンスとディスカバリを統一的に管理できる。"
      - id: "c"
        text: "AWSリソースタグ（AWSタグ）をGlueテーブルに付与してコスト配分に使用する"
        explanation: "不正解。AWSリソースタグは課金管理や運用管理に適しているが、データカタログのメタデータとしてのディスカバリやLake Formationのアクセス制御には連携しない。LF-Tagとは目的が異なる。"
      - id: "d"
        text: "データベース名にドメインを、テーブル名に機密度をプレフィックスとして含める命名規則を定義する"
        explanation: "不正解。命名規則は補助的な手段としては有用だが、名前の変更が困難であり、機密度の変更時にテーブルの再作成が必要になるなど柔軟性に欠ける。"
    answer: "b"

  - id: "aws-dae-sg-020"
    text: "ある企業がAWS Organizationsを使用して複数のAWSアカウントを管理しています。開発チームのOU（組織単位）に属するアカウントで、Amazon S3バケットのパブリックアクセスを有効にすることと、S3バケットの暗号化を無効にすることを組織レベルで禁止したいと考えています。最も適切な予防的制御はどれですか？"
    choices:
      - id: "a"
        text: "AWS Configルールでs3-bucket-public-read-prohibitedとs3-bucket-server-side-encryption-enabledを設定し、非準拠リソースを検出する"
        explanation: "不正解。AWS Configルールは検出的制御であり、非準拠の設定変更そのものを防止することはできない。違反を検出した後に対応する事後的な仕組みである。"
      - id: "b"
        text: "各アカウントのIAMポリシーでS3のPutBucketPublicAccessBlockとPutEncryptionConfigurationを制限する"
        explanation: "不正解。個別アカウントのIAMポリシーはアカウント管理者によって変更可能であるため、組織レベルの強制力を持たない。"
      - id: "c"
        text: "開発チームのOUにSCP（サービスコントロールポリシー）を適用し、S3のパブリックアクセス設定の変更とサーバーサイド暗号化の無効化を拒否する"
        explanation: "正しい。SCPはOU内の全アカウントに対して上位の権限境界として機能し、個別アカウントの管理者であっても違反する操作を実行できない。s3:PutBucketPublicAccessBlockやs3:PutEncryptionConfigurationなどの特定アクションを条件付きで拒否することで、パブリックアクセスの有効化や暗号化の無効化を組織レベルで予防できる。"
      - id: "d"
        text: "Amazon S3のアカウントレベルのパブリックアクセスブロック設定を各アカウントで手動で有効にする"
        explanation: "不正解。手動設定はアカウント管理者が解除可能であり、組織レベルの強制力がない。SCPと異なり、設定の変更自体を防止する仕組みではない。"
    answer: "c"

  - id: "aws-dae-sg-021"
    text: "金融機関がコンプライアンス要件（SEC 17a-4）を満たすため、Amazon S3に保存された取引記録を一定期間変更・削除できないようにする必要があります。ルートユーザーを含むすべてのユーザーによる削除を防止するために最も適切な設定はどれですか？"
    choices:
      - id: "a"
        text: "S3 Object Lockのコンプライアンスモードで保持期間を設定する"
        explanation: "正しい。S3 Object Lockのコンプライアンスモードでは、ルートユーザーを含むすべてのユーザーがオブジェクトの上書き・削除を行えず、保持期間の短縮も不可能である。WORM（Write Once Read Many）モデルを実現し、SEC 17a-4、CFTC、FINRAなどの金融規制に対応する。S3バージョニングが自動的に有効化される。"
      - id: "b"
        text: "S3 Object Lockのガバナンスモードで保持期間を設定する"
        explanation: "不正解。ガバナンスモードではs3:BypassGovernanceRetention権限を持つユーザーがロックを解除してオブジェクトを削除できるため、ルートユーザーを含む全ユーザーの削除を防止する要件を満たさない。"
      - id: "c"
        text: "S3バケットポリシーでs3:DeleteObject をすべてのプリンシパルに対してDenyする"
        explanation: "不正解。バケットポリシーはバケット所有者やルートユーザーが変更可能であるため、恒久的な不変性を保証できない。規制要件を満たす技術的強制力がない。"
      - id: "d"
        text: "S3バケットのMFA Deleteを有効にする"
        explanation: "不正解。MFA DeleteはバージョニングされたオブジェクトのDelete操作にMFA認証を必要とする機能であり、MFA認証を行えば削除可能である。完全な削除防止にはならない。"
    answer: "a"

  - id: "aws-dae-sg-022"
    text: "VPC内のプライベートサブネットで稼働するAmazon Redshift Serverlessから、AWS KMSとAWS Glue Data Catalogにパブリックインターネットを経由せずにアクセスする必要があります。最も適切な構成はどれですか？"
    choices:
      - id: "a"
        text: "NATゲートウェイを配置してKMSおよびGlueのパブリックエンドポイントにアクセスする"
        explanation: "不正解。NATゲートウェイはインターネットゲートウェイ経由でトラフィックを送出するため、パブリックインターネットを経由する。セキュリティ要件を満たさない。"
      - id: "b"
        text: "KMSおよびGlue用のインターフェイス型VPCエンドポイント（AWS PrivateLink）を作成する"
        explanation: "正しい。AWS KMSとAWS GlueはインターフェイスVPCエンドポイント（AWS PrivateLink）をサポートしている。VPCエンドポイントを作成すると、VPC内のリソースはAWSネットワーク内のプライベート接続を通じてこれらのサービスにアクセスでき、トラフィックがパブリックインターネットを通過しない。"
      - id: "c"
        text: "KMSおよびGlue用のゲートウェイ型VPCエンドポイントを作成する"
        explanation: "不正解。ゲートウェイ型VPCエンドポイントはAmazon S3とAmazon DynamoDBのみをサポートしている。KMSやGlueにはインターフェイス型VPCエンドポイント（PrivateLink）を使用する必要がある。"
      - id: "d"
        text: "Redshift ServerlessをVPCの外に配置してダイレクトコネクトでアクセスする"
        explanation: "不正解。Redshift Serverlessは指定されたVPC内で動作し、VPCの外に配置することはできない。Direct ConnectはオンプレミスとAWS間の接続であり、AWSサービス間の接続には使用しない。"
    answer: "b"

  - id: "aws-dae-sg-023"
    text: "ある企業がAmazon QuickSightを使用して売上ダッシュボードを全国の営業マネージャーに提供しています。各マネージャーが自分の担当地域のデータのみを閲覧でき、かつ全マネージャーに対して顧客の個人連絡先カラムを非表示にする必要があります。最も適切な設定の組み合わせはどれですか？"
    choices:
      - id: "a"
        text: "行レベルセキュリティ（RLS）で地域カラムに基づくユーザーベースルールを定義し、カラムレベルセキュリティ（CLS）で個人連絡先カラムへのアクセスを制限する"
        explanation: "正しい。QuickSightのRLSはユーザーベースルールのデータセットを定義し、各ユーザーまたはグループがアクセスできる行を地域カラムの値に基づいて制限できる。CLSは特定のカラムを指定したユーザーやグループから非表示にする。両機能を組み合わせることで、行単位とカラム単位の両方のアクセス制御を同一ダッシュボード上で実現できる。"
      - id: "b"
        text: "地域ごとに個別のダッシュボードを作成し、各マネージャーに対応するダッシュボードのみへのアクセスを許可する"
        explanation: "不正解。地域ごとの個別ダッシュボード作成はダッシュボードの増殖を招き、保守性が著しく低下する。また、カラムレベルの制御も別途必要となり、管理が煩雑になる。"
      - id: "c"
        text: "QuickSightの名前空間を地域ごとに分離し、データソースを個別に設定する"
        explanation: "不正解。名前空間の分離はマルチテナント環境での組織分離に使用するものであり、同一組織内の行レベルのアクセス制御には適さない。過剰な構成であり運用コストも高い。"
      - id: "d"
        text: "IAMポリシーでQuickSightのDescribeDashboard APIにリソース条件を付与して制御する"
        explanation: "不正解。IAMポリシーはダッシュボード自体へのアクセス制御であり、ダッシュボード内のデータ行やカラムの表示制御には対応しない。"
    answer: "a"

  - id: "aws-dae-sg-024"
    text: "あるデータウェアハウスチームが、Amazon Redshiftに保存された顧客テーブルのクレジットカード番号カラムに対して、一般アナリストには末尾4桁のみ表示し、コンプライアンスチームには完全な番号を表示したいと考えています。データの物理的な変換を行わずにこの要件を満たすために最も適切な方法はどれですか？"
    choices:
      - id: "a"
        text: "Redshiftの動的データマスキング（DDM）ポリシーを作成し、一般アナリストロールに部分マスキング関数を適用し、コンプライアンスチームロールにはマスキングなしのポリシーを適用する"
        explanation: "正しい。Redshiftの動的データマスキングでは、カラムに対してロールごとに異なるマスキングポリシーを適用できる。マスキング関数はSQL、Python、またはLambda UDFで定義でき、クエリ実行時に動的に適用されるため、元データを物理的に変換する必要がない。複数のポリシーに優先度を設定して競合を回避できる。"
      - id: "b"
        text: "クレジットカード番号を別テーブルに分離し、コンプライアンスチームのみにそのテーブルへのGRANT権限を付与する"
        explanation: "不正解。テーブル分離は一般アナリストが末尾4桁も閲覧できなくなるため要件を満たさない。また、テーブル間のJOINが必要となり、クエリの複雑化を招く。"
      - id: "c"
        text: "一般アナリスト向けにマスキング済みのビューを作成し、コンプライアンスチームには元テーブルへのアクセスを許可する"
        explanation: "不正解。ビューベースのアプローチは可能だが、ロールごとに参照先を切り替える運用が必要となり、DDMに比べて管理が煩雑である。新たなロールの追加時にビューの再作成も必要となる。"
      - id: "d"
        text: "AWS Glue ETLジョブでマスキング済みデータを別テーブルに出力し、一般アナリストにはそのテーブルのみを公開する"
        explanation: "不正解。ETLジョブによるマスキングはデータの物理的な変換を伴うため要件に反する。データの二重管理やリアルタイム性の欠如も課題となる。"
    answer: "a"

  - id: "aws-dae-sg-025"
    text: "ある企業がデータレイクのコンプライアンス要件として、すべてのAmazon S3バケットでサーバーサイド暗号化が有効であること、Amazon Redshiftクラスターで監査ログが有効であること、およびAmazon RDSインスタンスで暗号化が有効であることを継続的に監視し、非準拠リソースを自動的に検出したいと考えています。最も適切な方法はどれですか？"
    choices:
      - id: "a"
        text: "AWS Configのマネージドルール（s3-bucket-server-side-encryption-enabled、redshift-cluster-audit-logging、rds-storage-encrypted）を有効にし、コンフォーマンスパックとしてデプロイする"
        explanation: "正しい。AWS Configのマネージドルールは事前定義されたコンプライアンスチェックを提供し、リソースの構成変更を継続的に評価する。コンフォーマンスパックとして複数のルールをまとめてデプロイすることで、S3、Redshift、RDSにまたがるコンプライアンス要件を一元的に管理・監視できる。非準拠リソースはダッシュボードで可視化され、SNS通知やSystems Manager自動修復との連携も可能である。"
      - id: "b"
        text: "Amazon CloudWatchアラームを各リソースに設定して暗号化とログの状態を監視する"
        explanation: "不正解。CloudWatchアラームはメトリクスベースの監視であり、リソースの構成設定（暗号化の有効/無効、監査ログの設定）を直接評価する機能は持たない。"
      - id: "c"
        text: "AWS Trusted Advisorのチェック結果を定期的にレビューする"
        explanation: "不正解。Trusted Advisorはベストプラクティスのレコメンデーションを提供するが、カスタムコンプライアンスルールの定義や継続的な構成評価、自動修復との連携には対応していない。"
      - id: "d"
        text: "Lambda関数を定期実行してdescribe APIで各リソースの設定を確認する"
        explanation: "不正解。カスタムLambda関数での監視は可能だが、AWS Configのマネージドルールが提供する継続的評価、コンプライアンスダッシュボード、自動修復連携をすべて自前で実装する必要があり、運用負荷が過大である。"
    answer: "a"
