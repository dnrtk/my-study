questions:
  - id: "aws-dae-ds-001"
    text: "ある企業がAmazon S3上のデータレイクに大量のログデータを保存しています。データは最初の30日間は頻繁にアクセスされますが、その後90日間はたまにアクセスされ、1年後にはコンプライアンス要件のために7年間保持する必要がありますが、ほとんどアクセスされません。最もコスト効率の良いストレージ戦略はどれですか？"
    choices:
      - id: "a"
        text: "S3 Standard → S3 Standard-IA → S3 Glacier Deep Archiveへのライフサイクルポリシーを設定する"
        explanation: "正しい。頻繁なアクセスにはS3 Standard、低頻度アクセスにはS3 Standard-IA、長期保管にはS3 Glacier Deep Archiveが最もコスト効率が良い。ライフサイクルポリシーにより自動的にストレージクラスを移行できる。"
      - id: "b"
        text: "すべてのデータをS3 Intelligent-Tieringに保存する"
        explanation: "不正解。S3 Intelligent-Tieringはアクセスパターンが予測不能な場合に有効だが、この問題ではアクセスパターンが明確に定義されているため、明示的なライフサイクルポリシーの方がコスト効率が良い。また、Intelligent-Tieringにはモニタリング料金が発生する。"
      - id: "c"
        text: "S3 Standard → S3 One Zone-IA → S3 Glacier Flexible Retrievalへのライフサイクルポリシーを設定する"
        explanation: "不正解。S3 One Zone-IAは単一AZにしかデータを保存しないため、コンプライアンス要件のある長期保存データには適切ではない。可用性と耐久性の観点でリスクがある。"
      - id: "d"
        text: "すべてのデータをS3 Glacier Instant Retrievalに保存する"
        explanation: "不正解。最初の30日間は頻繁にアクセスされるため、Glacier Instant Retrievalのデータ取得コストが高くなる。アクセス頻度が高いデータにはS3 Standardが適している。"
    answer: "a"

  - id: "aws-dae-ds-002"
    text: "データエンジニアがAmazon Redshiftを使用して分析クエリを実行しています。大量のファクトテーブルに対するクエリのパフォーマンスを最適化するために、最も効果的な分散スタイルはどれですか？テーブルは主にJOIN操作で使用され、特定の日付列でフィルタリングされます。"
    choices:
      - id: "a"
        text: "KEY分散を使用し、JOIN条件で頻繁に使用される列を分散キーに設定する"
        explanation: "正しい。KEY分散は特定の列の値に基づいてデータを各ノードに分散する。JOIN条件で頻繁に使用される列を分散キーに設定することで、データのコロケーションが実現し、ネットワーク間のデータ移動を最小化してJOINパフォーマンスが向上する。"
      - id: "b"
        text: "ALL分散を使用して、すべてのノードにテーブル全体をコピーする"
        explanation: "不正解。ALL分散はすべてのノードにテーブル全体をコピーするため、小さなディメンションテーブルには適しているが、大量のファクトテーブルには不適切。ストレージコストが増大し、データ更新のオーバーヘッドも大きい。"
      - id: "c"
        text: "EVEN分散を使用して、ラウンドロビン方式でデータを均等に分散する"
        explanation: "不正解。EVEN分散はデータを均等に分散するが、JOIN操作時にデータの再分散が必要となるため、JOIN中心のワークロードではパフォーマンスが低下する。"
      - id: "d"
        text: "AUTO分散を使用して、Redshiftに最適な分散方式を自動選択させる"
        explanation: "不正解。AUTO分散はテーブルサイズに基づいて自動的にALLまたはEVEN分散を選択するが、特定のJOINパターンが明確な場合は、明示的にKEY分散を指定する方が最適なパフォーマンスを得られる。"
    answer: "a"

  - id: "aws-dae-ds-003"
    text: "データエンジニアがデータレイクにデータを格納するためのファイル形式を選定しています。大量の分析クエリを実行するワークロードで、特定の列のみを頻繁に参照するクエリパターンです。ストレージコストの削減とクエリパフォーマンスの両方を最適化するファイル形式はどれですか？"
    choices:
      - id: "a"
        text: "Apache Parquet"
        explanation: "正しい。Parquetは列指向フォーマットであり、特定の列のみを読み取るクエリでは不要な列をスキップでき、I/Oを大幅に削減する。また、列単位の圧縮により高い圧縮率を実現し、ストレージコストも削減できる。Snappy圧縮との組み合わせで分析クエリに最適。"
      - id: "b"
        text: "JSON"
        explanation: "不正解。JSONは行指向のテキストフォーマットであり、特定の列のみを読み取ることができない。圧縮効率も低く、大量データの分析クエリには不向き。"
      - id: "c"
        text: "CSV"
        explanation: "不正解。CSVは行指向のテキストフォーマットで、スキーマ情報を持たず、特定の列の選択的読み取りもできない。圧縮効率もParquetに劣る。"
      - id: "d"
        text: "Apache Avro"
        explanation: "不正解。Avroは行指向フォーマットであり、データのシリアライゼーションやスキーマ進化には優れているが、特定の列のみを参照する分析クエリではParquetほどのパフォーマンスは得られない。書き込み重視のワークロードに適している。"
    answer: "a"

  - id: "aws-dae-ds-004"
    text: "ある企業がAmazon DynamoDBテーブルのデータをAmazon Redshiftでニアリアルタイムに分析したいと考えています。ETLパイプラインの構築と管理のオーバーヘッドを最小限に抑えるソリューションはどれですか？"
    choices:
      - id: "a"
        text: "DynamoDB Streamsを使用してAWS Lambdaでデータを変換し、Amazon Redshiftにロードする"
        explanation: "不正解。この方法はETLパイプラインの構築と管理が必要であり、Lambda関数のコーディング、エラーハンドリング、スケーリングなどの運用オーバーヘッドが発生する。"
      - id: "b"
        text: "Amazon DynamoDBのzero-ETL統合を使用してAmazon Redshiftと連携する"
        explanation: "正しい。DynamoDBのzero-ETL統合により、ETLパイプラインを構築・管理することなく、DynamoDBのデータをRedshiftで直接分析できる。DynamoDBのRead Capacity Units (RCU)を消費せずにデータをレプリケーションでき、管理オーバーヘッドが最小限になる。"
      - id: "c"
        text: "AWS Glue ETLジョブを使用してDynamoDBからRedshiftにデータを定期的にロードする"
        explanation: "不正解。Glue ETLジョブはバッチ処理であり、ニアリアルタイムの要件を満たしにくい。また、ETLジョブの管理オーバーヘッドも発生する。"
      - id: "d"
        text: "Amazon Kinesis Data Streamsを使用してDynamoDBの変更をキャプチャし、Redshiftにストリーミングする"
        explanation: "不正解。この方法はKinesis Data StreamsとRedshiftストリーミングインジェストの構築・管理が必要であり、zero-ETL統合と比較して運用オーバーヘッドが大きい。"
    answer: "b"

  - id: "aws-dae-ds-005"
    text: "データエンジニアがAWS Glue Data Catalogを使用してデータレイクのメタデータを管理しています。複数のAWSアカウントからデータカタログにアクセスし、きめ細かいアクセス制御を実装する必要があります。最も適切なアプローチはどれですか？"
    choices:
      - id: "a"
        text: "各アカウントに個別のGlue Data Catalogを作成し、IAMポリシーでアクセスを制御する"
        explanation: "不正解。各アカウントに個別のカタログを作成すると、メタデータの一貫性を維持するのが困難になり、管理オーバーヘッドが増大する。"
      - id: "b"
        text: "AWS Lake Formationを使用して、クロスアカウント共有とカラムレベルのアクセス制御を設定する"
        explanation: "正しい。Lake Formationはクロスアカウントのデータ共有と、テーブルレベル、カラムレベル、行レベル、セルレベルのきめ細かいアクセス制御を提供する。Glue Data Catalogと統合されており、統一的なガバナンスフレームワークを実現できる。"
      - id: "c"
        text: "S3バケットポリシーとIAMロールを使用して、アカウント間のアクセスを制御する"
        explanation: "不正解。S3バケットポリシーはストレージレベルのアクセス制御であり、カラムレベルや行レベルのきめ細かいアクセス制御はできない。データカタログのメタデータ管理には不十分。"
      - id: "d"
        text: "AWS Resource Access Manager (RAM)を使用して、Glue Data Catalogリソースを共有する"
        explanation: "不正解。RAMは一部のAWSリソースの共有に使用できるが、Glue Data Catalogのきめ細かいカラムレベル・行レベルのアクセス制御にはLake Formationが必要。"
    answer: "b"

  - id: "aws-dae-ds-006"
    text: "ある企業がAmazon S3上のデータレイクでApache Icebergテーブルフォーマットを使用することを検討しています。AWS上でApache Icebergテーブルを最も効率的にフルマネージドで管理する方法はどれですか？"
    choices:
      - id: "a"
        text: "Amazon S3 Tablesを使用して、ビルトインのApache Icebergサポートでテーブルを管理する"
        explanation: "正しい。Amazon S3 Tablesはクラウドオブジェクトストアとして初めてApache Icebergをビルトインでサポートし、自己管理テーブルと比較して最大3倍のクエリスループットと10倍のトランザクション性能を実現する。コンパクションやスナップショット管理などのテーブルメンテナンスも自動的に実行される。"
      - id: "b"
        text: "Amazon EMRクラスター上でApache Spark + Icebergカタログを手動で管理する"
        explanation: "不正解。EMRクラスターの管理、Icebergカタログの設定、コンパクションなどのテーブルメンテナンスをすべて手動で管理する必要があり、運用オーバーヘッドが大きい。"
      - id: "c"
        text: "AWS Glue ETLジョブでIcebergテーブルの作成と管理を行う"
        explanation: "不正解。Glue ETLジョブでIcebergテーブルを操作することは可能だが、テーブルメンテナンス（コンパクション、スナップショット期限切れなど）を別途管理する必要があり、S3 Tablesほどフルマネージドではない。"
      - id: "d"
        text: "Amazon Athenaのみを使用してIcebergテーブルを作成・管理する"
        explanation: "不正解。AthenaでIcebergテーブルを作成・クエリすることは可能だが、テーブルの最適化やメンテナンスの自動化はS3 Tablesほど包括的ではない。"
    answer: "a"

  - id: "aws-dae-ds-007"
    text: "データエンジニアがAmazon S3上の大量のParquetファイルのクエリパフォーマンスを改善する必要があります。データは日時でパーティショニングされており、クエリは主に特定の日付範囲とcustomer_idでフィルタリングされます。追加の最適化として最も効果的な手法はどれですか？"
    choices:
      - id: "a"
        text: "ファイルサイズを1MB以下に細分化する"
        explanation: "不正解。ファイルサイズが小さすぎると、S3へのAPI呼び出し回数が増加し、オーバーヘッドが大きくなる。一般的に128MB～512MB程度のファイルサイズが推奨される。"
      - id: "b"
        text: "Parquetファイル内のcustomer_id列にソートキーを設定し、ファイルサイズを128MB～512MBに最適化する"
        explanation: "正しい。Parquetファイル内でcustomer_id列をソートすることで、行グループ内の統計情報（min/max値）が効果的になり、Predicate Pushdownによって不要な行グループをスキップできる。また、適切なファイルサイズ（128MB～512MB）にすることで、S3のAPI呼び出しオーバーヘッドと並列処理のバランスが最適化される。"
      - id: "c"
        text: "ParquetからCSVに変換してクエリする"
        explanation: "不正解。CSVは列指向ではないため、Predicate PushdownやColumn Pruningの恩恵を受けられず、ParquetよりI/O効率が悪い。"
      - id: "d"
        text: "Gzip圧縮を適用してファイルサイズを最小化する"
        explanation: "不正解。Gzip圧縮はファイルサイズを削減するが、分割不可能（non-splittable）なため並列処理ができない。Parquetファイルには通常Snappy圧縮が推奨され、圧縮率と処理速度のバランスが良い。"
    answer: "b"

  - id: "aws-dae-ds-008"
    text: "ある企業がグラフデータベースを使用して、ソーシャルネットワークの関係性データを管理・クエリしたいと考えています。AWSでフルマネージドのグラフデータベースサービスを使用する場合、最も適切なサービスはどれですか？"
    choices:
      - id: "a"
        text: "Amazon DynamoDB"
        explanation: "不正解。DynamoDBはキーバリューおよびドキュメントデータベースであり、グラフデータの関係性クエリには最適化されていない。"
      - id: "b"
        text: "Amazon Neptune"
        explanation: "正しい。Amazon Neptuneはフルマネージドのグラフデータベースサービスで、Property GraphとRDFの両方をサポートする。GremlinとSPARQLクエリ言語に対応し、ソーシャルネットワーク、レコメンデーション、不正検出などの関係性データのユースケースに最適化されている。"
      - id: "c"
        text: "Amazon DocumentDB"
        explanation: "不正解。DocumentDBはMongoDB互換のドキュメントデータベースであり、JSONドキュメントの保存に適しているが、グラフデータの複雑な関係性クエリには最適化されていない。"
      - id: "d"
        text: "Amazon OpenSearch Service"
        explanation: "不正解。OpenSearch Serviceはログ分析、全文検索、ダッシュボードに最適化されたサービスであり、グラフデータの関係性クエリには適していない。"
    answer: "b"

  - id: "aws-dae-ds-009"
    text: "データエンジニアがAmazon AuroraのトランザクションデータをニアリアルタイムでAmazon Redshiftに連携し、分析を行う必要があります。Aurora MySQL互換エディションを使用しており、ETLパイプラインの管理を最小化したいと考えています。最も適切なアプローチはどれですか？"
    choices:
      - id: "a"
        text: "Aurora MySQLのzero-ETL統合を使用してAmazon Redshiftと連携する"
        explanation: "正しい。Aurora MySQLのzero-ETL統合により、ETLパイプラインを構築・管理することなく、トランザクションデータをRedshiftに自動的にレプリケーションできる。1分あたり100万トランザクション以上の処理が可能で、p50レイテンシは15秒未満である。ワークフロー処理に対する追加料金は発生しない。"
      - id: "b"
        text: "AWS Database Migration Service (DMS)を使用して継続的レプリケーションを設定する"
        explanation: "不正解。DMSで継続的レプリケーションは可能だが、レプリケーションインスタンスの管理やマッピング設定が必要であり、zero-ETL統合と比較して運用オーバーヘッドが大きい。"
      - id: "c"
        text: "AuroraのバイナリログをKinesis Data Streamsに送信し、Redshiftにストリーミングする"
        explanation: "不正解。Kinesisを使用したストリーミングパイプラインの構築・管理が必要であり、管理オーバーヘッドが大きい。zero-ETL統合の方が簡潔。"
      - id: "d"
        text: "AWS Glue ETLジョブでAuroraからRedshiftにバッチでデータをロードする"
        explanation: "不正解。Glue ETLジョブはバッチ処理であり、ニアリアルタイムの要件を満たしにくい。また、ETLジョブの管理オーバーヘッドも発生する。"
    answer: "a"

  - id: "aws-dae-ds-010"
    text: "ある企業が時系列のIoTセンサーデータをAmazon DynamoDBに保存しています。テーブルの設計では、sensor_idをパーティションキー、timestampをソートキーとして使用しています。しかし、特定のセンサーに書き込みが集中し、ホットパーティションが発生しています。この問題を解決するための最も適切なアプローチはどれですか？"
    choices:
      - id: "a"
        text: "プロビジョンドキャパシティモードのWCUを増加させる"
        explanation: "不正解。WCUの増加はテーブル全体のスループットを上げるが、ホットパーティションの問題は解決しない。スループットは各パーティションに均等に分配されるため、特定のパーティションへの集中は改善されない。"
      - id: "b"
        text: "パーティションキーにランダムなサフィックス（例：sensor_id + random_suffix）を追加して書き込みを分散させる"
        explanation: "正しい。ライトシャーディングにより、パーティションキーにランダムなサフィックスを追加することで、書き込みが複数のパーティションに分散される。読み取り時にはすべてのサフィックスに対してクエリを実行し、結果をマージする必要がある。"
      - id: "c"
        text: "グローバルセカンダリインデックス（GSI）を追加して書き込みを分散させる"
        explanation: "不正解。GSIは読み取りパターンの最適化に使用されるものであり、ベーステーブルへの書き込みの分散には直接寄与しない。むしろGSIへの書き込みオーバーヘッドが追加される。"
      - id: "d"
        text: "DynamoDB Accelerator (DAX)を導入してスループットを向上させる"
        explanation: "不正解。DAXは読み取りキャッシュであり、書き込みスループットの問題は解決しない。ホットパーティションへの書き込み集中の問題はDAXでは対処できない。"
    answer: "b"

  - id: "aws-dae-ds-011"
    text: "データエンジニアがAmazon Redshiftクラスターに大量のデータをロードする必要があります。データはAmazon S3に複数のgzip圧縮されたCSVファイルとして保存されています。ロードパフォーマンスを最大化するためのベストプラクティスはどれですか？"
    choices:
      - id: "a"
        text: "単一の大きなファイルをINSERT INTO文で1行ずつロードする"
        explanation: "不正解。INSERT INTO文による1行ずつのロードは非常に遅く、大量データのロードには適さない。COPYコマンドが推奨される。"
      - id: "b"
        text: "COPYコマンドを使用し、ファイル数をクラスターのスライス数の倍数に分割してロードする"
        explanation: "正しい。COPYコマンドはS3からの並列ロードに最適化されており、ファイル数をスライス数の倍数に分割することで各スライスが均等にデータをロードできる。これにより、すべてのコンピュートリソースを最大限に活用した並列ロードが実現する。"
      - id: "c"
        text: "AWS Glue ETLジョブを使用してデータを変換し、JDBC接続でRedshiftにロードする"
        explanation: "不正解。JDBC接続によるロードはCOPYコマンドと比較してパフォーマンスが劣る。COPYコマンドはRedshiftに最適化された高速なバルクロード方法である。"
      - id: "d"
        text: "Amazon Kinesis Data Firehoseを使用してデータをストリーミングロードする"
        explanation: "不正解。Firehoseはリアルタイムストリーミングデータのロードに適しているが、既にS3にバッチで保存されたデータのロードにはCOPYコマンドの方が効率的かつ高速。"
    answer: "b"

  - id: "aws-dae-ds-012"
    text: "ある企業がAmazon Keyspacesを使用してアプリケーションのセッションデータを管理しています。セッションデータは作成から24時間後に自動的に削除する必要があります。最も運用オーバーヘッドが少ない方法はどれですか？"
    choices:
      - id: "a"
        text: "AWS Lambda関数をスケジュール実行して、期限切れのセッションデータを定期的に削除する"
        explanation: "不正解。Lambda関数のスケジュール実行は運用オーバーヘッドが発生する。エラーハンドリング、スケーリング、タイムアウト管理なども必要になる。"
      - id: "b"
        text: "Amazon Keyspacesのデフォルトの有効期限（TTL）機能を使用して、行レベルでTTLを設定する"
        explanation: "正しい。Amazon Keyspacesはapache Cassandraと互換性があり、行レベルのTTL（Time to Live）をネイティブでサポートしている。データ挿入時にTTL値を設定するだけで、期限切れのデータが自動的に削除される。追加のインフラストラクチャ管理は不要。"
      - id: "c"
        text: "AWS Glue ETLジョブを使用して期限切れデータを定期的にスキャンし削除する"
        explanation: "不正解。Glue ETLジョブの管理オーバーヘッドが発生し、TTL機能と比較して複雑かつコストが高い。"
      - id: "d"
        text: "Amazon DynamoDBに移行してTTL機能を使用する"
        explanation: "不正解。DynamoDBのTTL機能は有効だが、既にKeyspacesを使用しているアプリケーションを移行する必要があり、不要な工数が発生する。Keyspaces自体がTTL機能を提供している。"
    answer: "b"

  - id: "aws-dae-ds-013"
    text: "データエンジニアがAWS Glue Data CatalogとAmazon Redshift Spectrumを使用して、S3上のデータレイクとRedshiftのデータウェアハウスを統合クエリしたいと考えています。S3上のデータは年/月/日のHiveスタイルパーティションで構成されています。Redshift Spectrumでクエリパフォーマンスを最適化するために最も重要な設定はどれですか？"
    choices:
      - id: "a"
        text: "Glue Data Catalogに外部スキーマを登録し、パーティションプルーニングを活用するためにWHERE句でパーティション列を指定する"
        explanation: "正しい。Redshift SpectrumはGlue Data Catalogのパーティション情報を利用して、クエリに関連するパーティションのみをスキャンする（パーティションプルーニング）。WHERE句でパーティション列（年/月/日）を指定することで、不要なデータのスキャンを回避しパフォーマンスとコストを最適化できる。"
      - id: "b"
        text: "S3上のすべてのデータを単一のプレフィックスに統合する"
        explanation: "不正解。パーティショニングを解除すると、すべてのデータをスキャンする必要があり、パフォーマンスが大幅に低下しコストも増加する。"
      - id: "c"
        text: "Redshift Spectrumの代わりにCOPYコマンドですべてのデータをRedshiftにロードする"
        explanation: "不正解。すべてのデータをRedshiftにロードするとストレージコストが増加し、データレイクの利点（柔軟性、スケーラビリティ）が失われる。Spectrumの目的はS3上のデータを直接クエリすることにある。"
      - id: "d"
        text: "各パーティションに1つの大きなファイルのみを配置する"
        explanation: "不正解。単一の大きなファイルよりも、適切なサイズ（128MB～512MB）の複数ファイルに分割する方が並列処理の恩恵を受けられる。"
    answer: "a"

  - id: "aws-dae-ds-014"
    text: "ある企業がログ分析とダッシュボードの可視化のためにAmazon OpenSearch Serviceを使用しています。インデックスのデータ量が急増し、ストレージコストの増加とクエリパフォーマンスの低下が問題になっています。最も適切な対策はどれですか？"
    choices:
      - id: "a"
        text: "すべてのインデックスのレプリカシャード数を0に設定する"
        explanation: "不正解。レプリカシャードを0にすると可用性と耐障害性が低下する。ノード障害時にデータ損失のリスクがある。"
      - id: "b"
        text: "Index State Management (ISM)ポリシーを使用して、古いインデックスをウォームストレージに移動し、一定期間後に削除する"
        explanation: "正しい。ISMポリシーにより、インデックスのライフサイクルを自動管理できる。ホットストレージからウォームストレージ（UltraWarm）への移行で最大90%のコスト削減が可能。さらにコールドストレージへの移行や期限切れインデックスの自動削除も設定でき、ストレージコストとクエリパフォーマンスの両方を最適化できる。"
      - id: "c"
        text: "データノードのインスタンスタイプを最大サイズにスケールアップする"
        explanation: "不正解。スケールアップはコストが大幅に増加する。データライフサイクル管理を行わずにインスタンスサイズを増やしても、根本的な問題は解決しない。"
      - id: "d"
        text: "インデックスのシャード数を1に減らす"
        explanation: "不正解。シャード数を1に減らすと、大量データの並列処理能力が低下し、クエリパフォーマンスがさらに悪化する可能性がある。"
    answer: "b"

  - id: "aws-dae-ds-015"
    text: "データエンジニアがデータレイクの構築にあたり、スキーマ進化（Schema Evolution）をサポートするファイル形式を選定しています。既存のデータを書き直すことなく、新しいフィールドの追加や既存フィールドの型の互換性のある変更が必要です。また、データは主にストリーミング処理パイプラインの中間フォーマットとして使用されます。最も適切なファイル形式はどれですか？"
    choices:
      - id: "a"
        text: "CSV"
        explanation: "不正解。CSVはスキーマ情報をファイル自体に持たないため、スキーマ進化のサポートが限定的。フィールドの追加や型変更の管理が困難で、データの整合性を保証できない。"
      - id: "b"
        text: "Apache ORC"
        explanation: "不正解。ORCはスキーマ進化を部分的にサポートするが、列の追加のみに限定される。また、ORCは主にバッチ分析に最適化されており、ストリーミング処理の中間フォーマットとしてはAvroが優れている。"
      - id: "c"
        text: "Apache Avro"
        explanation: "正しい。Avroはスキーマ進化を完全にサポートし、前方互換性と後方互換性の両方を提供する。ライタースキーマとリーダースキーマの分離により、新しいフィールドの追加やデフォルト値の設定が容易。また、行指向でシリアライゼーション効率が高く、ストリーミング処理の中間フォーマットに最適。Apache KafkaやKinesis Data Streamsとの親和性も高い。"
      - id: "d"
        text: "Apache Parquet"
        explanation: "不正解。Parquetもスキーマ進化をサポートするが、列指向フォーマットであるため分析クエリに最適化されている。ストリーミング処理の中間フォーマットとしては、行指向のAvroの方がシリアライゼーション/デシリアライゼーション効率が高い。"
    answer: "c"

  - id: "aws-dae-ds-016"
    text: "ある企業がAmazon QuickSightを使用して営業チーム向けのダッシュボードを構築しています。データソースはAmazon Redshiftで、ダッシュボードは毎朝の定例会議で使用されますが、日中はほとんどアクセスされません。ダッシュボードの表示速度を最適化しつつ、Redshiftクラスターへの負荷を最小限に抑えるための最も適切なアプローチはどれですか？"
    choices:
      - id: "a"
        text: "QuickSightのSPICE（Super-fast, Parallel, In-memory Calculation Engine）にデータをインポートし、毎朝の会議前にスケジュール更新を設定する"
        explanation: "正しい。SPICEはQuickSightのインメモリエンジンであり、データをキャッシュすることでRedshiftへの直接クエリを不要にする。スケジュール更新により会議前に最新データを取り込め、日中のRedshiftクラスターへの負荷もゼロになる。SPICEはEnterprise Editionで最大20億行のデータセットをサポートし、ダッシュボード表示も高速化される。"
      - id: "b"
        text: "QuickSightのダイレクトクエリモードを使用してRedshiftにリアルタイムで接続する"
        explanation: "不正解。ダイレクトクエリモードではダッシュボードを開くたびにRedshiftにクエリが送信される。日中ほとんどアクセスされないにもかかわらず、Redshiftクラスターを常時稼働させる必要がありコスト効率が悪い。また、SPICEと比較してダッシュボードの表示速度も遅くなる。"
      - id: "c"
        text: "RedshiftのデータをCSVとしてS3にエクスポートし、QuickSightからS3を直接参照する"
        explanation: "不正解。S3上のCSVファイルを直接参照する方法はデータ変換のオーバーヘッドが発生し、SPICEへのインポートと比較してクエリパフォーマンスも劣る。また、データ更新の自動化が複雑になる。"
      - id: "d"
        text: "Amazon Athenaを経由してRedshiftのデータをクエリし、QuickSightのデータソースとして設定する"
        explanation: "不正解。AthenaをRedshiftの前段に挿入することはアーキテクチャの複雑化を招き、レイテンシも増加する。QuickSightはRedshiftに直接接続可能であり、不要な中間レイヤーを追加するメリットがない。"
    answer: "a"

  - id: "aws-dae-ds-017"
    text: "ある多国籍企業がAmazon QuickSightのEnterprise Editionを使用して、全社共通の売上ダッシュボードを展開しています。各国の営業担当者は自国のデータのみを閲覧できるようにし、管理者はすべての国のデータを閲覧できるようにする必要があります。ダッシュボード自体は全ユーザーで共通のものを使用したい場合、最も適切な方法はどれですか？"
    choices:
      - id: "a"
        text: "国ごとに個別のダッシュボードを作成し、各国の営業担当者に対応するダッシュボードのみを共有する"
        explanation: "不正解。国ごとに個別のダッシュボードを作成すると管理負荷が増大し、ダッシュボードの変更時にすべてのコピーを更新する必要がある。全社共通のダッシュボードという要件にも反する。"
      - id: "b"
        text: "データセットに行レベルセキュリティ（RLS）のルールを適用し、ユーザー名またはグループに基づいて国別のデータアクセスを制御する"
        explanation: "正しい。QuickSight Enterprise Editionの行レベルセキュリティ（RLS）を使用すると、権限データセットにユーザー名/グループと許可する国の組み合わせを定義できる。同一ダッシュボードを全ユーザーに共有しても、各ユーザーは自分に許可されたデータのみを閲覧でき、管理者にはすべてのデータが表示される。ダッシュボードの一元管理が可能になる。"
      - id: "c"
        text: "QuickSightのフィルター機能を使用して、各ユーザーにデフォルトフィルターを設定する"
        explanation: "不正解。フィルターはユーザーが自由に変更できるため、他国のデータへのアクセスを防止するセキュリティ手段にはならない。データアクセス制御にはRLSが必要。"
      - id: "d"
        text: "IAMポリシーを使用して、QuickSightのデータセットレベルでアクセスを制御する"
        explanation: "不正解。IAMポリシーはデータセット全体へのアクセス可否を制御するが、データセット内の行レベルのアクセス制御は行えない。国別のデータフィルタリングにはQuickSightのRLS機能が必要。"
    answer: "b"

  - id: "aws-dae-ds-018"
    text: "あるSaaS企業が自社のWebアプリケーション内にAmazon QuickSightのダッシュボードを埋め込み、エンドユーザーが自然言語で質問してデータインサイトを得られるようにしたいと考えています。エンドユーザーはQuickSightに個別にプロビジョニングされていません。最も適切な実装アプローチはどれですか？"
    choices:
      - id: "a"
        text: "QuickSightの埋め込み分析APIを使用してダッシュボードを埋め込み、Amazon Q in QuickSightのGenerative BI機能を有効化する。匿名ユーザー向けの埋め込みURLを生成し、タグベースのRLSでアクセスを制御する"
        explanation: "正しい。QuickSightの埋め込み分析では、GenerateEmbedUrlForAnonymousUser APIを使用して、QuickSightにプロビジョニングされていない匿名ユーザー向けの埋め込みURLを生成できる。Amazon Q in QuickSightのGenerative BI機能を埋め込みダッシュボード内で有効化することで、自然言語によるQ&A、AIによるエグゼクティブサマリー、データストーリー生成が利用可能になる。タグベースのRLSにより匿名ユーザーのデータアクセスも制御できる。"
      - id: "b"
        text: "QuickSightの公開ダッシュボード共有リンクを生成し、アプリケーションにiframeで埋め込む"
        explanation: "不正解。QuickSightには認証なしの公開ダッシュボード共有リンク機能は存在しない。埋め込みには専用の埋め込みAPIを使用する必要がある。"
      - id: "c"
        text: "各エンドユーザーをQuickSightのReaderとしてプロビジョニングし、QuickSightのコンソールURLを直接共有する"
        explanation: "不正解。エンドユーザーがQuickSightに個別にプロビジョニングされていないという要件に反する。SaaSアプリケーションの多数のエンドユーザーを全員Readerとして登録するとコストも増大する。"
      - id: "d"
        text: "Amazon Athenaに直接クエリを送信するカスタムの自然言語インターフェースを構築する"
        explanation: "不正解。カスタムの自然言語インターフェースの構築には多大な開発工数が必要であり、Amazon Q in QuickSightが既に提供するGenerative BI機能を活用する方が効率的。"
    answer: "a"

  - id: "aws-dae-ds-019"
    text: "あるスタートアップ企業がデータウェアハウスの導入を検討しています。クエリのワークロードは日中に集中し、夜間や週末はほとんど使用されません。ワークロードの量は月によって大きく変動し、将来的な成長も予測困難です。インフラストラクチャの管理を最小限にしたいと考えています。最も適切な選択はどれですか？"
    choices:
      - id: "a"
        text: "Amazon Redshift Serverlessを使用する"
        explanation: "正しい。Redshift Serverlessはクエリ実行時のみRPU（Redshift Processing Units）に対して課金され、アイドル時はコストが発生しない。ワークロードに応じてコンピュートキャパシティが自動スケーリングされるため、変動の大きいワークロードに最適。ノードの選定、クラスターのサイジング、メンテナンスウィンドウの管理も不要であり、インフラ管理を最小化できる。"
      - id: "b"
        text: "Amazon Redshiftのプロビジョンドクラスター（dc2.largeノード）を使用し、不使用時にクラスターを一時停止する"
        explanation: "不正解。プロビジョンドクラスターの一時停止・再開は可能だが、一時停止中もストレージ料金が発生する。また、ワークロードの変動に応じたノード数の手動調整やクラスターサイジングの管理が必要であり、運用オーバーヘッドがServerlessより大きい。"
      - id: "c"
        text: "Amazon Redshiftのプロビジョンドクラスターでra3.xlplusノードを使用し、Concurrency Scalingを有効化する"
        explanation: "不正解。ra3ノードはストレージとコンピュートの分離により柔軟性が高いが、常時稼働のベースコストが発生する。Concurrency Scalingはピーク時のスケールアウトに有効だが、夜間・週末のアイドル時間のコストは削減できない。"
      - id: "d"
        text: "Amazon Athenaを使用してS3上のデータを直接クエリする"
        explanation: "不正解。Athenaはアドホッククエリには適しているが、データウェアハウスとしての機能（マテリアライズドビュー、ストアドプロシージャ、複雑なETLなど）を提供しない。本格的なデータウェアハウスの用途にはRedshiftの方が適切。"
    answer: "a"

  - id: "aws-dae-ds-020"
    text: "データエンジニアがAmazon Redshiftで複雑な集計クエリを含むダッシュボードのパフォーマンスを改善する必要があります。ダッシュボードは15分ごとに更新され、同じ集計クエリが繰り返し実行されます。同時に、アドホッククエリを実行するデータアナリストチームと、ETLロードジョブが同じクラスターで稼働しています。パフォーマンスを最適化し、ワークロード間の干渉を防ぐための最も適切な組み合わせはどれですか？"
    choices:
      - id: "a"
        text: "ダッシュボードの集計クエリにマテリアライズドビューを作成して自動リフレッシュを設定し、自動ワークロード管理（Auto WLM）を有効化してワークロードの優先度をMLで動的に管理する"
        explanation: "正しい。マテリアライズドビューは複雑な集計結果を事前計算して保持し、ダッシュボードクエリの応答時間を大幅に短縮する（30～45秒の集計が2秒未満に改善された事例がある）。自動リフレッシュにより増分更新が可能。Auto WLMは機械学習を活用してメモリと同時実行数を動的に管理し、ダッシュボード、アドホッククエリ、ETLジョブのワークロード間でリソースを最適配分する。"
      - id: "b"
        text: "ダッシュボードのクエリ結果をRedshiftの一時テーブルにキャッシュし、手動WLMで3つのキューを固定メモリ配分で作成する"
        explanation: "不正解。一時テーブルへのキャッシュは手動管理が必要であり、マテリアライズドビューの自動リフレッシュと比較して運用負荷が高い。手動WLMの固定メモリ配分はワークロードの変動に対応しにくく、Auto WLMの方がリソース利用効率が高い。"
      - id: "c"
        text: "Concurrency Scalingを有効化し、すべてのクエリを同一のデフォルトキューで実行する"
        explanation: "不正解。Concurrency Scalingはピーク時の同時実行性を向上させるが、ワークロードの優先度制御やリソース配分は行わない。ETLジョブがダッシュボードクエリのリソースを圧迫する可能性がある。また、繰り返し実行される集計クエリの根本的な高速化にはマテリアライズドビューが必要。"
      - id: "d"
        text: "クラスターのノード数を2倍にスケールアップして、すべてのワークロードに十分なリソースを確保する"
        explanation: "不正解。スケールアップはコストが大幅に増加し、根本的な最適化にはならない。マテリアライズドビューによる計算量の削減とWLMによるリソース配分の最適化の方が、コスト効率の良いアプローチ。"
    answer: "a"

  - id: "aws-dae-ds-021"
    text: "データエンジニアがAmazon Athenaを使用して、Amazon S3上のデータレイクのデータとAmazon RDS for PostgreSQL内のトランザクションデータを結合するクエリを実行する必要があります。RDSのデータをS3にコピーすることなく、単一のSQLクエリで両方のデータソースを結合するための最も適切な方法はどれですか？"
    choices:
      - id: "a"
        text: "Athenaフェデレーテッドクエリを使用し、RDS用のLambdaベースのデータソースコネクタをデプロイしてクエリを実行する"
        explanation: "正しい。Athenaフェデレーテッドクエリは、AWS Lambdaで実行されるデータソースコネクタを介して外部データソースに接続する。AWSが提供するプリビルトのJDBC対応コネクタ（PostgreSQL用を含む）を使用することで、S3上のデータとRDSのデータを単一のSQLクエリで結合できる。コネクタはフィルタ述語のプッシュダウンやApache Arrow形式でのデータ返却をサポートし、効率的なクエリ実行が可能。"
      - id: "b"
        text: "AWS Glue ETLジョブでRDSのデータをS3にコピーしてからAthenaでクエリする"
        explanation: "不正解。RDSのデータをS3にコピーすることなく結合するという要件に反する。また、ETLジョブの管理とデータの鮮度維持のオーバーヘッドが発生する。"
      - id: "c"
        text: "Amazon Redshift Spectrumを使用してS3とRDSのデータを結合する"
        explanation: "不正解。Redshift SpectrumはS3上の外部テーブルに対するクエリ機能であり、RDSへの直接フェデレーションはサポートしていない。Redshiftを使用する場合もRDSのデータを事前にロードする必要がある。"
      - id: "d"
        text: "RDSのリードレプリカを作成し、Athenaから直接JDBC接続でクエリする"
        explanation: "不正解。AthenaはJDBC接続による直接クエリ機能を持たない。AthenaがRDSのデータにアクセスするには、フェデレーテッドクエリ用のLambdaコネクタを経由する必要がある。"
    answer: "a"

  - id: "aws-dae-ds-022"
    text: "ある企業がAmazon Athenaを複数のチーム（データサイエンス、BI、アプリケーション開発）で共有しています。各チームのクエリコストを個別に追跡し、特定のチームが過剰なデータスキャンを行った場合に自動的にクエリをキャンセルする仕組みを導入したいと考えています。最も適切な方法はどれですか？"
    choices:
      - id: "a"
        text: "チームごとにAthenaワークグループを作成し、ワークグループごとにクエリあたりのデータスキャン量上限とワークグループ全体の日次スキャン量上限を設定する。CloudWatchメトリクスとAmazon SNSを使用してアラート通知を構成する"
        explanation: "正しい。Athenaワークグループでは、クエリあたりのスキャン上限（BytesScannedCutoffPerQuery）を設定すると上限を超えたクエリが自動キャンセルされる。ワークグループ全体の日次/時間単位のスキャン量閾値も設定可能で、閾値超過時にAmazon SNSトピックに通知を送信できる。各ワークグループのCloudWatchメトリクスでコストを個別に追跡でき、チームごとの利用状況を可視化できる。"
      - id: "b"
        text: "IAMポリシーでチームごとにAthenaのクエリ実行権限を制限し、AWS Budgetsでコストアラートを設定する"
        explanation: "不正解。IAMポリシーでクエリ実行権限を制限しても、データスキャン量の上限設定やクエリの自動キャンセルは実現できない。AWS Budgetsは事後的なコスト通知であり、リアルタイムのクエリ制御には対応しない。"
      - id: "c"
        text: "チームごとに個別のAWSアカウントを作成し、アカウント単位でコストを管理する"
        explanation: "不正解。アカウント分離はコスト管理には有効だが、クロスアカウントのデータ共有やカタログ管理が複雑になる。Athenaワークグループを使用すれば同一アカウント内でチーム単位のコスト管理と制御が可能。"
      - id: "d"
        text: "AWS Lambda関数を定期実行してAthenaのクエリログを監視し、スキャン量が閾値を超えたクエリを手動でキャンセルする"
        explanation: "不正解。Lambda関数による監視はリアルタイム性に欠け、クエリ実行中のキャンセルが間に合わない可能性がある。ワークグループのクエリあたりスキャン上限設定の方が確実かつ運用オーバーヘッドが少ない。"
    answer: "a"

  - id: "aws-dae-ds-023"
    text: "ある企業がオンプレミスのPostgreSQLデータベースからAWSに移行し、トランザクションデータを分析パイプラインの起点として活用する計画です。要件として、トランザクション処理の低レイテンシ、Redshiftへのニアリアルタイムデータ連携、およびETLパイプラインの管理最小化が求められています。最も適切なアーキテクチャはどれですか？"
    choices:
      - id: "a"
        text: "Amazon RDS for PostgreSQLに移行し、zero-ETL統合でAmazon Redshiftにデータを連携する"
        explanation: "正しい。Amazon RDS for PostgreSQLのzero-ETL統合（2025年GA）により、ETLパイプラインを構築・管理することなくトランザクションデータをRedshiftにニアリアルタイムでレプリケーションできる。データフィルタリングにより特定のテーブルのみを連携対象にすることも可能。RDSはフルマネージドで低レイテンシのトランザクション処理を提供し、PostgreSQL互換のため移行も容易。"
      - id: "b"
        text: "Amazon Aurora PostgreSQL互換に移行し、AWS DMSでRedshiftに継続的レプリケーションを設定する"
        explanation: "不正解。DMSによる継続的レプリケーションは可能だが、レプリケーションインスタンスの管理やタスク監視が必要であり、zero-ETL統合と比較して運用オーバーヘッドが大きい。Aurora PostgreSQLもzero-ETL統合をサポートしているが、RDS for PostgreSQLで十分な場合にAuroraを選択するとコストが増加する。"
      - id: "c"
        text: "Amazon RDS for PostgreSQLに移行し、AWS Glueジョブで定期的にRedshiftにデータをロードする"
        explanation: "不正解。Glueジョブはバッチ処理であり、ニアリアルタイムのデータ連携要件を満たしにくい。ETLジョブの管理も必要であり、管理最小化の要件に反する。"
      - id: "d"
        text: "Amazon Redshiftにトランザクションデータを直接格納し、分析クエリも同じクラスターで実行する"
        explanation: "不正解。Redshiftは分析ワークロードに最適化されたカラムナーストレージであり、低レイテンシのトランザクション処理（頻繁なINSERT/UPDATE/DELETE）には適さない。OLTPワークロードにはRDSのような行指向データベースが適切。"
    answer: "a"

  - id: "aws-dae-ds-024"
    text: "ある企業がモバイルゲームのユーザープロファイル、インベントリ、プレイ履歴を管理するデータベースを選定しています。データは半構造化されたJSONドキュメントとして格納され、スキーマは頻繁に変更されます。既存のアプリケーションコードはMongoDB APIを使用しており、フルマネージドのAWSサービスに移行したいと考えています。また、将来的にベクトル検索によるAIベースのレコメンデーション機能も計画しています。最も適切なサービスはどれですか？"
    choices:
      - id: "a"
        text: "Amazon DocumentDB（MongoDB互換）"
        explanation: "正しい。Amazon DocumentDBはMongoDB互換のフルマネージドドキュメントデータベースであり、既存のMongoDBドライバーとツールをそのまま使用できる。柔軟なJSONドキュメントモデルにより頻繁なスキーマ変更にも対応可能。DocumentDB 8.0ではクエリレイテンシが最大7倍改善され、圧縮率も最大5倍向上している。さらにベクトルインデックスのビルド時間が最大30倍高速化されており、AIベースのレコメンデーション用ベクトル検索にも対応できる。"
      - id: "b"
        text: "Amazon DynamoDB"
        explanation: "不正解。DynamoDBはスケーラビリティに優れたNoSQLデータベースだが、MongoDB API互換ではないため既存のアプリケーションコードの大幅な書き換えが必要。また、DynamoDBの柔軟なクエリやアグリゲーション機能はDocumentDBより制限される。"
      - id: "c"
        text: "Amazon RDS for PostgreSQL（JSONBカラム使用）"
        explanation: "不正解。PostgreSQLのJSONBはJSONドキュメントの保存が可能だが、MongoDB APIとは互換性がなく、既存のアプリケーションコードの大幅な書き換えが必要。半構造化データに特化したドキュメントデータベースとしての柔軟性もDocumentDBに劣る。"
      - id: "d"
        text: "Amazon Neptune"
        explanation: "不正解。Neptuneはグラフデータベースであり、ドキュメント型のJSONデータ格納やMongoDB互換のAPIをサポートしていない。グラフ型の関係性データの管理には適しているが、本ユースケースには不適切。"
    answer: "a"

  - id: "aws-dae-ds-025"
    text: "ある金融企業がus-east-1リージョンにAmazon S3データレイクとAmazon Redshiftクラスターを運用しています。規制要件により、リージョン障害時にもRTO 60分以内でeu-west-1リージョンからデータレイクとデータウェアハウスの両方を復旧できるディザスタリカバリ（DR）戦略が必要です。最もコスト効率が良く、要件を満たすアプローチはどれですか？"
    choices:
      - id: "a"
        text: "S3クロスリージョンレプリケーション（CRR）をeu-west-1のバケットに設定し、Redshiftのクロスリージョン自動スナップショットコピーをeu-west-1に構成する。障害時にスナップショットからRedshiftクラスターを復元する"
        explanation: "正しい。S3 CRRにより、データレイクのオブジェクトがeu-west-1に非同期で自動レプリケーションされる。ソースバケットでの削除はDRリージョンに伝播しないため、悪意のある削除からも保護される。Redshiftのクロスリージョン自動スナップショットコピーにより、約8時間ごとまたは5GB/ノードのデータ変更ごとにスナップショットが自動的にDRリージョンにコピーされる。障害時には最新のスナップショットからクラスターを復元でき、RTO 60分以内を達成可能。DR側で常時クラスターを稼働させる必要がないためコスト効率が良い。"
      - id: "b"
        text: "eu-west-1にS3バケットとRedshiftクラスターの完全なレプリカ環境を常時稼働させ、アクティブ-アクティブ構成にする"
        explanation: "不正解。アクティブ-アクティブ構成はRTOを最小化できるが、DRリージョンでRedshiftクラスターを常時稼働させるコストが二重に発生する。RTO 60分以内の要件であれば、バックアップ＆リストア方式で十分達成可能であり、コスト効率の面で劣る。"
      - id: "c"
        text: "AWS Backupを使用してS3とRedshiftのバックアップをeu-west-1に定期コピーする。障害時にバックアップからすべてを復元する"
        explanation: "不正解。AWS BackupでS3とRedshiftのクロスリージョンコピーは可能だが、S3 CRRの連続的なレプリケーションと比較してRPOが大きくなる可能性がある。また、S3 CRRとRedshiftの自動スナップショットコピーを直接使用する方が、バックアッププランの管理オーバーヘッドが少ない。"
      - id: "d"
        text: "AWS CloudFormationテンプレートを準備し、障害時にeu-west-1で環境全体をゼロから再構築する"
        explanation: "不正解。環境の再構築はインフラのプロビジョニングにかかる時間に加え、データのコピーに長時間を要する。大量のデータレイクとデータウェアハウスのデータを障害発生後にリージョン間転送するとRTO 60分以内を達成できない。"
    answer: "a"
